canonical_example: |-
  struct stat_double { double mystery; double a; double b; };
  void who_am_i(stat_double &data) {
    if (data.a > data.b)
      data.mystery = data.a - data.b;
    else
      data.mystery = data.b - data.a;
  }
expected_output: mystery = |a - b| (absolute difference)

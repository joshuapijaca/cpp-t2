    why_one_line: fourth mock; adds tricky stat_double mystery formulas to Q1.
    snippet: |-
      // Mock 4 — absolute difference variant
      struct stat_double { double mystery; double a; double b; };

      void who_am_i(stat_double &data) {
        if (data.a > data.b)
          data.mystery = data.a - data.b;
        else
          data.mystery = data.b - data.a;
      }

      void read_stat(stat_double &list[], int count) {
        for (int i = 0; i < count; i++) {
          cin >> list[i].a;
          cin >> list[i].b;
        }
      }

      int main() {
        const int MAX = 100;
        stat_double list[MAX];
        int count;
        cin >> count;
        read_stat(list, count);
        return 0;
      }

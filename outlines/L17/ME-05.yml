  see_demo:
    why_one_line: final mock; production-readiness check before exam day.
    snippet: |-
      // Mock 5 — count-positive variant
      struct stat_double { double mystery; double numbers[5]; };

      void who_am_i(stat_double &data) {
        data.mystery = 0;
        for (int i = 0; i < 5; i++) {
          if (data.numbers[i] > 0)
            data.mystery = data.mystery + 1;
        }
      }

      void read_stat(stat_double &list[], int count) {
        for (int i = 0; i < count; i++) {
          for (int j = 0; j < 5; j++) {
            cin >> list[i].numbers[j];
          }
        }
      }

      int main() {
        const int MAX = 100;
        stat_double list[MAX];
        int count;
        cin >> count;
        read_stat(list, count);
        return 0;
      }

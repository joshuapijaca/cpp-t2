canonical_example: |-
  struct stat_double { double mystery; double numbers[5]; };
  void who_am_i(stat_double &data) {
    data.mystery = 0;
    for (int i = 0; i < 5; i++) {
      if (data.numbers[i] > 0)
        data.mystery = data.mystery + 1;
    }
  }
expected_output: mystery = count of positive numbers

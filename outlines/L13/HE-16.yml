canonical_example: |
  // Max of an array of 5 doubles
  double nums[5] = {3.2, 7.1, 5.0, 9.4, 2.8};
  double max_val = nums[0];
  for (int i = 1; i < 5; i++) {
      if (nums[i] > max_val) {
          max_val = nums[i];
      }
  }
  // max_val = 9.4

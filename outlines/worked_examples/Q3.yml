    variant_name: "read_book"
    explanation: "canonical Q3: void + &list[] + int count + for-loop + cin per field."
    highlights: ["book &list[]", "cin >> list[i].title"]
    code: |
      void read_book(book &list[], int count) {
        for (int i = 0; i < count; i++) {
          cout << "id: ";    cin >> list[i].id;
          cout << "title: "; cin >> list[i].title;
          cout << "price: "; cin >> list[i].price;
        }
      }

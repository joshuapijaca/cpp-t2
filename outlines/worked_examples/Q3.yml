  - id: we-q3-09
    atom_id: RW-02
    variant_name: "trap-no-ampersand"
    explanation: "WRONG. Without &, writes vanish at return. Caller array stays empty."
    highlights: ["book list[]"]
    code: |
      // WRONG: no & means writes never reach caller.
      void read_book(book list[], int count) {   // <-- missing &
        for (int i = 0; i < count; i++) {
          cin >> list[i].id;          // local copy
          cin >> list[i].title;
          cin >> list[i].price;
        }
      }
  - id: we-q3-10
    atom_id: RW-04
    variant_name: "trap-wrong-loop-bound"
    explanation: "WRONG. i <= count walks one past the last record."
    highlights: ["i <= count"]
    code: |
      // WRONG: i <= count is off-by-one.
      void read_book(book &list[], int count) {
        for (int i = 0; i <= count; i++) {        // <-- should be i < count
          cin >> list[i].id;
        }
      }

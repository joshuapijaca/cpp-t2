  - id: we-q4-01
    atom_id: MW-01
    variant_name: "book-main"
    explanation: "canonical Q4: const MAX, list[MAX], count, cin, call read, printf loop."
    highlights: ["const int MAX = 100;", "read_book(list, count);", "%d %s %.2f\\n", ".c_str()"]
    code: |
      int main() {
        const int MAX = 100;
        book list[MAX];
        int count;
        cin >> count;
        read_book(list, count);
        for (int i = 0; i < count; i++) {
          printf("%d %s %.2f\n", list[i].id, list[i].title.c_str(), list[i].price);
        }
        return 0;
      }

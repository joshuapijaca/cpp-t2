full_code: |
  #include <iostream>
  #include <string>
  using namespace std;
  
  struct book {
    int id;
    string title;
    double price;
  };
  
  int main() {
    book b;
    b.id = 1;
    b.title = "C++";
    b.price = 9.95;
    cout << b.id << " " << b.title << endl;
    return 0;
  }

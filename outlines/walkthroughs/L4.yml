full_code: |
  #include <iostream>
  using namespace std;
  
  int main() {
    int width = 4;
    int height = 3;
    int area = width * height;
    int perim = 2 * (width + height);
    cout << "area = " << area << endl;
    cout << "perim = " << perim << endl;
    return 0;
  }

    - "const blocks param mutation"
    - "const & for safety not mutation"
    - "read but don't write"
    - "const & passes ref but locks"
  trace:
    description: "Show legal read through const &; show compile error on mutation attempt."
    minimum_steps: 3
    must_show:
      - "alias bound (const)"
      - "read OK"
      - "write attempted -> compiler error"
  write_L1_fill:
    template: "void print_user(___ user_data &user) { cout << user.username; }"
    blank_value: "const"
  write_L2_complete:
    template: "void print(const user_data &u) {\n  ___\n}"
    blank_value: "cout << u.username;"
  write_L3_free_spec: "Write a function that prints a user_data struct without allowing mutation. Use const &."

  see_demo:
    why_one_line: "const & lets the function read the caller box without ever writing it."
    snippet: |

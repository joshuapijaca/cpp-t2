canonical_example: |
  void print_user(const user_data &user) {
    cout << user.username << endl;
    // user.username = "X";  // ERROR: cannot modify const
  }

  int main() {
    user_data u;
    u.username = "alice";
    print_user(u);     // u stays "alice"
    return 0;
  }
expected_output: "alice"

sit102_quirks:
  - "const & = pass-by-ref but compiler blocks mutation"
  - "Used for read-only large structs (efficiency)"
  - "Q3 read_X uses & (mutable) NOT const & (mutable required)"

misconceptions:
  - id: M01
    description: "Believes & always requires const"
    student_says: "Must always write const & in parameters"
    correct_says: "& alone for mutable; const & for read-only"
  - id: M02
    description: "Tries to mutate const & param"
    student_says: "user.username = newName;"
    correct_says: "Compile error - const blocks mutation through this alias"
  - id: M03
    description: "Misuses const & where mutation needed"
    student_says: "Used const X &list[] for read_X"
    correct_says: "read_X must mutate list - use plain X &list[]"

render_hints:

# M21 — Purpose-authored decompose snippets for 103 fallback atoms.
# Each snippet shows ≥3 atoms interacting. Grouped by level.
# Atoms assigned per-level to shared snippets.
# Skip: P-01..P-07 (meta), ME-01..ME-05 (mock composite) = 12 intentional fallback.

snippets:
  hello_world: |
    #include <iostream>
    using namespace std;

    int main() {
      cout << "Hello" << endl;
      return 0;
    }

  cout_chain: |
    string name = "Alice";
    int score = 95;
    cout << "Name: " << name << endl;
    cout << "Score: " << score << "\n";

  printf_format: |
    int id = 42;
    string name = "Bob";
    double gpa = 3.75;
    printf("Student %d: %s, GPA %.2f\n", id, name.c_str(), gpa);

  var_types: |
    int age = 25;
    double price = 9.99;
    string name = "Alice";
    char grade = 'A';
    bool passed = true;

  var_assign: |
    int x = 5;
    x = x + 1;
    int y = x;
    string greeting = "hi";
    greeting = "hello";

  var_const: |
    const int MAX = 100;
    int count = 0;
    double total = 0.0;
    count = count + 1;
    total = total + 9.99;

  input_basic: |
    int age;
    string name;
    cout << "Enter name: ";
    cin >> name;
    cout << "Enter age: ";
    cin >> age;
    cout << name << " is " << age << endl;

  arith_basic: |
    int a = 10, b = 3;
    int sum = a + b;
    int diff = a - b;
    int prod = a * b;
    int quot = a / b;
    int rem = a % b;

  arith_inc: |
    int x = 5;
    x++;
    x--;
    int y = (x + 2) * 3;
    double z = 10.0 / 3;

  cond_compare: |
    int x = 10;
    if (x > 5) {
      cout << "big" << endl;
    } else if (x == 5) {
      cout << "exact" << endl;
    } else {
      cout << "small" << endl;
    }

  cond_logic: |
    int x = 10;
    if (x > 5 && x < 20) {
      cout << "in range" << endl;
    }
    if (x < 0 || x > 100) {
      cout << "out of bounds" << endl;
    }
    bool valid = !(x < 0);

  func_basic: |
    int square(int x) {
      return x * x;
    }

    int main() {
      int result = square(5);
      cout << result << endl;
      return 0;
    }

  loop_for: |
    for (int i = 0; i < 5; i++) {
      cout << i << " ";
    }
    cout << endl;
    int sum = 0;
    for (int i = 1; i <= 10; i++) {
      sum = sum + i;
    }

  loop_while: |
    int i = 0;
    while (i < 10) {
      if (i == 7) break;
      if (i % 2 == 0) {
        i++;
        continue;
      }
      cout << i << " ";
      i++;
    }

  string_methods: |
    string name = "Alice";
    int len = name.length();
    char first = name[0];
    string sub = name.substr(1, 3);
    cout << len << " " << first << " " << sub << endl;

  string_convert: |
    int x = 42;
    string s = to_string(x);
    double d = stod("3.14");
    int n = stoi("99");
    cout << s << " " << d << " " << n << endl;

  array_loop: |
    int arr[5] = {10, 20, 30, 40, 50};
    for (int i = 0; i < 5; i++) {
      arr[i] = arr[i] * 2;
    }
    cout << arr[0] << " " << arr[4] << endl;

  param_ref: |
    struct Point { int x; int y; };
    void shift(Point &p) {
      p.x = p.x + 1;
      p.y = p.y + 1;
    }
    Point a = {3, 4};
    shift(a);

  struct_write: |
    struct student {
      int id;
      string name;
      double gpa;
    };

  main_wrapper: |
    int main() {
      const int MAX = 100;
      book list[MAX];
      int count;
      cin >> count;
      read_book(list, count);
      for (int i = 0; i < count; i++) {
        printf("%d %s %.2f\n", list[i].id, list[i].title.c_str(), list[i].price);
      }
      return 0;
    }


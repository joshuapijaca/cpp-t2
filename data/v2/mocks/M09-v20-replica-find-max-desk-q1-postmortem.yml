stem: |
  Postmortem for Mock M09 Q1 (hand-execute, V2.0 replica).
  Why did the failed attempt below lose marks? What's the exact repair?

failedAttempt: |
  // Student forgot pre-loop init (seeded with brace-init 0.0).
  void who_am_i(stat_double &data) {
    int i;
    // (init line forgotten)
    for (i = 0; i < SIZE; i++) {
      if (data.numbers[i] > data.mystery) {
        data.mystery = data.numbers[i];
      }
    }
    return;
  }
  // Result: d.mystery = 11.3 by luck (6.5 > 0.0), but the marker
  // checks the trace, not the final number — and the trace is wrong.

diagnosis: |
  Skipping the pre-loop init (line `data.mystery = data.numbers[0];`)
  leaves data.mystery at the brace-init value (0.0). For find-max,
  the canonical seed is data.numbers[0] (= 6.5), not 0.0. With the
  bad seed, i=0 fires (6.5 > 0.0) and overwrites mystery to 6.5 —
  this is correct by coincidence, but the iteration trace is wrong:
  the marker scans for `mystery = numbers[0]` BEFORE the loop.

repairSteps:
  - "Add line `data.mystery = data.numbers[0];` before the for-loop."
  - "Re-do the trace with seed=6.5 written first."
  - "Verify final d.mystery equals 11.3 (only 11.3 beats running max)."

preventionTip: |
  Find-max ALWAYS seeds with `data.numbers[0]`, NOT with 0.0. Write the seed line first, before reading the loop body.


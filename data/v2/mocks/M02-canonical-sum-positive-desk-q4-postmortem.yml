stem: |
  Postmortem for Mock M02 Q4 (main, V2.0 shape). Why did the failed
  attempt below lose marks? What's the exact repair?

failedAttempt: |
  int main() {
    desk_data desks[100];
    int desk_num;
    cin >> desk_num;
    read_desks(desks, desk_num);
    return 0;
  }
  // Bugs: (1) hard-coded 100 instead of MAX=700; (2) no print loop.

diagnosis: |
  Three stacked V2.0 issues: (1) `const int MAX = 700;` is the
  V2.0-verbatim rubric token; the mock uses 700 (not 100). Hard-coding
  `desks[100]` loses the const-named-MAX rubric mark. (2) The print
  loop is missing — main must iterate desks and `cout` each field
  with `<< endl` on the last. (3) The cout prompt `"How many desks? "`
  is also expected per the V2.0 shape.

repairSteps:
  - "Add `const int MAX = 700;` then change `desks[100]` to `desks[MAX]`."
  - "Add the cout prompt line: `cout << \"How many desks? \";`."
  - "Add the for-loop after read_desks: `for (int i = 0; i < desk_num; i++) { cout << desks[i].room_id << \", \"; ... << endl; }`."
  - "Verify: token-match for `const int MAX = 700` AND `endl` AND `return 0;` all pass."

preventionTip: |
  Every Q4 V2.0 main has these non-negotiable tokens: `const int MAX = 700;`, `desk_data desks[MAX];`, `int desk_num;`, `read_desks(desks, desk_num);`, print loop with `endl`, `return 0;`.


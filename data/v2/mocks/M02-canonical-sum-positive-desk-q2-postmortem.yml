stem: |
  Postmortem for Mock M02 Q2 (struct define, V2.0 shape). Why did the
  failed attempt below lose marks? What's the exact repair?

failedAttempt: |
  struct desk_data {
    int room_id;
    int d_id;
    int number_of_screens;
  }
  // Bug: missing ; after closing }.

diagnosis: |
  Forgot the `;` after the closing `}` of the struct.
  C++ requires every struct/class definition to be a STATEMENT, and
  statements end in semicolon. Without it, the next declaration
  (usually a function) silently parses as an instance declaration
  of the struct, producing cascading "expected initializer" errors.
  V2.0 entity = desk_data with 3 int fields (room_id, d_id,
  number_of_screens) — no string fields, no double height.

repairSteps:
  - "Add `;` after the closing `}` of the struct."
  - "Confirm the 3 fields are exactly: int room_id; int d_id; int number_of_screens;."
  - "Pattern memorize: every `struct X { ... };` form ends with `};`."

preventionTip: |
  Mentally chant `struct close brace SEMICOLON` whenever you write a struct.


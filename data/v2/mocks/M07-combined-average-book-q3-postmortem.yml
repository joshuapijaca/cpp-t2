stem: |
  Postmortem for Mock M07 Q3 (read function). Why did the failed
  attempt below lose marks? What's the exact repair?

failedAttempt: |
  void read_books(book_data arr, int count) {
    int i;
    for (i = 0; i < count; i++) {
      cin >> arr[i].title;
    }
  }
  // Bug: arr passed by value (no [], no &). Caller's array unchanged.

diagnosis: |
  Two stacked errors: (1) parameter `book_data arr` accepts
  a single struct by value, not an array; (2) even if a value-array
  were possible, mutations would not propagate back. The correct
  form is `book_data arr[]` (decay-array, the Deakin convention)
  which auto-passes by-pointer to the underlying memory.

repairSteps:
  - "Change `book_data arr` to `book_data arr[]`."
  - "Verify compile + run shows mutations persist."
  - "Drill Q3 read-function template 5x."

preventionTip: |
  Q3 signature is always `void read_X(EntityName arr[], int count)` — drill the [] and the &-style.


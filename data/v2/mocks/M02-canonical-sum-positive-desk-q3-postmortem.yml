stem: |
  Postmortem for Mock M02 Q3 (read function, V2.0 shape). Why did the
  failed attempt below lose marks? What's the exact repair?

failedAttempt: |
  void read_desks(desk_data desk_list, int number_to_read) {
    int i;
    for (i = 0; i < number_to_read; i++) {
      cin >> desk_list[i].room_id;
    }
  }
  // Bug: param `desk_data desk_list` is a single struct value, not an array.
  //      Missing `&` and `[]` per Deakin V2.0 convention.

diagnosis: |
  Two stacked errors: (1) parameter `desk_data desk_list` accepts
  a single struct by value, not an array; (2) the V2.0 Deakin
  convention is `desk_data &desk_list[]` — ampersand AND empty
  brackets. Without `&[]` the array does not pass through correctly
  per the rubric, and only one of three fields is read (room_id only;
  d_id and number_of_screens are skipped).

repairSteps:
  - "Change `desk_data desk_list` to `desk_data &desk_list[]`."
  - "Add the two missing cin lines: `cin >> desk_list[i].d_id;` and `cin >> desk_list[i].number_of_screens;`."
  - "Verify signature matches V2.0 verbatim: `void read_desks(desk_data &desk_list[], int number_to_read)`."

preventionTip: |
  Q3 V2.0 signature is ALWAYS `void read_X(EntityName &arr[], int number_to_read)` — drill the `&` AND the `[]` together. Read all three fields.


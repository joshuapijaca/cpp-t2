failedAttempt: |
  struct Desk_Data {
    int room_id;
    int d_id;
    int number_of_screens;
  };
  // Bug: capital D's. V2.0 convention is all-lowercase snake_case.

diagnosis: |
  The V2.0 entity name is `desk_data` — all lowercase snake_case.
  Capitalising as `Desk_Data` (or `DeskData`) breaks the rubric
  token-match: every later occurrence of `desk_data` in the read
  function and main also has to use the exact name. Inconsistent
  casing yields cascading "undeclared identifier" errors.

repairSteps:
  - "Lowercase the struct name to `desk_data`."
  - "Audit all later uses (read_desks signature, main array, print loop) — they must all read `desk_data`."
  - "Verify: the `;` at the end of `};` is also present."

preventionTip: |
  All V2.0 entity names are lowercase snake_case. Burn this in: `desk_data`, `book_data`, `employee_data` — never capitals.


prompt: |
  === Q1 (25 marks) HAND EXECUTE ===
  const int SIZE = 5;
  
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };
  
  void who_am_i(stat_double &data) {
    int i;
    data.mystery = 0.0;
    for (i = 0; i < SIZE; i++) {
      if (data.numbers[i] < 0) {
        data.mystery = data.mystery + data.numbers[i];
      }
    }
    return;
  }
  
  stat_double d = {{1.0, -2.5, 3.0, -1.5, 4.0}, 0.0};
  who_am_i(d);
  // Report d.mystery + iteration trace.
  
  === Q2 (25 marks) DEFINE STRUCT ===
  Define a struct order_data with the following fields (in order):
  string customer; int items; double total;
  
  === Q3 (25 marks) READ FUNCTION ===
  Write read_orders(order_data arr[], int count) that reads
  three fields per element from cin into the array.
  Use a for-loop. Pass arr by reference (decay-array form).
  
  === Q4 (25 marks) MAIN ===
  Write int main() that:
    1. Declares const int MAX = 100;
    2. Declares order_data arr[MAX];
    3. Reads count from cin (count <= MAX).
    4. Calls read_orders(arr, count) to populate.
    5. Calls print_orders(arr, count) to display.
    6. Returns 0.

canonicalAnswer: |
  // Q1 final value: d.mystery == -4.0
  
  // Q2: struct
  struct order_data {
    string customer;
    int items;
    double total;
  };
  
  // Q3: read function
  void read_orders(order_data arr[], int count) {
    int i;
    for (i = 0; i < count; i++) {
      cin >> arr[i].customer;
      cin >> arr[i].items;
      cin >> arr[i].total;
    }
  }
  
  // Q4: main
  int main() {
    const int MAX = 100;
    order_data arr[MAX];
    int count;
    cin >> count;
    read_orders(arr, count);
    print_orders(arr, count);
    return 0;
  }


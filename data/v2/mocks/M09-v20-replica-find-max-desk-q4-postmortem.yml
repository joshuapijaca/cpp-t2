stem: |
  Postmortem for Mock M09 Q4 (main, V2.0 shape).
  Why did the failed attempt below lose marks? What's the exact repair?

failedAttempt: |
  int main() {
    const int MAX = 100;
    desk_data desks[MAX];
    int desk_num;
    cin >> desk_num;
    read_desks(desks, desk_num);
    for (int i = 0; i < desk_num; i++) {
      cout << desks[i].room_id << endl;
    }
    return 0;
  }
  // Bugs: (1) MAX=100 instead of V2.0 MAX=700; (2) only one field printed.

diagnosis: |
  V2.0 rubric requires `const int MAX = 700;` (verbatim 700) and the
  print loop must output all THREE fields (room_id, d_id,
  number_of_screens) per element with a trailing `endl` on the last
  cout. Printing only one field loses 4 of 25 marks; wrong MAX
  loses another 1-2 marks for token-match.

repairSteps:
  - "Change `MAX = 100` to `MAX = 700` (V2.0 verbatim)."
  - "Add the missing two cout lines for d_id and number_of_screens."
  - "Confirm last cout uses `<< endl`, not `<< \", \"`."
  - "Add the cout prompt before cin: `cout << \"How many desks? \";`."

preventionTip: |
  V2.0 main pattern: `const int MAX = 700;` then `desk_data desks[MAX];` then `int desk_num;` then prompt+cin+call+for-loop printing ALL fields with endl on last+`return 0;`.


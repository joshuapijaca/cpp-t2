failedAttempt: |
  void read_desks(desk_data desk_list[], int number_to_read) {
    for (int i = 0; i < number_to_read; i++) {
      cin >> desk_list[i].room_id;
      cin >> desk_list[i].d_id;
      cin >> desk_list[i].number_of_screens;
    }
  }
  // Bug: missing & in `desk_data &desk_list[]` per V2.0 Deakin convention.

diagnosis: |
  V2.0 Q3 signature is `void read_desks(desk_data &desk_list[], int number_to_read)`
  — both `&` AND `[]` are required by the Deakin pass-by-reference
  convention. The student kept the array brackets but dropped the
  ampersand. Lose 2-3 marks under §7.4 of the rubric (signature line).

repairSteps:
  - "Insert `&` before `desk_list[]` in the signature."
  - "Verify exact signature: `void read_desks(desk_data &desk_list[], int number_to_read)`."
  - "Drill the &-on-array Deakin signature 5x (R-05 atom)."

preventionTip: |
  Q3 V2.0 = `void read_X(EntityName &arr[], int number_to_read)` — ampersand AND brackets together. Drill them as one chunk.


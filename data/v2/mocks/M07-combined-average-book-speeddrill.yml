  - "return 0;"


explanation: |
  Full mock = compressed exam paper. Q1 body is sum-all (the if (true)
  guard fires every iteration); with seed 0.0 and input {3,6,9,4,8}
  the running total is 3 -> 9 -> 18 -> 22 -> 30, so d.mystery == 30.0.
  Q2 defines the book_data struct with fields: string title,
  string author, int pages, double price. Q3 read_books loops
  i=0..count-1, cin into each field. Q4 main wires count -> read ->
  print -> return 0. Variant: combined (sum-all algorithm).


stem: |
  Postmortem for Mock M07 Q1 (hand-execute). Why did the failed
  attempt below lose marks? What's the exact repair?

failedAttempt: |
  // Student answered 6.0 (wrongly divided sum by SIZE).
  void who_am_i(stat_double &data) {
    int i;
    data.mystery = 0.0;
    for (i = 0; i < SIZE; i++) {
      if (true) {
        data.mystery = data.mystery + data.numbers[i];
      }
    }
    // Student wrote: d.mystery = 30.0 / 5 = 6.0.
    return;
  }
  // Result: student got 6.0 by READING the algorithm wrong — there
  // is NO division step. The body just sums every element.

diagnosis: |
  The algorithm body is `if (true) data.mystery += data.numbers[i];`
  — a sum-all loop, NOT an average. There is no division by SIZE
  anywhere in the body. With input {3.0, 6.0, 9.0, 4.0, 8.0} and
  seed 0.0, hand-trace gives 0+3=3, 3+6=9, 9+9=18, 18+4=22, 22+8=30.
  Final d.mystery == 30.0. The student saw the variant label
  "average" and mentally injected a `/SIZE` step that the actual
  C++ code does NOT contain. Read the body, not the label.

repairSteps:
  - "Re-read the body. Confirm there is NO `/ SIZE` and NO division."
  - "Hand-trace each iter: 0+3=3; +6=9; +9=18; +4=22; +8=30."
  - "Verify final d.mystery equals 30.0 (not 6.0)."

preventionTip: |
  Trust the CODE, not the label. If the body has no `/`, no division happens. Sum-all and average look similar; only the body decides.

explanation: |

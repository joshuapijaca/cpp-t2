  - {questionNumber: "Q3", prompt: "Write the read_orders function.", canonicalAnswer: "void read_orders(order_data orders[], int &count)\n{\n    cout << \"How many orders? \";\n    cin >> count;\n    for (int i = 0; i < count; i++)\n    {\n        cin >> orders[i].id;\n        cin >> orders[i].customer;\n        cin >> orders[i].total;\n    }\n}"}
  - {questionNumber: "Q4", prompt: "Write the main() that calls read_orders and prints all rows.", canonicalAnswer: "int main()\n{\n    const int MAX = 1000;\n    order_data orders[MAX];\n    int order_num;\n\n    cout << \"How many orders? \";\n    cin >> order_num;\n\n    read_orders(orders, order_num);\n\n    for (int i = 0; i < order_num; i++)\n    {\n        cout << orders[i].id << \", \";\n        cout << orders[i].customer << \", \";\n        cout << orders[i].total << endl;\n    }\n\n    return 0;\n}"}

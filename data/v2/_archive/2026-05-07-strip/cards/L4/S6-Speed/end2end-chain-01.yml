  - {questionNumber: "Q3", prompt: "Write the read_desks function.", canonicalAnswer: "void read_desks(desk_data desks[], int &count)\n{\n    cout << \"How many desks? \";\n    cin >> count;\n    for (int i = 0; i < count; i++)\n    {\n        cin >> desks[i].room_id;\n        cin >> desks[i].d_id;\n        cin >> desks[i].number_of_screens;\n    }\n}"}
  - {questionNumber: "Q4", prompt: "Write the main() that calls read_desks and prints all rows.", canonicalAnswer: "int main()\n{\n    const int MAX = 700;\n    desk_data desks[MAX];\n    int desk_num;\n\n    cout << \"How many desks? \";\n    cin >> desk_num;\n\n    read_desks(desks, desk_num);\n\n    for (int i = 0; i < desk_num; i++)\n    {\n        cout << desks[i].room_id << \", \";\n        cout << desks[i].d_id << \", \";\n        cout << desks[i].number_of_screens << endl;\n    }\n\n    return 0;\n}"}

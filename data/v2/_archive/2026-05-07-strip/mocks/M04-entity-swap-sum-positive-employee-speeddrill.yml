prompt: |
  === Q1 (25 marks) HAND EXECUTE ===
  const int SIZE = 5;
  
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };
  
  void who_am_i(stat_double &data) {
    int i;
    data.mystery = 0.0;
    for (i = 0; i < SIZE; i++) {
      if (data.numbers[i] > 0) {
        data.mystery = data.mystery + data.numbers[i];
      }
    }
    return;
  }
  
  stat_double d = {{1.5, -2.0, 3.5, -0.5, 2.0}, 0.0};
  who_am_i(d);
  // Report d.mystery + iteration trace.
  
  === Q2 (25 marks) DEFINE STRUCT ===
  Define a struct employee_data with the following fields (in order):
  string name; int years; double salary;
  
  === Q3 (25 marks) READ FUNCTION ===
  Write read_employees(employee_data arr[], int count) that reads
  three fields per element from cin into the array.
  Use a for-loop. Pass arr by reference (decay-array form).
  
  === Q4 (25 marks) MAIN ===
  Write int main() that:
    1. Declares const int MAX = 100;
    2. Declares employee_data arr[MAX];
    3. Reads count from cin (count <= MAX).
    4. Calls read_employees(arr, count) to populate.
    5. Calls print_employees(arr, count) to display.
    6. Returns 0.

canonicalAnswer: |
  // Q1 final value: d.mystery == 7.0
  
  // Q2: struct
  struct employee_data {
    string name;
    int years;
    double salary;
  };
  
  // Q3: read function
  void read_employees(employee_data arr[], int count) {
    int i;
    for (i = 0; i < count; i++) {
      cin >> arr[i].name;
      cin >> arr[i].years;
      cin >> arr[i].salary;
    }
  }
  
  // Q4: main
  int main() {
    const int MAX = 100;
    employee_data arr[MAX];
    int count;
    cin >> count;
    read_employees(arr, count);
    print_employees(arr, count);
    return 0;
  }


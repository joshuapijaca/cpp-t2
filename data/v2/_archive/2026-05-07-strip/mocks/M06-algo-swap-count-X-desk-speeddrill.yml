prompt: |
  === Q1 (25 marks) HAND EXECUTE ===
  const int SIZE = 5;
  
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };
  
  void who_am_i(stat_double &data) {
    int i;
    data.mystery = 0;
    for (i = 0; i < SIZE; i++) {
      if (data.numbers[i] > 5) {
        data.mystery = data.mystery + 1;
      }
    }
    return;
  }
  
  stat_double d = {{2.0, 7.0, 1.0, 8.5, 6.0}, 0};
  who_am_i(d);
  // Report d.mystery + iteration trace.
  
  === Q2 (25 marks) DEFINE STRUCT ===
  Define a struct desk_data with the following fields (in order):
  string material; int drawers; double height;
  
  === Q3 (25 marks) READ FUNCTION ===
  Write read_desks(desk_data arr[], int count) that reads
  three fields per element from cin into the array.
  Use a for-loop. Pass arr by reference (decay-array form).
  
  === Q4 (25 marks) MAIN ===
  Write int main() that:
    1. Declares const int MAX = 100;
    2. Declares desk_data arr[MAX];
    3. Reads count from cin (count <= MAX).
    4. Calls read_desks(arr, count) to populate.
    5. Calls print_desks(arr, count) to display.
    6. Returns 0.

canonicalAnswer: |
  // Q1 final value: d.mystery == 3
  
  // Q2: struct
  struct desk_data {
    string material;
    int drawers;
    double height;
  };
  
  // Q3: read function
  void read_desks(desk_data arr[], int count) {
    int i;
    for (i = 0; i < count; i++) {
      cin >> arr[i].material;
      cin >> arr[i].drawers;
      cin >> arr[i].height;
    }
  }
  
  // Q4: main
  int main() {
    const int MAX = 100;
    desk_data arr[MAX];
    int count;
    cin >> count;
    read_desks(arr, count);
    print_desks(arr, count);
    return 0;
  }


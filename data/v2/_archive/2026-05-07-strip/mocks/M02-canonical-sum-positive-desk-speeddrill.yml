prompt: |
  === Q1 (25 marks) HAND EXECUTE ===
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

  void who_am_i(stat_double &data) {
    int i;
    data.mystery = 0.0;
    for (i = 0; i < SIZE; i++) {
      if (data.numbers[i] > 0) {
        data.mystery = data.mystery + data.numbers[i];
      }
    }
    return;
  }

  stat_double d = {{2.4, -3.7, -1.7, 3.0, 2.0}, -0.9};
  who_am_i(d);
  // Report d.mystery + iteration trace.

  === Q2 (25 marks) DEFINE STRUCT ===
  Define a struct desk_data with the following fields (in order):
  int room_id; int d_id; int number_of_screens;

  === Q3 (25 marks) READ FUNCTION ===
  Write read_desks(desk_data &desk_list[], int number_to_read) that
  reads three fields per element from cin into the array.
  Use a for-loop. Pass the array by reference (Deakin & on array).

  === Q4 (25 marks) MAIN ===
  Write int main() that:
    1. Declares const int MAX = 700;
    2. Declares desk_data desks[MAX];
    3. Reads desk_num from cin (desk_num <= MAX).
    4. Calls read_desks(desks, desk_num) to populate.
    5. Prints each desk's room_id, d_id, number_of_screens.
    6. Returns 0.

canonicalAnswer: |
  // Q1 final value: d.mystery == 7.4
  //   Trace: i=0 +2.4 -> 2.4; i=1 skip; i=2 skip;
  //          i=3 +3.0 -> 5.4; i=4 +2.0 -> 7.4.

  // Q2: struct
  struct desk_data {
    int room_id;
    int d_id;
    int number_of_screens;
  };

  // Q3: read function (V2.0 shape)
  void read_desks(desk_data &desk_list[], int number_to_read) {
    int i;
    for (i = 0; i < number_to_read; i++) {
      cin >> desk_list[i].room_id;
      cin >> desk_list[i].d_id;
      cin >> desk_list[i].number_of_screens;
    }
  }

  // Q4: main (V2.0 shape — MAX=700, count var = desk_num)
  int main() {
    const int MAX = 700;
    desk_data desks[MAX];
    int desk_num;
    cout << "How many desks? ";
    cin >> desk_num;
    read_desks(desks, desk_num);
    for (int i = 0; i < desk_num; i++) {
      cout << desks[i].room_id << ", ";
      cout << desks[i].d_id << ", ";
      cout << desks[i].number_of_screens << endl;
    }
    return 0;
  }


stem: |
  Rule recall for CM-off-by-one-exit: Q1 off-by-one exit i==SIZE. After the for-loop, i equals SIZE. Avoid numbers[i].

correct: "// post-loop: do NOT use data.numbers[i]"

distractors:
  - "cout << data.numbers[i]; // i is now SIZE"
  - "// no init needed"
  - "// the compiler infers it"

explanation: |
  Canonical: // post-loop: do NOT use data.numbers[i]
  Mistake: Indexed numbers[i] after loop exit (i == SIZE, out-of-bounds).


code: |
  // Trap: Indexed numbers[i] after loop exit (i == SIZE, out-of-bounds).
  cout << data.numbers[i]; // i is now SIZE
  ;

question: |
  What goes wrong with the line above on Q1?

options:
  - label: "A"
    text: "Indexed numbers[i] after loop exit (i == SIZE, out-of-bounds)."
  - label: "B"
    text: "Compile error caught immediately."
  - label: "C"
    text: "Nothing — both forms are equivalent."
  - label: "D"
    text: "Runtime crash at the first iteration."

correctLabel: "A"

explanation: |
  Indexed numbers[i] after loop exit (i == SIZE, out-of-bounds). The canonical pattern is: // post-loop: do NOT use data.numbers[i]


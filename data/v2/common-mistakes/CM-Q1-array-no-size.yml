id: CM-Q1-array-no-size
name: "Q1 struct array field declared with empty brackets numbers[]"
description: |
  Inside a struct, an array field MUST have a compile-time known size.
  The Q1 canonical form is `double numbers[SIZE];` where SIZE is a
  file-scope `const int SIZE = 5;` declared above the struct. Students
  write `double numbers[];` (empty brackets) or omit the brackets entirely
  thinking the size is "filled in by the data". Empty brackets inside
  a struct are a compile error in C++ — incomplete type, unknown size.
whyItHappens: |
  Three import paths: (a) JavaScript / Python / Java where arrays are
  dynamically sized — students assume C++ works the same; (b) function
  parameter syntax where `int arr[]` IS legal (decay to pointer) gets
  copied into struct definitions; (c) variable-length array (VLA)
  experience from C99 where `int arr[n];` works at function scope.
  Inside a struct, none of these apply — size must be a constant
  expression known at compile time.
immunizationStrategy: |
  1. SpotError: struct with `double numbers[];` — supply SIZE.
  2. MCQ: "Which compiles inside a struct?" — [] / [SIZE] / [n] / [5+1].
  3. Cloze: `double numbers[___];` with const int SIZE = 5 above.
  4. Demo: side-by-side struct field decl vs function param decl —
     show why params allow [] but struct fields don't.
  5. Walkthrough: declare const int SIZE = 5; then struct with
     numbers[SIZE] — explain compile-time vs run-time.
  6. Decompose: 4 array decls — pick the legal struct-field form.
examImpact: high
atomDependencies: [T-01, F-19, F-22e]
qTracks: [Q1]
relatedCMs: [CM-Q1-mystery-wrong-type, CM-wrong-bound-SIZE]
source:

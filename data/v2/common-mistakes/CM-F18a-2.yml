id: CM-F18a-2
name: "for-loop init slot: omits `int` keyword, treats `i = 0` as declaration"
description: |
  The for-loop init slot can DECLARE a new counter: `for (int i = 0;
  i < SIZE; i++)`. Students drop the `int` and write `for (i = 0;
  i < SIZE; i++)` — this is an ASSIGNMENT, not a declaration, and only
  works if `i` was declared elsewhere in scope. If `i` doesn't exist,
  the compiler errors. If it does, the student leaks a stale value
  into the loop. Either way the canonical Test 2 form requires the
  type keyword inside the init slot.
whyItHappens: |
  Python / JavaScript habit: `for i in range(n):` doesn't declare a
  type. Students transfer this to C++ and assume `i` is auto-created.
  Compounded by tutorials that pre-declare `int i;` before the loop
  ("for clarity"), then use `for (i = 0; ...)` — students see the
  pattern but miss that `int i;` was a separate line. The init slot
  combines both steps; the right idiom is `int i = 0` inline.
immunizationStrategy: |
  1. SpotError: `for (i = 0; i < SIZE; i++)` with no prior `int i;` —
     supply `int`.
  2. Cloze: blank the init slot `for (___; i < SIZE; i++)` — answer
     `int i = 0`.
  3. MCQ: "Canonical for-loop init?" — `i = 0` / `int i = 0` / `int
     i;` / `i = 0; int i;`.
  4. Demo: side-by-side declare-then-assign vs declare-in-init,
     scope difference highlighted.
  5. Decompose: which init forms compile? — pick the legal Test 2 form.
  6. Walkthrough: dissect `for (int i = 0; ...)` slot by slot.
examImpact: high
atomDependencies: [F-18, F-18a]
qTracks: [Q1, Q3, Q4]
relatedCMs: [CM-F18a, CM-iplusplus-before-body, CM-scope-leak]

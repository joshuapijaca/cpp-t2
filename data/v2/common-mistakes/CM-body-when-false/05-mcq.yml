stem: |
  Rule recall for CM-body-when-false: Q1 body run when condition false. Place the action ONLY inside the if-body for sum-positive.

correct: "if (data.numbers[i] > 0) { data.mystery = data.mystery + data.numbers[i]; }"

distractors:
  - "data.mystery = data.mystery + data.numbers[i]; // outside the if"
  - "// no init needed"
  - "// the compiler infers it"

explanation: |
  Canonical: if (data.numbers[i] > 0) { data.mystery = data.mystery + data.numbers[i]; }
  Mistake: Action runs unconditionally instead of inside the if-body.


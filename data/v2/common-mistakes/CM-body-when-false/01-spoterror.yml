stem: |
  Which line below contains the bug?

  Broken code:
  // Q1 broken excerpt:
  data.mystery = data.mystery + data.numbers[i]; // outside the if
  // (canonical was: if (data.numbers[i] > 0) { data.mystery = data.mystery + data.numbers[i]; })
  ;
correct: data.mystery = data.mystery + data.numbers[i]; // outside the if
distractors:
  - '// Q1 broken excerpt:'
  - '// (canonical was: if (data.numbers[i] > 0) { data.mystery = data.mystery + data.numbers[i]; })'
  - ;
explanation: |
  Bug: Action runs unconditionally instead of inside the if-body.
  Fix: if (data.numbers[i] > 0) { data.mystery = data.mystery + data.numbers[i]; }
  This common mistake costs marks on Q1 per the rubric.

stem: |
  Rule recall for CM-prompt-outside-loop: Q3 prompt outside loop. Prompts go INSIDE the loop, before each cin.

correct: "// inside loop: cout << \"Enter title: \"; cin >> arr[i].title;"

distractors:
  - "// before loop: cout << \"Enter all titles: \"; (only once)"
  - "// no init needed"
  - "// the compiler infers it"

explanation: |
  Canonical: // inside loop: cout << "Enter title: "; cin >> arr[i].title;
  Mistake: Prompt printed once, before loop — should be per iteration.


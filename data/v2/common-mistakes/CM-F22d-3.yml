id: CM-F22d-3
name: "Q1 trace: forgets to update OTHER fields when one field mutates"
description: |
  In Test 2 V2.0 Q1, who_am_i mutates `data.mystery` inside a loop but
  also reads `data.numbers[i]`. After the call, students update the
  panel ONLY for the mutated field (mystery) and forget that the
  unmutated fields (numbers[0..4]) are still the caller's original
  values. Or worse, they think the function "consumed" or "cleared"
  the array and write zeros for it. The correct mental model: pass-by-
  reference exposes ALL fields; only the ones you assign to change.
whyItHappens: |
  Students think of a function call as opaque ("did its thing"). When
  they re-enter main() they treat the struct as a black box and may
  forget intermediate state. Compounded by trace cards that focus on
  one field — students miss that the panel is the WHOLE struct, not
  just the changed field. Reading from a field doesn't change it; only
  assignment does.
immunizationStrategy: |
  1. SpotError: post-call panel showing zeros for numbers[]; correct
     to original values.
  2. MCQ: "After who_am_i returns, what is data.numbers[2]?" with
     options original / 0 / undefined / sum.
  3. Trace: multi-field mutation card forces tracking of all fields.
  4. Decompose: 4 panel snapshots after a call — pick the right one.
  5. Demo: function that reads one field and writes another, side-by-
     side panel before and after.
  6. Walkthrough: explicit "every field is the caller's storage" recap.
examImpact: medium
atomDependencies: [F-22a, F-22d]
qTracks: [Q1, Q3]
relatedCMs: [CM-F22d-1, CM-F22d-2, CM-stale-mystery, CM-omit-mystery-cell]
source:
  kind: v2
  ref: "C++T2 spec §F-22d multi-field mutation; Test 2 V2.0 — who_am_i mutates mystery only"

stem: |
  Trap-trace for CM-off-by-one-le: Q3 off-by-one i <=.

code: |
  // Trap: Used `i <= count` — array overrun by 1.
  for (i = 0; i <= count; i++)
  ;

question: |
  What goes wrong with the line above on Q3?

options:
  - label: "A"
    text: "Used `i <= count` — array overrun by 1."
  - label: "B"
    text: "Compile error caught immediately."
  - label: "C"
    text: "Nothing — both forms are equivalent."
  - label: "D"
    text: "Runtime crash at the first iteration."

correctLabel: "A"

explanation: |
  Used `i <= count` — array overrun by 1. The canonical pattern is: for (i = 0; i < count; i++)


stem: |
  Rule recall for CM-off-by-one-le: Q3 off-by-one i <=. Always strict less-than: `i < count`.

correct: "for (i = 0; i < count; i++)"

distractors:
  - "for (i = 0; i <= count; i++)"
  - "// no init needed"
  - "// the compiler infers it"

explanation: |
  Canonical: for (i = 0; i < count; i++)
  Mistake: Used `i <= count` — array overrun by 1.


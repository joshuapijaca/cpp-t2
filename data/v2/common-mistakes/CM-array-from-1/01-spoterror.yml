stem: |
  Which line below contains the bug?

  Broken code:
  // Q1 broken excerpt:
  for (i = 1; i < SIZE; i++) {
  // (canonical was: for (i = 0; i < SIZE; i++) {)
  ;
correct: for (i = 1; i < SIZE; i++) {
distractors:
  - '// Q1 broken excerpt:'
  - '// (canonical was: for (i = 0; i < SIZE; i++) {)'
  - ;
explanation: |
  Bug: for-loop starts at i = 1 — skips element 0.
  Fix: for (i = 0; i < SIZE; i++) {
  This common mistake costs marks on Q1 per the rubric.

stem: |
  Rule recall for CM-wrong-cin-direction: Q3 wrong cin direction. cin uses `>>`. The arrow points FROM cin TO destination.

correct: "cin >> arr[i].field;"

distractors:
  - "cin << arr[i].field;"
  - "// no init needed"
  - "// the compiler infers it"

explanation: |
  Canonical: cin >> arr[i].field;
  Mistake: Wrote `cin << arr[i].field` (output direction).


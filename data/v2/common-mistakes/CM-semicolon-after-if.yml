id: CM-semicolon-after-if
name: "Student writes `if (cond);` (semicolon after if)"
description: |
  `if (cond);` is a syntactically valid empty-body if. Students typing
  fast accidentally insert `;` after the `)`, then write the intended
  body in a block below — which always executes regardless of cond.
  Subtle bug because it compiles cleanly.
whyItHappens: |
  Muscle memory: every C++ statement ends with `;`. The if-header looks
  like a statement. Students are taught to terminate everything with `;`
  without realising control-flow headers have no terminator.
immunizationStrategy: |
  1. SpotError: `if (cond);` followed by block; spot the always-runs body.
  2. MCQ: "Does `if (x>0);` need a semicolon? (no)"
  3. Cloze: remove the rogue `;` after the if header.
  4. WriteCard rejecting `;` between `)` and `{`.
  5. Trace card showing always-true effect of `if (cond);`.
  6. Decompose: distinguish header from statement terminators.
examImpact: low
atomDependencies: [F-07, F-17]
qTracks: [Q1]
relatedCMs: [CM-misorder-loop-sem]
source:
  kind: pfg
  ref: "Programming Fundamentals Guide § part-1/3-control-flow — if-statement syntax"

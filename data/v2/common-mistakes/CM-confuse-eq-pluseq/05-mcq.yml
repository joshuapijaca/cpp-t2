stem: |
  Rule recall for CM-confuse-eq-pluseq: Q1 = vs += confusion. Choose the right operator: find-max uses =; sum uses + accumulation.

correct: "data.mystery = data.mystery + data.numbers[i]; // sum"

distractors:
  - "data.mystery = data.numbers[i]; // sum (wrong)"
  - "// no init needed"
  - "// the compiler infers it"

explanation: |
  Canonical: data.mystery = data.mystery + data.numbers[i]; // sum
  Mistake: sum-positive used = instead of += (or vice versa for find-max).


stem: |
  Rule recall for CM-wrong-bound-SIZE: Q3 wrong bound SIZE. Q3 bound is the runtime count, not compile-time SIZE.

correct: "for (i = 0; i < count; i++)"

distractors:
  - "for (i = 0; i < SIZE; i++)"
  - "// no init needed"
  - "// the compiler infers it"

explanation: |
  Canonical: for (i = 0; i < count; i++)
  Mistake: Used `i < SIZE` — read past the actual count.


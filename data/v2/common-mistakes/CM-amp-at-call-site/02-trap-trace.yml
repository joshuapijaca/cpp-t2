code: |
  // Trap: Wrote `read_X(&arr, &count)` — & belongs in signature only.
  read_X(&arr, &count);
  ;

question: |
  What goes wrong with the line above on Q4?

options:
  - label: "A"
    text: "Wrote `read_X(&arr, &count)` — & belongs in signature only."
  - label: "B"
    text: "Compile error caught immediately."
  - label: "C"
    text: "Nothing — both forms are equivalent."
  - label: "D"
    text: "Runtime crash at the first iteration."

correctLabel: "A"

explanation: |
  Wrote `read_X(&arr, &count)` — & belongs in signature only. The canonical pattern is: read_X(arr, count);


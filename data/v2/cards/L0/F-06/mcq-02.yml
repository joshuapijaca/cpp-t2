stem: |
  Which of these is the correct, idiomatic SIT102 form of the
  entry-function header?

correct: "int main() {"

distractors:
  - "void main() {"
  - "int Main() {"
  - "int main {"

explanation: |
  Correct form: `int main() {` — return type `int`, lowercase name
  `main`, empty parameter list `()`, opening brace `{`.

  `void main()` is not valid standard C++; main must return int.
  `int Main()` capitalises the M; identifiers are case-sensitive,
  so `Main` is not the entry point the OS looks for.
  `int main {` drops the parentheses; the parameter list is required
  even when empty.


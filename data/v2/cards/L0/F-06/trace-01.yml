# =====================================================================
# L0 / F-06 / TraceCard 01
# Atom: int main() and return 0;
# =====================================================================
id: "L0-F06-trace-01"
schemaVersion: "v2"
atomId: "F-06"
qTags: ["Q1", "Q4"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Trace this program. The body of main has one cout and a return.
  Predict the variables-panel state and the terminal output after
  the program finishes.

code: |
  #include <iostream>
  using namespace std;
  int main() {
    int n = 7;
    cout << n << endl;
    return 0;
  }

variables: ["n"]

expectedTrace:
  - line: 4
    variable: "n"
    value: "7"
    output: null
  - line: 5
    variable: ""
    value: ""
    output: "7"

terminalOutput: ["7"]

inputMode: "final-only"

teachMe: |
  Step-by-step:
  - Line 4 `int n = 7;` — open box `n`, write 7. Panel: { n: 7 }.
  - Line 5 `cout << n << endl;` — look up `n` (it is 7), write `7`
    to terminal, then a newline.
  - Line 6 `return 0;` — main exits. Program ends.

  Final panel: n = 7. Final terminal: 7.

  Note: `return 0;` does NOT print 0 to the terminal. It returns the
  integer 0 to the OS as the program's exit status. The terminal
  shows only what `cout` produced.

drills: ["tier1:prereq:int-main-and-return-0"]
source:
  kind: "pfg"
  ref: "Programming Fundamentals Guide § part-2/1-starting-cpp/2-trailside/2-main-function"

commonMistakeIds: ["CM-F06a"]
status: "NEW"
authoringStatus: "DRAFT"
createdBy: "SA-PhaseB"
notes: |
  Trace card 1: anchors that `return 0;` is silent — it does not
  print 0. A common novice misconception is that the terminal will
  show "7\n0" because main returns 0. It does not.

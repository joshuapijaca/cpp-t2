stem: |
  Build a complete program that declares an int variable, prints it,
  and exits. Use the canonical Q4 skeleton end-to-end.

section: "L0 · F-06 · procedural — declare-print-return"

prompt: |
  Write a complete C++T2 program that declares an int `x` set to 42,
  prints it (followed by a newline), and returns 0.

expectedAnswer: |
  #include <iostream>
  using namespace std;
  int main() {
    int x = 42;
    cout << x << endl;
    return 0;
  }

keyChecks:
  - "#include"

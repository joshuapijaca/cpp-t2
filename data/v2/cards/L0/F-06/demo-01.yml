stem: |
  Watch the smallest possible legal C++ program. It prints nothing,
  declares no variables — but it compiles and runs. This is the
  empty Q4 skeleton you scaffold every answer onto.

whyOneLine: "The minimum C++ program is int main() { return 0; } — the entry point + a successful exit."

demoCode: |
  // The smallest legal C++ program:

  #include <iostream>
  using namespace std;
  int main() {
    return 0;
  }

  // It compiles, runs, prints nothing, and exits with status 0.
  // Everything else in any Q4 answer is built INSIDE the braces of main.


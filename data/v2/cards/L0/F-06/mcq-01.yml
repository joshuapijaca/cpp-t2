stem: |
  What does `return 0;` at the end of `main` actually do? Pick the
  option that matches the C++ standard's defined behaviour.

correct: "It ends main() and returns the integer 0 to the operating system as the program's exit status, signalling success."

distractors:
  - "It prints the digit 0 to the terminal as a final line of output."
  - "It clears all variables in the variables panel before the program ends."
  - "It loops back to the start of main, repeating execution from the top."

explanation: |
  `return 0;` is a return statement. It (1) ends the function `main`
  (no later statements run), and (2) hands the integer 0 back to
  whoever called main — which, for a program, is the operating
  system. The OS treats 0 as "success" and any non-zero value as a
  failure code.

  Distractor 1 confuses return-value with cout output. The terminal
  shows ONLY what `cout` printed; `return 0;` is silent.
  Distractor 2 fictionalises a clean-up effect. Variable scope ends
  naturally when main exits; `return` doesn't actively clear them.
  Distractor 3 invents a loop. `return` exits — never repeats.


stem: |
  Anatomy of `int main()`. Each part has a fixed role. Watch the
  return type, the name, the parameter list, and the opening brace.

whyOneLine: "int main() = return type 'int' + function name 'main' + empty parens () + opening brace { for the body."

demoCode: |
  //   int    main    ()    OPEN-BRACE
  //    |      |      |        |
  //    |      |      |        +-- opening brace: body starts after this
  //    |      |      +----------- empty parameter list (no inputs)
  //    |      +------------------ function name (lowercase, exactly: main)
  //    +------------------------- return type: int (function returns integer)
  //
  //    Wrong forms beginners write:
  //      - void main      -->  return type must be int, not void
  //      - capital Main   -->  M uppercase; OS looks for lowercase main
  //      - int main NO-PARENS  --> the parameter list parens are required

  int main() {
    return 0;
  }

highlightTokens:

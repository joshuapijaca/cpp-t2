stem: |
  Fill the blank with the final statement that returns success to
  the OS.

code: |
  #include <iostream>
  using namespace std;
  int main() {
    cout << 1 << endl;
    ____
  }

clozeSentence: |
  ____    (the last statement before the closing brace)

answer: "return 0;"

explanation: |
  The final statement is `return 0;`. It returns the integer 0 to
  the OS, signalling success. The semicolon at the end is required
  (F-07). This statement sits BEFORE the closing brace `}`, never
  after.


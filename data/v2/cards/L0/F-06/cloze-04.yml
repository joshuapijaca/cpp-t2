stem: |
  Fill THREE blanks: the return type, the function name, and the
  final return statement. This rebuilds the whole skeleton from the
  open-brace line and the close-brace line.

code: |
  #include <iostream>
  using namespace std;
  ___ ____() {
    cout << 9 << endl;
    ____
  }

clozeSentence: |
  Fill the three blanks: return type, function name, last statement.

answer: "int main return 0;"

explanation: |
  The three blanks fill to:
  - Return type: `int`
  - Function name: `main`
  - Last statement: `return 0;`

  Together they form the canonical skeleton:
    int main() {
      ...
      return 0;
    }


type: "ProceduralCard"

stem: |
  Build a complete program that prints the number 5 once and exits
  successfully. Use the canonical Q4 preamble plus `int main()` plus
  `return 0;`.

section: "L0 · F-06 · procedural — print 5 with full skeleton"

prompt: |
  Write a complete C++T2 program that prints `5` (followed by a
  newline) to the terminal and exits with status 0.

expectedAnswer: |
  #include <iostream>
  using namespace std;
  int main() {
    cout << 5 << endl;
    return 0;
  }

keyChecks:
  - "#include"
  - "<iostream>"
  - "using namespace std;"
  - "int main()"
  - "cout << 5 << endl;"
  - "return 0;"

forbiddenTokens:
  - "void main"
  - "iostream.h"

variants:
  - prompt: "Write a complete program that prints 8 once."
    expectedAnswer: |
      #include <iostream>
      using namespace std;
      int main() {
        cout << 8 << endl;
        return 0;
      }
  - prompt: "Write a complete program that prints the string \"hi\" once."
    expectedAnswer: |
      #include <iostream>
      using namespace std;
      int main() {
        cout << "hi" << endl;
        return 0;
      }


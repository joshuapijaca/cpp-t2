notes: |
  Real Q4-style content (declare + arithmetic + print + return). The
  walkthrough emphasises the position of `return 0;` (last statement
  INSIDE the braces, before `}`) — addresses CM-F06c (return 0
  outside the closing brace), the most common shape error.

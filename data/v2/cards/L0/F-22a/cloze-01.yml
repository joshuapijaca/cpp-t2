stem: |
  Fill in the missing return type for a procedure (returns nothing).

code: |
  ___ who_am_i(stat_double &data)
  {
  }

clozeSentence: "___ who_am_i(...) { }   // procedure, returns nothing"

answer: "void"

explanation: |
  `void` is the return type for a function that returns no value.
  It comes FIRST in the header, before the function name. Test 2
  Q3 read procedures all have return type `void`.


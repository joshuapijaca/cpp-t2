id: "L0-F22a-cloze-02"
schemaVersion: "v2"
atomId: "F-22a"
qTags: ["Q1", "Q3"]
stage: 0
level: "L0"
type: "ClozeCard"

stem: |
  Fill in the matching pair of braces around the function body.

code: |
  void who_am_i(stat_double &data)
  ___
    int i;
    data.mystery = 0.0;
  ___

clozeSentence: "void who_am_i(...)\n___ ... ___"

answer: "{ }"

explanation: |
  The body is wrapped in `{ }` directly after the header. NO `;`
  between the `)` and the `{`. The `}` ends the function — nothing
  comes after it (no `;`).

drills: ["tier1:prereq:function-definition-syntax"]

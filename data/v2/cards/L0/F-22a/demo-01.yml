stage: 0
level: "L0"
type: "DemoCard"

stem: |
  Watch: a function definition is `<return_type> <name>(<params>) { <body> }`.
  Four parts, fixed order, NO semicolon after the parameter list.

whyOneLine: "Function = `return_type name(params) { body }` — fixed shape, no `;` after `)`."

demoCode: |
  // canonical function definition shape:
  return_type name(params)
  {
    body;
  }

  // void example (procedure):
  void greet(string s)
  {
    cout << s << endl;
  }

  // Test 2 V2.0 read-procedure shape:
  void who_am_i(stat_double &data)
  {
    // body
  }

highlightTokens:
  - "return_type"
  - "name"
  - "(params)"
  - "{ body }"
  - "void greet"
  - "void who_am_i"

usedIn:
  - "Q3 read function definition (write a `void read_xxx(...)`)"
  - "Q1 trace (you read a function definition before tracing)"

drills: ["tier1:prereq:function-definition-syntax"]

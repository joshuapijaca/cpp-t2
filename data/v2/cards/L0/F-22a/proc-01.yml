stage: 0
level: "L0"
type: "ProceduralCard"

stem: |
  Procedural drill — write a function header + empty body on
  demand.

section: "F-22a function shell drill"

prompt: |
  Write a function header for `print_hello` returning `void` with
  no parameters, plus an empty body.

expectedAnswer: |
  void print_hello()
  {
  }

keyChecks:
  - "void print_hello()"
  - "{"
  - "}"

variants:
  - prompt: |
      Write a function header for `add_one` returning `int` taking
      one int parameter `n`, plus an empty body.
    expectedAnswer: |
      int add_one(int n)
      {
      }
  - prompt: |
      Write a function header for `report` returning `void` taking
      one string parameter `msg`, plus an empty body.
    expectedAnswer: |
      void report(string msg)
      {
      }
  - prompt: |
      Write a function header for `sum` returning `double` taking
      two double parameters `a` and `b`, plus an empty body.
    expectedAnswer: |
      double sum(double a, double b)
      {
      }

drills: ["tier1:prereq:function-definition-syntax"]

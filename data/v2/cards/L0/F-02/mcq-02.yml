stem: |
  After running `g++ hello.cpp -o hello` successfully, how many files
  exist in that folder that are directly related to the program?

correct: "Two — the original source `hello.cpp` (text) and the new executable `hello` (machine code)."

distractors:
  - "One — the compile step replaced the source file with the executable."
  - "Three — `hello.cpp`, an intermediate `.obj` file, and the executable `hello`."
  - "None — the compile output is held in memory and is lost as soon as the terminal closes."

explanation: |
  After a successful compile, the source file is unchanged AND a new
  executable file is created. Two files coexist on disk. The compiler
  may use temporary intermediate files internally, but they are
  cleaned up automatically — the user-visible result is exactly two
  files: the input source and the output executable.

  Distractor 1 ("one — replaced") is the destructive-compile
  misconception. Distractor 2 ("three") confuses C++ with split
  toolchains where `.o` files are kept. Distractor 3 ("none — in
  memory") is the "compile = run" misconception.


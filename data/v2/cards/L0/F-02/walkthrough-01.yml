notes: |
  This walkthrough makes the source-vs-program distinction concrete.
  Two files visible side-by-side after compile is the load-bearing
  visual. Q1 trace cards later assume the student understands that the
  compiler exists as a separate step and the program runs from its
  output, not the source.

id: "L0-F24-trace-25"
schemaVersion: "v2"
atomId: "F-24"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Predict-first. Print THEN update. Articulate the printed value AND
  the new value of `n` BEFORE pressing [step] on each line.

code: |
  int main() {
    int n = 5;
    cout << n << endl;
    n = n * 4;
    return 0;
  }

variables: ["n"]

expectedTrace:
  - line: 2
    variable: "n"
    value: "5"
    output: null
  - line: 3
    variable: ""
    value: ""
    output: "5"
  - line: 4
    variable: "n"
    value: "20"
    output: null

terminalOutput: ["5"]

inputMode: "per-step"

q4StopCondition: "Articulate the printed value or new value BEFORE pressing [step]."

teachMe: |
  PREDICTIONS:
  - line 2: "n becomes five"
  - line 3: "terminal receives five" (current value, not future
    value)
  - line 4: "n becomes twenty"
  Final panel: { n: 20 }. Terminal: 5.

  cout always reads the value AT THE TIME IT RUNS. Future updates
  are irrelevant to past outputs.

drills: ["tier1:prereq:sub-vocal-predict-next-state-drill"]
source:
  kind: "pfg"
  ref: "Programming Fundamentals Guide § part-1/3-control-flow/0-panorama/07-hand-execution"


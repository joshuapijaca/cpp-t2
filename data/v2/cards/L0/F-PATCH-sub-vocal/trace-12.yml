  kind: "pfg"
  ref: "Programming Fundamentals Guide § part-1/3-control-flow/0-panorama/07-hand-execution"

commonMistakeIds: ["CM-arithmetic-error"]
status: "NEW"
authoringStatus: "DRAFT"
createdBy: "SA-L0-PATCH"
notes: |
  Integer-division trap. Articulating "three" is what catches the
  trap; the fingers tend to type 3.25 if the brain glides past.

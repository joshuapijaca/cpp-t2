id: "L0-F24-trace-15"
schemaVersion: "v2"
atomId: "F-24"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Predict-first. Single overwrite. Say the next value of `n` out loud
  (or mouth it) BEFORE pressing [step] on EACH line.

code: |
  int main() {
    int n = 4;
    n = 9;
    return 0;
  }

variables: ["n"]

expectedTrace:
  - line: 2
    variable: "n"
    value: "4"
    output: null
  - line: 3
    variable: "n"
    value: "9"
    output: null

terminalOutput: []

inputMode: "per-step"

q4StopCondition: "Say the next value BEFORE pressing [step]."

teachMe: |
  PREDICTION 1: "n becomes four".
  PREDICTION 2: "n becomes nine" (4 is gone).
  Final panel: { n: 9 }.

  Saying "becomes" out loud — twice — fights the temptation to
  remember the old value.

drills: ["tier1:prereq:sub-vocal-predict-next-state-drill"]
source:
  kind: "pfg"
  ref: "Programming Fundamentals Guide § part-1/3-control-flow/0-panorama/07-hand-execution"

commonMistakeIds: ["CM-uses-old-value-after-update"]
status: "NEW"
authoringStatus: "DRAFT"
createdBy: "SA-L0-PATCH"
notes: |
  Overwrite + sub-vocal. The articulation pattern "n becomes X" is a
  ritual that kills the stale-value trap.

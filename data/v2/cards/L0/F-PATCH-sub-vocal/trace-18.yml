id: "L0-F24-trace-18"
schemaVersion: "v2"
atomId: "F-24"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Predict-first. Two self-updates in a row. Say the next value of
  `n` BEFORE pressing [step] — at every line.

code: |
  int main() {
    int n = 1;
    n = n + 4;
    n = n * 3;
    return 0;
  }

variables: ["n"]

expectedTrace:
  - line: 2
    variable: "n"
    value: "1"
    output: null
  - line: 3
    variable: "n"
    value: "5"
    output: null
  - line: 4
    variable: "n"
    value: "15"
    output: null

terminalOutput: []

inputMode: "per-step"

q4StopCondition: "Speak the next value BEFORE pressing [step]."

teachMe: |
  PREDICTIONS:
  - line 2: "n becomes one"
  - line 3: "n becomes five"   (1 + 4)
  - line 4: "n becomes fifteen" (5 * 3, NOT 1 * 3)
  Final panel: { n: 15 }.

  Saying the result aloud at each line is what stops you from using
  the original 1 on line 4.

drills: ["tier1:prereq:sub-vocal-predict-next-state-drill"]
source:
  kind: "pfg"
  ref: "Programming Fundamentals Guide § part-1/3-control-flow/0-panorama/07-hand-execution"

commonMistakeIds: ["CM-uses-old-value-after-update"]
status: "NEW"
authoringStatus: "DRAFT"
createdBy: "SA-L0-PATCH"
notes: |
  Compound self-update with sub-vocal. The mid-stream articulation
  is what catches the stale-original-value trap.

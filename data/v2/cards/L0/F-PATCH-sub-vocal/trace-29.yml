id: "L0-F24-trace-29"
schemaVersion: "v2"
atomId: "F-24"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Predict-first. Labelled print of an updated value. Speak the next
  value AND the entire printed line BEFORE pressing [step].

code: |
  int main() {
    int score = 5;
    score = score * 3;
    cout << "score = " << score << endl;
    return 0;
  }

variables: ["score"]

expectedTrace:
  - line: 2
    variable: "score"
    value: "5"
    output: null
  - line: 3
    variable: "score"
    value: "15"
    output: null
  - line: 4
    variable: ""
    value: ""
    output: "score = 15"

terminalOutput: ["score = 15"]

inputMode: "per-step"

q4StopCondition: "Speak the printed line BEFORE pressing [step]."

teachMe: |
  PREDICTIONS:
  - line 2: "score becomes five"
  - line 3: "score becomes fifteen" (5 * 3)
  - line 4: "terminal receives score equals fifteen" (printing the
    UPDATED value, not the original 5)
  Final panel: { score: 15 }. Terminal: score = 15.

drills: ["tier1:prereq:sub-vocal-predict-next-state-drill"]
source:
  kind: "pfg"
  ref: "Programming Fundamentals Guide § part-1/3-control-flow/0-panorama/07-hand-execution"

commonMistakeIds: ["CM-uses-old-value-after-update", "CM-prints-variable-name"]
status: "NEW"
authoringStatus: "DRAFT"
createdBy: "SA-L0-PATCH"
notes: |
  Labelled print after update. Forces sub-vocal of full literal +
  current value.

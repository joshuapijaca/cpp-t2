id: "L0-F24-trace-09"
schemaVersion: "v2"
atomId: "F-24"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Articulate the next value of `c` out loud (or mouth it) BEFORE
  pressing [step]. The RHS is `5 + 2`, so predict the SUM, not the
  literal expression.

code: |
  int main() {
    int c = 5 + 2;
    return 0;
  }

variables: ["c"]

expectedTrace:
  - line: 2
    variable: "c"
    value: "7"
    output: null

terminalOutput: []

inputMode: "per-step"

q4StopCondition: "Say the next value BEFORE pressing [step]."

teachMe: |
  PREDICTION: "c becomes seven".  (NOT "five plus two"!)
  Verify: 5 + 2 is computed first, then 7 is written into box `c`.
  Final panel: { c: 7 }.

  Predicting the COMPUTED value (not the expression) is the whole
  game. If you find yourself saying "five plus two" out loud, slow
  down and say the result.

drills: ["tier1:prereq:sub-vocal-predict-next-state-drill"]

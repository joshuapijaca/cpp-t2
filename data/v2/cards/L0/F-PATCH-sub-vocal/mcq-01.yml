stem: |
  In the sub-vocal predict-next-state drill, when do you say (or
  silently mouth) the next variable value?
correct: "Before pressing [step] — the prediction is articulated FIRST, then verified by the panel update."
distractors:
  - "After pressing [step] — read the new value out loud once it appears."
  - "Only at the end of the program — say all values at once."
  - "Never — the drill is silent, the panel does the talking."
explanation: |
  The load-bearing pedagogical move is articulation BEFORE the step.
  Saying the value commits your brain to one specific answer; if you
  are wrong, the panel update immediately reveals the mismatch and
  you correct on the spot.
  Targets CM-skips-mental-state (silent eye-skimming hides errors
  until the final wrong answer).
notes: "MCQ form for QA-M10 type-diversity (atom F-24 was 30 TraceCard)."

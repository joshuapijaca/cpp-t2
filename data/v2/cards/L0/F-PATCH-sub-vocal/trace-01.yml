# =====================================================================
# L0 / F-24 / TraceCard 01 — sub-vocal predict-next-state
# Atom: Sub-vocal predict-next-state drill
# Purpose: Articulate prediction before stepping; one-box decl
# =====================================================================
id: "L0-F24-trace-01"
schemaVersion: "v2"
atomId: "F-24"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  PREDICT-FIRST. For each line, say the next value of `n` out loud
  (or silently mouth the digits to yourself) BEFORE you press [step].
  No silent eye-skimming. Then enter the final value of `n` in the
  variables panel.

code: |
  int main() {
    int n = 6;
    return 0;
  }

variables: ["n"]

expectedTrace:
  - line: 2
    variable: "n"
    value: "6"
    output: null

terminalOutput: []

inputMode: "per-step"

q4StopCondition: "Articulate the next value out loud (or silently mouth it) BEFORE pressing [step]."

teachMe: |
  PREDICTION for line 2: "n becomes six".
  Verify: line 2 writes 6 into box `n`. Final panel: { n: 6 }.

  Why articulate? Saying the value commits your brain to one
  specific answer. If you are wrong, you notice immediately. Silent
  eye-skimming hides errors until the final wrong submission.

source:
  kind: "v2"
  ref: "C++T2 spec §B.2 patch — sub-vocal predict card 1/30"

commonMistakeIds: ["CM-skips-mental-state"]
status: "NEW"
authoringStatus: "DRAFT"
createdBy: "SA-L0-PATCH"
notes: |
  Smallest sub-vocal card. The articulation requirement is the
  load-bearing pedagogical move — encoded in stem + q4StopCondition.

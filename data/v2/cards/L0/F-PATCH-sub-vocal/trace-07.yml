stem: |
  Two declarations. For EACH line, articulate the next value out loud
  (or mouth it) BEFORE pressing [step]. Two predictions, two checks.

code: |
  int main() {
    int x = 1;
    int y = 2;
    return 0;
  }

variables: ["x", "y"]

expectedTrace:
  - line: 2
    variable: "x"
    value: "1"
    output: null
  - line: 3
    variable: "y"
    value: "2"
    output: null

terminalOutput: []

inputMode: "per-step"

q4StopCondition: "Articulate the next value BEFORE pressing [step]."

teachMe: |
  PREDICTION 1: "x becomes one".  Verify line 2.
  PREDICTION 2: "y becomes two".  Verify line 3.
  Final panel: { x: 1, y: 2 }.

  Two predictions in a row is the rhythm you want to feel by L1.


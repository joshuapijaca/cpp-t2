stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Predict-first. Two cout lines. Speak each printed value out loud
  (or mouth it) BEFORE pressing [step].

code: |
  int main() {
    int a = 3;
    int b = 7;
    cout << a << endl;
    cout << b << endl;
    return 0;
  }

variables: ["a", "b"]

expectedTrace:
  - line: 2
    variable: "a"
    value: "3"
    output: null
  - line: 3
    variable: "b"
    value: "7"
    output: null
  - line: 4
    variable: ""
    value: ""
    output: "3"
  - line: 5
    variable: ""
    value: ""
    output: "7"

terminalOutput: ["3", "7"]

inputMode: "per-step"

q4StopCondition: "Speak the next printed value BEFORE pressing [step]."

teachMe: |
  PREDICTIONS:
  - line 2: "a becomes three"
  - line 3: "b becomes seven"
  - line 4: "terminal receives three"
  - line 5: "terminal receives seven"
  Final panel: { a: 3, b: 7 }.
  Terminal: two lines, 3 then 7.

drills: ["tier1:prereq:sub-vocal-predict-next-state-drill"]

stem: |
  Predict-first. With cout this time. Before line 3, also predict
  what the terminal will receive — say the value out loud (or mouth
  it) BEFORE pressing [step].

code: |
  int main() {
    int v = 9;
    cout << v << endl;
    return 0;
  }

variables: ["v"]

expectedTrace:
  - line: 2
    variable: "v"
    value: "9"
    output: null
  - line: 3
    variable: ""
    value: ""
    output: "9"

terminalOutput: ["9"]

inputMode: "per-step"

q4StopCondition: "Articulate the value cout will print BEFORE pressing [step]."

teachMe: |
  PREDICTIONS:
  - line 2: "v becomes nine"
  - line 3: "terminal receives nine"
  Final panel: { v: 9 }. Terminal: 9.

  Predicting the printed value is what stops the "prints variable
  name" mistake.


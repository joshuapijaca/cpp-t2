type: "MCQCard"

stem: |
  Same if-else. The HIGHLIGHTED brace this time is the `{` AFTER
  `else`. Which `}` matches?

  ```cpp
  int main() {       // depth 0 open
    if (x > 0) {     // depth 1 open (if branch)
      cout << "+";
    } else {         // <-- HIGHLIGHT (the `{` after else, depth 1)
      cout << "-";
    }                // <-- option A (depth 1, else close)
    return 0;
  }                  // <-- option B (depth 0)
  ```

correct: "A — the `}` on the line after `cout << \"-\";` (depth-1, else's close)."

distractors:
  - "B — the final `}` of main, since the else stretches to the bottom."
  - "C — the `}` two lines up, because else and if share the same closing brace."
  - "D — there is no matching brace; the else keyword does not need one."

explanation: |
  A is correct. The else-block opens at the highlighted `{` and
  closes at the next `}` at the same depth.

  B is wrong: B is depth 0.
  C is wrong: that `}` already closed the if.
  D is wrong: braces are still required.


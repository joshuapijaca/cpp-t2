stem: |
  for-loop inside main. The HIGHLIGHTED `{` opens the for-body at
  depth 1. Which `}` matches?

  ```cpp
  int main() {                        // depth 0 open
    for (int i = 0; i < 3; i = i+1) { // <-- HIGHLIGHT (depth 1)
      cout << i << endl;
    }                                 // <-- option A (depth 1)
    return 0;
  }                                   // <-- option B (depth 0)
  ```

correct: "A — the `}` on the line after the cout (depth-1 close)."

distractors:
  - "B — the final `}` of main, because the for-loop's body is the rest of the program."
  - "C — there is no matching brace; for-loops use `endfor`."
  - "D — the `)` at the end of the for-header is the matching brace."

explanation: |
  A is correct. The for-body opens at the highlighted `{` and
  closes at the next `}` at depth 1.

  B is wrong: that closes main, not the for.
  C is wrong: C++ uses `}`, not `endfor`.
  D is wrong: `)` matches `(`, not `{`.


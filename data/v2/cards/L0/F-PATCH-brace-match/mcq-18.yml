type: "MCQCard"

stem: |
  Struct above main. The HIGHLIGHTED `{` opens main. Which `}` is
  main's close?

  ```cpp
  struct Item {           // depth 0 open (struct)
    string name;
    int qty;
  };                      // option A (depth 0, struct close)
  int main() {            // <-- HIGHLIGHT (depth 0, main)
    Item it;
    it.qty = 5;
    return 0;
  }                       // <-- option B (depth 0, main close)
  ```

correct: "B — the final `}` on its own line at the bottom (depth 0, main's close)."

distractors:
  - "A — the `};` line, because that closes everything above main."
  - "C — the `;` after `it.qty = 5` is the matching closing brace."
  - "D — there is no closing brace for main; the struct's `};` covers both."

explanation: |
  B is correct. depth-0 has TWO opens (struct and main), so it has
  TWO closes (option A and option B). Each pairs inwards.

  A is wrong: A closes the struct, not main.
  C is wrong: `;` is a statement terminator.
  D is wrong: each `{` has its own `}`.


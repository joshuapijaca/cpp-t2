type: "MCQCard"

stem: |
  A function `add` with parameters. The HIGHLIGHTED `{` opens add's
  body. Which `}` matches?

  ```cpp
  int add(int a, int b) {     // <-- HIGHLIGHT (depth 0, add body)
    int result = a + b;
    return result;
  }                           // <-- option A (depth 0, add close)
  int main() {                // depth 0 open (main)
    int s = add(2, 3);
    return 0;
  }                           // <-- option B (depth 0, main close)
  ```

correct: "A — the `}` on the line after `return result;` (depth 0, add's close)."

distractors:
  - "B — the final `}` of main, because add and main share their closing brace."
  - "C — the `)` after `int b` is the matching brace of `int add(`."
  - "D — there is no matching brace; the `return` keyword closes the function automatically."

explanation: |
  A is correct. add opens at the highlighted `{` and closes at the
  next depth-0 `}`.

  B is wrong: B closes main.
  C is wrong: parens close other parens, not braces.
  D is wrong: `return` is a statement; the body still needs `}`.


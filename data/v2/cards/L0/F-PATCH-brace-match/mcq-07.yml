stem: |
  Same shape as card 06, but the HIGHLIGHTED brace is main's
  opening brace at depth 0. Which `}` matches?

  ```cpp
  int main() {                        // <-- HIGHLIGHT (depth 0)
    for (int i = 0; i < 3; i = i+1) { // depth 1 open
      cout << i << endl;
    }                                 // option A (depth 1)
    return 0;
  }                                   // <-- option B (depth 0)
  ```

correct: "B — the final `}` on its own line (depth-0 close)."

distractors:
  - "A — the `}` after the cout, because that is the first `}` after the highlighted brace."
  - "C — there is no matching brace; main never closes in this code."
  - "D — both option A and option B are correct; main has two closing braces."

explanation: |
  B is correct. main opens at depth 0 and closes at the final `}`,
  also at depth 0. Option A is at depth 1 — it pairs with the for.

  A is wrong: depth 1 only pairs with depth 1.
  C is wrong: B exists.
  D is wrong: each `{` matches exactly one `}`.


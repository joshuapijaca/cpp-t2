type: "MCQCard"

stem: |
  A free function defined above main. The HIGHLIGHTED `{` opens
  the function's body. Which `}` matches?

  ```cpp
  void greet() {     // <-- HIGHLIGHT (depth 0, greet)
    cout << "hi";
  }                  // <-- option A (depth 0, greet close)
  int main() {       // depth 0 open (main)
    greet();
    return 0;
  }                  // <-- option B (depth 0, main close)
  ```

correct: "A — the `}` on the line after the cout (depth 0, greet's close)."

distractors:
  - "B — the final `}` of main, since both function bodies share one closing brace."
  - "C — the `(` and `)` of `greet()` close the body."
  - "D — there is no matching `}`; functions without a return need none."

explanation: |
  A is correct. greet opens at the highlighted `{` and closes at
  the next `}` at the same depth.

  B is wrong: B closes main, not greet.
  C is wrong: parens enclose the parameter list, not the body.
  D is wrong: every function body needs `}`.


stem: |
  A free function `printAll` that contains a for-loop. The
  HIGHLIGHTED `{` opens the for-body at depth 1. Which `}` matches?

  ```cpp
  void printAll(int n) {                // depth 0 open (printAll)
    for (int i = 0; i < n; i = i+1) {   // <-- HIGHLIGHT (depth 1, for)
      cout << i << endl;
    }                                   // <-- option A (depth 1)
  }                                     // <-- option B (depth 0)
  int main() {                          // depth 0 open (main)
    printAll(3);
    return 0;
  }                                     // <-- option C (depth 0)
  ```

correct: "A — the `}` on the line after the cout (depth 1, for close)."

distractors:
  - "B — the `}` between A and `int main()`, since printAll and the for share their closing brace."
  - "C — the final `}` of main, because all loops finish at the program's end."
  - "D — the `)` at the end of the for-header is the matching brace."

explanation: |
  A is correct. depth-1 pairs with depth-1.

  B is wrong: B closes printAll, not the for.
  C is wrong: C closes main.
  D is wrong: parens never match braces.


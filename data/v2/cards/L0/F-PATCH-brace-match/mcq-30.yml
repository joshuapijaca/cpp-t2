stem: |
  Capstone. A struct, a function with a for-loop, and main. The
  HIGHLIGHTED `{` opens the FOR-loop body inside `printAll` at
  depth 1. Which `}` matches?

  ```cpp
  struct Item {                         // depth 0 open (struct)
    string name;
    int qty;
  };                                    // option A (depth 0, struct close)
  void printAll(Item items[], int n) {  // depth 0 open (printAll)
    for (int i = 0; i < n; i = i+1) {   // <-- HIGHLIGHT (depth 1, for)
      cout << items[i].name;
      cout << " ";
      cout << items[i].qty << endl;
    }                                   // <-- option B (depth 1, for close)
    cout << "done" << endl;
  }                                     // option C (depth 0, printAll close)
  int main() {                          // depth 0 open (main)
    Item arr[2];
    printAll(arr, 2);
    return 0;
  }                                     // option D (depth 0, main close)
  ```

correct: "B — the `}` on the line after the third cout (depth 1, for-body close)."

distractors:
  - "A — the `};` line, since structs lend their closing brace to following functions."
  - "C — the `}` after `cout << \"done\" << endl;`, since that is the next `}` after the for body."
  - "D — the final `}` of main, because the for-loop runs across the whole program."

explanation: |
  B is correct. depth-1 matches depth-1, and option B is the only
  depth-1 `}` after the highlight.

  A is wrong: A is depth 0 (struct close).
  C is wrong: C is depth 0 (printAll's close — see how the
  `cout << "done"` line is OUTSIDE the for, at depth 1, so the
  `}` after it is at depth 0).
  D is wrong: D is depth 0 (main).

  KEY MOVE for capstone: after option B closes the for, the
  remaining `cout << "done"` runs ONCE, then printAll closes at
  C. Trace the depth label of every `}` to find the right one.


stem: |
  A for-loop and an if at depth 1, side by side. The HIGHLIGHTED
  `{` opens the for. Which `}` matches?

  ```cpp
  int main() {                          // depth 0 open
    for (int i = 0; i < 3; i = i+1) {   // <-- HIGHLIGHT (depth 1, for)
      cout << i << endl;
    }                                   // <-- option A (depth 1, for close)
    if (n > 0) {                        // depth 1 open (if)
      cout << "yes";
    }                                   // <-- option B (depth 1, if close)
    return 0;
  }                                     // <-- option C (depth 0)
  ```

correct: "A — the `}` immediately after `cout << i << endl;` (depth-1, for close)."

distractors:
  - "B — the `}` after `cout << \"yes\";`, because for and if share their closing brace."
  - "C — the final `}` of main, since both blocks live inside main."
  - "D — both A and B; the for-loop has two closing braces (one per iteration)."

explanation: |
  A is correct. The for-body opens at the highlighted `{` and
  closes at the FIRST depth-1 `}` after it.

  B is wrong: B closes the if.
  C is wrong: C is depth 0.
  D is wrong: a for-loop has ONE closing brace regardless of how
  many times the body iterates.


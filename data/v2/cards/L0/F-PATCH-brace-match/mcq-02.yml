qTags: ["Q2", "Q4"]
stage: 0
level: "L0"
type: "MCQCard"

stem: |
  Two top-level blocks (a struct and main). The HIGHLIGHTED `{`
  below opens the struct. Which `}` closes it?

  ```cpp
  struct Point {   // <-- HIGHLIGHT (depth 0, struct)
    int x;
    int y;
  };               // <-- option A (depth 0, struct close)
  int main() {    // <-- option B opens main (depth 0, main)
    return 0;
  }                // <-- option C closes main (depth 0, main close)
  ```

correct: "A — the `};` line. The `}` part closes the struct; the `;` finishes the struct declaration."

distractors:
  - "B — the `{` on the next line, which opens `main`. Two opening braces in a row pair with each other."
  - "C — the `}` after `return 0;`. The struct's brace and main's brace are adjacent so they share."
  - "D — none of the visible `}` characters; the struct must be closed with `END` instead."

explanation: |
  A is correct. The struct opens at the highlighted `{` and closes
  at the matching `}` (which sits in front of the required `;`).

  B is wrong: two `{`s in a row do NOT pair with each other; each
  pairs with the matching `}` later.
  C is wrong: the `}` on option C closes `main`, not the struct.
  D is wrong: option A IS visible.


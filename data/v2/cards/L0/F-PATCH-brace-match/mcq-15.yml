level: "L0"
type: "MCQCard"

stem: |
  An if-else has TWO blocks side by side at the same depth. The
  HIGHLIGHTED `{` opens the IF branch. Which `}` matches?

  ```cpp
  int main() {       // depth 0 open
    if (x > 0) {     // <-- HIGHLIGHT (depth 1, if branch)
      cout << "+";
    } else {         // <-- option A (depth 1, if close + else open)
      cout << "-";
    }                // <-- option B (depth 1, else close)
    return 0;
  }                  // <-- option C (depth 0)
  ```

correct: "A — the `} else {` line. The `}` portion closes the if branch; the `{` portion opens the else."

distractors:
  - "B — the `}` after `cout << \"-\";`, because if-else uses one shared closing brace."
  - "C — the final `}` of main, because if-else stretches from the if-open to main's end."
  - "D — none; if-else replaces braces with the keyword `else`."

explanation: |
  A is correct. The if-block is `{ ... }` ending right before
  `else`. The `}` on option A's line closes the if branch.

  B is wrong: B closes the else branch (a different block).
  C is wrong: C is depth 0.
  D is wrong: braces are required even in if-else.


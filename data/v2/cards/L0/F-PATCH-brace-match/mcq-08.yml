stem: |
  Three nested blocks. The HIGHLIGHTED `{` is the if at depth 2.
  Which `}` matches?

  ```cpp
  int main() {                          // depth 0 open
    for (int i = 0; i < 3; i = i+1) {   // depth 1 open
      if (i > 0) {                      // <-- HIGHLIGHT (depth 2)
        cout << i << endl;
      }                                 // <-- option A (depth 2)
    }                                   // <-- option B (depth 1)
    return 0;
  }                                     // <-- option C (depth 0)
  ```

correct: "A — the `}` immediately after the cout, at depth 2."

distractors:
  - "B — the `}` two lines below, because that is the only `}` clearly aligned with the for-loop."
  - "C — the final `}` of main, because it closes everything inside it."
  - "D — none of the visible `}`; you need a separate `endif`."

explanation: |
  A is correct. depth-2 matches depth-2: the if opens at the
  highlighted `{` and closes at the next depth-2 `}`.

  B is wrong: depth-1 `}` pairs with the for, not the if.
  C is wrong: depth-0 `}` pairs with main.
  D is wrong: C++ does not use `endif`.


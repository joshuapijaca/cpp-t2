stem: |
  Same code as the previous card, but the HIGHLIGHTED brace is the
  OUTER one (main's open). Which `}` is its match?

  ```cpp
  int main() {     // <-- HIGHLIGHT (depth 0 open)
    if (1 < 2) {   // depth 1 open
      int n = 0;
    }              // option A (depth 1 close)
    return 0;
  }                // <-- option B (depth 0 close)
  ```

correct: "B — the final `}` on its own line (depth-0 close)."

distractors:
  - "A — the `}` at the end of the if-block, because it is the first `}` after the highlighted `{`."
  - "C — there is no matching brace; main's body is unbounded."
  - "D — option A and option B together; main needs two closing braces."

explanation: |
  B is correct. The highlighted `{` opens main at depth 0. The
  first `}` you encounter (option A) is at depth 1 — it closes the
  if, NOT main. The match is the next `}` AFTER A, at depth 0.

  A is wrong: depth-1 close pairs with the depth-1 open (the if),
  not main.
  C is wrong: B is visible.
  D is wrong: each `{` needs exactly one matching `}`.


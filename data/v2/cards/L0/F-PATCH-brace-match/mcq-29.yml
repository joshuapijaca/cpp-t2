stem: |
  For-loop with if-else inside. The HIGHLIGHTED `{` is the `{`
  AFTER `else` (the else-branch open at depth 2). Which `}`
  matches?

  ```cpp
  int main() {                          // depth 0 open
    for (int i = 0; i < 4; i = i+1) {   // depth 1 open
      if (i % 2 == 0) {                 // depth 2 open (if)
        cout << "even";
      } else {                          // <-- HIGHLIGHT (the `{` after else, depth 2)
        cout << "odd";
      }                                 // <-- option A (depth 2, else close)
    }                                   // <-- option B (depth 1, for close)
    return 0;
  }                                     // <-- option C (depth 0)
  ```

correct: "A — the `}` on the line after `cout << \"odd\";` (depth-2, else's close)."

distractors:
  - "B — the next `}`, since the for-loop wraps the else in its closing brace."
  - "C — the final `}` of main, because nested else extends to the program's end."
  - "D — the previous `}` (just before `else`), because if and else share their close."

explanation: |
  A is correct. The else-branch opens at the highlighted `{` and
  closes at the next depth-2 `}`.

  B is wrong: B is depth 1.
  C is wrong: C is depth 0.
  D is wrong: that `}` already closed the if.


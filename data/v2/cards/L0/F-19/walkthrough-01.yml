notes: |
  First-touch walkthrough. Drives home: (1) declaration syntax
  `int arr[5];`, (2) zero-based indexing 0..N-1, (3) accessing
  arr[N] is out of bounds. These three are the load-bearing facts
  the rest of the F-19 deck drills.

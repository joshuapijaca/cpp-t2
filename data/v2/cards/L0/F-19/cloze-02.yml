type: "ClozeCard"

stem: |
  Given `int arr[5];`, fill in the largest valid index.

code: |
  int arr[5];
  arr[___] = 100;   // last valid slot

clozeSentence: "arr[___]  // last valid index in a 5-element array"

answer: "4"

explanation: |
  An array of size 5 has indices 0, 1, 2, 3, 4. The last valid index
  is SIZE - 1 = 4. Writing arr[5] would go off the end (CM-F19b).


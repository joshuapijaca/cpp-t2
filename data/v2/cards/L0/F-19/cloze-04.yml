stem: |
  Fill in the missing variable to read element at index `i` of `arr`.

code: |
  int i = 2;
  cout << arr[___] << endl;

clozeSentence: "cout << arr[___] << endl;  // read element at index i"

answer: "i"

explanation: |
  An array index can be a literal (`arr[2]`) or any int expression
  including a variable (`arr[i]`). When `i = 2`, then `arr[i]` is the
  same as `arr[2]`. This is the loop-driven access pattern used in
  Q1 trace bodies and Q3 read functions.


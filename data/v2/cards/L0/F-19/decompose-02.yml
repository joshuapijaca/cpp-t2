type: "DecomposeCard"

stem: |
  Pick the line that correctly declares an array of 4 ints named
  `scores`.

code: |
  // your job: identify the correct declaration syntax

question: |
  Which of these declares a fixed-size array of 4 ints called scores?

options:
  - label: "A"
    text: "int scores = [4];"
  - label: "B"
    text: "int scores[4];"
  - label: "C"
    text: "array<int, 4> scores;"
  - label: "D"
    text: "int[4] scores;"

correctLabel: "B"

explanation: |
  B is correct. The C++ fixed-size-array declaration is
  `TYPE NAME[SIZE];`.
  A is wrong: there is no `= [4]` syntax in C++.
  C is wrong: `array<int, 4>` is the std::array template (Phase 5
  off-scope; Test 2 uses raw arrays only).
  D is wrong: the size brackets follow the NAME, not the type.


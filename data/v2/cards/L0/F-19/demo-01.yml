stem: |
  Watch: the canonical array declaration. Type, name, size in
  brackets, semicolon. Memorise the shape — every Q1 and Q3 trace
  begins with one of these.

whyOneLine: "`int arr[5];` allocates five int slots indexed 0 through 4."

demoCode: |
  // canonical fixed-size array declaration:
  int arr[5];

  // shape:        TYPE   NAME   [SIZE]   ;
  // example A:    int    arr    [5]      ;
  // example B:    double prices [10]     ;
  // example C:    char   word   [20]     ;

highlightTokens:
  - "int arr[5];"
  - "TYPE"
  - "NAME"
  - "[SIZE]"
  - ";"

usedIn:
  - "Q1 trace (struct field `double numbers[SIZE];`)"
  - "Q3 read function (array as struct field, then iterate)"
  - "Q4 main program (declare local array, fill it, print it)"


stem: |
  Fill in the missing token to declare a 5-int array called `arr`.

code: |
  int arr[___];

clozeSentence: "int arr[___];  // declares 5-int storage"

answer: "5"

explanation: |
  The size goes between the brackets after the name. `int arr[5];`
  allocates 5 int slots indexed 0..4. The size must be a compile-time
  constant (an int literal or a `const int` value).


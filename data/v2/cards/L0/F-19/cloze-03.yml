stem: |
  Fill in the missing punctuation to initialise an array of 4 ints
  with the values 1, 2, 3, 4.

code: |
  int arr[4] = ___1, 2, 3, 4___;

clozeSentence: "int arr[4] = ___1, 2, 3, 4___;  // brace-list initialiser"

answer: "{ }"

explanation: |
  The initialiser is a brace-enclosed list: `{1, 2, 3, 4}`. The braces
  separate this from a function call (which uses parens) or a comma
  expression. The trailing `;` ends the declaration statement.


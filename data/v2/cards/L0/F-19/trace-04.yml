# L0 / F-19 / TraceCard 04
# Atom: Fixed-size array — write through index, read back
# =====================================================================
id: "L0-F19-trace-04"
schemaVersion: "v2"
atomId: "F-19"
qTags: ["Q1", "Q3", "Q4"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  This program writes to slot 2 then prints all five slots. Fill in
  the final state of every slot and the terminal output.

code: |
  int main() {
    int arr[5] = {0, 0, 0, 0, 0};
    arr[2] = 99;
    cout << arr[0] << endl;
    cout << arr[1] << endl;
    cout << arr[2] << endl;
    cout << arr[3] << endl;
    cout << arr[4] << endl;
    return 0;
  }

variables: ["arr[0]", "arr[1]", "arr[2]", "arr[3]", "arr[4]"]

expectedTrace:
  - line: 2
    variable: "arr[0]"
    value: "0"
    output: null
  - line: 2
    variable: "arr[1]"
    value: "0"
    output: null
  - line: 2
    variable: "arr[2]"
    value: "0"
    output: null
  - line: 2
    variable: "arr[3]"
    value: "0"
    output: null
  - line: 2
    variable: "arr[4]"
    value: "0"
    output: null
  - line: 3
    variable: "arr[2]"
    value: "99"
    output: null
  - line: 4
    variable: ""
    value: ""
    output: "0"
  - line: 5
    variable: ""
    value: ""
    output: "0"
  - line: 6
    variable: ""
    value: ""
    output: "99"
  - line: 7
    variable: ""
    value: ""
    output: "0"
  - line: 8
    variable: ""
    value: ""
    output: "0"

terminalOutput: ["0", "0", "99", "0", "0"]

inputMode: "final-only"

teachMe: |
  - Line 2: all five slots = 0.
  - Line 3: writing to arr[2] only changes slot 2. Slots 0, 1, 3, 4
            keep their old values. The write is targeted.
  - Lines 4-8: print each slot. Only arr[2] is 99; the rest are 0.

  Final state: arr = {0, 0, 99, 0, 0}.

  Trap: writing arr[2] = 99 does NOT shift other slots. Each slot is
  an independent int. Writing one does not touch the others.

drills: ["tier1:prereq:fixed-size-array-t-arr-n"]

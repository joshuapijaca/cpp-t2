type: "ClozeCard"

stem: |
  The line below uses the placeholder CLOSE_BRACE for a single
  punctuation character. Type that character.

code: |
  // function-body skeleton with the closing character hidden:
  //   int main() OPEN_BRACE
  //     return 0;
  //   CLOSE_BRACE
  //
  // Reference (with the actual characters):
  int main() {
    return 0;
  }

clozeSentence: |
  The CLOSE_BRACE placeholder stands for the single character ____

answer: "}"

explanation: |
  The character is `}`. It closes the function body block. Every
  `}` must have a matching `{` earlier — on the function-header
  line.


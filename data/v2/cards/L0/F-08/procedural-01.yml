stem: |
  Build a full Q4-style program with TWO matched brace pairs — one
  for a struct, one for main. Counts must be: 2 opens, 2 closes.

section: "L0 · F-08 · procedural — paired-blocks Q4 answer"

prompt: |
  Write a complete C++T2 program with:
  1. A struct named `Box` with one int field `width`.
  2. A main that declares a Box, sets `width` to 12, prints it,
     and returns 0.

expectedAnswer: |
  #include <iostream>
  using namespace std;
  struct Box {
    int width;
  };
  int main() {
    Box b;
    b.width = 12;
    cout << b.width << endl;
    return 0;
  }

keyChecks:
  - "struct Box {"
  - "int width;"
  - "};"
  - "int main()"
  - "Box b;"
  - "b.width = 12;"
  - "cout << b.width << endl;"
  - "return 0;"
  - "}"

variants:
  - prompt: "Same shape — struct Item with one int field 'price', main sets price to 50, prints it, returns 0."
    expectedAnswer: |
      #include <iostream>
      using namespace std;
      struct Item {
        int price;
      };
      int main() {
        Item i;
        i.price = 50;
        cout << i.price << endl;
        return 0;
      }


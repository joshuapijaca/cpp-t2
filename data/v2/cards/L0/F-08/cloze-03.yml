qTags: ["Q2", "Q4"]
stage: 0
level: "L0"
type: "ClozeCard"

stem: |
  Fill the blank with the closing line of `main`. The line is
  exactly one character.

code: |
  // The function's last line has been hidden as ____ below.
  // Reference (balanced) version of the same function:
  int main() {
    int z = 9;
    cout << z << endl;
    return 0;
  }
  // In the hidden-version, the ____ replaces the single character
  // on the last line.

clozeSentence: |
  ____    (the final line of main, after return 0;)

answer: "}"

explanation: |
  The final line of main is `}` — the closing brace alone. For
  function bodies, the close is just `}`, NOT `};`. (The `};`
  shape is for struct definitions only.)


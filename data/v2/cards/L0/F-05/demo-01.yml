id: "L0-F05-demo-01"
schemaVersion: "v2"
atomId: "F-05"
qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "DemoCard"

stem: |
  Watch the effect. Same program, same output — but the body changes
  shape depending on whether `using namespace std;` is present.

whyOneLine: "using namespace std; lets you write cout instead of std::cout — SIT102's default style."

demoCode: |
  // ============  WITHOUT the directive  ============
  #include <iostream>
  int main() {
    std::cout << "ok" << std::endl;
    return 0;
  }

  // ============  WITH the directive  ============
  #include <iostream>
  using namespace std;
  int main() {
    cout << "ok" << endl;
    return 0;
  }

  // The OUTPUT is identical: ok
  // Only the call sites change: std::cout -> cout, std::endl -> endl.

highlightTokens:
  - "using namespace std;"
  - "std::cout"
  - "cout"
  - "OUTPUT is identical"


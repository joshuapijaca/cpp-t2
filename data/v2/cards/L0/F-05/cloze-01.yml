# Atom: using namespace std;
# =====================================================================
id: "L0-F05-cloze-01"
schemaVersion: "v2"
atomId: "F-05"
qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "ClozeCard"

stem: |
  Fill the blank. The answer is the keyword that begins the
  using-namespace line.

code: |
  #include <iostream>
  ____ namespace std;
  int main() {
    cout << 1 << endl;
    return 0;
  }

clozeSentence: |
  ____ namespace std;

answer: "using"

explanation: |
  The line begins with the keyword `using`. Without `using`, just
  writing `namespace std;` is not a valid C++ statement — `namespace`
  alone is for *defining* a namespace, not opening one for unqualified
  access.


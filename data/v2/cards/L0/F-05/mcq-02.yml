qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "MCQCard"

stem: |
  Which of these is the correct, idiomatic SIT102 form of the
  using-namespace line?

correct: "using namespace std;"

distractors:
  - "namespace std;"
  - "using namespace STD;"
  - "use namespace std;"

explanation: |
  Correct: `using namespace std;` — keyword `using`, keyword
  `namespace`, the lowercase name `std`, then a semicolon.

  `namespace std;` drops the `using` keyword, which makes the line
  invalid (and `namespace` alone has different syntax for *defining*
  a namespace).
  `using namespace STD;` capitalises the namespace; identifiers in
  C++ are case-sensitive, so `STD` ≠ `std`.
  `use namespace std;` invents a keyword `use` that does not exist
  in C++.


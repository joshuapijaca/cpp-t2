qTags: ["Q4"]
stage: 0
level: "L0"
type: "DemoCard"

stem: |
  Anatomy of the line. Watch the keywords, the namespace name, and
  the terminator. Each token has a fixed role.

whyOneLine: "using namespace std; is one statement: keyword 'using' + keyword 'namespace' + name 'std' + semicolon."

demoCode: |
  //  using   namespace   std   ;
  //   |        |          |    |
  //   |        |          |    +-- statement terminator (required)
  //   |        |          +------- the namespace name (lowercase)
  //   |        +------------------ keyword: namespace
  //   +--------------------------- keyword: using

  using namespace std;

  //  Correct order matters: `using` first, `namespace` second, name
  //  third, semicolon last. Reordering any of those (e.g. writing
  //  just `namespace std;` without `using`) is invalid.

highlightTokens:
  - "using"
  - "namespace"
  - "std"
  - ";"
  - "Correct order"

usedIn:
  - "Q4 main program (mandatory line 2 of every answer)"


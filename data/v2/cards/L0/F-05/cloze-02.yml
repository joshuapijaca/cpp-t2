stem: |
  Fill the blank with the namespace name. Mind the case — the
  standard-library namespace is lowercase.

code: |
  #include <iostream>
  using namespace ____;
  int main() {
    cout << 2 << endl;
    return 0;
  }

clozeSentence: |
  using namespace ____;

answer: "std"

explanation: |
  The namespace name is `std` (all lowercase). Capital forms like
  `STD` or `Std` will not compile — namespaces are case-sensitive
  identifiers.


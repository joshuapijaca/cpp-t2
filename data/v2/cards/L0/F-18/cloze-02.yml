stem: |
  Fill in the INIT slot. Declare a new int counter named `i`
  starting at 0.

code: |
  for (___; i < SIZE; i++) {
    cout << i << endl;
  }

clozeSentence: |
  for (___; i < SIZE; i++)

answer: "int i = 0"

explanation: |
  The init slot can DECLARE a new variable. `int i = 0` opens box
  `i` with value 0 once at loop start. The variable is scoped to
  the loop only.


stem: |
  In `for (int i = 0; i < 3; i++)`, when does `i++` execute
  relative to the body?

correct: "After the body finishes; the body sees the BEFORE-step value of i."

distractors:
  - "Before the body; the body sees the AFTER-step value of i."
  - "Simultaneously with the body."
  - "Only on the final iteration; not on earlier iterations."

explanation: |
  Execution order each iteration: TEST first; if true, BODY runs;
  then STEP (`i++`). So the body sees i = 0, then 1, then 2 — not
  1, 2, 3. This is why `for (int i = 0; i < 3; i++) cout << i;`
  prints "012" not "123".


  Fill in the keyword that introduces a counted loop in C++.

code: |
  ___ (int i = 0; i < SIZE; i++) {
    cout << i << endl;
  }

clozeSentence: |
  ___ (int i = 0; i < SIZE; i++)

answer: "for"

explanation: |
  `for` is the C++ keyword for a counted loop. The header has three
  pieces (init; test; step) separated by semicolons.


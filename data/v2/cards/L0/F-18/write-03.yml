type: "TemplateRecallCard"

stem: |
  Write the literal Q1 max-finding for-loop body. The for-loop
  iterates `i` from 0 to SIZE-1. Inside, an if updates
  `data.mystery` when `data.numbers[i]` is greater.

prompt: |
  Write the Q1 `who_am_i` for-loop body verbatim.

template: |
  for (___) {
    if (___) {
      ___ = ___;
    }
  }

canonicalAnswer: |
  for (i = 0; i < SIZE; i++) {
    if (data.numbers[i] > data.mystery) {
      data.mystery = data.numbers[i];
    }
  }

keyChecks:
  - "for (i = 0; i < SIZE; i++)"
  - "if (data.numbers[i] > data.mystery)"
  - "data.mystery = data.numbers[i];"

forbiddenTokens:
  - "while"
  - "do"

explanation: |
  Letter-for-letter the Q1 body of `who_am_i`. `i` was declared
  earlier with `int i;` so the init slot just assigns. The if
  uses strict `>`. The body of the if assigns numbers[i] into
  mystery.


teachMe: |
  Four iterations. mystery starts at numbers[0] = -2.0. Iter 1: skip
  (-2.0 not > -2.0). Iter 2: mystery becomes 5.5. Iter 3: skip
  (1.3 not > 5.5). Iter 4: skip (4.0 not > 5.5). Final mystery =
  5.5 — the maximum of the array. This is exactly the Q1 shape:
  for-loop + if-condition + update.


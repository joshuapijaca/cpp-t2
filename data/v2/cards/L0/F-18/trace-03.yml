stem: |
  Hand-execute. This is a stripped-down version of the Test 2 Q1
  shape: a for-loop iterating over an array, with an if inside
  that updates a running maximum. Track `mystery` carefully.

code: |
  int main() {
    const int SIZE = 4;
    double numbers[SIZE] = {-2.0, 5.5, 1.3, 4.0};
    double mystery = numbers[0];
    for (int i = 0; i < SIZE; i++) {
      if (numbers[i] > mystery) {
        mystery = numbers[i];
      }
    }
    cout << mystery << endl;
    return 0;
  }

variables: ["mystery", "i"]


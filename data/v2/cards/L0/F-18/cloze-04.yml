type: "ClozeCard"

stem: |
  Fill in the STEP slot. The counter should increase by 1 after
  each body execution.

code: |
  for (int i = 0; i < SIZE; ___) {
    cout << i << endl;
  }

clozeSentence: |
  for (int i = 0; i < SIZE; ___)

answer: "i++"

explanation: |
  `i++` increments i by 1. It runs AFTER each body execution. If
  this slot is empty, i never changes and the loop is infinite.


# Atom: write canonical for-loop counting 0..N-1
# =====================================================================
id: "L0-F18-write-01"
schemaVersion: "v2"
atomId: "F-18"
qTags: ["Q1", "Q3", "Q4"]
stage: 0
level: "L0"
type: "TemplateRecallCard"

stem: |
  Write a complete for-loop that prints the integers 0, 1, 2, 3, 4
  (one per line). Declare `i` in the init slot.

prompt: |
  Print 0..4 inclusive, one per line, using a counted for-loop.

template: |
  for (___) {
    cout << ___ << endl;
  }

canonicalAnswer: |
  for (int i = 0; i < 5; i++) {
    cout << i << endl;
  }

keyChecks:
  - "for (int i = 0; i < 5; i++)"
  - "cout"

forbiddenTokens:
  - "while"
  - "do"

explanation: |
  Init `int i = 0`, test `i < 5`, step `i++`. Body prints i. The
  body runs for i = 0, 1, 2, 3, 4 (five values). Using `i <= 5`
  would run six times and print an extra 5.

drills: ["tier1:prereq:for-int-i-0-i-n-i-counting-loop"]

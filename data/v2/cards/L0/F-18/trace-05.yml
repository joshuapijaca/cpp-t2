id: "L0-F18-trace-05"
schemaVersion: "v2"
atomId: "F-18"
qTags: ["Q1", "Q3", "Q4"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Hand-execute. Predict each line of terminal output.

code: |
  int main() {
    for (int i = 1; i < 4; i++) {
      cout << "tick " << i << endl;
    }
    return 0;
  }

variables: ["i"]

expectedTrace:
  - line: 2
    variable: "i"
    value: "1"
    output: null
    condition: "init i = 1 (note: starts at 1, not 0)"
  - line: 3
    variable: ""
    value: ""
    output: "tick 1"
    condition: "iter 1: 1<4 true"
  - line: 2
    variable: "i"
    value: "2"
    output: null
    condition: "step"
  - line: 3
    variable: ""
    value: ""
    output: "tick 2"
    condition: "iter 2: 2<4 true"
  - line: 2
    variable: "i"
    value: "3"
    output: null
    condition: "step"
  - line: 3
    variable: ""
    value: ""
    output: "tick 3"
    condition: "iter 3: 3<4 true"
  - line: 2
    variable: "i"
    value: "4"
    output: null
    condition: "step"
  - line: 2
    variable: ""
    value: ""
    output: null
    condition: "test: 4<4 false, EXIT"

terminalOutput:
  - "tick 1"
  - "tick 2"
  - "tick 3"

inputMode: "final-only"

teachMe: |
  Init starts at 1, not 0. Three iterations: i = 1, 2, 3. The
  loop exits at i = 4 because 4 < 4 is false. The body prints a
  string literal `"tick "` plus the current i.

drills: ["tier1:prereq:for-int-i-0-i-n-i-counting-loop"]

# Atom: header has SEMICOLONS not commas
# =====================================================================
id: "L0-F18-decomp-03"
schemaVersion: "v2"
atomId: "F-18"
qTags: ["Q1", "Q3", "Q4"]
stage: 0
level: "L0"
type: "DecomposeCard"

stem: |
  Pick the syntactically valid for-loop header.

code: |
  // intent: i from 0 up to (but not including) 5
  for ( ??? ) {
    cout << i << endl;
  }

question: |
  Which option goes in `???`?

options:
  - label: "A"
    text: |
      `int i = 0, i < 5, i++` — three pieces separated by commas.
  - label: "B"
    text: |
      `int i = 0; i < 5; i++` — three pieces separated by
      semicolons.
  - label: "C"
    text: |
      `int i = 0 i < 5 i++` — three pieces with no separators.
  - label: "D"
    text: |
      `int i = 0: i < 5: i++` — three pieces separated by colons.

correctLabel: "B"

explanation: |
  B. The C++ for-header uses TWO semicolons to separate init,
  test, step. Commas would make it a single comma-expression and
  break the parse. No-separators is a syntax error. Colons are
  not used.


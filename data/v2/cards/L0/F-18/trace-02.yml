teachMe: |
  Five iterations: i = 0, 1, 2, 3, 4. Each adds i to sum. Running
  total: 0, 1, 3, 6, 10. Final sum = 10 = 0+1+2+3+4. The terminal
  prints 10. (Note: `sum += i` is `sum = sum + i` — read sum and
  i, add, write back into sum.)


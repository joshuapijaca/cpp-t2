stem: |
  Hand-execute. The body adds the loop index into a running total.
  Predict the final value of `sum`. Track sum at each iteration.

code: |
  int main() {
    int sum = 0;
    for (int i = 0; i < 5; i++) {
      sum += i;
    }
    cout << sum << endl;
    return 0;
  }


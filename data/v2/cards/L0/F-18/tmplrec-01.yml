stage: 0
level: "L0"
type: "TemplateRecallCard"

stem: |
  Recall and write the canonical for-loop SKELETON with
  placeholders for init / test / step / body.

prompt: |
  Produce the empty for-loop skeleton with the three header slots
  and one body line.

template: |
  for (___; ___; ___) {
    ___;
  }

canonicalAnswer: |
  for (init; test; step) {
    body;
  }

keyChecks:
  - "for ("
  - ";"
  - ")"
  - "{"
  - "}"

forbiddenTokens:
  - "while"
  - "do"

explanation: |
  Memorise this exact shape. `for`, paren, init, semicolon, test,
  semicolon, step, paren, brace, body with semicolon, brace. Two
  semicolons inside the header — never commas, never colons.


type: "ClozeCard"

stem: |
  Fill in the TEST slot. The loop should iterate as long as i has
  not yet reached SIZE.

code: |
  for (int i = 0; ___; i++) {
    cout << i << endl;
  }

clozeSentence: |
  for (int i = 0; ___; i++)

answer: "i < SIZE"

explanation: |
  `i < SIZE` is the canonical test for an array of length SIZE.
  Body runs for i = 0, 1, ..., SIZE-1 — exactly SIZE iterations.
  Using `i <= SIZE` would walk past the array end.


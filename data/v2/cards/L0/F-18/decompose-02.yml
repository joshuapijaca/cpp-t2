# L0 / F-18 / DecomposeCard 02
# Atom: missing i++ -> infinite loop
# =====================================================================
id: "L0-F18-decomp-02"
schemaVersion: "v2"
atomId: "F-18"
qTags: ["Q1", "Q3", "Q4"]
stage: 0
level: "L0"
type: "DecomposeCard"

stem: |
  A student wrote the loop below and reports the program "hangs"
  forever. Diagnose.

code: |
  for (int i = 0; i < 3; ) {
    cout << i << endl;
  }

question: |
  What is wrong?

options:
  - label: "A"
    text: |
      The body lacks a return statement.
  - label: "B"
    text: |
      The third header slot (the step) is empty, so `i` is never
      incremented. The test `i < 3` stays true forever and the
      loop body prints 0, 0, 0, ... endlessly. Add `i++` to fix.
  - label: "C"
    text: |
      The condition `i < 3` should be `i <= 3` to terminate.
  - label: "D"
    text: |
      The init must run more than once to break the loop.

correctLabel: "B"

explanation: |
  B. The for-header has three slots: init, test, step. The step
  slot here is empty, so nothing changes `i`. The condition stays
  true forever — infinite loop. Adding `i++` to the third slot
  fixes it.


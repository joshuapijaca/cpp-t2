stem: |
  A for-loop has THREE pieces in its header (init, test, step) and
  one BODY in braces. Each iteration: test runs first, body runs if
  test was true, step runs after the body. Walk through each step
  for `for (int i = 0; i < 3; i++)`.

levelLabel: "L0 Foundation · Phase D · F-18"

fullCode: |
  for (int i = 0; i < 3; i++) {
    cout << i << endl;
  }

steps:
  - line: 1
    code: 'int i = 0  (INIT, runs once)'
    annotation: |
      The init `int i = 0` runs ONCE, before any iteration. Box `i`
      is opened with value 0.
      VARIABLES: { i: 0 }
    atomIds: ["F-18", "F-18a"]
  - line: 1
    code: 'i < 3  (TEST, before iter 1)'
    annotation: |
      Evaluate test: 0 < 3? TRUE. Enter body.
    atomIds: ["F-18", "F-18b"]
  - line: 2
    code: 'cout << i << endl;  (BODY, iter 1)'
    annotation: |
      Print i = 0. TERMINAL: 0
    atomIds: ["F-18b"]
  - line: 1
    code: 'i++  (STEP, after iter 1)'
    annotation: |
      Increment i. Now i = 1. Strikethrough old 0.
      VARIABLES: { i: 1 }
    atomIds: ["F-18", "F-18b"]
  - line: 1
    code: 'i < 3  (TEST, before iter 2)'
    annotation: |
      Evaluate test: 1 < 3? TRUE. Enter body.
    atomIds: ["F-18b"]
  - line: 2
    code: 'cout << i << endl;  (BODY, iter 2)'
    annotation: |
      Print i = 1. TERMINAL: 0 / 1
    atomIds: ["F-18b"]
  - line: 1
    code: 'i++  (STEP, after iter 2)'
    annotation: |
      i = 2. VARIABLES: { i: 2 }
    atomIds: ["F-18b"]
  - line: 1
    code: 'i < 3  (TEST, before iter 3)'
    annotation: |
      2 < 3? TRUE. Enter body.
    atomIds: ["F-18b"]
  - line: 2
    code: 'cout << i << endl;  (BODY, iter 3)'
    annotation: |
      Print i = 2. TERMINAL: 0 / 1 / 2
    atomIds: ["F-18b"]
  - line: 1
    code: 'i++  (STEP, after iter 3)'
    annotation: |
      i = 3. VARIABLES: { i: 3 }
    atomIds: ["F-18b"]
  - line: 1
    code: 'i < 3  (TEST, before iter 4)'
    annotation: |
      3 < 3? FALSE. EXIT loop. The body does NOT run a fourth
      time. Final terminal: 0 / 1 / 2.
    atomIds: ["F-18b"]


stem: |
  Suppose you write a counted for-loop with header
  `for (int i = 0; i < N; i++)`. How many times does the body
  execute, and which values of `i` does it see?

correct: "Exactly N times — i takes values 0, 1, ..., N-1."

distractors:
  - "Exactly N+1 times — i takes values 0, 1, ..., N."
  - "Exactly N-1 times — i takes values 1, 2, ..., N-1."
  - "Infinitely many — the test always passes."

explanation: |
  `i = 0; i < N; i++` runs the body for i in {0, 1, ..., N-1}.
  That is exactly N iterations. At i = N the test fails and the
  loop exits, so the body NEVER runs at i = N. This is the safe
  array-iteration form: `arr[i]` only ever indexes 0..N-1.


stem: |
  Watch the canonical for-loop header. Three pieces, separated by
  TWO semicolons. Memorise the shape.

whyOneLine: "Every for-loop is `for (init; test; step) { body }` — three pieces, two semicolons, four braces (parens + braces)."

demoCode: |
  ┌─ for-LOOP ANATOMY ──────────────────────────────────┐
  │                                                     │
  │   for ( int i = 0 ;  i < SIZE ;  i++ ) {            │
  │   ^^^   ^^^^^^^^^^   ^^^^^^^^   ^^^                 │
  │   |     |             |          |                  │
  │   |     |             |          STEP   (after body)│
  │   |     |             TEST       (before each iter) │
  │   |     INIT          (runs once)                   │
  │   KEYWORD                                           │
  │                                                     │
  │       body;                                         │
  │   }                                                 │
  │                                                     │
  │   semicolons separate the three header pieces:      │
  │     for (init; test; step)   <-- two ; in header    │
  │                                                     │
  │   No ; right after the )    -- otherwise empty body │
  └─────────────────────────────────────────────────────┘

highlightTokens:
  - "for"
  - "int i = 0"
  - "i < SIZE"
  - "i++"
  - "INIT"
  - "TEST"
  - "STEP"


stem: |
  Fill in the missing punctuation that wraps the if condition.

code: |
  if ___x > 0___ {
    cout << "positive" << endl;
  }

clozeSentence: |
  if ___x > 0___

answer: "( )"

explanation: |
  Parentheses are required around the if condition. Open paren
  immediately after `if` (with optional space), close paren before
  the `{`.


stem: |
  Watch the EXACT shape of the if you will see on Q1. Inside a for
  loop, an if checks an array element against a running value, and
  conditionally updates the running value.

whyOneLine: "The Q1 if pattern is `if (data.numbers[i] > data.mystery) { data.mystery = data.numbers[i]; }` — recognise it on sight."

demoCode: |
  ┌─ Q1 CANONICAL if ─────────────────────────────────┐
  │                                                   │
  │   for (i = 0; i < SIZE; i++) {                    │
  │       if ( data.numbers[i] > data.mystery ) {     │
  │           data.mystery = data.numbers[i];         │
  │       }                                           │
  │   }                                               │
  │                                                   │
  │   if has 3 parts:                                 │
  │     1. condition: data.numbers[i] > data.mystery  │
  │     2. body:      one assignment                  │
  │     3. braces:    required, even for one stmt     │
  │                                                   │
  │   The if updates mystery ONLY when current array  │
  │   element is strictly greater. Otherwise mystery  │
  │   stays where it is.                              │
  └───────────────────────────────────────────────────┘


stem: |
  Write an if-statement that updates `max` to the value of `x`
  whenever `x` is greater than `max`. (The Q1 max-finding pattern.)

prompt: |
  Produce an if that overwrites max with x when x is bigger.

template: |
  if (___) {
    ___ = ___;
  }

canonicalAnswer: |
  if (x > max) {
    max = x;
  }

keyChecks:
  - "if (x > max)"
  - "max = x;"

forbiddenTokens:
  - "while"
  - "do"

explanation: |
  This is the canonical max-finding pattern: condition `x > max`,
  body `max = x;`. The right-hand side `x` is read first, then
  written into box `max`. Mirrors Q1 of Test 2.


id: "L0-F17-tmplrec-01"
schemaVersion: "v2"
atomId: "F-17"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TemplateRecallCard"

stem: |
  Recall and write the canonical if-skeleton. No specific values —
  just the empty shape with three holes (cond, body-line).

prompt: |
  Produce the empty if-statement skeleton with placeholders for
  the condition and one body statement.

template: |
  if (___) {
    ___;
  }

canonicalAnswer: |
  if (cond) {
    body;
  }

keyChecks:
  - "if ("
  - ")"
  - "{"
  - "}"

forbiddenTokens:
  - "while"
  - "do"

explanation: |
  Memorise this exact shape. `if`, parens, condition, close paren,
  open brace, body with semicolon, close brace. No semicolon
  between the close paren and the open brace. No semicolon after
  the close brace.


# =====================================================================
# L0 / F-17 / TraceCard 03
# Atom: if updates a variable conditionally
# =====================================================================
id: "L0-F17-trace-03"
schemaVersion: "v2"
atomId: "F-17"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Hand-execute. Track the value of `max` carefully — it should
  only change when the if condition is true.

code: |
  int main() {
    int x = 4;
    int max = 10;
    if (x > max) {
      max = x;
    }
    cout << max << endl;
    return 0;
  }

variables: ["x", "max"]

expectedTrace:
  - line: 2
    variable: "x"
    value: "4"
    output: null
  - line: 3
    variable: "max"
    value: "10"
    output: null
  - line: 4
    variable: ""
    value: ""
    output: null
    condition: "4 > 10 -> false, skip body"
  - line: 6
    variable: ""
    value: ""
    output: "10"

terminalOutput:
  - "10"

inputMode: "final-only"

teachMe: |
  This is the SHAPE of Q1: if (current > running) running = current.
  Here current=4, running=10. 4 is not greater than 10, so the body
  is skipped and max stays at 10. The terminal prints 10.

drills: ["tier1:prereq:if-cond-no-else"]
source:
  kind: "pfg"
  ref: "Programming Fundamentals Guide § part-1/3-control-flow/0-panorama/02-branches"

commonMistakeIds: ["CM-F17a"]
status: "NEW"
createdBy: "SA-PhaseD"
notes: |
  authoringStatus: DRAFT. Mirrors Q1 max-finding pattern.

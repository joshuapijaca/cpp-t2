stem: |
  Fill in the missing punctuation that delimits the if body.

code: |
  if (x > 0) ___
    cout << "positive" << endl;
  ___

clozeSentence: |
  if (x > 0) ___ ... ___

answer: "{ }"

explanation: |
  Braces around the body are MANDATORY in this curriculum. Open
  brace `{` after the closing paren of the condition; close brace
  `}` after the last statement of the body.


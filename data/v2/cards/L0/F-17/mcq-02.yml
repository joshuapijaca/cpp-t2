stem: |
  One of the four lines below is the classic silent if-bug — the
  body runs unconditionally even though the if appears to gate it.
  Which line contains the bug?

correct: "if (n > 0); — the semicolon ENDS the if at an empty body."

distractors:
  - "if (n > 0) { — the open brace must be on the next line."
  - "if (n > 0) — missing semicolon at end of line."
  - "if (n > 0) { /* body */ } — needs an else clause."

explanation: |
  `if (cond);` parses as: if with empty body. Any block following
  it runs unconditionally. This is the most common silent if bug.
  No semicolon belongs between the close paren and the open brace.


levelLabel: "L0 Foundation Phase C F-15"

fullCode: |
  void read_desks(desk_data desks[], int num_to_read) {
    int i;
    for (i = 0; i < num_to_read; i++) {
      cout << "desk " << i << " desk_id: ";
      cin >> desks[i].desk_id;

      cout << "desk " << i << " price: ";
      cin >> desks[i].price;
    }
  }

steps:
  - line: 4
    code: 'cout << "desk " << i << " desk_id: ";'
    annotation: |
      First prompt of THIS iteration. Includes the loop index `i` so
      the user knows which desk they are entering. Trailing space
      before the cursor sits.
    atomIds: ["F-15", "F-13b"]
  - line: 5
    code: 'cin >> desks[i].desk_id;'
    annotation: |
      Read the desk_id field of the i-th array element. The dot +
      brackets work together: `desks[i]` picks the array slot, `.desk_id`
      picks the field inside that struct.
    atomIds: ["F-15", "F-14b"]
  - line: 7
    code: 'cout << "desk " << i << " price: ";'
    annotation: |
      Second prompt of this iteration. Same shape, different label
      and field.
    atomIds: ["F-15", "F-13b"]
  - line: 8
    code: 'cin >> desks[i].price;'
    annotation: |
      Read into the second field. The pattern repeats: prompt then
      read, prompt then read.

      KEY: every cin has a cout label IMMEDIATELY before it.
    atomIds: ["F-15", "F-14b"]


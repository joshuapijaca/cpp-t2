stem: |
  Type a prompt-pair that reads into an array element field, with
  loop index in the prompt.

section: "F-15 prompt-pair drills (array element)"

prompt: |
  Assume `desk_data desks[MAX]; int i;` are in scope. Write the two
  lines that prompt with `desk i desk_id: ` (with i interpolated)
  and read into `desks[i].desk_id`.

expectedAnswer: |
  cout << "desk " << i << " desk_id: ";
  cin >> desks[i].desk_id;

keyChecks: ['cout << "desk " << i << " desk_id: ";', "cin >> desks[i].desk_id;"]


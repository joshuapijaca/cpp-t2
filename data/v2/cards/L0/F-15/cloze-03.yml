schemaVersion: "v2"
atomId: "F-15"
qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "ClozeCard"

stem: |
  Fill in the punctuation/space that should appear at the end of
  the prompt label.

code: |
  cout << "desk_id___";
  cin >> desk_id;

clozeSentence: |
  The last two characters inside the prompt quotes (before the
  closing quote) should be a colon followed by a `___`.

answer: " "

explanation: |
  After the colon, include a SPACE so the user's typed value does
  not visually touch the colon. The full label is `"desk_id: "` —
  ending colon, space, closing quote. SIT102 marker style requires
  this trailing space.


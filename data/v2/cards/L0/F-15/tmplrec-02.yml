stem: |
  Recall the array-element prompt-pair template (the loop body
  shape).

prompt: |
  Type the two-line prompt-pair for reading `desks[i].desk_id` with
  the index `i` in the prompt label.

template: |
  cout << "____ " << ____ << " ____: ";
  cin >> ____[____].____;

canonicalAnswer: |
  cout << "desk " << i << " desk_id: ";
  cin >> desks[i].desk_id;

keyChecks: ["cout", "i", "desk_id", "cin", "desks[i].desk_id"]

forbiddenTokens: []

explanation: |
  The array-element prompt-pair has the index `i` interpolated into
  the label so the user knows WHICH desk they are entering. The
  read uses `desks[i].desk_id` to write into the i-th struct's
  desk_id field.

  Pattern:
  - cout chains: "label " << i << " sub-label: "
  - cin: array name [i] . field


  // Q4 main (sketch): read N desks, then print them.
  int main() {
    int num_to_read;
    cout << "num_to_read: ";
    cin >> num_to_read;

    desk_data desks[MAX];
    int i;
    for (i = 0; i < num_to_read; i++) {
      cout << "desk " << i << " desk_id: ";
      cin >> desks[i].desk_id;

      cout << "desk " << i << " price: ";
      cin >> desks[i].price;
    }

    // ... (then print the list) ...
    return 0;
  }


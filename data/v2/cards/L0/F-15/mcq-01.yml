stem: |
  Which of these is the canonical SIT102 prompt-pair for reading an
  int `desk_id` from the user?

correct: 'cout << "desk_id: "; then cin >> desk_id;  (prompt first, with trailing space, no endl on prompt)'

distractors:
  - "cin >> desk_id;  then  cout << \"desk_id: \";  (read first, then label after — wrong order)"
  - "cout << \"desk_id\" << endl;  then  cin >> desk_id;  (endl puts label on its own line — wrong style)"
  - "cout << \"desk_id:\";  then  cin >> desk_id;  (no trailing space — value will touch the colon)"

explanation: |
  The canonical prompt-pair has THREE properties:
  1. cout BEFORE cin (prompt first).
  2. Trailing space inside the quotes (`"label: "`).
  3. NO `endl` on the prompt (cursor stays on the line).
  Only one option matches all three.


stem: |
  Recall the canonical prompt-pair template. Fill in the four parts
  exactly.

prompt: |
  Type the two-line prompt-pair shape, using `desk_id` as the field.

template: |
  ____ << "____: ";
  ____ >> ____;

canonicalAnswer: |
  cout << "desk_id: ";
  cin >> desk_id;

keyChecks: ["cout", '"desk_id: "', "cin", "desk_id", ";"]

forbiddenTokens: []

explanation: |
  The prompt-pair template:
  ```
  cout << "LABEL: ";
  cin >> VARIABLE;
  ```
  Three parts to remember:
  1. cout FIRST (prompt before read)
  2. Trailing space inside quotes (`"label: "`)
  3. No `endl` on the prompt — cursor stays on the line

  This shape repeats for EVERY field of EVERY struct. Learn it once,
  use it dozens of times.


      V2.0 variant: read stat_double's mystery and the first numbers
      slot. Assume `stat_double data;` is declared.
    expectedAnswer: |
      cout << "mystery: ";
      cin >> data.mystery;
      cout << "numbers[0]: ";
      cin >> data.numbers[0];


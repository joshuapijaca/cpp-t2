prompt: |
  Assume `desk_data desk;` is declared. Write the four lines (two
  prompt-pairs) that read desk.desk_id and desk.price.

expectedAnswer: |
  cout << "desk_id: ";
  cin >> desk.desk_id;
  cout << "price: ";
  cin >> desk.price;

keyChecks: ['cout << "desk_id: ";', "cin >> desk.desk_id;", 'cout << "price: ";', "cin >> desk.price;"]


stem: |
  Fill in the missing read line.

code: |
  int desk_id;
  cout << "desk_id: ";
  ____________________

clozeSentence: |
  The single line that reads the user's typed value INTO desk_id is
  `___`.

answer: "cin >> desk_id;"

explanation: |
  Canonical read: `cin >> desk_id;`. cin first, then `>>`, then the
  variable name, then `;`. Pulls one whitespace-delimited token.


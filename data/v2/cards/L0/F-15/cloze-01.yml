stem: |
  Fill in the missing prompt line. The student must use the canonical
  Q3 idiom.

code: |
  int desk_id;
  ____________________
  cin >> desk_id;

clozeSentence: |
  The single line that prints the label `desk_id: ` to the terminal
  (no newline) is `___`.

answer: 'cout << "desk_id: ";'

explanation: |
  Canonical prompt: `cout << "desk_id: ";`. Trailing space inside
  quotes; no `endl`. The cursor stays on the same line so the user
  types right after the colon.


id: "L0-F15-trace-01"
schemaVersion: "v2"
atomId: "F-15"
qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Hand-execute. The user types `5` then Enter when prompted. Type
  the final value of `desk_id` and the terminal output.

code: |
  int main() {
    int desk_id;
    cout << "desk_id: ";
    cin >> desk_id;
    cout << desk_id << endl;
    return 0;
  }

variables: ["desk_id"]

userInputs: ["5"]
inputLabels: ["desk_id"]

expectedTrace:
  - line: 3
    variable: ""
    value: ""
    output: "desk_id: "
  - line: 4
    variable: "desk_id"
    value: "5"
    output: null
  - line: 5
    variable: ""
    value: ""
    output: "desk_id: 5"

terminalOutput: ["desk_id: 5"]

inputMode: "per-step"

teachMe: |
  - Line 3: cout prints `desk_id: ` (no newline). Cursor sits after
    the space.
  - Line 4: cin reads the user's `5`. Box desk_id = 5.
  - Line 5: cout prints `5` then newline.

  Final: desk_id = 5. Terminal: `desk_id: 5`.


stem: |
  Fill in the keyword that goes FIRST in a prompt-pair.

code: |
  ___ << "desk_id: ";
  cin >> desk_id;

clozeSentence: |
  The first line of every prompt-pair is a `___ << "label: ";`
  output.

answer: "cout"

explanation: |
  cout always comes first. The prompt label is printed BEFORE the
  cin so the user knows what to type. Order: cout (prompt) -> cin
  (read).


id: "L0-F20-cloze-04"
schemaVersion: "v2"
atomId: "F-20"
qTags: ["Q1", "Q2", "Q3", "Q4"]
stage: 0
level: "L0"
type: "ClozeCard"

stem: |
  Fill in the matching pair of braces around the field list.

code: |
  struct stat_double ___
    double numbers[SIZE];
    double mystery;
  ___;

clozeSentence: "struct stat_double ___ ... ___;  // open + close field list"

answer: "{ }"

explanation: |
  The field list is wrapped in matching braces: `{` opens it
  immediately after the struct name (typically on the same line),
  `}` closes it immediately before the terminating `;`.

drills: ["tier1:prereq:struct-definition-multi-field"]

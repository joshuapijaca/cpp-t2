qTags: ["Q1", "Q2", "Q3", "Q4"]
stage: 0
level: "L0"
type: "DemoCard"

stem: |
  Watch: the keyword is `struct` (lowercase). The C++ language is
  case-sensitive — `Struct` is not a keyword and will fail to
  compile.

whyOneLine: "The keyword is `struct` (lowercase). `Struct` and `STRUCT` are NOT keywords."

demoCode: |
  // CORRECT — keyword `struct` is lowercase:
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

  // WRONG — `Struct` is not a keyword:
  // Struct stat_double { ... };          // <- will not compile
  // STRUCT stat_double { ... };          // <- will not compile

  // The struct NAME can be lower or snake_case. Test 2 V2.0 uses
  // snake_case: `stat_double`.

highlightTokens:
  - "struct"
  - "Struct"
  - "STRUCT"
  - "stat_double"

usedIn:

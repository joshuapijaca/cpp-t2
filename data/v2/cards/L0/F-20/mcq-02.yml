stem: |
  Test 2 hands you a prompt asking to define a `stat_double`
  entity. Which keyword do you type FIRST on the definition line
  in standard C++ (case matters — the compiler is case-sensitive)?

correct: "struct (lowercase) — the only spelling the compiler recognises."

distractors:
  - "Struct (capital S) — Pascal-case is the convention for type definitions."
  - "STRUCT (all caps) — keywords are upper-case in standard C++."
  - "structure (full word) — the abbreviated `struct` is informal slang."

explanation: |
  C++ is case-sensitive. The keyword is exactly `struct`, lowercase.
  `Struct`, `STRUCT`, and `structure` are not keywords — the
  compiler treats them as undeclared identifiers.


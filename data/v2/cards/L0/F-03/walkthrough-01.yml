notes: |
  First exposure to the "memory boxes + terminal" two-pane mental model.
  This is the SAME model the code editor debugger panel shows in later
  trace cards. Establishing the pattern here on the simplest possible
  program (3 ints + 1 cout) means the visual primitive is already
  familiar when L1 traces ramp difficulty.

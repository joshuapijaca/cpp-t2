stem: |
  Variables can change value during execution. When you hand-execute,
  you cross out the OLD value and write the NEW value. Walk through
  this program. Watch how `x` changes on each line.

levelLabel: "L0 Foundation · Phase A · F-03"

fullCode: |
  #include <iostream>
  using namespace std;
  int main() {
    int x = 1;
    x = x + 10;
    x = x * 2;
    cout << x << endl;
    return 0;
  }

steps:
  - line: 4
    code: 'int x = 1;'
    annotation: |
      Open box `x`. Write `1`.
      VARIABLES PANEL: { x: 1 }
      TERMINAL: (empty)
    atomIds: ["F-03"]
  - line: 5
    code: 'x = x + 10;'
    annotation: |
      The right side is computed FIRST: read `x` (it is 1), add 10 → 11.
      Then write 11 INTO box `x`. Cross out the old `1`. Box `x` now
      holds `11`.
      VARIABLES PANEL: { x: 11 }   (old: ~~1~~)
      TERMINAL: (empty)
    atomIds: ["F-03"]
  - line: 6
    code: 'x = x * 2;'
    annotation: |
      Right side first: read `x` (now 11), multiply by 2 → 22. Write
      22 into box `x`. Cross out the 11.
      VARIABLES PANEL: { x: 22 }   (old: ~~1~~ ~~11~~)
      TERMINAL: (empty)
    atomIds: ["F-03"]
  - line: 7
    code: 'cout << x << endl;'
    annotation: |
      Read the CURRENT value of `x` (22) and write to terminal.
      VARIABLES PANEL: { x: 22 }
      TERMINAL: 22
    atomIds: ["F-03"]
  - line: 8
    code: 'return 0;'
    annotation: |
      Program ends. The marker only sees what was printed: `22`.
      That is the trace answer.
    atomIds: ["F-03"]


stem: |
  Watch: this is what hand-execution LOOKS LIKE on screen. Two panels:
  the **variables panel** (your memory boxes) and the **terminal panel**
  (what the program prints). Every trace card you see in this app uses
  these same two panels.

whyOneLine: "Hand-execution = reading code line-by-line while updating the variables panel and terminal panel in your head."

demoCode: |
  ┌─ trace.cpp ─────────────┐  ┌─ VARIABLES ──────────┐
  │ 1│ int main() {          │  │ name │ value │ scope │
  │ 2│   int a = 3;          │  │ a    │ 3     │ local │
  │ 3│   int b = 4;          │  │ b    │ 4     │ local │
  │▶4│   int c = a + b;      │  │ c    │ 7     │ local │
  │ 5│   cout << c << endl;  │  └──────────────────────┘
  │ 6│   return 0;           │  ┌─ TERMINAL ───────────┐
  │ 7│ }                     │  │ $ ./prog             │
  └─────────────────────────┘  │ _                    │
                                └──────────────────────┘

  The little ▶ marks which line is about to execute next.

highlightTokens:
  - "VARIABLES"
  - "TERMINAL"
  - "name │ value │ scope"
  - "▶"
  - "memory boxes"


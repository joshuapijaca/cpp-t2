qTags: ["Q4"]
stage: 0
level: "L0"
type: "DemoCard"

stem: |
  The include line has a fixed shape. Notice the punctuation marks —
  every character matters. Watch the anatomy of `#include <iostream>`.

whyOneLine: "The include line uses # then include then a space then <iostream> with angle brackets — no quotes, no semicolon, no .h."

demoCode: |
  //  Anatomy of the line (every character labelled):
  //
  //   #  include   <iostream>
  //   |  |          |
  //   |  |          +-- header name in ANGLE brackets, NO ".h" suffix
  //   |  +------------- the keyword "include" (lowercase, exactly)
  //   +---------------- the hash sign (preprocessor marker)
  //
  //  Note: NO trailing semicolon. Preprocessor directives end at the
  //  newline, not at `;`. Adding a semicolon is a beginner habit
  //  imported from the rest of C++ — wrong here.

  #include <iostream>

highlightTokens:
  - "#"
  - "include"
  - "<iostream>"
  - "ANGLE brackets"
  - "NO trailing semicolon"


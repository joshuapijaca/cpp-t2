qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "ProceduralCard"

stem: |
  A friend's program below has every line typed correctly EXCEPT the
  include line is missing. Add only that one missing line at the very
  top, leaving the rest of the file unchanged. Type the resulting
  first line plus the using line that already exists.

section: "L0 · F-04 · μ-write — repair missing include"

prompt: |
  Original file (broken):

  using namespace std;
  int main() {
    cout << 1 << endl;
    return 0;
  }

  Add the missing include directive at the top. Type your repaired
  preamble (the include line you added plus the using line).

expectedAnswer: |
  #include <iostream>
  using namespace std;

keyChecks:
  - "#include"
  - "<iostream>"

variants:
  - prompt: "Patch the missing include for a Q4 answer that uses cout to print one number."
    expectedAnswer: |
      #include <iostream>
      using namespace std;
  - prompt: "The compiler says 'cout was not declared'. Add the missing line that fixes this. Show the include line plus the using line."
    expectedAnswer: |
      #include <iostream>
      using namespace std;

drills: ["tier1:prereq:include-iostream"]

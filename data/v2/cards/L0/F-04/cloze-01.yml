qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "ClozeCard"

stem: |
  Fill the blank to make this program compile. The blank holds the
  preprocessor directive that brings in the iostream library.

code: |
  ____ <iostream>
  using namespace std;
  int main() {
    cout << "hi" << endl;
    return 0;
  }

clozeSentence: |
  ____ <iostream>

answer: "#include"

explanation: |
  The directive is `#include`. The `#` makes it a preprocessor command;
  `include` is the command itself. Together they tell the compiler
  to copy the contents of the named header (`<iostream>`) into the
  file before compiling. Without these characters, the compiler will
  never know about `cout`.


type: "ClozeCard"

stem: |
  Fill the blank with the header name. Use angle brackets exactly as
  they should appear in the source.

code: |
  #include ____
  using namespace std;
  int main() {
    cout << 1 << endl;
    return 0;
  }

clozeSentence: |
  #include ____

answer: "<iostream>"

explanation: |
  The header name is `iostream`, written between angle brackets:
  `<iostream>`. Standard-library headers always use angle brackets
  (not double quotes) and never carry a `.h` suffix in modern C++.


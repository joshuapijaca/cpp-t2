# Atom: #include <iostream>
# =====================================================================
id: "L0-F04-cloze-04"
schemaVersion: "v2"
atomId: "F-04"
qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "ClozeCard"

stem: |
  Fill the blanks. Two characters are missing — the first is the
  preprocessor marker, the second wraps the header name on its right.

code: |
  __include _iostream__
  using namespace std;
  int main() {
    cout << 0 << endl;
    return 0;
  }

clozeSentence: |
  __include _iostream__       (fill in: leading '#', and '<' '>' around iostream)

answer: "# <iostream>"

explanation: |
  The blanks fill to give `#include <iostream>`. The `#` is the
  preprocessor marker; `<` and `>` form the angle-bracket wrapper
  around the header name. Together: hash, include, space, angle-open,
  iostream, angle-close.

drills: ["tier1:prereq:include-iostream"]
source:
  kind: "pfg"

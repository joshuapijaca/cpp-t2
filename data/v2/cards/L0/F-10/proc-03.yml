stem: |
  Write three declaration lines, one per type. Pick the right type
  for each value.

section: "F-10 type-write drills (multi-type)"

prompt: |
  Declare three variables: `desk_count` for a count, `price` for a
  decimal money amount, `name` for text. Each on its own line, each
  ending in a semicolon.

expectedAnswer: |
  int desk_count;
  double price;
  string name;

keyChecks: ["int desk_count;", "double price;", "string name;"]

variants:
  - prompt: |
      Declare three variables: `i` (int counter), `total` (double sum),
      `label` (string name). Each on its own line, each ending in a
      semicolon.
    expectedAnswer: |
      int i;
      double total;
      string label;


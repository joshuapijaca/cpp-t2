clozeSentence: |
  Decimal numbers in SIT102 use the type `___`.

answer: "double"

explanation: |
  `double` holds decimal (fractional) numbers. SIT102 idiom says
  always double, never float. The real test V2.0 used double for every
  number in the desk_data.numbers array.


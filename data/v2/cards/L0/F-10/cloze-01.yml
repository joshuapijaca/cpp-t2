clozeSentence: |
  The type used to count whole things in SIT102 is `___`.

answer: "int"

explanation: |
  `int` holds whole numbers (0, 1, 2, 3, ...). It is the right type
  for counts, indices, sizes. Real test V2.0 declared
  `int num_to_read;` exactly this way.


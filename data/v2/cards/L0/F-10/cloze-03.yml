clozeSentence: |
  Text values in SIT102 use the type `___`. The same word fills both
  blanks above (the include header AND the variable type).

answer: "string"

explanation: |
  `string` is the text type. The include header `<string>` brings the
  type into scope. Both blanks take the same word: `string`.


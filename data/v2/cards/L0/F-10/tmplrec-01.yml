stem: |
  Recall the canonical SIT102 file header for any program that uses
  strings. Fill the template with the exact two include lines and the
  using-namespace line.

prompt: |
  Type the three lines that always appear at the top of a SIT102 main
  program that uses strings. Order: iostream include, string include,
  using namespace.

template: |
  #include <_____>
  #include <_____>
  using namespace _____;

canonicalAnswer: |
  #include <iostream>
  #include <string>
  using namespace std;

keyChecks: ["#include <iostream>", "#include <string>", "using namespace std;"]

forbiddenTokens: []

explanation: |
  Every SIT102 program that uses strings has these three lines at the
  top. `<iostream>` for cout/cin, `<string>` for the string type,
  `using namespace std;` so the names appear without the `std::`
  prefix. Memorise the order; markers expect this header.


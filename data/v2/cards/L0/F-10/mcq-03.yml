qTags: ["Q1", "Q2", "Q3", "Q4"]
stage: 0
level: "L0"
type: "MCQCard"

stem: |
  A program contains `string label = "desk";` but the compiler
  complains: `error: 'string' was not declared`. What is missing from
  the file?

correct: "An #include <string> directive at the top of the file."

distractors:
  - "An empty constructor: `string() label = \"desk\";`."
  - "A namespace prefix: `cpp::string label = \"desk\";`."
  - "A type-cast: `(string)\"desk\";`."

explanation: |
  The `string` type lives in the standard library header `<string>`.
  Without `#include <string>` near the top of the file, the compiler
  has no idea what `string` means. Adding the include declares the
  type and resolves the error.


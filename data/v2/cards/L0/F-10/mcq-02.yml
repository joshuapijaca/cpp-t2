qTags: ["Q1", "Q2", "Q3", "Q4"]
stage: 0
level: "L0"
type: "MCQCard"

stem: |
  Which type best fits a variable that stores a customer's height in
  centimetres (e.g. 175.5)?

correct: "double — the value has a decimal part, so use the SIT102 decimal type."

distractors:
  - "int — heights are usually counted in whole centimetres."
  - "string — every measurement should be stored as text for printing."
  - "char — height fits in a single character."

explanation: |
  Heights, weights, distances, prices — anything with a fractional
  part — should be `double`. Storing 175.5 in an int truncates to 175,
  losing precision. Storing it in a string makes arithmetic
  impossible.

drills: ["tier1:prereq:primitive-types-int-double-string"]

id: "L0-F10-demo-01"
schemaVersion: "v2"
atomId: "F-10"
qTags: ["Q1", "Q2", "Q3", "Q4"]
stage: 0
level: "L0"
type: "DemoCard"

stem: |
  Watch what `int` does. The variable is a small box that ONLY holds
  whole numbers. If you try to put a decimal in, the decimal part is
  silently dropped.

whyOneLine: "int = whole numbers only. Decimals are truncated, not rounded."

demoCode: |
  int a = 5;        // box `a` holds 5
  int b = -7;       // box `b` holds -7
  int c = 9.99;     // box `c` holds 9 — the .99 is dropped
  int d = 3.5;      // box `d` holds 3 — NOT 4. No rounding.
  cout << c << endl;  // prints: 9
  cout << d << endl;  // prints: 3

highlightTokens:

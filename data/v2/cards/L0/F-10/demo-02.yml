stem: |
  Watch what `double` does. The variable holds decimal numbers. SIT102
  always uses `double` (not `float`) for fractional numbers.

whyOneLine: "double = decimal numbers. SIT102 idiom; never use float."

demoCode: |
  double a = 9.99;       // box `a` holds 9.99
  double b = 3.5;        // box `b` holds 3.5
  double c = -1.7;       // box `c` holds -1.7
  double d = 5;          // box `d` holds 5.0 — still legal, stored as decimal
  cout << a << endl;     // prints: 9.99
  cout << d << endl;     // prints: 5


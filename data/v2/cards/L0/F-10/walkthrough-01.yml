stage: 0
level: "L0"
type: "WalkthroughCard"

stem: |
  Every variable in C++ has a TYPE. The type controls (a) what shape
  of value the box can hold, and (b) how big the box is in memory.
  SIT102 uses three primitive types in Test 2: `int`, `double`, and
  `string`. Walk through each one ŌĆö what value goes in, what cannot.

levelLabel: "L0 Foundation Phase C F-10"

fullCode: |
  #include <iostream>
  #include <string>
  using namespace std;
  int main() {
    int count = 5;
    double price = 9.99;
    string name = "ana";
    cout << count << endl;
    cout << price << endl;
    cout << name << endl;
    return 0;
  }

steps:
  - line: 2
    code: '#include <string>'
    annotation: |
      To use the `string` type at all, the file must `#include <string>`.
      Without this line, `string` is undefined. `int` and `double` are
      built into the language and need no include.
    atomIds: ["F-10"]
  - line: 5
    code: 'int count = 5;'
    annotation: |
      `int` holds whole numbers: ..., -2, -1, 0, 1, 2, ... It cannot
      hold 5.5 ŌĆö the decimal part is silently chopped if you assign one.
      Use `int` for counts, indices, sizes, ages.
    atomIds: ["F-10"]
  - line: 6
    code: 'double price = 9.99;'
    annotation: |
      `double` holds decimal numbers. SIT102 uses `double` (not float)
      for every fractional number. Real test V2.0 used `double` for
      every number in the desk_data array.
    atomIds: ["F-10"]
  - line: 7
    code: 'string name = "ana";'
    annotation: |
      `string` holds text. The value must be wrapped in double quotes.
      Single quotes (`'ana'`) do NOT make a string in C++ ŌĆö they make a
      character literal.
    atomIds: ["F-10"]
  - line: 8
    code: 'cout << count << endl;'
    annotation: |
      `cout` works with all three types. The compiler picks the right
      print routine based on the type of `count`. You do not write
      anything special for int vs double vs string.
    atomIds: ["F-10"]

drills: ["tier1:prereq:primitive-types-int-double-string"]

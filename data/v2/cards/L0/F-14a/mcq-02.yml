stage: 0
level: "L0"
type: "MCQCard"

stem: |
  Choose the matched pair. Pick the row where both directions are
  correct.

correct: "cout << x;  and  cin >> y;  (output uses <<, input uses >>)"

distractors:
  - "cout >> x;  and  cin << y;  (both reversed)"
  - "cout << x;  and  cin << y;  (cin uses output direction)"
  - "cout >> x;  and  cin >> y;  (cout uses input direction)"

explanation: |
  cout always uses `<<`; cin always uses `>>`. The direction is
  consistent: arrow points toward the destination.
  - cout << x: x flows INTO cout (output)
  - cin >> x: x is the destination, value flows INTO it (input)


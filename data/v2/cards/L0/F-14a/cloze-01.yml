type: "ClozeCard"

stem: |
  Fill in the operator that pulls a value FROM cin INTO a variable.

code: |
  cin ___ x;
  cin ___ price;
  cin ___ name;

clozeSentence: |
  The two-character operator that pulls values from cin into a
  variable is `___`.

answer: ">>"

explanation: |
  `>>` is the extraction operator. It points TOWARD the variable,
  indicating the value flows from cin into the box. Pair: `cout <<`
  for output.


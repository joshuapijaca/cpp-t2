id: "L0-F14a-demo-02"
schemaVersion: "v2"
atomId: "F-14a"
qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "DemoCard"

stem: |
  Watch the symmetry. cout writes; cin reads. Same operator shape
  (`<<` vs `>>`), opposite direction.

whyOneLine: "cout uses <<; cin uses >>. Opposite arrows for opposite directions."

demoCode: |
  int x;
  cin >> x;          // user types value, written INTO x
  cout << x;         // value of x written OUT to terminal

  // Memory aid:
  //   cout << value         (value flows INTO cout)
  //   cin  >> variable      (value flows INTO variable)
  // Both arrows point AWAY from the source, TOWARD the destination.

highlightTokens:
  - "cin >> x"
  - "cout << x"
  - "<<"
  - ">>"
  - "INTO"

usedIn:

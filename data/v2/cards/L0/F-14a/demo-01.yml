level: "L0"
type: "DemoCard"

stem: |
  Watch the direction. The arrows point RIGHT, away from cin and
  toward the variable. The value flows from cin INTO the variable.

whyOneLine: "cin >> x;  the >> points toward x. Value flows FROM cin INTO x."

demoCode: |
  // user types: 7 (then Enter)
  int n;
  cin >> n;
  // box n now holds 7

  // user types: 9.99 (then Enter)
  double price;
  cin >> price;
  // box price now holds 9.99

  // user types: ana (then Enter)
  string name;
  cin >> name;
  // box name now holds the text ana

highlightTokens:

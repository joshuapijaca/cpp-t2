# =====================================================================
# L0 / F-13b / DecomposeCard 01
# Atom: cout chained values + endl (comma vs <<)
# =====================================================================
id: "L0-F13b-decomp-01"
schemaVersion: "v2"
atomId: "F-13b"
qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "DecomposeCard"

stem: |
  A student writes the line below intending to print three values.
  Pick the option that best describes what is wrong.

code: |
  int a = 1, b = 2, c = 3;
  cout << a, b, c << endl;

question: |
  Why does this not print "1 2 3"?

options:
  - label: "A"
    text: |
      Each value to be printed must be separated by `<<`, not `,`.
      The comma operator does not chain values into cout.
  - label: "B"
    text: |
      The values are too large; cout cannot print three integers at
      once.
  - label: "C"
    text: |
      `endl` must come immediately after `cout`, not at the end.
  - label: "D"
    text: |
      The variables must be quoted: `cout << "a, b, c";`.

correctLabel: "A"

explanation: |
  A is correct. cout chains values via `<<`, not commas. Only `a` is
  pushed into cout. The `, b, c` is interpreted with the comma
  operator, evaluated and discarded. The fix: replace each `,` with
  `<<`:
  `cout << a << " " << b << " " << c << endl;`.

drills: ["tier1:prereq:cout-chained-values-endl"]
source:

id: "L0-F13b-demo-01"
schemaVersion: "v2"
atomId: "F-13b"
qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "DemoCard"

stem: |
  Watch how chaining works. Each `<<` glues the next piece on. The
  output appears in left-to-right order on the same line. `endl`
  ends the line.

whyOneLine: "cout << a << b << endl;  chain values left-to-right then end the line."

demoCode: |
  int x = 5;
  cout << "x = " << x << endl;
  // Terminal:
  // x = 5

  int a = 1, b = 2, c = 3;
  cout << a << " + " << b << " = " << c << endl;
  // Terminal:
  // 1 + 2 = 3

highlightTokens:
  - "<<"
  - "endl"
  - '"x = "'
  - '" + "'
  - '" = "'


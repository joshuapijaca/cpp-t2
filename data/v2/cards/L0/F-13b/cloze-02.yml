type: "ClozeCard"

stem: |
  Fill in the operator that joins multiple values in one cout
  statement.

code: |
  cout ___ "x = " ___ x ___ endl;

clozeSentence: |
  Multiple values are joined into a single cout statement using the
  `___` operator each time.

answer: "<<"

explanation: |
  `<<` chains values into cout. EACH value (literal text, variable,
  endl) needs its own `<<`. The single statement reads
  `cout << "x = " << x << endl;`.


stem: |
  Which of these correctly prints `x = 5` followed by a newline,
  given `int x = 5;`?

correct: 'cout << "x = " << x << endl;'

distractors:
  - 'cout << "x = ", x, endl;'
  - 'cout << "x = " + x + endl;'
  - 'cout >> "x = " >> x >> endl;'

explanation: |
  cout chains values with `<<`, not commas (Python style) and not `+`
  (Java string-concat style). The arrow points TOWARD cout.
  Distractor analysis:
  - Comma version uses the comma operator; only "x = " is printed.
  - Plus version tries to concatenate text with int; type mismatch.
  - Reverse-arrow version uses cin's input direction; wrong direction.


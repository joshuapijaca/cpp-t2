stem: |
  Recall the canonical labelled-print template. Fill in the four
  parts.

prompt: |
  Type the canonical labelled-print line shape: stream, label,
  variable, line-end.

template: |
  ____ << "____" << ____ << ____;

canonicalAnswer: |
  cout << "x = " << x << endl;

keyChecks: ["cout", "<<", "x", "endl", ";"]

forbiddenTokens: []

explanation: |
  The labelled-print template is:
  - `cout` (output stream)
  - `<< "label"` (text)
  - `<< variable` (value)
  - `<< endl` (newline)
  - `;` (statement terminator)

  Used in EVERY Q3 prompt and EVERY Q4 print.


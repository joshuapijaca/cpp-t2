stem: |
  Fill in the marker that ends a line of output.

code: |
  cout << x << ___;
  cout << y << ___;

clozeSentence: |
  The four-letter marker that ends a line of cout output is `___`.

answer: "endl"

explanation: |
  `endl` (END Line) writes a newline character AND flushes the output
  buffer. Without endl, lines run into each other. SIT102 idiom is
  always end with `<< endl;`.


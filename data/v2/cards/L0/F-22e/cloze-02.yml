stem: |
  Test 2 V2.0 reaches array length inside a function via a
  file-scope constant. Fill the missing keyword.

code: |
  ___ int SIZE = 5;

  void zero_all(stat_double &data) {
    for (int i = 0; i < SIZE; i++) {
      data.numbers[i] = 0;
    }
  }

clozeSentence: "___ int SIZE = 5;   // file-scope length constant"

answer: "const"

explanation: |
  `const int SIZE = 5;` declared at file scope is visible to every
  function in the file. The function does not need to receive the
  size as a parameter because the constant is in scope.
  Targets CM-F22e-2 (tries arr.length / sizeof inside fn — neither
  works in C++).


type: "DemoCard"

stem: |
  Watch: when you pass an array to a function, two shapes look
  similar but mean different things. Test 2 V2.0 wraps the array
  inside a struct, then passes the STRUCT by reference — that
  hides this gotcha.

whyOneLine: "Test 2 wraps arrays in structs and passes the struct by reference; raw `T arr[]` decay is a separate idiom."

demoCode: |
  // Idiom 1: raw array as parameter — DECAY (no copy made):
  void fill(int arr[], int size) {
    for (int i = 0; i < size; i++) arr[i] = 0;
  }
  // arr is a *pointer-like alias* to the caller's storage.
  // Mutations to arr[i] ARE visible to the caller.
  // Size is NOT carried; pass it as a separate parameter.

  // Idiom 2: struct-with-array, struct passed by reference — TEST 2 V2.0
  void who_am_i(stat_double &data) {
    data.numbers[0] = 0;     // mutation visible to caller
  }
  // The whole struct (including its array field) is bound by reference.
  // SIZE is reachable via the file-scope `const int SIZE = 5;`.

highlightTokens:

id: "L0-F16-write-02"
schemaVersion: "v2"
atomId: "F-16"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TemplateRecallCard"

stem: |
  Write a one-line condition that is TRUE when `i` is less than
  `SIZE` (i.e. has not yet reached SIZE).

prompt: |
  Produce a C++ boolean expression that is true exactly when the
  loop index `i` is below SIZE.

template: |
  i ___ SIZE;

canonicalAnswer: |
  i < SIZE;

keyChecks:
  - "i < SIZE"

forbiddenTokens:
  - "while"
  - "do"
  - "<="

explanation: |
  `i < SIZE` is the canonical for-loop test. The loop runs for
  `i = 0, 1, ..., SIZE-1` — exactly SIZE iterations. Using `<=`
  here would cause an off-by-one error and an out-of-bounds array
  access at index SIZE.

source:
  kind: "v2"
  ref: "Test2-SIT102-practice (1).docx — for (i = 0; i < SIZE; i++) header"


type: "ClozeCard"

stem: |
  Fill in the blank with the operator that ASKS "are these two
  values equal?".

code: |
  int x = 5;
  int y = 5;
  if (x ___ y) {
    cout << "same" << endl;
  }

clozeSentence: |
  if (x ___ y)

answer: "=="

explanation: |
  `==` is the equality TEST. A single `=` would assign y to x.
  Inside an if condition, you almost always want `==`.


stem: |
  This snippet mirrors the real Test 2 Q1. Fill in the blank with
  the operator that asks "is the array element STRICTLY GREATER
  than the running mystery value?".

code: |
  if (data.numbers[i] ___ data.mystery) {
    data.mystery = data.numbers[i];
  }

clozeSentence: |
  if (data.numbers[i] ___ data.mystery)

answer: ">"

explanation: |
  `>` is strictly greater than. In the Test 2 Q1 procedure, this
  finds the maximum value: replace mystery only when the new
  element is strictly larger. If you used `>=`, equal values would
  also overwrite (still correct for max but more work).


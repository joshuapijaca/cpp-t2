  Fill in the blank with the operator that means "not equal to".

code: |
  int n = 4;
  if (n ___ 0) {
    cout << "non-zero" << endl;
  }

clozeSentence: |
  if (n ___ 0)

answer: "!="

explanation: |
  `!=` is the not-equal test. The `!` symbol generally means NOT in
  C++. The condition is true when the two operands DIFFER.


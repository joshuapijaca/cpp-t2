id: "L0-F16-write-01"
schemaVersion: "v2"
atomId: "F-16"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TemplateRecallCard"

stem: |
  Write a one-line condition that is TRUE when `count` is exactly
  zero. Use the equality operator.

prompt: |
  Produce a C++ boolean expression that is true iff `count` equals 0.

template: |
  count ___ 0

canonicalAnswer: |
  count == 0;

keyChecks:
  - "count == 0"

forbiddenTokens:
  - "while"
  - "do"

explanation: |
  `count == 0` is the equality test. Two equal signs. A single `=`
  would assign zero to count and would not produce a boolean result
  for an if condition.


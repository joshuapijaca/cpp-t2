stem: |
  Inside an if condition `if ( ??? )`, you want to ask the question
  "are these two values equal?". Which C++ symbol performs this
  exact equality test (and not assignment)?

correct: "Two equal signs side-by-side: =="

distractors:
  - "A single equal sign: ="
  - "A colon-equals: :="
  - "An exclamation followed by equals: !="

explanation: |
  `==` (two equals) is the equality TEST. A single `=` is
  ASSIGNMENT. `!=` is the OPPOSITE test (not equal). C++ does not
  use `:=`.


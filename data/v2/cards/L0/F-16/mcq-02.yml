stem: |
  Which of the following is the syntactically correct C++ spelling
  of the comparison "greater than or equal to" — accepted by the
  compiler with no whitespace tricks?

correct: ">= (the > sign followed by =)"

distractors:
  - "=> (the = sign followed by >)"
  - "> = (with a space between)"
  - ">== (two equals after the >)"

explanation: |
  C++ requires `>=` — the relational symbol first, then `=`. `=>`
  is a syntax error here. A space between `>` and `=` produces two
  separate tokens (a syntax error). `>==` is also wrong — only one
  `=` follows the relational symbol.


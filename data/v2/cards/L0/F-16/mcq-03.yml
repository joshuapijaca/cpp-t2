# Atom: result type of a comparison
# =====================================================================
id: "L0-F16-mcq-03"
schemaVersion: "v2"
atomId: "F-16"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "MCQCard"

stem: |
  Given `int a = 3; int b = 5;`, the expression `(a < b)` has what
  type and value?

correct: "type bool, value true"

distractors:
  - "type int, value 1"
  - "type bool, value false"
  - "type string, value \"a is less than b\""

explanation: |
  Every comparison operator produces a `bool` — true or false.
  Here 3 < 5, so the result is true. (Internally `bool` is often
  implemented as a 0/1 byte, but the TYPE on the answer line is
  `bool`, not `int`.)


# Atom: write >= boundary
# =====================================================================
id: "L0-F16-write-03"
schemaVersion: "v2"
atomId: "F-16"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TemplateRecallCard"

stem: |
  Write a one-line condition that is TRUE when `score` is at least
  50 (50 itself counts as passing).

prompt: |
  Produce a C++ boolean expression that is true iff score >= 50.

template: |
  score ___ 50

canonicalAnswer: |
  score >= 50;

keyChecks:
  - "score >= 50"

forbiddenTokens:
  - "while"
  - "do"
  - "=>"

explanation: |
  `>=` (greater than or equal). The symbol order is `>` then `=`,
  never `=>`. "At least 50" includes 50, so use `>=`, not `>`.

drills: ["tier1:prereq:comparison-operators"]

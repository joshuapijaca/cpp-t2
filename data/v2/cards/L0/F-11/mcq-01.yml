type: "MCQCard"

stem: |
  After `int x;` runs (and nothing else), what is in box `x`?

correct: "An undefined garbage value — local ints are not zero-initialised."

distractors:
  - "0 — C++ guarantees every int starts at zero."
  - "An empty value, similar to null."
  - "Nothing — the box is not created until a value is assigned."

explanation: |
  Local int variables are NOT zero-initialised in C++. The box exists
  immediately after `int x;`, but the value inside is whatever bits
  were already at that memory location. Reading `x` before assignment
  is undefined behaviour. Always initialise on declaration to be safe.


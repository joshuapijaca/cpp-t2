stem: |
  Recall the canonical declare-and-initialise template. Fill the four
  parts.

prompt: |
  Type the four-part shape of a SIT102 declare-and-init line.

template: |
  TYPE NAME = VALUE;

canonicalAnswer: |
  int score = 0;

keyChecks: ["int", "score", "=", "0", ";"]

forbiddenTokens: []

explanation: |
  Every C++ declare-and-init line has four parts:
  - TYPE: int / double / string
  - NAME: a snake_case identifier
  - `=`: the assignment operator
  - VALUE: a literal or expression
  Followed by a semicolon `;`. The example `int score = 0;` is the
  canonical shape.


qTags: ["Q1", "Q3", "Q4"]
stage: 0
level: "L0"
type: "ClozeCard"

stem: |
  Fill in the missing piece. The line below declares an int AND
  initialises it to 0.

code: |
  int score ___ 0;

clozeSentence: |
  The single character that joins a declaration to its initial value
  is `___`.

answer: "="

explanation: |
  The single equals sign `=` is the assignment operator. In a
  declaration `int score = 0;`, `=` writes 0 into the new box.


fullCode: |
  void who_am_i(stat_double &data) {
    int i;
    data.mystery = 0.0;
    for (i = 0; i < SIZE; i++) {
      if (data.numbers[i] > 0) {
        data.mystery = data.mystery + data.numbers[i];
      }
    }
  }

steps:
  - line: 2
    code: '  int i;'
    annotation: |
      Open a box `i`, type int. NO initial value yet — the for-loop on
      line 4 will assign the first value.
    atomIds: ["F-11"]
  - line: 3
    code: '  data.mystery = 0.0;'
    annotation: |
      `data.mystery` already exists (it is a field of the struct
      passed in). This line ASSIGNS 0.0 — it is not a declaration, it
      is an initialisation-by-assignment.
    atomIds: ["F-11", "F-12"]
  - line: 4
    code: '  for (i = 0; i < SIZE; i++) {'
    annotation: |
      The for-header writes 0 into the existing box `i`. This is the
      first time `i` gets a defined value. From here on `i` is safe to
      read.
    atomIds: ["F-11", "F-12"]


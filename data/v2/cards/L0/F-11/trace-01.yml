# =====================================================================
# L0 / F-11 / TraceCard 01
# Atom: Variable declaration + initialisation
# Purpose: Trace simple decl + init pattern
# =====================================================================
id: "L0-F11-trace-01"
schemaVersion: "v2"
atomId: "F-11"
qTags: ["Q1", "Q3", "Q4"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Hand-execute the program. Type the final values of each variable
  into the variables panel, and the terminal output.

code: |
  int main() {
    int a = 5;
    int b = 10;
    int c = a + b;
    cout << c << endl;
    return 0;
  }

variables: ["a", "b", "c"]

expectedTrace:
  - line: 2
    variable: "a"
    value: "5"
    output: null
  - line: 3
    variable: "b"
    value: "10"
    output: null
  - line: 4
    variable: "c"
    value: "15"
    output: null
  - line: 5
    variable: ""
    value: ""
    output: "15"

terminalOutput: ["15"]

inputMode: "final-only"

teachMe: |
  - Line 2 declares `a` AND writes 5 into it. Panel: { a: 5 }.
  - Line 3 declares `b` AND writes 10. Panel: { a: 5, b: 10 }.
  - Line 4 declares `c`. The initialiser `a + b` is computed:
    look up a (5), look up b (10), add to get 15, then write 15 into
    box c. Panel: { a: 5, b: 10, c: 15 }.
  - Line 5 prints the value of c: 15.

  Final: a = 5, b = 10, c = 15. Terminal: 15.

source:
  kind: "v2"
  ref: "C++T2 spec F-11 declaration trace primer"

commonMistakeIds: ["CM-F11a"]
status: "NEW"
createdBy: "SA-PhaseC"
authoringStatus: "DRAFT"
notes: |
  First trace in the F-11 sequence. Three boxes, one cout.

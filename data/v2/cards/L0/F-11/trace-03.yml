# =====================================================================
# L0 / F-11 / TraceCard 03
# Atom: Variable declaration + initialisation
# Purpose: Trace double + string declarations
# =====================================================================
id: "L0-F11-trace-03"
schemaVersion: "v2"
atomId: "F-11"
qTags: ["Q1", "Q3", "Q4"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Hand-execute the program. Three different types are declared. Type
  the final value of each into the variables panel.

code: |
  int main() {
    int count = 5;
    double price = 9.99;
    string name = "ana";
    cout << count << " " << price << " " << name << endl;
    return 0;
  }

variables: ["count", "price", "name"]

expectedTrace:
  - line: 2
    variable: "count"
    value: "5"
    output: null
  - line: 3
    variable: "price"
    value: "9.99"
    output: null
  - line: 4
    variable: "name"
    value: "ana"
    output: null
  - line: 5
    variable: ""
    value: ""
    output: "5 9.99 ana"

terminalOutput: ["5 9.99 ana"]

inputMode: "final-only"

teachMe: |
  - Line 2: `int count = 5;` — open int box, write 5.
  - Line 3: `double price = 9.99;` — open double box, write 9.99.
  - Line 4: `string name = "ana";` — open string box, write text ana.
  - Line 5: print all three with a space between, then a newline.

  Final: count=5, price=9.99, name=ana. Terminal: `5 9.99 ana`.

drills: ["tier1:prereq:variable-declaration-initialisation"]
source:
  kind: "pfg"
  ref: "Programming Fundamentals Guide § part-1/1-sequence-and-data/2-trailside/07-variable"

commonMistakeIds: ["CM-F11a"]
status: "NEW"
createdBy: "SA-PhaseC"
authoringStatus: "DRAFT"
notes: |
  Three-type declaration trace. Demonstrates that all three primitive
  types declare-and-initialise the same way (with `= value`).

stem: |
  Which line correctly declares an int `i` AND gives it a starting
  value of 0?

correct: "int i = 0;"

distractors:
  - "i = int 0;"
  - "int i: 0;"
  - "i: int = 0;"

explanation: |
  C++ syntax is TYPE NAME = VALUE;. The other three options use
  syntax from other languages (Python uses `i: int = 0`,
  Pascal uses `i: int`, etc.) and fail to compile in C++.


type: "ClozeCard"

stem: |
  Fill in the SAFE initial value. For an accumulator that will sum
  doubles, this is the canonical starting value.

code: |
  double total = ___;

  for (i = 0; i < 5; i++) {
    total = total + numbers[i];
  }

clozeSentence: |
  A double accumulator that will collect a SUM should be initialised
  to `___`.

answer: "0.0"

explanation: |
  Starting an accumulator at 0.0 is the canonical pattern. Each
  addition `total = total + numbers[i]` builds on a known starting
  point. Starting at any other value would offset every result by
  that value.

  Use 0.0 (not 0) so the type matches `double` exactly. The compiler
  accepts 0 here, but 0.0 is the idiomatic style.


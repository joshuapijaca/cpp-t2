qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "ClozeCard"

stem: |
  Fill in the missing word. cin >> reads up to a specific kind of
  character.

code: |
  cin >> name;   // user types: Ana Maria
  // name now holds: Ana

clozeSentence: |
  cin >> consumes characters until the first ___ character (space,
  tab, or newline).

answer: "whitespace"

explanation: |
  Whitespace ends a token. Spaces, tabs, and newlines all act as
  boundaries. The boundary is NOT consumed (it stays in the buffer
  for the next cin).


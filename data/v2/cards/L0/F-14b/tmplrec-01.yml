stem: |
  Recall the canonical cin template. Fill in the three parts.

prompt: |
  Type the canonical cin shape: stream, operator, variable.

template: |
  ____ ____ ____ ;

canonicalAnswer: |
  cin >> x;

keyChecks: ["cin", ">>", "x", ";"]

forbiddenTokens: []

explanation: |
  The cin template is:
  - `cin` (input stream)
  - `>>` (extraction operator)
  - VARIABLE (destination box)
  - `;` (terminator)

  Each cin pulls ONE token. Type-conversion is automatic based on
  the variable's declared type.


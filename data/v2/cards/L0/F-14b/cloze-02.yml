qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "ClozeCard"

stem: |
  Fill in the count. Each `cin >>` consumes a specific number of
  tokens.

code: |
  int a;
  cin >> a;   // user types: 5 12 99

clozeSentence: |
  Each `cin >>` consumes exactly ___ token from the input buffer.

answer: "one"

explanation: |
  One token per cin. To read three values you need three cins (or
  one cin chain like `cin >> a >> b >> c;`). Whitespace between
  tokens is automatically skipped.


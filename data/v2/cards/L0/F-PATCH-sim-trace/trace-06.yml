id: "L0-F23-trace-06"
schemaVersion: "v2"
atomId: "F-23"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Trace through. Final value of `name` in the variables panel? Type
  the string content (no quotes around it).

code: |
  int main() {
    string name = "Sam";
    return 0;
  }

variables: ["name"]

expectedTrace:
  - line: 2
    variable: "name"
    value: "Sam"
    output: null

terminalOutput: []

inputMode: "final-only"

teachMe: |
  Box `name` holds the string Sam. The double-quotes in source code
  are syntax for the literal — they are NOT stored inside the box.

drills: ["tier1:prereq:sim-trace-primer-variables-panel-meta-skill"]

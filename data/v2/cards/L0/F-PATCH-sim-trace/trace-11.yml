stem: |
  First arithmetic. The right-hand side `3 + 4` is computed, then the
  result is written into box `sum`. Step through and enter the final
  value of `sum`.

code: |
  int main() {
    int sum = 3 + 4;
    return 0;
  }

variables: ["sum"]

expectedTrace:
  - line: 2
    variable: "sum"
    value: "7"
    output: null

terminalOutput: []

inputMode: "final-only"

teachMe: |
  RHS-first rule: compute 3 + 4 first (= 7), then write 7 into box
  `sum`. The expression `3 + 4` is NOT stored — only the result is.
  Final panel: { sum: 7 }.


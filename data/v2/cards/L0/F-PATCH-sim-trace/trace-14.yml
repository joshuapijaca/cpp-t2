stem: |
  Step through. Both operands are `int`, so `/` is integer division
  (any remainder is dropped). Final value of `q`?

code: |
  int main() {
    int q = 9 / 2;
    return 0;
  }

variables: ["q"]

expectedTrace:
  - line: 2
    variable: "q"
    value: "4"
    output: null

terminalOutput: []

inputMode: "final-only"

teachMe: |
  Integer division: 9 / 2 = 4 (the .5 is dropped, NOT rounded).
  Final panel: { q: 4 }. This rule shows up everywhere — always
  remember the type of the operands.


# =====================================================================
# L0 / F-23 / TraceCard 30 — sim-trace primer (capstone)
# Atom: Sim-trace primer (variables-panel meta-skill)
# Purpose: Capstone — three boxes, two updates, two prints
# =====================================================================
id: "L0-F23-trace-30"
schemaVersion: "v2"
atomId: "F-23"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Capstone of the primer. Step through carefully — three boxes,
  cross-variable arithmetic, two prints. Enter every final value and
  every terminal line.

code: |
  int main() {
    int a = 4;
    int b = 6;
    int sum = a + b;
    cout << "sum = " << sum << endl;
    sum = sum * 2;
    cout << "doubled = " << sum << endl;
    return 0;
  }

variables: ["a", "b", "sum"]

expectedTrace:
  - line: 2
    variable: "a"
    value: "4"
    output: null
  - line: 3
    variable: "b"
    value: "6"
    output: null
  - line: 4
    variable: "sum"
    value: "10"
    output: null
  - line: 5
    variable: ""
    value: ""
    output: "sum = 10"
  - line: 6
    variable: "sum"
    value: "20"
    output: null
  - line: 7
    variable: ""
    value: ""
    output: "doubled = 20"

terminalOutput: ["sum = 10", "doubled = 20"]

inputMode: "final-only"

teachMe: |
  Walk it:
  - a = 4, b = 6.
  - sum = 4 + 6 = 10.   (cout prints "sum = 10")
  - sum = 10 * 2 = 20.  (cout prints "doubled = 20")
  Final panel: { a: 4, b: 6, sum: 20 }.
  Terminal:
      sum = 10
      doubled = 20

  Note the order: the FIRST cout sees sum = 10, the SECOND cout sees
  the updated sum = 20. The terminal preserves the time order.

drills: ["tier1:prereq:sim-trace-primer-variables-panel-meta-skill"]
source:
  kind: "pfg"
  ref: "Programming Fundamentals Guide § part-1/3-control-flow/0-panorama/07-hand-execution"

commonMistakeIds: ["CM-uses-old-value-after-update", "CM-prints-variable-name"]
status: "NEW"
authoringStatus: "DRAFT"
createdBy: "SA-L0-PATCH"
notes: |
  Capstone: 3 boxes, 2 updates, 2 prints. If the student passes this
  in one try, they have the panel-discipline ready for L1.

# =====================================================================
# L0 / F-23 / TraceCard 01 — sim-trace primer
# Atom: Sim-trace primer (variables-panel meta-skill)
# Purpose: Single int declaration. Open one box, write one value.
# =====================================================================
id: "L0-F23-trace-01"
schemaVersion: "v2"
atomId: "F-23"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Use the variables panel like a debugger. Run the program in your
  head, line by line, then enter the final value of `n` into the
  variables panel.

code: |
  int main() {
    int n = 1;
    return 0;
  }

variables: ["n"]

expectedTrace:
  - line: 2
    variable: "n"
    value: "1"
    output: null

terminalOutput: []

inputMode: "final-only"

teachMe: |
  One declaration, one box. Line 2 opens box `n` and writes 1. The
  panel after the program ends: { n: 1 }. There is no `cout`, so
  the terminal stays empty.

source:
  kind: "v2"
  ref: "C++T2 spec §B.2 patch — sim-trace primer card 1/30"

commonMistakeIds: ["CM-skips-mental-state"]
status: "NEW"
authoringStatus: "DRAFT"
createdBy: "SA-L0-PATCH"
notes: |
  Cleanest possible warm-up. Smaller than F-03/trace-01 (no return
  ceremony in the stem) — the goal is to get the student to *touch*
  the panel for the first time in this 30-card sequence.

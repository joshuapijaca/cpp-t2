stem: |
  When you hand-execute a program by maintaining a variables panel,
  what marks the boundary between "before line N runs" and "after
  line N runs"?
correct: "A new written value enters the box for the variable assigned on line N (or no change if line N has no assignment)."
distractors:
  - "Nothing — the panel is updated only at the end of the program."
  - "The cursor jumps to the next line without touching the panel."
  - "The previous line's value is erased even if line N does not assign anything."
explanation: |
  The panel is updated PER LINE: every assignment writes a new value
  into the corresponding box; non-assignment lines leave the panel
  unchanged. This per-line discipline is what stops the eyes from
  skimming.
  Targets CM-skips-mental-state (lazy-eye glaze where the panel is
  not touched).

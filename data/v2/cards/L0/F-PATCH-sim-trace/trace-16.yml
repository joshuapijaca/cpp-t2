# =====================================================================
# L0 / F-23 / TraceCard 16 — sim-trace primer
# Atom: Sim-trace primer (variables-panel meta-skill)
# Purpose: Variable-on-RHS — read box, compute, write new box
# =====================================================================
id: "L0-F23-trace-16"
schemaVersion: "v2"
atomId: "F-23"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Step through. Line 3 reads box `a`, adds 1, then writes the result
  into box `b`. Final values of `a` and `b`?

code: |
  int main() {
    int a = 5;
    int b = a + 1;
    return 0;
  }

variables: ["a", "b"]

expectedTrace:
  - line: 2
    variable: "a"
    value: "5"
    output: null
  - line: 3
    variable: "b"
    value: "6"
    output: null

terminalOutput: []

inputMode: "final-only"

teachMe: |
  RHS-first: read box `a` (= 5), compute 5 + 1 = 6, write 6 into a
  fresh box `b`. Box `a` is NOT changed by this — only read.
  Final panel: { a: 5, b: 6 }.

drills: ["tier1:prereq:sim-trace-primer-variables-panel-meta-skill"]
source:
  kind: "pfg"
  ref: "Programming Fundamentals Guide § part-1/3-control-flow/0-panorama/07-hand-execution"

commonMistakeIds: ["CM-uses-old-value-after-update", "CM-arithmetic-error"]
status: "NEW"
authoringStatus: "DRAFT"
createdBy: "SA-L0-PATCH"
notes: |
  Cross-variable read. The "read does not consume" idea is
  load-bearing for later loops.

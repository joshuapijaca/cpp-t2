id: "L0-F23-trace-07"
schemaVersion: "v2"
atomId: "F-23"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Two declarations this time. Step through and fill in both `a` and
  `b` in the variables panel.

code: |
  int main() {
    int a = 4;
    int b = 9;
    return 0;
  }

variables: ["a", "b"]

expectedTrace:
  - line: 2
    variable: "a"
    value: "4"
    output: null
  - line: 3
    variable: "b"
    value: "9"
    output: null

terminalOutput: []

inputMode: "final-only"

teachMe: |
  Two lines, two boxes. Line 2 opens `a` with 4; line 3 opens `b`
  with 9. Final panel: { a: 4, b: 9 }. The boxes do not interact.

drills: ["tier1:prereq:sim-trace-primer-variables-panel-meta-skill"]

qTags: ["Q1"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Critical pattern. Step through. The RHS reads the current value of
  `n`, adds 1, then the result is written back into `n` (the same
  box). Final value of `n`?

code: |
  int main() {
    int n = 4;
    n = n + 1;
    return 0;
  }

variables: ["n"]

expectedTrace:
  - line: 2
    variable: "n"
    value: "4"
    output: null
  - line: 3
    variable: "n"
    value: "5"
    output: null

terminalOutput: []

inputMode: "final-only"

teachMe: |
  RHS-first: read `n` (= 4), compute 4 + 1 = 5, write 5 back into
  the same box `n`. The 4 is gone. Final panel: { n: 5 }.

  This pattern (`var = var + 1`) is the heart of every counter loop.
  Remember: read FIRST, then write.


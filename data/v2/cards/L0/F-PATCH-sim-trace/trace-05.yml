id: "L0-F23-trace-05"
schemaVersion: "v2"
atomId: "F-23"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Trace this. The type is `double`, the literal has a decimal point.
  Final value of `pi` in the variables panel?

code: |
  int main() {
    double pi = 3.14;
    return 0;
  }

variables: ["pi"]

expectedTrace:
  - line: 2
    variable: "pi"
    value: "3.14"
    output: null

terminalOutput: []

inputMode: "final-only"

teachMe: |
  Box `pi` holds the value 3.14. The panel does not care that the
  type is `double` instead of `int` — it just stores whatever you
  put in the box.


id: "L0-F23-trace-20"
schemaVersion: "v2"
atomId: "F-23"
qTags: ["Q1"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Step through carefully. Two updates, one box. Each line uses the
  CURRENT value of `n` (not the original). Final value?

code: |
  int main() {
    int n = 2;
    n = n + 3;
    n = n * 2;
    return 0;
  }

variables: ["n"]

expectedTrace:
  - line: 2
    variable: "n"
    value: "2"
    output: null
  - line: 3
    variable: "n"
    value: "5"
    output: null
  - line: 4
    variable: "n"
    value: "10"
    output: null

terminalOutput: []

inputMode: "final-only"

teachMe: |
  Walk it: 2 -> 2+3 = 5 -> 5*2 = 10. The second update uses the
  result of the first, not the original 2. Final panel: { n: 10 }.

drills: ["tier1:prereq:sim-trace-primer-variables-panel-meta-skill"]
source:
  kind: "pfg"
  ref: "Programming Fundamentals Guide § part-1/3-control-flow/0-panorama/07-hand-execution"

commonMistakeIds: ["CM-uses-old-value-after-update"]
status: "NEW"
authoringStatus: "DRAFT"
createdBy: "SA-L0-PATCH"
notes: |
  Compounding self-updates. If the student grasps this, the loop
  body in F-18 will not surprise them.

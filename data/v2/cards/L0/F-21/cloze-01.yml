stem: |
  Fill in the missing operator that accesses the field `mystery` of
  struct instance `data`.

code: |
  cout << data___mystery << endl;

clozeSentence: "data___mystery   // field-access"

answer: "."

explanation: |
  The dot `.` is the field-access operator for struct instances.
  `data.mystery` reads the `mystery` field of `data`.


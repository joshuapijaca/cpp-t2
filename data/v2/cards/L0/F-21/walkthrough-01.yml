stem: |
  Once a struct instance exists, you read or write its fields with a
  dot: `obj.field`. Walk through this 7-line program — every dot
  access is highlighted.

levelLabel: "L0 Foundation · Phase E · F-21"

fullCode: |
  struct point {
    int x;
    int y;
  };

  int main() {
    point p;
    p.x = 3;
    p.y = 4;
    cout << p.x << endl;
    return 0;
  }

steps:
  - line: 7
    code: '  point p;'
    annotation: |
      `p` is a `point` instance. It has two fields, both currently
      uninitialised.
    atomIds: ["F-20"]
  - line: 8
    code: '  p.x = 3;'
    annotation: |
      `p.x` names the `x` field of `p`. The dot is the FIELD-ACCESS
      operator. Read it as: "p dot x". Writing 3 there stores 3 in
      that field; `p.y` is untouched.
    atomIds: ["F-21"]
  - line: 9
    code: '  p.y = 4;'
    annotation: |
      Same shape, different field. Now p.x = 3 and p.y = 4.
    atomIds: ["F-21"]
  - line: 10
    code: '  cout << p.x << endl;'
    annotation: |
      Reading: `p.x` returns the int currently in field x (= 3).
      cout prints 3.
    atomIds: ["F-21"]

drills: ["tier1:prereq:dot-access-obj-field"]

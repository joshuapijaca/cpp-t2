stage: 0
level: "L0"
type: "MCQCard"

stem: |
  Given `point pts[5];` (an array OF struct points, where point has
  field `x`), which token reads the `x` field of the third point?

correct: "pts[2].x — index first, then dot."

distractors:
  - "pts.x[2] — dot first, then index."
  - "pts->x[2] — pointer-arrow operator."
  - "pts[2]::x — scope-resolution."

explanation: |
  `pts` is an array of structs. To pick one struct first, then read
  one of its fields, the order is `pts[index].field` =
  `pts[2].x`.
  `pts.x[2]` would require `pts` itself to be a struct with a field
  called `x` that is an array — different shape (CM-F21a).
  Note: this is the OPPOSITE order from `data.numbers[i]` because
  the underlying shape is opposite (array of structs vs struct
  with array). Both are valid C++; pick the one matching your
  declaration.


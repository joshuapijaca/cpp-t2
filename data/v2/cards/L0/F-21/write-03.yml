type: "FunctionWriteCard"

stem: |
  Write a single C++ statement that adds the i-th element of
  `data.numbers` to `data.mystery`. The result must be stored back
  in `data.mystery`.

prompt: "Add data.numbers[i] to data.mystery (in-place accumulator step)."

signatureHint: "____ = ____ + ____;"

canonicalAnswer: |
  data.mystery = data.mystery + data.numbers[i];

keyChecks:
  - "data.mystery"
  - "="
  - "data.mystery + data.numbers[i]"
  - ";"

forbiddenTokens:
  - "data->mystery"
  - "data::mystery"
  - "data[i].numbers"
  - "*"

explanation: |
  This is the EXACT body line of the Test 2 Q1 accumulator. RHS
  reads the current `data.mystery` plus the i-th array slot; LHS
  writes the sum back into the scalar field. Identical token on
  both sides — familiar from F-21 cloze-04.


stem: |
  Fill in the LHS to assign the value 0 to the `mystery` field of
  struct instance `data`.

code: |
  ___ = 0.0;

clozeSentence: "___ = 0.0;  // assign 0 to mystery field of data"

answer: "data.mystery"

explanation: |
  The same `instance.field` token works on the LHS of an assignment.
  `data.mystery = 0.0;` writes 0 into the `mystery` field of `data`.


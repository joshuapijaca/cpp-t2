      Write the statement that prints the `mystery` field of `data`,
      followed by endl.
    expectedAnswer: |
      cout << data.mystery << endl;
  - prompt: |
      Write the assignment that sets `data.numbers[3]` to 42.0.
    expectedAnswer: |
      data.numbers[3] = 42.0;


stem: |
  Fill in the composite token: increment the i-th slot of the
  `numbers` array field of `data` by 1.

code: |
  ___ = ___ + 1;

clozeSentence: "___ = ___ + 1;  // both blanks: same composite token"

answer: "data.numbers[i]"

explanation: |
  Both blanks are the same composite token: `data.numbers[i]`. The
  RHS reads the current value of slot i; the LHS writes (current +
  1) back into slot i. Identical token, both sides.


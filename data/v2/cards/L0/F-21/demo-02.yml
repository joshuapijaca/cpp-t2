demoCode: |
  // canonical composite shape:
  obj.field[i]

  // ALWAYS read left-to-right:
  //   obj      = the struct instance       (data)
  //   .        = field-access operator     (.)
  //   field    = the field name            (numbers)
  //   [i]      = the index INTO the array  ([i])

  // Test 2 V2.0:
  data.numbers[0]      // first element
  data.numbers[i]      // element at index i (loop body)
  data.numbers[SIZE-1] // last element


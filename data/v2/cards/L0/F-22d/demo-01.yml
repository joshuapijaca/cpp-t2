qTags: ["Q1", "Q3"]
stage: 0
level: "L0"
type: "DemoCard"

stem: |
  Watch: a reference parameter is an ALIAS — a second name for the
  caller's variable. There is one storage, two names; mutations
  through either name are visible through both.

whyOneLine: "A `&` parameter is a second NAME for one storage — mutations are visible to all names."

demoCode: |
  // Caller side:
  int n = 5;            // STORAGE: 5,  NAMES: { n }

  // Inside `void bump(int &x) { x = x + 1; }`:
  //                     STORAGE: 5,  NAMES: { n, x }
  //                     after `x = x + 1`:
  //                     STORAGE: 6,  NAMES: { n, x }

  // After return (x goes out of scope):
  //                     STORAGE: 6,  NAMES: { n }

  // The caller now sees n = 6.

  // KEY MENTAL MODEL: one box, two labels. Modify through either
  // label and the box (storage) updates. The labels never have
  // their own boxes.

highlightTokens:

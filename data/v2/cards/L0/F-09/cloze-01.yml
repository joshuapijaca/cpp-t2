type: "ClozeCard"

stem: |
  Fill in the missing word. SIT102 names every variable, function and
  struct using one specific style.

code: |
  double total_price = 9.99;
  string first_name = "ana";
  void read_desk(int num_to_read);

clozeSentence: |
  The naming style used above is called ___ case. Words are joined by
  underscores, and only lowercase letters appear.

answer: "snake"

explanation: |
  snake_case is the SIT102 convention. Words are joined by `_` and
  every letter is lowercase. Examples: `total_price`, `first_name`,
  `num_to_read`. The opposite styles are camelCase (totalPrice) and
  PascalCase (TotalPrice), which SIT102 does NOT use.


stage: 0
level: "L0"
type: "ClozeCard"

stem: |
  A snake_case identifier joins multiple words. Fill in the punctuation
  used between words.

code: |
  int first___name;
  string user___id;
  double total___price;

clozeSentence: |
  Words inside a snake_case identifier are joined by a single ___
  character. Spaces are not legal; hyphens are not legal.

answer: "_"

explanation: |
  The underscore character `_` joins words in snake_case. The legal
  versions are `first_name`, `user_id`, `total_price`. The compiler
  reads `_` as part of the identifier, just like a letter.


stem: |
  Watch how every name in real SIT102 code looks. Every variable, every
  field, every function — same shape: lowercase letters joined by
  underscores. No camelCase, no PascalCase for variables. Just
  snake_case.

whyOneLine: "SIT102 naming convention is snake_case for variables, functions and struct types."

demoCode: |
  struct stat_double {
    double numbers[5];
    double mystery;
  };

  void who_am_i(stat_double &data) {
    int i;
    data.mystery = 0.0;
  }

  int read_num_to_read() {
    int num_to_read;
    return num_to_read;
  }


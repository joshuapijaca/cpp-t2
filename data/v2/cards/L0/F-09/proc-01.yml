stem: |
  Translate a plain-English variable description into a legal SIT102
  identifier declaration. Use the identifier as the variable name in
  a full `TYPE NAME;` line.

section: "F-09 identifier writing"

prompt: |
  An int that stores how many desks the user wants to read.
  Use snake_case. Write the full declaration line.

expectedAnswer: "int num_to_read;"

keyChecks: ["num_to_read"]

variants:
  - prompt: |
      A double that stores the total price of an order. snake_case.
      Full declaration line.
    expectedAnswer: "double total_price;"
  - prompt: |
      A string that stores a person's first name. snake_case. Full
      declaration line.
    expectedAnswer: "string first_name;"


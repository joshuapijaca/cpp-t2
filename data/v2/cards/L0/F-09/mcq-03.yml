level: "L0"
type: "MCQCard"

stem: |
  In SIT102, what is the canonical naming style for a variable that
  stores a person's last name?

correct: "last_name"

distractors:
  - "lastName"
  - "LastName"
  - "LAST_NAME"

explanation: |
  SIT102 (and the PFG) uses snake_case for every variable, struct
  field, and function name. The other three are real conventions in
  other languages: lastName is camelCase (Java, JavaScript), LastName
  is PascalCase (C# class names), LAST_NAME is SCREAMING_SNAKE_CASE
  (constants in some languages). All three compile, but none of them
  match SIT102 idiom and the marker will deduct style marks.


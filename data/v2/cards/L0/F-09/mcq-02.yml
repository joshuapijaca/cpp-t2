stem: |
  A student writes `int struct = 0;` and the compiler refuses. Which
  rule does this break?

correct: "`struct` is a reserved C++ keyword and cannot be used as a variable name."

distractors:
  - "Variables of type `int` cannot have a value of 0; the compiler complains about the literal."
  - "The semicolon is in the wrong place; it must come after `int` not after `0`."
  - "Variables must be initialised with a non-zero value when first declared."

explanation: |
  C++ reserves a fixed list of words for the language itself: `int`,
  `double`, `string`, `struct`, `for`, `if`, `return`, `void`, etc.
  None of these can be used as a variable name. The compiler stops
  immediately when it sees `int struct` because two type-keywords back-
  to-back is meaningless. Pick a non-keyword name.


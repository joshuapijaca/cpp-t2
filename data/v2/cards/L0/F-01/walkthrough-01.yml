createdBy: "SA-PhaseA"
notes: |
  First card a 0-prior-knowledge student sees. Goal: dissolve the
  superstition that code is "special." It is text. Period. Demystifying
  this single fact unblocks every later atom — the compiler (F-02) and
  hand-execution (F-03) only make sense once "source = text" is a felt,
  obvious truth.

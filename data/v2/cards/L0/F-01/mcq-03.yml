stem: |
  A friend emails you a file called `q1_solution.cpp`. You have not
  installed any C++ tools yet. Can you read what is inside the file?

correct: "Yes — open it in any text editor and you will see the C++ source as readable text."

distractors:
  - "No — without a C++ compiler installed, the file is unreadable on your machine."
  - "Only partially — without a compiler, only the comments are readable; the code itself is encrypted."
  - "Only if you rename the extension to .txt first, otherwise the operating system blocks the file."

explanation: |
  A `.cpp` file is plain text. It can be opened and read in any text
  editor on any operating system, with or without a C++ compiler
  installed. The compiler is needed to *run* the program, not to *read*
  the source.

  Renaming the extension to `.txt` changes nothing about the file's
  content — it just changes which app opens by default. The OS does not
  block files based on extension.


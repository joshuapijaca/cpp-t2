id: "L0-F13-cloze-01"
schemaVersion: "v2"
atomId: "F-13"
qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "ClozeCard"

stem: |
  Fill the missing token so the chain prints `count` and ends the line.

code: |
  int count = 7;
  cout << "count = " << count << ___;

clozeSentence: "cout << \"count = \" << count << ___;   // end the line"

answer: "endl"

explanation: |
  `endl` writes a newline character AND flushes the output buffer.
  Without `endl`, the next `cout` runs onto the same terminal line.
  Targets CM-F13b (forgets endl, output runs together).


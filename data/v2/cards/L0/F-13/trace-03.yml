# =====================================================================
# L0 / F-13 / TraceCard 03
# Atom: cout chained output (no endl, lines run together)
# =====================================================================
id: "L0-F13-trace-03"
schemaVersion: "v2"
atomId: "F-13"
qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Hand-execute. Notice what happens when `endl` is missing on the
  first cout. Predict the exact terminal output.

code: |
  int main() {
    int a = 1;
    int b = 2;
    cout << "a: " << a;
    cout << "b: " << b << endl;
    return 0;
  }

variables: ["a", "b"]

expectedTrace:
  - line: 2
    variable: "a"
    value: "1"
    output: null
  - line: 3
    variable: "b"
    value: "2"
    output: null
  - line: 4
    variable: ""
    value: ""
    output: "a: 1"
  - line: 5
    variable: ""
    value: ""
    output: "a: 1b: 2"

terminalOutput: ["a: 1b: 2"]

inputMode: "final-only"

teachMe: |
  - Line 2: a = 1. Line 3: b = 2.
  - Line 4: cout pushes `a: ` then `1`. Terminal: `a: 1` (no newline).
  - Line 5: cout pushes `b: ` then `2` then newline. Terminal:
    `a: 1b: 2\n`

  The two cout statements glue together because the first one did
  not end its line. Always include `<< endl;` (or `<< "\n";`) at
  end of line.

drills: ["tier1:prereq:cout-chained-output"]
source:
  kind: "pfg"
  ref: "Programming Fundamentals Guide § part-1/1-sequence-and-data/2-trailside/11-1-terminal"

commonMistakeIds: ["CM-F13b-1"]
status: "NEW"
createdBy: "SA-PhaseC"
authoringStatus: "DRAFT"
notes: |
  Demonstrates the missing-endl glue behaviour.

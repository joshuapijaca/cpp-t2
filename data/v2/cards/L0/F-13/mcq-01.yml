stem: |
  Which line correctly prints `a` and `b` separated by a space, then
  ends the line, using a single chained `cout` statement?

correct: "cout << a << \" \" << b << endl;"

distractors:
  - "cout >> a >> \" \" >> b >> endl;"
  - "cout << a, \" \", b, endl;"
  - "cout << a + \" \" + b + endl;"

explanation: |
  `cout` uses the insertion operator `<<` (left-arrows pointing into
  the stream), chained left-to-right. The space and newline are inserted
  by adding `" "` and `endl` to the chain.
  Distractor 1 (CM-F13a) flips the operator to `>>`, which is for input.
  Distractor 2 uses commas — `cout << a, " ", b` only prints `a`; the
  comma operator discards the rest. Distractor 3 tries `+`, which only
  works when both sides are strings.


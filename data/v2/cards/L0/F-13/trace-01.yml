# =====================================================================
# L0 / F-13 / TraceCard 01
# Atom: cout chained output (parent atom — covers chaining trace)
# =====================================================================
id: "L0-F13-trace-01"
schemaVersion: "v2"
atomId: "F-13"
qTags: ["Q3", "Q4"]
stage: 0
level: "L0"
type: "TraceCard"

stem: |
  Hand-execute. Predict the EXACT terminal output of the chained cout
  statement.

code: |
  int main() {
    int a = 4;
    int b = 7;
    cout << a << " " << b << endl;
    return 0;
  }

variables: ["a", "b"]

expectedTrace:
  - line: 2
    variable: "a"
    value: "4"
    output: null
  - line: 3
    variable: "b"
    value: "7"
    output: null
  - line: 4
    variable: ""
    value: ""
    output: "4 7"

terminalOutput: ["4 7"]

inputMode: "final-only"

teachMe: |
  - Line 2: a = 4. Line 3: b = 7.
  - Line 4: cout chain
    - `<< a` -> push 4. Terminal: 4
    - `<< " "` -> push space. Terminal: 4 (space)
    - `<< b` -> push 7. Terminal: 4 7
    - `<< endl` -> push newline. Terminal: 4 7\n

  Final output: `4 7`.

source:
  kind: "v2"
  ref: "C++T2 spec F-13 trace primer — chained output"

commonMistakeIds: []

stem: |
  Watch the direction. The arrows point LEFT, toward cout. The value
  flows from the right (a literal or variable) INTO cout on the left.

whyOneLine: "cout << x;  the << points toward cout. Value flows INTO cout."

demoCode: |
  cout << 7;            // 7 INTO cout. Terminal: 7
  cout << "hi";         // "hi" INTO cout. Terminal: 7hi
  cout << 3.14;         // 3.14 INTO cout. Terminal: 7hi3.14
  // Direction: VALUE -->  COUT
  // Operator: <<  (points left, toward cout)


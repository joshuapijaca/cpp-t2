stem: |
  Fill in the operator that pushes a value INTO cout.

code: |
  cout ___ x;
  cout ___ "hello";

clozeSentence: |
  The two-character operator that pushes values into cout is `___`.

answer: "<<"

explanation: |
  `<<` is the insertion operator. It points TOWARD cout, indicating
  the value flows into cout. Pair: `cin >>` for input.


type: "MCQCard"

stem: |
  Which line correctly prints the value of `int x = 7;` to the
  terminal?

correct: "cout << x;"

distractors:
  - "cout >> x;"
  - "cin << x;"
  - "x << cout;"

explanation: |
  cout uses `<<` and the stream name comes FIRST. The arrow points
  toward cout, indicating the value is pushed in.
  - `cout >> x` is wrong direction (>> is input).
  - `cin << x` mixes the input stream with the output operator.
  - `x << cout` is reversed; cout must come first.


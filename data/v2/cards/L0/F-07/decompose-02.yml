notes: |
  Inverse of decomp-01. Targets the OPPOSITE error — adding `;`
  where it does not belong. Critical for disentangling: every
  statement ends with `;`, but block-openers, block-closers (for
  functions and control structures), and preprocessor directives
  do NOT.

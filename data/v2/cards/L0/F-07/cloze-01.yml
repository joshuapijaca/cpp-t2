stem: |
  Fill the blank with the single character that must end every
  C++ statement.

code: |
  int x = 5_
  cout << x << endl_

clozeSentence: |
  int x = 5_       (the underscore is the missing character)

answer: ";"

explanation: |
  The missing character is `;` — the C++ statement terminator. Both
  lines are statements (declaration, output) and each must end with
  its own `;`.


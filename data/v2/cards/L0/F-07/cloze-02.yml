type: "ClozeCard"

stem: |
  The struct definition below is missing one character at the very
  end, immediately AFTER the closing brace. Fill in that character.

code: |
  struct Point {
    int x;
    int y;
  }_

clozeSentence: |
  After the closing brace of the struct, what single character must
  be added to terminate the definition?

answer: ";"

explanation: |
  The missing character is `;`. A struct definition is a *statement*
  (it tells the compiler "here is a new type"), and like any C++
  statement it must end with a semicolon. The full ending is
  therefore `};` — close-brace, semicolon.

  Forgetting this `;` (the `};` shape) is the highest-frequency
  Q2 error per Saloni's seminar.


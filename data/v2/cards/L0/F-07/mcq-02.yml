qTags: ["Q2"]
stage: 0
level: "L0"
type: "MCQCard"

stem: |
  Which is the correct, fully-terminated ending of a C++ struct
  definition? Pick the option that matches what Q2 marking accepts.

correct: "};"

distractors:
  - "}"
  - ";"
  - "};;"

explanation: |
  Correct: `};` — the closing brace of the struct, immediately
  followed by a semicolon. The struct definition is itself a
  statement; the brace closes the field list, the semicolon
  terminates the statement.

  `}` alone is missing the terminator (the highest-frequency Q2
  error per Saloni's seminar).
  `;` alone is missing the closing brace.
  `};;` adds a second redundant semicolon — legal but
  non-idiomatic; in practice marking accepts only the canonical
  single `};`.


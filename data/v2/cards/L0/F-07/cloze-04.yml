qTags: ["Q2"]
stage: 0
level: "L0"
type: "ClozeCard"

stem: |
  Find every missing terminator in this struct. Three field lines
  need terminators, and one character is missing from the very end
  (after the closing brace).

code: |
  struct Point {
    int x_
    int y_
    int z_
  }_

clozeSentence: |
  Each `_` stands for one missing character. List the four missing
  characters as a single string (separated by spaces).

answer: "; ; ; ;"

explanation: |
  All four missing characters are semicolons:
  - After `int x` — `;` (every field is its own statement)
  - After `int y` — `;`
  - After `int z` — `;`
  - After the closing brace — `;` (the struct definition itself
    is a statement; the close + `;` form the canonical `};` ending)

  Fully repaired:
    struct Point {
      int x;
      int y;
      int z;
    };


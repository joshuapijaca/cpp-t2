id: "L0-F07-cloze-03"
schemaVersion: "v2"
atomId: "F-07"
qTags: ["Q4"]
stage: 0
level: "L0"
type: "ClozeCard"

stem: |
  Fill the missing terminators. Three statement lines need them.

code: |
  int main() {
    int a = 1
    int b = 2
    cout << a + b << endl
    return 0;
  }

clozeSentence: |
  Add the missing `;` characters at the end of three lines (a, b,
  cout).

answer: "; ; ;"

explanation: |
  Three lines are missing terminators:
  - `int a = 1;`
  - `int b = 2;`
  - `cout << a + b << endl;`

  The fourth line, `return 0;`, already has its `;`. The opening
  brace line (`int main() {`) and closing brace `}` do NOT take
  semicolons.

drills: ["tier1:prereq:statement-terminator-semicolon"]

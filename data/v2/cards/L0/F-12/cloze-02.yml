code: |
  data.mystery = ___ + data.numbers[i];

clozeSentence: |
  To accumulate the array element into the running total, the RHS
  starts with `___`, then adds the new element.

answer: "data.mystery"

explanation: |
  The accumulator pattern reads the CURRENT value (`data.mystery`),
  adds the new element, then writes back. The RHS first reads
  data.mystery, then evaluates the addition. Without the
  `data.mystery` on the RHS, the previous total is overwritten and
  lost.


stem: |
  Fill in the operator that WRITES into a variable.

code: |
  int x;
  x ___ 5;

clozeSentence: |
  The single-character operator that writes a value into a variable
  is `___`.

answer: "="

explanation: |
  Single `=` is the assignment operator. It writes the right-hand
  value into the left-hand box. Double `==` is comparison; do not
  confuse them.


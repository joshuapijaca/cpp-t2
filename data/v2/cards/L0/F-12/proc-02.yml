stem: |
  Type a single line that increases a variable by adding to itself.

section: "F-12 assignment drills (read-modify-write)"

prompt: |
  Assume `int total;` is declared. Write the line that ADDS the value
  of `n` into total (i.e. total becomes total + n). End with `;`.

expectedAnswer: "total = total + n;"

keyChecks: ["total = total + n;"]


# Atom: Assignment = (LHS must be a box)
# =====================================================================
id: "L0-F12-mcq-03"
schemaVersion: "v2"
atomId: "F-12"
qTags: ["Q1", "Q4"]
stage: 0
level: "L0"
type: "MCQCard"

stem: |
  Which of these lines is INVALID C++ assignment?

correct: "5 = x;  (the literal 5 cannot be the target of assignment)"

distractors:
  - "x = 5;"
  - "x = x + 1;"
  - "data.mystery = 0.0;"

explanation: |
  The left-hand side of `=` must be a NAME (variable, struct field,
  array element). It cannot be a literal value. `5 = x;` tries to
  write into the literal 5, which is not a memory box. Compile error.

  The other three are all valid: a name on the LHS in each case.


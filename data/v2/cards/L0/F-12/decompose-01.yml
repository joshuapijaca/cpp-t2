# =====================================================================
# L0 / F-12 / DecomposeCard 01
# Atom: Assignment = (= vs ==)
# =====================================================================
id: "L0-F12-decomp-01"
schemaVersion: "v2"
atomId: "F-12"
qTags: ["Q1", "Q4"]
stage: 0
level: "L0"
type: "DecomposeCard"

stem: |
  A student wrote the if-statement below intending to "if x is 5".
  Pick the option that best describes what the line ACTUALLY does.

code: |
  int x = 3;
  if (x = 5) {
    cout << "match" << endl;
  }

question: |
  What does this if-statement do?

options:
  - label: "A"
    text: |
      Compares `x` to 5 and runs the body if equal.
  - label: "B"
    text: |
      Assigns 5 to `x`, then treats the assignment as the if-condition.
      Since 5 is non-zero, the body always runs and `x` is now 5.
  - label: "C"
    text: |
      Fails to compile because `=` is not allowed inside an if.
  - label: "D"
    text: |
      Treats `x = 5` as a syntax error and skips the body.

correctLabel: "B"

explanation: |
  B is correct. `=` is ASSIGNMENT, not comparison. The line writes 5
  into `x` and the if-condition uses the assigned value (5).
  Non-zero is treated as true, so the body runs. As a side effect,
  `x` is now 5.

  A is wrong: that would be `if (x == 5)` with double-equals.
  C is wrong: the line compiles (with a warning).
  D is wrong: not a syntax error.

  Lesson: in conditions, ALWAYS use `==` for comparison. `=` is
  assignment.

source:

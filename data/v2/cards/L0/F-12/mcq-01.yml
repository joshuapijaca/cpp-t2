stage: 0
level: "L0"
type: "MCQCard"

stem: |
  Which symbol writes a value INTO a variable in C++?

correct: "= (single equals sign)"

distractors:
  - "== (double equals sign)"
  - ":= (colon equals)"
  - "<- (left arrow)"

explanation: |
  Single `=` is assignment. `==` is comparison (used in if/while
  conditions). `:=` is the Pascal/Go assignment operator. `<-` is
  used by R and Haskell. C++ uses `=` for write, `==` for compare.


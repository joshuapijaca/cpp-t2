canonicalAnswer: |
  struct game_data
  {
    int players;
    double duration;
    double price;
  };

  void read_games(game_data &games[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cin >> games[i].players;
      cin >> games[i].duration;
      cin >> games[i].price;
    }
  }

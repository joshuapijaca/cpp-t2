  Two-pane: Q2 struct shown left. Write the matching Q3 read_phones.
prompt: "Two-pane Q2 -> Q3."
signatureHint: |
  Given:
  struct phone_data
  {
    int storage_gb;
    int battery_mah;
    double price;
  };
  Write read_phones.
canonicalAnswer: |
  void read_phones(phone_data &phones[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Storage (GB): ";
      cin >> phones[i].storage_gb;
      cout << "Battery (mAh): ";
      cin >> phones[i].battery_mah;
      cout << "Price: ";
      cin >> phones[i].price;
    }
  }

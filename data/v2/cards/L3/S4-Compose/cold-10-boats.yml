canonicalAnswer: |
  struct boat_data
  {
    double length_m;
    int capacity;
    double price;
  };

  void read_boats(boat_data &boats[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Length (m): ";
      cin >> boats[i].length_m;
      cout << "Capacity: ";
      cin >> boats[i].capacity;
      cout << "Price: ";
      cin >> boats[i].price;
    }
  }

  Cold start. You are given only the entity name 'phones'. Choose
  3 plausible fields, write the struct, and then the matching read_phones.
prompt: "Cold-start phones (Q2 + Q3)."
signatureHint: "Entity: phones. Choose fields, write Q2 struct, then Q3 read fn."
canonicalAnswer: |
  struct phone_data
  {
    int storage_gb;
    int battery_mah;
    double price;
  };

  void read_phones(phone_data &phones[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Storage (GB): ";
      cin >> phones[i].storage_gb;
      cout << "Battery (mAh): ";
      cin >> phones[i].battery_mah;
      cout << "Price: ";
      cin >> phones[i].price;
    }
  }

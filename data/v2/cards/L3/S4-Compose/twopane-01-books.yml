type: "FunctionWriteCard"
stem: |
  Two-pane: Q2 struct shown left. Write the matching Q3 read_books.
prompt: "Two-pane Q2 -> Q3."
signatureHint: |
  Given:
  struct book_data
  {
    int pages;
    double price;
    double rating;
  };
  Write read_books.
canonicalAnswer: |
  void read_books(book_data &books[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Pages: ";
      cin >> books[i].pages;
      cout << "Price: ";
      cin >> books[i].price;
      cout << "Rating: ";
      cin >> books[i].rating;
    }
  }

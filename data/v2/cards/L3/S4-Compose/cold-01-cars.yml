  Cold start. You are given only the entity name 'cars'. Choose
  3 plausible fields, write the struct, and then the matching read_cars.
prompt: "Cold-start cars (Q2 + Q3)."
signatureHint: "Entity: cars. Choose fields, write Q2 struct, then Q3 read fn."
canonicalAnswer: |
  struct car_data
  {
    double engine_l;
    int doors;
    double mileage;
  };

  void read_cars(car_data &cars[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Engine litres: ";
      cin >> cars[i].engine_l;
      cout << "Doors: ";
      cin >> cars[i].doors;
      cout << "Mileage (km): ";
      cin >> cars[i].mileage;
    }
  }

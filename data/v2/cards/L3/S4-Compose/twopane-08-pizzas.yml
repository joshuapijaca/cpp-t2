  void read_pizzas(pizza_data &pizzas[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Diameter (cm): ";
      cin >> pizzas[i].diameter_cm;
      cout << "Toppings: ";
      cin >> pizzas[i].toppings;
      cout << "Price: ";
      cin >> pizzas[i].price;
    }
  }

  void read_kettles(kettle_data &kettles[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Volume (L): ";
      cin >> kettles[i].volume_l;
      cout << "Watts: ";
      cin >> kettles[i].watts;
      cout << "Price: ";
      cin >> kettles[i].price;
    }
  }

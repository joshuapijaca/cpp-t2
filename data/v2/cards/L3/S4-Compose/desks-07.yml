signatureHint: "void read_desks(desk_data &desks[], int number_to_read) { ... }"
canonicalAnswer: |
  void read_desks(desk_data &desks[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Width: ";
      cin >> desks[i].width;
      cout << "Height: ";
      cin >> desks[i].height;
      cout << "Depth: ";
      cin >> desks[i].depth;
    }
  }

signatureHint: |
  Q2 (with typos):
  struct book_data
  {
    int pages;  // <-- typo: extra semicolon expected here?
    double price;
    double rating;
  };
  Write read_books canonically.
canonicalAnswer: |
  void read_books(book_data &books[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Pages: ";
      cin >> books[i].pages;
      cout << "Price: ";
      cin >> books[i].price;
      cout << "Rating: ";
      cin >> books[i].rating;
    }
  }

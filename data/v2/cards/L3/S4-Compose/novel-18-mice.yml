canonicalAnswer: |
  void read_mice(mouse_data &mice[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "DPI: ";
      cin >> mice[i].dpi;
      cout << "Buttons: ";
      cin >> mice[i].buttons;
      cout << "Weight (g): ";
      cin >> mice[i].weight_g;
    }
  }

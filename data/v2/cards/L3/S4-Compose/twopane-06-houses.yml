signatureHint: |
  Given:
  struct house_data
  {
    int bedrooms;
    double area_m2;
    double price;
  };
  Write read_houses.
canonicalAnswer: |
  void read_houses(house_data &houses[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Bedrooms: ";
      cin >> houses[i].bedrooms;
      cout << "Area (m^2): ";
      cin >> houses[i].area_m2;
      cout << "Price: ";
      cin >> houses[i].price;
    }
  }

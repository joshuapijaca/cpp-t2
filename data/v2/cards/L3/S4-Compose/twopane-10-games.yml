  Given:
  struct game_data
  {
    int players;
    double duration;
    double price;
  };
  Write read_games.
canonicalAnswer: |
  void read_games(game_data &games[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Players: ";
      cin >> games[i].players;
      cout << "Duration (h): ";
      cin >> games[i].duration;
      cout << "Price: ";
      cin >> games[i].price;
    }
  }

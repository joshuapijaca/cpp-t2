    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Engine litres: ";
      cin >> cars[i].engine_l;
      cout << "Doors: ";
      cin >> cars[i].doors;
      cout << "Mileage (km): ";
      cin >> cars[i].mileage;
    }
  }

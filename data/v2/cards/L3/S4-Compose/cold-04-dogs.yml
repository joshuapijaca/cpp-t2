canonicalAnswer: |
  struct dog_data
  {
    int age_yrs;
    double weight_kg;
    int visits;
  };

  void read_dogs(dog_data &dogs[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cin >> dogs[i].age_yrs;
      cin >> dogs[i].weight_kg;
      cin >> dogs[i].visits;
    }
  }

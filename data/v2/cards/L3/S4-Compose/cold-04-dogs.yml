canonicalAnswer: |
  struct dog_data
  {
    int age_yrs;
    double weight_kg;
    int visits;
  };

  void read_dogs(dog_data &dogs[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Age (yrs): ";
      cin >> dogs[i].age_yrs;
      cout << "Weight (kg): ";
      cin >> dogs[i].weight_kg;
      cout << "Vet visits: ";
      cin >> dogs[i].visits;
    }
  }

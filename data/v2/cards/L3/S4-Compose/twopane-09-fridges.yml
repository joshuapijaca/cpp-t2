  struct fridge_data
  {
    double volume_l;
    int shelves;
    double price;
  };
  Write read_fridges.
canonicalAnswer: |
  void read_fridges(fridge_data &fridges[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Volume (L): ";
      cin >> fridges[i].volume_l;
      cout << "Shelves: ";
      cin >> fridges[i].shelves;
      cout << "Price: ";
      cin >> fridges[i].price;
    }
  }

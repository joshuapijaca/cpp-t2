  {{R}} read_books(book_data {{A}}books[], {{I}} number_to_read)
  {
    for (int i = 0; i < {{B}}; i++)
    {
      cout << "Pages: ";
      cin >> {{T}};
      cout << "Price: ";
      cin >> books[i].price;
      cout << "Rating: ";
      cin >> books[i].rating;
    }
  }
canonicalAnswer: |
  void read_books(book_data &books[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Pages: ";
      cin >> books[i].pages;
      cout << "Price: ";
      cin >> books[i].price;
      cout << "Rating: ";
      cin >> books[i].rating;
    }
  }

stem: |
  Cold start. You are given only the entity name 'plants'. Choose
  3 plausible fields, write the struct, and then the matching read_plants.
prompt: Cold-start plants (Q2 + Q3).
signatureHint: 'Entity: plants. Choose fields, write Q2 struct, then Q3 read fn.'
canonicalAnswer: |
  struct plant_data
  {
    double height_cm;
    int leaves;
    double water_ml;
  };

  void read_plants(plant_data &plants[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cin >> plants[i].height_cm;
      cin >> plants[i].leaves;
      cin >> plants[i].water_ml;
    }
  }

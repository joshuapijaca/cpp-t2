signatureHint: "Entity: plants. Choose fields, write Q2 struct, then Q3 read fn."
canonicalAnswer: |
  struct plant_data
  {
    double height_cm;
    int leaves;
    double water_ml;
  };

  void read_plants(plant_data &plants[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Height (cm): ";
      cin >> plants[i].height_cm;
      cout << "Leaves: ";
      cin >> plants[i].leaves;
      cout << "Water (ml): ";
      cin >> plants[i].water_ml;
    }
  }

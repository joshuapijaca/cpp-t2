signatureHint: 'Entity: houses. Choose fields, write Q2 struct, then Q3 read fn.'
canonicalAnswer: |
  struct house_data
  {
    int bedrooms;
    double area_m2;
    double price;
  };

  void read_houses(house_data &houses[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cin >> houses[i].bedrooms;
      cin >> houses[i].area_m2;
      cin >> houses[i].price;
    }
  }

stem: |
  Write the FULL read_books function. book_data has 3 fields:
  int pages, double price, double rating.
prompt: "Compose: novel entity read_books."
signatureHint: "void read_books(book_data &books[], int number_to_read) { ... }"
canonicalAnswer: |
  void read_books(book_data &books[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Pages: ";
      cin >> books[i].pages;
      cout << "Price: ";
      cin >> books[i].price;
      cout << "Rating: ";
      cin >> books[i].rating;
    }
  }

canonicalAnswer: |
  struct bike_data
  {
    int gears;
    double weight_kg;
    double price;
  };

  void read_bikes(bike_data &bikes[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Gears: ";
      cin >> bikes[i].gears;
      cout << "Weight (kg): ";
      cin >> bikes[i].weight_kg;
      cout << "Price: ";
      cin >> bikes[i].price;
    }
  }

stem: "The signature below is WRONG by V2.0 marking. Identify the exact bug."

code: |
  void read_desks(desk_data desk_list[], int number_to_read)

question: "Pick the option that correctly identifies what is missing or wrong."

options:
  - label: "A"
    text: "Missing & before desk_list. The V2.0 form must be `desk_data &desk_list[]` so the array is passed by reference and the caller sees writes."
  - label: "B"
    text: "Missing [] after desk_list."
  - label: "C"
    text: "The return type should be int, not void."
  - label: "D"
    text: "The signature is fine — arrays decay to pointers in C++."

correctLabel: "A"

explanation: |
  Without &, the caller sees no writes. V2.0 hands you a 0/4 here. The fix: `desk_data &desk_list[]`.


stem: "The signature below is WRONG by V2.0 marking. Identify the exact bug."

code: |
  void read_desks(desk_data &desk_list, int number_to_read)

question: "Pick the option that correctly identifies what is missing or wrong."

options:
  - label: "A"
    text: "Missing [] after desk_list. The V2.0 form must be `desk_data &desk_list[]` so the parameter is the array (not a single struct)."
  - label: "B"
    text: "Missing & — & should be on the count parameter."
  - label: "C"
    text: "The first parameter is correct as a single desk_data."
  - label: "D"
    text: "Replace `int` with `size_t`."

correctLabel: "A"

explanation: |
  `&desk_list` (no []) is a single-struct reference, not an array. V2.0 reads N items, so the param must be `&desk_list[]`.


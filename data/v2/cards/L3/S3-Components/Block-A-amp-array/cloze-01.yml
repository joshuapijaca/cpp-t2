stem: "Fill in the symbol that makes the array parameter pass-by-reference."

code: |
  void read_desks(desk_data ___desk_list[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i = i + 1) {
      cin >> desk_list[i].name;
    }
  }

clozeSentence: "The single character that goes immediately before `desk_list[]` to pass the array by reference is ____."

answer: "&"

explanation: |
  & creates the reference. Without it, writes in `cin >> desk_list[i].name` are lost when the function returns.


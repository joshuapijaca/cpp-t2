stem: |-
  This Q3 read function fails to compile because a struct field access is malformed. Spot the bug.

  Code under review:
  void read_data(stat_double &data) {
    for (int i = 0; i < SIZE; i++) {
      cin >> data numbers[i];
    }
  }


  Which diagnosis describes the bug?
correct: missing `.` between struct and field
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: |
  Field access uses `.` (or `->` for pointers). `data numbers[i]` is two tokens with nothing between them.

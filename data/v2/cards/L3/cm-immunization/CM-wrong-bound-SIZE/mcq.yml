stem: |
  For a `SIZE=5` array, what is the correct loop bound?

correct: '`for (int i = 0; i < SIZE; i++)` — strictly less than'

distractors:
  - '`for (int i = 0; i <= SIZE; i++)` — inclusive of SIZE'
  - '`for (int i = 1; i <= SIZE; i++)` — start at 1'
  - '`for (int i = 0; i < SIZE - 1; i++)` — stop one early'

explanation: |
  Indices are 0..SIZE-1 (5 values). `<` (not `<=`) gives exactly SIZE iterations and never reaches the off-the-end index SIZE.


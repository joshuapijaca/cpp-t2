stem: |-
  This Q3 read loop runs ONE extra iteration past the array. Find and fix the bug.

  Code under review:
  for (int i = 0; i <= SIZE; i++) {
    cin >> data.numbers[i];
  }


  Which diagnosis describes the bug?
correct: off-by-one — used `<= SIZE`
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  Array indices run 0..SIZE-1. `i <= SIZE` writes into cell SIZE which doesn't exist. Use `i < SIZE` (strictly less
  than).

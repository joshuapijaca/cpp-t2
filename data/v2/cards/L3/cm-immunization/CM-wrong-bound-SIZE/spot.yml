schemaVersion: "v2"
atomId: "R-00"
qTags: ["Q3"]
stage: 4
level: "L3"
type: "FaultInjectionCard"

stem: |
  This Q3 read loop runs ONE extra iteration past the array. Find and fix the bug.

brokenCode: |
  for (int i = 0; i <= SIZE; i++) {
    cin >> data.numbers[i];
  }

bugLocations: [1]

fixedCode: |
  for (int i = 0; i < SIZE; i++) {
    cin >> data.numbers[i];
  }

bugCategory: 'off-by-one — used `<= SIZE`'

keyChecks:
  - 'i < SIZE'

explanation: |
  Array indices run 0..SIZE-1. `i <= SIZE` writes into cell SIZE which doesn't exist. Use `i < SIZE` (strictly less than).


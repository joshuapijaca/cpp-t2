stem: |
  You want exactly SIZE iterations of a 0-indexed loop. Which bound?

correct: '`i < SIZE` — strict less-than'

distractors:
  - '`i <= SIZE` — inclusive'
  - '`i < SIZE - 1` — stops one early'
  - '`i != SIZE + 1` — explicit'

explanation: |
  0..SIZE-1 is SIZE values. `<` gives that. `<=` gives SIZE+1 values (including a no-such-cell at index SIZE).


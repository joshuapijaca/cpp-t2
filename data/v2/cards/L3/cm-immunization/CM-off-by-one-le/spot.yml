stem: |-
  This Q3 read loop reads SIZE+1 values (one too many). Find and fix the bug.

  Code under review:
  for (int i = 0; i <= SIZE; i++) {
    cin >> data.numbers[i];
  }


  Which diagnosis describes the bug?
correct: off-by-one — `<=` instead of `<`
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: |
  `i <= SIZE` runs once for i=SIZE, which writes outside the array. Use `<` so the last iteration is i=SIZE-1.

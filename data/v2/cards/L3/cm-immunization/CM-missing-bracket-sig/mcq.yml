stem: |
  What surrounds the parameter list of a C++ function signature?

correct: 'Parentheses `( ... )`'

distractors:
  - 'Braces `{ ... }`'
  - 'Square brackets `[ ... ]`'
  - 'Angle brackets `< ... >`'

explanation: |
  Parens wrap params. Braces wrap the body, square brackets are for arrays/lambdas, angle for templates.


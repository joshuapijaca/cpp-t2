# Auto-emitted CM immunization (FaultInjectionCard) for CM-zero-instead-of-i
id: "L3-cmimm-CM-zero-instead-of-i-spot"
schemaVersion: "v2"
atomId: "R-00"
qTags: ["Q3"]
stage: 4
level: "L3"
type: "FaultInjectionCard"

stem: |
  This Q3 read function compiles, but every cell in `data.numbers` ends up as the LAST input. Find and fix the bug.

brokenCode: |
  void read_data(stat_double &data)
  {
    for (int i = 0; i < SIZE; i++) {
      cin >> data.numbers[0];
    }
  }

bugLocations: [3]

fixedCode: |
  void read_data(stat_double &data)
  {
    for (int i = 0; i < SIZE; i++) {
      cin >> data.numbers[i];
    }
  }

bugCategory: 'wrong index — `[0]` instead of `[i]`'

keyChecks:
  - 'data.numbers[i]'

explanation: |
  Inside the loop the index MUST be `i`, not `0`. With `[0]` every iteration overwrites cell 0 and cells 1..N-1 stay garbage. Replace `[0]` with `[i]`.


stem: |-
  This Q3 read function compiles, but every cell in `data.numbers` ends up as the LAST input. Find and fix the bug.

  Code under review:
  void read_data(stat_double &data)
  {
    for (int i = 0; i < SIZE; i++) {
      cin >> data.numbers[0];
    }
  }


  Which diagnosis describes the bug?
correct: wrong index — `[0]` instead of `[i]`
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  Inside the loop the index MUST be `i`, not `0`. With `[0]` every iteration overwrites cell 0 and cells 1..N-1 stay
  garbage. Replace `[0]` with `[i]`.

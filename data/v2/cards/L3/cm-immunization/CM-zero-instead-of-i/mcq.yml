stem: |
  You are inside a `for (int i = 0; i < SIZE; i++)` loop reading values. What index must you use to write into successive cells of `data.numbers`?

correct: '`data.numbers[i]` — the loop variable'

distractors:
  - '`data.numbers[0]` — always cell zero'
  - '`data.numbers[SIZE]` — last cell'
  - '`data.numbers[1]` — second cell'

explanation: |
  The loop variable `i` advances 0,1,2,...,SIZE-1. Using `[i]` distributes the inputs across all cells. `[0]` overwrites cell 0 N times.


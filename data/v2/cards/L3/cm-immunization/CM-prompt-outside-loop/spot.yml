stem: |-
  This Q3 read function prompts the user only ONCE for N values. Spot the bug.

  Code under review:
  void read_data(stat_double &data)
  {
    cout << "Enter value: ";
    for (int i = 0; i < SIZE; i++) {
      cin >> data.numbers[i];
    }
  }


  Which diagnosis describes the bug?
correct: prompt outside loop — only printed once
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  The prompt belongs INSIDE the loop, before each cin. Moving the cout out shows the prompt once but reads SIZE values
  silently.

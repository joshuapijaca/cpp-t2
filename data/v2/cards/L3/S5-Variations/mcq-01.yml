stem: |
  In a Q3 read variation, which line correctly reads the `width`
  field of the i-th element of an array of `desk_data`?
correct: "cin >> desks[i].width;"
distractors:
  - "cin >> desks.width;"
  - "cin >> desks[i]->width;"
  - "cin >> width[i];"
explanation: |
  `desks` is an array; `desks[i]` is the i-th struct; `.width`
  reaches into that struct's field. Distractor 1 omits the index
  (CM-Q3-missing-index). Distractor 2 uses `->`, which is for
  pointers — `desks[i]` is a struct value/reference. Distractor 3
  treats width as a free variable.
notes: "MCQ form for QA-M10 type-diversity (R-04 was FunctionWriteCard only)."

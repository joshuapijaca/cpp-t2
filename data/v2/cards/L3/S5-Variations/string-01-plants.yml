canonicalAnswer: |
  void read_plants(plant_data &plants[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Name: ";
      cin >> plants[i].name;
      cout << "Height (cm): ";
      cin >> plants[i].height_cm;
      cout << "Leaves: ";
      cin >> plants[i].leaves;
    }
  }
keyChecks:
  - "cin >> plants[i].name;"

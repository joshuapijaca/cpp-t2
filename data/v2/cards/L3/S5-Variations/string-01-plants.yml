  Variation: plants with a string 'name' as the first field.
  cin >> works for whitespace-delimited string tokens.
prompt: string-field variant
canonicalAnswer: |
  void read_plants(plant_data &plants[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cin >> plants[i].name;
      cin >> plants[i].height_cm;
      cin >> plants[i].leaves;
    }
  }
keyChecks:
  - cin >> plants[i].name;
forbiddenTokens:
  - while
  - getline
explanation: |
  cin >> reads up to first whitespace into the string. No getline required for single-token names.

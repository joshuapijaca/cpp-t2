      cout << "Engine litres: ";
      cin >> cars[i].engine_l;
      cout << "Doors: ";
      cin >> cars[i].doors;
      cout << "Mileage (km): ";
      cin >> cars[i].mileage;
      cout << "Extra: ";
      cin >> cars[i].extra;
    }
  }

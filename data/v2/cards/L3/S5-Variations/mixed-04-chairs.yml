  void read_chairs(chair_data &chairs[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cin >> chairs[i].height_cm;
      cin >> chairs[i].legs;
      cin >> chairs[i].weight_kg;
    }
  }

  void read_fridges(fridge_data &fridges[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cin >> fridges[i].volume_l;
      cin >> fridges[i].shelves;
      cin >> fridges[i].price;
    }
  }

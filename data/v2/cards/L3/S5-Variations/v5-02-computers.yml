      cout << "CPU speed (GHz): ";
      cin >> computers[i].cpu_speed;
      cout << "RAM (GB): ";
      cin >> computers[i].ram_gb;
      cout << "Price ($): ";
      cin >> computers[i].price;
      cout << "Extra1: ";
      cin >> computers[i].extra1;
      cout << "Extra2: ";
      cin >> computers[i].extra2;
    }
  }

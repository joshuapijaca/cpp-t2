      cout << "CPU speed (GHz): ";
      cin >> laptops[i].cpu_speed;
      cout << "RAM (GB): ";
      cin >> laptops[i].ram_gb;
      cout << "Price: ";
      cin >> laptops[i].price;
    }
  }

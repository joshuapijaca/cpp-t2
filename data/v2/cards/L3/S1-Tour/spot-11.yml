  Inside the read_desks loop, one line below is buggy. Pick the buggy form.
correct: "for (int i = 1; i <= number_to_read; i++)"
distractors:
  - "for (int i = 0; i < number_to_read; i++)"
  - "for (int i = 0; i <= number_to_read; i++)"
  - "for (int i = 1; i < number_to_read; i++)"
explanation: |
  Both off-by-one bugs at once: starts at 1 (skips index 0) AND exits at <= (overruns by 1). Correct form: for (int i = 0; i < number_to_read; i++)

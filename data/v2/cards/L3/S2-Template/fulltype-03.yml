stem: |
  Type the full read_books function from memory. 3 fields:
  int pages, double price, double rating.
prompt: "Full read_books from skeleton."
signatureHint: "void read_books(book_data &books[], int number_to_read) { ... }"
canonicalAnswer: |
  void read_books(book_data &books[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Pages: ";
      cin >> books[i].pages;
      cout << "Price: ";
      cin >> books[i].price;
      cout << "Rating: ";
      cin >> books[i].rating;
    }
  }

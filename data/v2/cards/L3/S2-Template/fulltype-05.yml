canonicalAnswer: |
  void read_phones(phone_data &phones[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "Storage (GB): ";
      cin >> phones[i].storage_gb;
      cout << "Battery (mAh): ";
      cin >> phones[i].battery_mah;
      cout << "Price: ";
      cin >> phones[i].price;
    }
  }

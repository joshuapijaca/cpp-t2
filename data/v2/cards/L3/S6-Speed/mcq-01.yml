stem: |
  Under speed conditions, which signature for the Q3 read function
  is correct?
correct: "void read_desks(desk_data &desks[], int number_to_read)"
distractors:
  - "void read_desks(desk_data desks[], int number_to_read)"
  - "desk_data read_desks(int number_to_read)"
  - "void read_desks(desk_data &desks, int number_to_read)"
explanation: |
  Q3 follows the Deakin convention: array-of-struct passed by
  reference is written `desk_data &desks[]`. Distractor 1 omits
  the `&` (CM-Q3-missing-amp); the function would still see the
  same storage in practice (decay) but the rubric requires the `&`.
  Distractor 2 returns a value rather than mutating in place.
  Distractor 3 drops the `[]`; that signature takes a single struct.
notes: "MCQ form for QA-M10 type-diversity (R-05 was SpeedDrillCard only)."

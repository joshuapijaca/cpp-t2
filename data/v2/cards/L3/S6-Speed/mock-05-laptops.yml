  void read_laptops(laptop_data &laptops[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "CPU speed (GHz): ";
      cin >> laptops[i].cpu_speed;
      cout << "RAM (GB): ";
      cin >> laptops[i].ram_gb;
      cout << "Price: ";
      cin >> laptops[i].price;
    }
  }

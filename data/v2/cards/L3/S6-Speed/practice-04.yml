  void read_computers(computer_data &computers[], int number_to_read)
  {
    for (int i = 0; i < number_to_read; i++)
    {
      cout << "CPU speed (GHz): ";
      cin >> computers[i].cpu_speed;
      cout << "RAM (GB): ";
      cin >> computers[i].ram_gb;
      cout << "Price ($): ";
      cin >> computers[i].price;
    }
  }

      cout << "Age (yrs): ";
      cin >> dogs[i].age_yrs;
      cout << "Weight (kg): ";
      cin >> dogs[i].weight_kg;
      cout << "Vet visits: ";
      cin >> dogs[i].visits;
    }
  }

stage: 5
level: L2
type: StructWriteCard
stem: 'Q2 array-field peek #2. A struct can hold a fixed-size array as one of its fields, written `type name[SIZE];`.'
prompt: 'lab_data for an extended desk lab: an array of `desk_ids[SIZE]` ints plus the room_id int.'
canonicalAnswer: |
  struct lab_data
  {
      int desk_ids[SIZE];
      int room_id;
  };
requiredFields:
  - desk_ids
  - room_id
keyChecks:
  - struct lab_data
  - '};'
  - '['
forbiddenTokens:
  - class
  - Struct
  - STRUCT
  - typedef
  - '*'
  - '->'
explanation: >-
  Q1 uses an array-field struct (`stat_double { double numbers[SIZE]; double mystery; }`). The pattern: `type
  field_name[SIZE];`.

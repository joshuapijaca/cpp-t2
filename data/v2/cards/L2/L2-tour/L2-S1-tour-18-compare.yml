stem: |-
  Q2 Tour compare #18. Two struct definitions side by side. Identify the meaningful difference.

  --- A ---
  struct order_data
  {
      int order_id
      double total;
      bool paid;
  };


  --- B ---
  struct order_data
  {
      int order_id;
      double total;
      bool paid;
  };


  Find the missing token in version A. Write the corrected code.
correct: |-
  struct order_data
  {
      int order_id;
      double total;
      bool paid;
  };
distractors:
  - A compiles; B does not
  - Both compile
  - Neither compiles
explanation: >-
  Version A is missing the `;` after `int order_id`. Every C++ statement ends with `;`; field declarations inside a
  struct are no exception.

stem: |-
  Q2 Tour compare #17. Two struct definitions side by side. Identify the meaningful difference.

  --- A ---
  struct computer_data
  {
      int id;
      string description;
      string location;
  };


  --- B ---
  struct Computer_Data
  {
      int id;
      string description;
      string location;
  };


  Both compile. Which one matches SIT102 style? Write the SIT102-style version.
correct: |-
  struct computer_data
  {
      int id;
      string description;
      string location;
  };
distractors:
  - A compiles; B does not
  - Both compile
  - Neither compiles
explanation: >-
  C++ allows both forms. SIT102 grades on style: snake_case names like `computer_data` are correct. Version A is the
  styled answer.

code: |
  struct computer_data
  {
      int id;
      string description;
      string location;
  };
question: What single character ends the struct definition (after the closing brace)?
options:
  - label: A
    text: '`.`'
  - label: B
    text: '`,`'
  - label: C
    text: '`;`'
  - label: D
    text: nothing — `}` alone is enough
correctLabel: C
explanation: >-
  A struct definition is a statement; like every C++ statement it terminates with `;` AFTER the closing `}`. This is the
  most-missed token on Q2.

stem: |-
  Q2 Tour compare #16. Two struct definitions side by side. Identify the meaningful difference.

  --- A ---
  struct desk_data
  {
      int room_id;
      int d_id;
      int number_of_screens;
  }


  --- B ---
  struct desk_data
  {
      int room_id;
      int d_id;
      int number_of_screens;
  };


  Which version compiles? What is the single-character difference? Write the corrected code.
correct: |-
  struct desk_data
  {
      int room_id;
      int d_id;
      int number_of_screens;
  };
distractors:
  - A compiles; B does not
  - Both compile
  - Neither compiles
explanation: >-
  Version B has the closing `;` after `}`. Version A is a compile error: `expected ';' after struct definition`. The
  trailing `;` after the closing brace is the highest-frequency Q2 error.

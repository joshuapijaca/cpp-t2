stem: >-
  Q2 Tour spot-error #10. The struct below has a single bug: two fields on one line. Identify what's wrong and write the
  fixed version.


  Code under review:

  struct house_data

  {
      string address; int bedrooms;
      double price;
  };



  Which diagnosis describes the bug?
correct: two fields on one line
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: One field per line is SIT102 style for Q2. The compiler accepts the dense form, but the rubric does not.

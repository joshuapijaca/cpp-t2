stem: |-
  This Q2 struct keyword is capitalised. Why won't it compile?

  Code under review:
  Struct stat_double {
    double numbers[SIZE];
    double mystery;
  };


  Which diagnosis describes the bug?
correct: wrong-case keyword (`Struct` not `struct`)
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: |
  C++ keywords are lowercase. `Struct` (capital S) isn't a keyword — the compiler sees an undefined identifier.

stem: |
  Which of these CANNOT be used as a struct field name in C++?

correct: '`class` — it is a reserved keyword'

distractors:
  - '`category` — looks like a keyword but isn''t'
  - '`numbers` — already used by std lib'
  - '`data1` — starts with a letter then digit'

explanation: |
  Reserved words (`class`, `int`, `for`, `return`, ...) cannot be identifiers. `category` and `data1` are fine.


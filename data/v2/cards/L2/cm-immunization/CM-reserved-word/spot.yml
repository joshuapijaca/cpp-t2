stem: |-
  This Q2 struct field name will not compile. What's wrong?

  Code under review:
  struct point {
    double class;
    double y;
  };


  Which diagnosis describes the bug?
correct: reserved word used as identifier
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: |
  `class` is a C++ keyword and can't be a field name. Pick a non-reserved name (e.g. `category`, `kind`).

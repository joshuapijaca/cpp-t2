stem: |
  In a `stat_double` struct that must hold real-valued inputs, what type must the `numbers` array use?

correct: '`double` — matches the struct name and decimal inputs'

distractors:
  - '`int` — works because numbers are whole most of the time'
  - '`float` — uses less memory than double'
  - '`string` — keeps the digits exact'

explanation: |
  The struct name `stat_double` is a hint: every numeric field is `double`. `int` truncates fractional parts and fails the rubric on any non-integer input.


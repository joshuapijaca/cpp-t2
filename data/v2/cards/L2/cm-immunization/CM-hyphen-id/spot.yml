stem: |-
  This Q2 struct field has a hyphen in its name. Why won't it compile?

  Code under review:
  struct stat_double {
    double max-value;
    double mystery;
  };


  Which diagnosis describes the bug?
correct: hyphen in identifier (not allowed)
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  C++ identifiers may use letters, digits, and `_`. Hyphen `-` is the subtraction operator, not a name char. Use `_`
  instead.

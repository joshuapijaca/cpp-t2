id: L2-S3-order-06
schemaVersion: v2
atomId: L-23b
qTags:
  - Q2
stage: 3
level: L2
type: StructWriteCard
stem: >-
  Q2 multi-field ordering #6. Write a struct with fields appearing in the exact order given in the prompt. Field-order
  discipline supports later Q3 read-loop and Q4 print-loop sequencing.
prompt: 'Write `house_data` IN THIS ORDER: address (string), bedrooms (int), price (double).'
canonicalAnswer: |
  struct house_data
  {
      string address;
      int bedrooms;
      double price;
  };
requiredFields:
  - address
  - bedrooms
  - price
keyChecks:
  - struct house_data
  - '};'
  - string address;
  - int bedrooms;
  - double price;
forbiddenTokens:
  - class
  - Struct
  - STRUCT
  - typedef
  - '*'
  - '->'
explanation: 3 fields, listed top-to-bottom in the prompt order. Each field on its own line, each ending `;`, closing `};`.

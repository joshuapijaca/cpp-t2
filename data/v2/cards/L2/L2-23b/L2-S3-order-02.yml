id: L2-S3-order-02
schemaVersion: v2
atomId: L-23b
qTags:
  - Q2
stage: 3
level: L2
type: StructWriteCard
stem: >-
  Q2 multi-field ordering #2. Write a struct with fields appearing in the exact order given in the prompt. Field-order
  discipline supports later Q3 read-loop and Q4 print-loop sequencing.
prompt: 'Write `computer_data` with fields IN THIS ORDER: id (int), description (string), location (string).'
canonicalAnswer: |
  struct computer_data
  {
      int id;
      string description;
      string location;
  };
requiredFields:
  - id
  - description
  - location
keyChecks:
  - struct computer_data
  - '};'
  - int id;
  - string description;
  - string location;
forbiddenTokens:
  - class
  - Struct
  - STRUCT
  - typedef
  - '*'
  - '->'
explanation: 3 fields, listed top-to-bottom in the prompt order. Each field on its own line, each ending `;`, closing `};`.

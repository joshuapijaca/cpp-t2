stage: 3
level: L2
type: StructWriteCard
stem: >-
  Q2 multi-field ordering #10. Write a struct with fields appearing in the exact order given in the prompt. Field-order
  discipline supports later Q3 read-loop and Q4 print-loop sequencing.
prompt: 'Write `room_data` IN THIS ORDER: room_id (int), capacity (int), has_projector (bool).'
canonicalAnswer: |
  struct room_data
  {
      int room_id;
      int capacity;
      bool has_projector;
  };
requiredFields:
  - room_id
  - capacity
  - has_projector
keyChecks:
  - struct room_data
  - '};'
  - int room_id;
  - int capacity;
  - bool has_projector;
forbiddenTokens:
  - class
  - Struct
  - STRUCT
  - typedef
  - '*'
  - '->'
explanation: 3 fields, listed top-to-bottom in the prompt order. Each field on its own line, each ending `;`, closing `};`.

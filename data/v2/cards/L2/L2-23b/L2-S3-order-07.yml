id: L2-S3-order-07
schemaVersion: v2
atomId: L-23b
qTags:
  - Q2
stage: 3
level: L2
type: StructWriteCard
stem: >-
  Q2 multi-field ordering #7. Write a struct with fields appearing in the exact order given in the prompt. Field-order
  discipline supports later Q3 read-loop and Q4 print-loop sequencing.
prompt: 'Write `recipe_data` IN THIS ORDER: name (string), servings (int), prep_time (int).'
canonicalAnswer: |
  struct recipe_data
  {
      string name;
      int servings;
      int prep_time;
  };
requiredFields:
  - name
  - servings
  - prep_time
keyChecks:
  - struct recipe_data
  - '};'
  - string name;
  - int servings;
  - int prep_time;
forbiddenTokens:
  - class
  - Struct
  - STRUCT
  - typedef
  - '*'
  - '->'
explanation: 3 fields, listed top-to-bottom in the prompt order. Each field on its own line, each ending `;`, closing `};`.

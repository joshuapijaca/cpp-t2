stem: |
  In a Q2 speed-write of a struct, which token is most often missed
  under time pressure and costs marks?
correct: "The trailing `};` after the closing brace of the struct."
distractors:
  - "The opening `struct` keyword."
  - "The `int` and `double` type names of the fields."
  - "Indentation of the field list."
explanation: |
  Under the 30-second clock, students reliably remember the body
  but drop the closing `};` (CM-F20d). The trailing `;` is required
  by C++ grammar; without it the next declaration becomes a syntax
  error. Type the closing `};` first, then fill the body inside.
  Distractor 4 (indentation) is graded as a style defect (L-23c)
  but is less catastrophic than missing `};`.
notes: "MCQ form for QA-M10 type-diversity (L-26 was SpeedDrillCard only)."

stem: 'Q2 identifier rules drill #26. Which is a legal identifier for the origin field?'
code: |
  struct flight_data
  {
      string flight_no;
      string origin;
      string destination;
  };
question: Which is a legal identifier for the origin field?
options:
  - label: A
    text: '`1st_origin`'
  - label: B
    text: '`origin`'
  - label: C
    text: '`Origin`'
  - label: D
    text: '`origin!`'
correctLabel: C
explanation: Identifiers cannot start with a digit and cannot contain `!`. Lowercase `origin` is SIT102-styled.

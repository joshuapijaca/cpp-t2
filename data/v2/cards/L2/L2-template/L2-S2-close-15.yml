stem: |-
  Q2 closing-`};` drill #15. book_data missing the closing `;`. Add the missing terminator and write the fix.

  Code under review:
  struct book_data
  {
      string title;
      string author;
      int pages;
  }


  Which diagnosis describes the bug?
correct: missing ; after closing }
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >-
  The closing brace of a struct definition MUST be followed by a semicolon. `}` alone is a compile error and the most
  expensive Q2 mistake on the SIT102 test.

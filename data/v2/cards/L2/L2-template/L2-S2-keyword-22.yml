stem: |-
  Q2 `struct` keyword drill #22. The keyword must be lowercase; the type is not a class.

  Code under review:
  typedef student_data
  {
      int student_id;
      string full_name;
      double gpa;
  };


  Which diagnosis describes the bug?
correct: wrong keyword (typedef instead of struct)
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >-
  C++ is case-sensitive: only `struct` (lowercase) is a valid keyword. `Struct`, `STRUCT`, and `class` are all wrong on
  Q2.

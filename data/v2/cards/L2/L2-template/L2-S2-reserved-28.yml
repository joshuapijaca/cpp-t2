stem: >-
  Q2 reserved-word ban drill #28. The field name `class` is a C++ keyword and cannot be used as an identifier. Choose a
  non-reserved alternative.


  Code under review:

  struct car_data

  {
      int class;
      string make;
  };



  Which diagnosis describes the bug?
correct: reserved word as field name
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >-
  `class` is a C++ reserved word. Field names must be non-reserved snake_case identifiers. `category` works because it
  is not a keyword.

stem: |
  SIT102 Q2 grades the formatting of your struct, not just whether
  it compiles. Which option lists the four required spacing rules?

correct: "One field per line, 4-space indent inside braces, single space between type and field name, closing `};` on its own line."

distractors:
  - "All fields on one line, tab-indent, no space between type and name, `};` flush against last field."
  - "One field per line, no indent, double-space between type and name, closing `}` without semicolon."
  - "Rules are not graded — any compiling struct earns full marks."

explanation: |
  SIT102 Q2 marking penalises layout defects even when the struct
  compiles. The required rules: one field per line, 4-space indent,
  one space between type and name, `};` on its own line.
  Distractor 3 (CM-Q2-twofields style ignorance) is the most
  dangerous misconception — students assume compilation is enough.


stem: >-
  Q2 spacing drill #2. The struct compiles but its layout is wrong by SIT102 style: fields not indented (no 4-space
  indent inside braces). One field per line, 4-space indent inside braces.


  Code under review:

  struct desk_data

  {

  int room_id;

  int d_id;

  int number_of_screens;

  };



  Which diagnosis describes the bug?
correct: fields not indented (no 4-space indent inside braces)
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: SIT102 Q2 expects one field per line. Two-fields-on-one-line is graded as a defect even though it compiles.

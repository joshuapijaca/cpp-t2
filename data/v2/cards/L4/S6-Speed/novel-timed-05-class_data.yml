canonicalAnswer: |
  int main()
  {
      const int MAX = 30;
      class_data classes[MAX];
      int class_num;
  
      cout << "How many classes? ";
      cin >> class_num;
  
      read_classes(classes, class_num);
  
      for (int i = 0; i < class_num; i++)
      {
          cout << classes[i].code << ", ";
          cout << classes[i].topic << ", ";
          cout << classes[i].size << endl;
      }
  
      return 0;
  }

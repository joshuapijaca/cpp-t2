canonicalAnswer: |
  int main()
  {
      const int MAX = 100;
      recipe_data recipes[MAX];
      int recipe_num;
  
      cout << "How many recipes? ";
      cin >> recipe_num;
  
      read_recipes(recipes, recipe_num);
  
      for (int i = 0; i < recipe_num; i++)
      {
          cout << recipes[i].name << ", ";
          cout << recipes[i].cuisine << ", ";
          cout << recipes[i].time << endl;
      }
  
      return 0;
  }

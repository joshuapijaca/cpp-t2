canonicalAnswer: |
  int main()
  {
      const int MAX = 50;
      idea_data ideas[MAX];
      int idea_num;
  
      cout << "How many ideas? ";
      cin >> idea_num;
  
      read_ideas(ideas, idea_num);
  
      for (int i = 0; i < idea_num; i++)
      {
          cout << ideas[i].title << ", ";
          cout << ideas[i].category << ", ";
          cout << ideas[i].rating << endl;
      }
  
      return 0;
  }

canonicalAnswer: |
  int main()
  {
      const int MAX = 200;
      task_data tasks[MAX];
      int task_num;
  
      cout << "How many tasks? ";
      cin >> task_num;
  
      read_tasks(tasks, task_num);
  
      for (int i = 0; i < task_num; i++)
      {
          cout << tasks[i].id << ", ";
          cout << tasks[i].title << ", ";
          cout << tasks[i].priority << endl;
      }
  
      return 0;
  }

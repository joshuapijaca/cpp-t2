  int main()
  {
      const int MAX = 500;
      song_data songs[MAX];
      int song_num;
  
      cout << "How many songs? ";
      cin >> song_num;
  
      read_songs(songs, song_num);
  
      for (int i = 0; i < song_num; i++)
      {
          cout << songs[i].title << ", ";
          cout << songs[i].artist << ", ";
          cout << songs[i].length << endl;
      }
  
      return 0;
  }

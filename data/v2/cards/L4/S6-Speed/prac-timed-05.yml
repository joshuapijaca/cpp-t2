prompt: >-
  Write the practice main(): const MAX=100, computer_data, computer_num, prompt+cin, read_computers call, print 3
  fields, return 0.
canonicalAnswer: |
  int main()
  {
      const int MAX = 100;
      computer_data computers[MAX];
      int computer_num;

      cout << "How many computers? ";
      cin >> computer_num;

      read_computers(computers, computer_num);

      for (int i = 0; i < computer_num; i++)
      {
          cout << computers[i].id << ", ";
          cout << computers[i].description << ", ";
          cout << computers[i].location << endl;
      }

      return 0;
  }

canonicalAnswer: |
  int main()
  {
      const int MAX = 80;
      menu_data menus[MAX];
      int menu_num;

      cout << "How many menus? ";
      cin >> menu_num;

      read_menus(menus, menu_num);

      for (int i = 0; i < menu_num; i++)
      {
          cout << menus[i].name << ", ";
          cout << menus[i].price << ", ";
          cout << menus[i].rating << endl;
      }

      return 0;
  }

prompt: 'photo_data: MAX=1000, count=photo_num, fn=read_photos, fields=id, date, rating, prompt="How many photos?".'
canonicalAnswer: |
  int main()
  {
      const int MAX = 1000;
      photo_data photos[MAX];
      int photo_num;

      cout << "How many photos? ";
      cin >> photo_num;

      read_photos(photos, photo_num);

      for (int i = 0; i < photo_num; i++)
      {
          cout << photos[i].id << ", ";
          cout << photos[i].date << ", ";
          cout << photos[i].rating << endl;
      }

      return 0;
  }

  - {questionNumber: "Q2", prompt: "Write the computer_data struct (3 fields).", canonicalAnswer: "struct computer_data\n{\n    int id;\n    int description;\n    int location;\n};"}
  - {questionNumber: "Q3", prompt: "Write the read_computers function.", canonicalAnswer: "void read_computers(computer_data computers[], int &count)\n{\n    cout << \"How many computers? \";\n    cin >> count;\n    for (int i = 0; i < count; i++)\n    {\n        cin >> computers[i].id;\n        cin >> computers[i].description;\n        cin >> computers[i].location;\n    }\n}"}
  - {questionNumber: "Q4", prompt: "Write the main() that calls read_computers and prints all rows.", canonicalAnswer: "int main()\n{\n    const int MAX = 100;\n    computer_data computers[MAX];\n    int computer_num;\n\n    cout << \"How many computers? \";\n    cin >> computer_num;\n\n    read_computers(computers, computer_num);\n\n    for (int i = 0; i < computer_num; i++)\n    {\n        cout << computers[i].id << \", \";\n        cout << computers[i].description << \", \";\n        cout << computers[i].location << endl;\n    }\n\n    return 0;\n}"}

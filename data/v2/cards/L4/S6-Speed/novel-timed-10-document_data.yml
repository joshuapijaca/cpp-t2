canonicalAnswer: |
  int main()
  {
      const int MAX = 200;
      document_data documents[MAX];
      int doc_num;
  
      cout << "How many documents? ";
      cin >> doc_num;
  
      read_documents(documents, doc_num);
  
      for (int i = 0; i < doc_num; i++)
      {
          cout << documents[i].title << ", ";
          cout << documents[i].author << ", ";
          cout << documents[i].pages << endl;
      }
  
      return 0;
  }

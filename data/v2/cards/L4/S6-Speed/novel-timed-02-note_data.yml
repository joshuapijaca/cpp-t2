canonicalAnswer: |
  int main()
  {
      const int MAX = 100;
      note_data notes[MAX];
      int note_num;
  
      cout << "How many notes? ";
      cin >> note_num;
  
      read_notes(notes, note_num);
  
      for (int i = 0; i < note_num; i++)
      {
          cout << notes[i].id << ", ";
          cout << notes[i].subject << ", ";
          cout << notes[i].date << endl;
      }
  
      return 0;
  }

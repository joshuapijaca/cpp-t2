  - {questionNumber: "Q2", prompt: "Write the book_data struct (3 fields).", canonicalAnswer: "struct book_data\n{\n    string title;\n    string author;\n    int pages;\n};"}
  - {questionNumber: "Q3", prompt: "Write the read_books function.", canonicalAnswer: "void read_books(book_data books[], int &count)\n{\n    cout << \"How many books? \";\n    cin >> count;\n    for (int i = 0; i < count; i++)\n    {\n        cin >> books[i].title;\n        cin >> books[i].author;\n        cin >> books[i].pages;\n    }\n}"}
  - {questionNumber: "Q4", prompt: "Write the main() that calls read_books and prints all rows.", canonicalAnswer: "int main()\n{\n    const int MAX = 200;\n    book_data books[MAX];\n    int book_num;\n\n    cout << \"How many books? \";\n    cin >> book_num;\n\n    read_books(books, book_num);\n\n    for (int i = 0; i < book_num; i++)\n    {\n        cout << books[i].title << \", \";\n        cout << books[i].author << \", \";\n        cout << books[i].pages << endl;\n    }\n\n    return 0;\n}"}
explanation: "Test-day chain simulator. Splitting Q2+Q3+Q4 over 8 min mirrors actual exam pacing minus Q1."

prompt: "Write a full main() for flight_data. const MAX = 800; count_var = flight_count; fn = read_flights; fields = number, origin, destination; prompt = \"How many flights?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 800;
      flight_data flights[MAX];
      int flight_count;
  
      cout << "How many flights? ";
      cin >> flight_count;
  
      read_flights(flights, flight_count);
  
      for (int i = 0; i < flight_count; i++)
      {
          cout << flights[i].number << ", ";
          cout << flights[i].origin << ", ";
          cout << flights[i].destination << endl;
      }
  
      return 0;
  }

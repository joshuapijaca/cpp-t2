prompt: "Write a full main() for product_data. const MAX = 500; count_var = product_count; fn = read_products; fields = id, name, price; prompt = \"How many products?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 500;
      product_data products[MAX];
      int product_count;
  
      cout << "How many products? ";
      cin >> product_count;
  
      read_products(products, product_count);
  
      for (int i = 0; i < product_count; i++)
      {
          cout << products[i].id << ", ";
          cout << products[i].name << ", ";
          cout << products[i].price << endl;
      }
  
      return 0;
  }

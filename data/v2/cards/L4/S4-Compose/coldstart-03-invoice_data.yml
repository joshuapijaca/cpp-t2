prompt: |
  Entity name: invoice_data. Write all 3 questions:
  Q2 — struct definition with fields
  Q3 — read fn signature + body that fills the array
  Q4 — main() that calls the read fn and prints all rows.
  
  Suggested fields: id, amount, date with types int, double, string. MAX = 500. count_var = inv_count. fn = read_invoices. prompt = "How many invoices?".
canonicalAnswer: |
  // Q2: struct
  struct invoice_data
  {
      int id;
      double amount;
      string date;
  };
  
  // Q3: read fn
  void read_invoices(invoice_data &invoices[], int &count)
  {
      cout << "How many invoices? ";
      cin >> count;
      for (int i = 0; i < count; i++)
      {
          cin >> invoices[i].id;
          cin >> invoices[i].amount;
          cin >> invoices[i].date;
      }
  }
  
  // Q4: main
  int main()
  {
      const int MAX = 500;
      invoice_data invoices[MAX];
      int inv_count;
  
      cout << "How many invoices? ";
      cin >> inv_count;
  
      read_invoices(invoices, inv_count);
  
      for (int i = 0; i < inv_count; i++)
      {
          cout << invoices[i].id << ", ";
          cout << invoices[i].amount << ", ";
          cout << invoices[i].date << endl;
      }
  
      return 0;
  }

prompt: "Write a full main() for car_data. const MAX = 100; count_var = car_num; fn = read_cars; fields = model, year, price; prompt = \"How many cars?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 100;
      car_data cars[MAX];
      int car_num;
  
      cout << "How many cars? ";
      cin >> car_num;
  
      read_cars(cars, car_num);
  
      for (int i = 0; i < car_num; i++)
      {
          cout << cars[i].model << ", ";
          cout << cars[i].year << ", ";
          cout << cars[i].price << endl;
      }
  
      return 0;
  }

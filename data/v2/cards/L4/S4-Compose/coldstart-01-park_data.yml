prompt: |
  Entity name: park_data. Write all 3 questions:
  Q2 — struct definition with fields
  Q3 — read fn signature + body that fills the array
  Q4 — main() that calls the read fn and prints all rows.
  
  Suggested fields: name, area, visitors with types string, double, int. MAX = 100. count_var = park_num. fn = read_parks. prompt = "How many parks?".
canonicalAnswer: |
  // Q2: struct
  struct park_data
  {
      string name;
      double area;
      int visitors;
  };
  
  // Q3: read fn
  void read_parks(park_data parks[], int &count)
  {
      cout << "How many parks? ";
      cin >> count;
      for (int i = 0; i < count; i++)
      {
          cin >> parks[i].name;
          cin >> parks[i].area;
          cin >> parks[i].visitors;
      }
  }
  
  // Q4: main
  int main()
  {
      const int MAX = 100;
      park_data parks[MAX];
      int park_num;
  
      cout << "How many parks? ";
      cin >> park_num;
  
      read_parks(parks, park_num);
  
      for (int i = 0; i < park_num; i++)
      {
          cout << parks[i].name << ", ";
          cout << parks[i].area << ", ";
          cout << parks[i].visitors << endl;
      }
  
      return 0;
  }

prompt: "Write a full main() for song_data. const MAX = 1000; count_var = song_num; fn = read_songs; fields = title, artist, length; prompt = \"How many songs?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 1000;
      song_data songs[MAX];
      int song_num;
  
      cout << "How many songs? ";
      cin >> song_num;
  
      read_songs(songs, song_num);
  
      for (int i = 0; i < song_num; i++)
      {
          cout << songs[i].title << ", ";
          cout << songs[i].artist << ", ";
          cout << songs[i].length << endl;
      }
  
      return 0;
  }

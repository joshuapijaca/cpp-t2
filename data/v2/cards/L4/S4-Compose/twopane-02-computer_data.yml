prompt: |
  LEFT PANE (given):
  struct computer_data
  {
      int id;
      string description;
      string location;
  };
  
  void read_computers(computer_data computers[], int &count);
  
  RIGHT PANE (write): the full main() that calls read_computers and prints all 3 fields per row. MAX = 100; count = computer_num; prompt = "How many computers?".
canonicalAnswer: |
  int main()
  {
      const int MAX = 100;
      computer_data computers[MAX];
      int computer_num;
  
      cout << "How many computers? ";
      cin >> computer_num;
  
      read_computers(computers, computer_num);
  
      for (int i = 0; i < computer_num; i++)
      {
          cout << computers[i].id << ", ";
          cout << computers[i].description << ", ";
          cout << computers[i].location << endl;
      }
  
      return 0;
  }

prompt: |
  LEFT PANE (given):
  struct student_data
  {
      int id;
      string name;
      double grade;
  };
  
  void read_students(student_data students[], int &count);
  
  RIGHT PANE (write): the full main() that calls read_students and prints all 3 fields per row. MAX = 300; count = s_count; prompt = "How many students?".
canonicalAnswer: |
  int main()
  {
      const int MAX = 300;
      student_data students[MAX];
      int s_count;
  
      cout << "How many students? ";
      cin >> s_count;
  
      read_students(students, s_count);
  
      for (int i = 0; i < s_count; i++)
      {
          cout << students[i].id << ", ";
          cout << students[i].name << ", ";
          cout << students[i].grade << endl;
      }
  
      return 0;
  }

prompt: "Write a full main() for house_data. const MAX = 300; count_var = house_num; fn = read_houses; fields = address, bedrooms, price; prompt = \"How many houses?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 300;
      house_data houses[MAX];
      int house_num;
  
      cout << "How many houses? ";
      cin >> house_num;
  
      read_houses(houses, house_num);
  
      for (int i = 0; i < house_num; i++)
      {
          cout << houses[i].address << ", ";
          cout << houses[i].bedrooms << ", ";
          cout << houses[i].price << endl;
      }
  
      return 0;
  }

prompt: "Write a full main() for event_data. const MAX = 250; count_var = event_num; fn = read_events; fields = name, date, attendance; prompt = \"How many events?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 250;
      event_data events[MAX];
      int event_num;
  
      cout << "How many events? ";
      cin >> event_num;
  
      read_events(events, event_num);
  
      for (int i = 0; i < event_num; i++)
      {
          cout << events[i].name << ", ";
          cout << events[i].date << ", ";
          cout << events[i].attendance << endl;
      }
  
      return 0;
  }

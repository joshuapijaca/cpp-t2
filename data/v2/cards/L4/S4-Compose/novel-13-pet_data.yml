prompt: "Write a full main() for pet_data. const MAX = 100; count_var = pet_num; fn = read_pets; fields = name, species, age; prompt = \"How many pets?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 100;
      pet_data pets[MAX];
      int pet_num;
  
      cout << "How many pets? ";
      cin >> pet_num;
  
      read_pets(pets, pet_num);
  
      for (int i = 0; i < pet_num; i++)
      {
          cout << pets[i].name << ", ";
          cout << pets[i].species << ", ";
          cout << pets[i].age << endl;
      }
  
      return 0;
  }

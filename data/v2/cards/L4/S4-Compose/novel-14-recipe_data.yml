prompt: "Write a full main() for recipe_data. const MAX = 200; count_var = recipe_count; fn = read_recipes; fields = name, cuisine, time; prompt = \"How many recipes?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 200;
      recipe_data recipes[MAX];
      int recipe_count;
  
      cout << "How many recipes? ";
      cin >> recipe_count;
  
      read_recipes(recipes, recipe_count);
  
      for (int i = 0; i < recipe_count; i++)
      {
          cout << recipes[i].name << ", ";
          cout << recipes[i].cuisine << ", ";
          cout << recipes[i].time << endl;
      }
  
      return 0;
  }

prompt: |
  Entity name: river_data. Write all 3 questions:
  Q2 — struct definition with fields
  Q3 — read fn signature + body that fills the array
  Q4 — main() that calls the read fn and prints all rows.
  
  Suggested fields: name, length, source with types string, double, string. MAX = 100. count_var = river_num. fn = read_rivers. prompt = "How many rivers?".
canonicalAnswer: |
  // Q2: struct
  struct river_data
  {
      string name;
      double length;
      string source;
  };
  
  // Q3: read fn
  void read_rivers(river_data rivers[], int &count)
  {
      cout << "How many rivers? ";
      cin >> count;
      for (int i = 0; i < count; i++)
      {
          cin >> rivers[i].name;
          cin >> rivers[i].length;
          cin >> rivers[i].source;
      }
  }
  
  // Q4: main
  int main()
  {
      const int MAX = 100;
      river_data rivers[MAX];
      int river_num;
  
      cout << "How many rivers? ";
      cin >> river_num;
  
      read_rivers(rivers, river_num);
  
      for (int i = 0; i < river_num; i++)
      {
          cout << rivers[i].name << ", ";
          cout << rivers[i].length << ", ";
          cout << rivers[i].source << endl;
      }
  
      return 0;
  }

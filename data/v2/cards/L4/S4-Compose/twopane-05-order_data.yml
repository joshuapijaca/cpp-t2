prompt: |
  LEFT PANE (given):
  struct order_data
  {
      int id;
      string customer;
      double total;
  };
  
  void read_orders(order_data orders[], int &count);
  
  RIGHT PANE (write): the full main() that calls read_orders and prints all 3 fields per row. MAX = 1000; count = order_count; prompt = "How many orders?".
canonicalAnswer: |
  int main()
  {
      const int MAX = 1000;
      order_data orders[MAX];
      int order_count;
  
      cout << "How many orders? ";
      cin >> order_count;
  
      read_orders(orders, order_count);
  
      for (int i = 0; i < order_count; i++)
      {
          cout << orders[i].id << ", ";
          cout << orders[i].customer << ", ";
          cout << orders[i].total << endl;
      }
  
      return 0;
  }

prompt: |
  Entity name: island_data. Write all 3 questions:
  Q2 — struct definition with fields
  Q3 — read fn signature + body that fills the array
  Q4 — main() that calls the read fn and prints all rows.
  
  Suggested fields: name, area, population with types string, double, int. MAX = 100. count_var = island_num. fn = read_islands. prompt = "How many islands?".
canonicalAnswer: |
  // Q2: struct
  struct island_data
  {
      string name;
      double area;
      int population;
  };
  
  // Q3: read fn
  void read_islands(island_data islands[], int &count)
  {
      cout << "How many islands? ";
      cin >> count;
      for (int i = 0; i < count; i++)
      {
          cin >> islands[i].name;
          cin >> islands[i].area;
          cin >> islands[i].population;
      }
  }
  
  // Q4: main
  int main()
  {
      const int MAX = 100;
      island_data islands[MAX];
      int island_num;
  
      cout << "How many islands? ";
      cin >> island_num;
  
      read_islands(islands, island_num);
  
      for (int i = 0; i < island_num; i++)
      {
          cout << islands[i].name << ", ";
          cout << islands[i].area << ", ";
          cout << islands[i].population << endl;
      }
  
      return 0;
  }

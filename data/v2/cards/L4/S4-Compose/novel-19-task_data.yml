prompt: "Write a full main() for task_data. const MAX = 500; count_var = task_count; fn = read_tasks; fields = id, title, priority; prompt = \"How many tasks?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 500;
      task_data tasks[MAX];
      int task_count;
  
      cout << "How many tasks? ";
      cin >> task_count;
  
      read_tasks(tasks, task_count);
  
      for (int i = 0; i < task_count; i++)
      {
          cout << tasks[i].id << ", ";
          cout << tasks[i].title << ", ";
          cout << tasks[i].priority << endl;
      }
  
      return 0;
  }

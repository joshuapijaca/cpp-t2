prompt: "Write a full main() for lab_data. const MAX = 30; count_var = lab_num; fn = read_labs; fields = number, topic, mark; prompt = \"How many labs?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 30;
      lab_data labs[MAX];
      int lab_num;
  
      cout << "How many labs? ";
      cin >> lab_num;
  
      read_labs(labs, lab_num);
  
      for (int i = 0; i < lab_num; i++)
      {
          cout << labs[i].number << ", ";
          cout << labs[i].topic << ", ";
          cout << labs[i].mark << endl;
      }
  
      return 0;
  }

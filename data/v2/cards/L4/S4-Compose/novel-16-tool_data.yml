prompt: "Write a full main() for tool_data. const MAX = 50; count_var = tool_count; fn = read_tools; fields = name, type, weight; prompt = \"How many tools?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 50;
      tool_data tools[MAX];
      int tool_count;
  
      cout << "How many tools? ";
      cin >> tool_count;
  
      read_tools(tools, tool_count);
  
      for (int i = 0; i < tool_count; i++)
      {
          cout << tools[i].name << ", ";
          cout << tools[i].type << ", ";
          cout << tools[i].weight << endl;
      }
  
      return 0;
  }

prompt: "Write a full main() for student_data. const MAX = 300; count_var = student_num; fn = read_students; fields = id, name, grade; prompt = \"How many students?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 300;
      student_data students[MAX];
      int student_num;
  
      cout << "How many students? ";
      cin >> student_num;
  
      read_students(students, student_num);
  
      for (int i = 0; i < student_num; i++)
      {
          cout << students[i].id << ", ";
          cout << students[i].name << ", ";
          cout << students[i].grade << endl;
      }
  
      return 0;
  }

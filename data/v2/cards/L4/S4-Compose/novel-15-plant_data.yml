prompt: "Write a full main() for plant_data. const MAX = 200; count_var = plant_num; fn = read_plants; fields = name, family, height; prompt = \"How many plants?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 200;
      plant_data plants[MAX];
      int plant_num;
  
      cout << "How many plants? ";
      cin >> plant_num;
  
      read_plants(plants, plant_num);
  
      for (int i = 0; i < plant_num; i++)
      {
          cout << plants[i].name << ", ";
          cout << plants[i].family << ", ";
          cout << plants[i].height << endl;
      }
  
      return 0;
  }

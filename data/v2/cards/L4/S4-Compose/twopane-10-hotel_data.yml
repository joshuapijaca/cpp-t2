prompt: |
  LEFT PANE (given):
  struct hotel_data
  {
      string name;
      double rating;
      double price;
  };
  
  void read_hotels(hotel_data hotels[], int &count);
  
  RIGHT PANE (write): the full main() that calls read_hotels and prints all 3 fields per row. MAX = 150; count = hotel_num; prompt = "How many hotels?".
canonicalAnswer: |
  int main()
  {
      const int MAX = 150;
      hotel_data hotels[MAX];
      int hotel_num;
  
      cout << "How many hotels? ";
      cin >> hotel_num;
  
      read_hotels(hotels, hotel_num);
  
      for (int i = 0; i < hotel_num; i++)
      {
          cout << hotels[i].name << ", ";
          cout << hotels[i].rating << ", ";
          cout << hotels[i].price << endl;
      }
  
      return 0;
  }

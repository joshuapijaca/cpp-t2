prompt: |
  Entity name: lake_data. Write all 3 questions:
  Q2 — struct definition with fields
  Q3 — read fn signature + body that fills the array
  Q4 — main() that calls the read fn and prints all rows.
  
  Suggested fields: name, depth, area with types string, double, double. MAX = 200. count_var = lake_num. fn = read_lakes. prompt = "How many lakes?".
canonicalAnswer: |
  // Q2: struct
  struct lake_data
  {
      string name;
      double depth;
      double area;
  };
  
  // Q3: read fn
  void read_lakes(lake_data lakes[], int &count)
  {
      cout << "How many lakes? ";
      cin >> count;
      for (int i = 0; i < count; i++)
      {
          cin >> lakes[i].name;
          cin >> lakes[i].depth;
          cin >> lakes[i].area;
      }
  }
  
  // Q4: main
  int main()
  {
      const int MAX = 200;
      lake_data lakes[MAX];
      int lake_num;
  
      cout << "How many lakes? ";
      cin >> lake_num;
  
      read_lakes(lakes, lake_num);
  
      for (int i = 0; i < lake_num; i++)
      {
          cout << lakes[i].name << ", ";
          cout << lakes[i].depth << ", ";
          cout << lakes[i].area << endl;
      }
  
      return 0;
  }

prompt: "Write a full main() for game_data. const MAX = 200; count_var = game_count; fn = read_games; fields = title, genre, score; prompt = \"How many games?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 200;
      game_data games[MAX];
      int game_count;
  
      cout << "How many games? ";
      cin >> game_count;
  
      read_games(games, game_count);
  
      for (int i = 0; i < game_count; i++)
      {
          cout << games[i].title << ", ";
          cout << games[i].genre << ", ";
          cout << games[i].score << endl;
      }
  
      return 0;
  }

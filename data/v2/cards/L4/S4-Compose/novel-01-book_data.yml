prompt: "Write a full main() for book_data. const MAX = 200; count_var = book_count; fn = read_books; fields = title, author, pages; prompt = \"How many books?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 200;
      book_data books[MAX];
      int book_count;
  
      cout << "How many books? ";
      cin >> book_count;
  
      read_books(books, book_count);
  
      for (int i = 0; i < book_count; i++)
      {
          cout << books[i].title << ", ";
          cout << books[i].author << ", ";
          cout << books[i].pages << endl;
      }
  
      return 0;
  }

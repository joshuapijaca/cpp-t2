prompt: |
  Entity name: beach_data. Write all 3 questions:
  Q2 — struct definition with fields
  Q3 — read fn signature + body that fills the array
  Q4 — main() that calls the read fn and prints all rows.
  
  Suggested fields: name, length, rating with types string, double, double. MAX = 80. count_var = beach_num. fn = read_beaches. prompt = "How many beaches?".
canonicalAnswer: |
  // Q2: struct
  struct beach_data
  {
      string name;
      double length;
      double rating;
  };
  
  // Q3: read fn
  void read_beaches(beach_data beaches[], int &count)
  {
      cout << "How many beaches? ";
      cin >> count;
      for (int i = 0; i < count; i++)
      {
          cin >> beaches[i].name;
          cin >> beaches[i].length;
          cin >> beaches[i].rating;
      }
  }
  
  // Q4: main
  int main()
  {
      const int MAX = 80;
      beach_data beaches[MAX];
      int beach_num;
  
      cout << "How many beaches? ";
      cin >> beach_num;
  
      read_beaches(beaches, beach_num);
  
      for (int i = 0; i < beach_num; i++)
      {
          cout << beaches[i].name << ", ";
          cout << beaches[i].length << ", ";
          cout << beaches[i].rating << endl;
      }
  
      return 0;
  }

prompt: |
  Entity name: gym_data. Write all 3 questions:
  Q2 — struct definition with fields
  Q3 — read fn signature + body that fills the array
  Q4 — main() that calls the read fn and prints all rows.
  
  Suggested fields: name, price, rating with types string, double, double. MAX = 30. count_var = gym_count. fn = read_gyms. prompt = "How many gyms?".
canonicalAnswer: |
  // Q2: struct
  struct gym_data
  {
      string name;
      double price;
      double rating;
  };
  
  // Q3: read fn
  void read_gyms(gym_data gyms[], int &count)
  {
      cout << "How many gyms? ";
      cin >> count;
      for (int i = 0; i < count; i++)
      {
          cin >> gyms[i].name;
          cin >> gyms[i].price;
          cin >> gyms[i].rating;
      }
  }
  
  // Q4: main
  int main()
  {
      const int MAX = 30;
      gym_data gyms[MAX];
      int gym_count;
  
      cout << "How many gyms? ";
      cin >> gym_count;
  
      read_gyms(gyms, gym_count);
  
      for (int i = 0; i < gym_count; i++)
      {
          cout << gyms[i].name << ", ";
          cout << gyms[i].price << ", ";
          cout << gyms[i].rating << endl;
      }
  
      return 0;
  }

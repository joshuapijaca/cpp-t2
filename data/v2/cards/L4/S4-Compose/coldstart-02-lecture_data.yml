prompt: |
  Entity name: lecture_data. Write all 3 questions:
  Q2 — struct definition with fields
  Q3 — read fn signature + body that fills the array
  Q4 — main() that calls the read fn and prints all rows.
  
  Suggested fields: code, topic, attendance with types string, string, int. MAX = 50. count_var = lec_num. fn = read_lectures. prompt = "How many lectures?".
canonicalAnswer: |
  // Q2: struct
  struct lecture_data
  {
      string code;
      string topic;
      int attendance;
  };
  
  // Q3: read fn
  void read_lectures(lecture_data lectures[], int &count)
  {
      cout << "How many lectures? ";
      cin >> count;
      for (int i = 0; i < count; i++)
      {
          cin >> lectures[i].code;
          cin >> lectures[i].topic;
          cin >> lectures[i].attendance;
      }
  }
  
  // Q4: main
  int main()
  {
      const int MAX = 50;
      lecture_data lectures[MAX];
      int lec_num;
  
      cout << "How many lectures? ";
      cin >> lec_num;
  
      read_lectures(lectures, lec_num);
  
      for (int i = 0; i < lec_num; i++)
      {
          cout << lectures[i].code << ", ";
          cout << lectures[i].topic << ", ";
          cout << lectures[i].attendance << endl;
      }
  
      return 0;
  }

prompt: |
  Entity name: club_data. Write all 3 questions:
  Q2 — struct definition with fields
  Q3 — read fn signature + body that fills the array
  Q4 — main() that calls the read fn and prints all rows.
  
  Suggested fields: name, members, fee with types string, int, double. MAX = 50. count_var = club_num. fn = read_clubs. prompt = "How many clubs?".
canonicalAnswer: |
  // Q2: struct
  struct club_data
  {
      string name;
      int members;
      double fee;
  };
  
  // Q3: read fn
  void read_clubs(club_data clubs[], int &count)
  {
      cout << "How many clubs? ";
      cin >> count;
      for (int i = 0; i < count; i++)
      {
          cin >> clubs[i].name;
          cin >> clubs[i].members;
          cin >> clubs[i].fee;
      }
  }
  
  // Q4: main
  int main()
  {
      const int MAX = 50;
      club_data clubs[MAX];
      int club_num;
  
      cout << "How many clubs? ";
      cin >> club_num;
  
      read_clubs(clubs, club_num);
  
      for (int i = 0; i < club_num; i++)
      {
          cout << clubs[i].name << ", ";
          cout << clubs[i].members << ", ";
          cout << clubs[i].fee << endl;
      }
  
      return 0;
  }

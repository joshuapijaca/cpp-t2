prompt: |
  Entity name: theatre_data. Write all 3 questions:
  Q2 — struct definition with fields
  Q3 — read fn signature + body that fills the array
  Q4 — main() that calls the read fn and prints all rows.
  
  Suggested fields: name, seats, rating with types string, int, double. MAX = 40. count_var = theatre_num. fn = read_theatres. prompt = "How many theatres?".
canonicalAnswer: |
  // Q2: struct
  struct theatre_data
  {
      string name;
      int seats;
      double rating;
  };
  
  // Q3: read fn
  void read_theatres(theatre_data theatres[], int &count)
  {
      cout << "How many theatres? ";
      cin >> count;
      for (int i = 0; i < count; i++)
      {
          cin >> theatres[i].name;
          cin >> theatres[i].seats;
          cin >> theatres[i].rating;
      }
  }
  
  // Q4: main
  int main()
  {
      const int MAX = 40;
      theatre_data theatres[MAX];
      int theatre_num;
  
      cout << "How many theatres? ";
      cin >> theatre_num;
  
      read_theatres(theatres, theatre_num);
  
      for (int i = 0; i < theatre_num; i++)
      {
          cout << theatres[i].name << ", ";
          cout << theatres[i].seats << ", ";
          cout << theatres[i].rating << endl;
      }
  
      return 0;
  }

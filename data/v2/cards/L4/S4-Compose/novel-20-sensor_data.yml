prompt: "Write a full main() for sensor_data. const MAX = 1000; count_var = sensor_num; fn = read_sensors; fields = id, reading, unit; prompt = \"How many sensors?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 1000;
      sensor_data sensors[MAX];
      int sensor_num;
  
      cout << "How many sensors? ";
      cin >> sensor_num;
  
      read_sensors(sensors, sensor_num);
  
      for (int i = 0; i < sensor_num; i++)
      {
          cout << sensors[i].id << ", ";
          cout << sensors[i].reading << ", ";
          cout << sensors[i].unit << endl;
      }
  
      return 0;
  }

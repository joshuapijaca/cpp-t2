prompt: |
  Entity name: recipe_data. Write all 3 questions:
  Q2 — struct definition with fields
  Q3 — read fn signature + body that fills the array
  Q4 — main() that calls the read fn and prints all rows.
  
  Suggested fields: name, prep_time, rating with types string, int, double. MAX = 100. count_var = rec_count. fn = read_recipes. prompt = "How many recipes?".
canonicalAnswer: |
  // Q2: struct
  struct recipe_data
  {
      string name;
      int prep_time;
      double rating;
  };
  
  // Q3: read fn
  void read_recipes(recipe_data recipes[], int &count)
  {
      cout << "How many recipes? ";
      cin >> count;
      for (int i = 0; i < count; i++)
      {
          cin >> recipes[i].name;
          cin >> recipes[i].prep_time;
          cin >> recipes[i].rating;
      }
  }
  
  // Q4: main
  int main()
  {
      const int MAX = 100;
      recipe_data recipes[MAX];
      int rec_count;
  
      cout << "How many recipes? ";
      cin >> rec_count;
  
      read_recipes(recipes, rec_count);
  
      for (int i = 0; i < rec_count; i++)
      {
          cout << recipes[i].name << ", ";
          cout << recipes[i].prep_time << ", ";
          cout << recipes[i].rating << endl;
      }
  
      return 0;
  }

prompt: "Write a full main() for movie_data. const MAX = 250; count_var = movie_count; fn = read_movies; fields = title, director, duration; prompt = \"How many movies?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 250;
      movie_data movies[MAX];
      int movie_count;
  
      cout << "How many movies? ";
      cin >> movie_count;
  
      read_movies(movies, movie_count);
  
      for (int i = 0; i < movie_count; i++)
      {
          cout << movies[i].title << ", ";
          cout << movies[i].director << ", ";
          cout << movies[i].duration << endl;
      }
  
      return 0;
  }

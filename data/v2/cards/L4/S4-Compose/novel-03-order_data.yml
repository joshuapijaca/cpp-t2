prompt: "Write a full main() for order_data. const MAX = 1000; count_var = order_count; fn = read_orders; fields = id, customer, total; prompt = \"How many orders?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 1000;
      order_data orders[MAX];
      int order_count;
  
      cout << "How many orders? ";
      cin >> order_count;
  
      read_orders(orders, order_count);
  
      for (int i = 0; i < order_count; i++)
      {
          cout << orders[i].id << ", ";
          cout << orders[i].customer << ", ";
          cout << orders[i].total << endl;
      }
  
      return 0;
  }

prompt: |
  Entity name: route_data. Write all 3 questions:
  Q2 — struct definition with fields
  Q3 — read fn signature + body that fills the array
  Q4 — main() that calls the read fn and prints all rows.
  
  Suggested fields: name, distance, time with types string, double, int. MAX = 300. count_var = route_num. fn = read_routes. prompt = "How many routes?".
canonicalAnswer: |
  // Q2: struct
  struct route_data
  {
      string name;
      double distance;
      int time;
  };
  
  // Q3: read fn
  void read_routes(route_data routes[], int &count)
  {
      cout << "How many routes? ";
      cin >> count;
      for (int i = 0; i < count; i++)
      {
          cin >> routes[i].name;
          cin >> routes[i].distance;
          cin >> routes[i].time;
      }
  }
  
  // Q4: main
  int main()
  {
      const int MAX = 300;
      route_data routes[MAX];
      int route_num;
  
      cout << "How many routes? ";
      cin >> route_num;
  
      read_routes(routes, route_num);
  
      for (int i = 0; i < route_num; i++)
      {
          cout << routes[i].name << ", ";
          cout << routes[i].distance << ", ";
          cout << routes[i].time << endl;
      }
  
      return 0;
  }

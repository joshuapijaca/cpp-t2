prompt: |
  LEFT PANE (given):
  struct flight_data
  {
      int number;
      string origin;
      string destination;
  };
  
  void read_flights(flight_data flights[], int &count);
  
  RIGHT PANE (write): the full main() that calls read_flights and prints all 3 fields per row. MAX = 800; count = f_count; prompt = "How many flights?".
canonicalAnswer: |
  int main()
  {
      const int MAX = 800;
      flight_data flights[MAX];
      int f_count;
  
      cout << "How many flights? ";
      cin >> f_count;
  
      read_flights(flights, f_count);
  
      for (int i = 0; i < f_count; i++)
      {
          cout << flights[i].number << ", ";
          cout << flights[i].origin << ", ";
          cout << flights[i].destination << endl;
      }
  
      return 0;
  }

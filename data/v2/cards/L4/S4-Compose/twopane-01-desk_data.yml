prompt: |
  LEFT PANE (given):
  struct desk_data
  {
      int room_id;
      int d_id;
      int number_of_screens;
  };
  
  void read_desks(desk_data desks[], int &count);
  
  RIGHT PANE (write): the full main() that calls read_desks and prints all 3 fields per row. MAX = 700; count = desk_num; prompt = "How many desks?".
canonicalAnswer: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }

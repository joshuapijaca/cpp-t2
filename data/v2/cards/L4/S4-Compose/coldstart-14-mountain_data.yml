prompt: |
  Entity name: mountain_data. Write all 3 questions:
  Q2 — struct definition with fields
  Q3 — read fn signature + body that fills the array
  Q4 — main() that calls the read fn and prints all rows.
  
  Suggested fields: name, height, range with types string, double, string. MAX = 150. count_var = mt_count. fn = read_mountains. prompt = "How many mountains?".
canonicalAnswer: |
  // Q2: struct
  struct mountain_data
  {
      string name;
      double height;
      string range;
  };
  
  // Q3: read fn
  void read_mountains(mountain_data mountains[], int &count)
  {
      cout << "How many mountains? ";
      cin >> count;
      for (int i = 0; i < count; i++)
      {
          cin >> mountains[i].name;
          cin >> mountains[i].height;
          cin >> mountains[i].range;
      }
  }
  
  // Q4: main
  int main()
  {
      const int MAX = 150;
      mountain_data mountains[MAX];
      int mt_count;
  
      cout << "How many mountains? ";
      cin >> mt_count;
  
      read_mountains(mountains, mt_count);
  
      for (int i = 0; i < mt_count; i++)
      {
          cout << mountains[i].name << ", ";
          cout << mountains[i].height << ", ";
          cout << mountains[i].range << endl;
      }
  
      return 0;
  }

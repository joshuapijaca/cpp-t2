prompt: "Write a full main() for employee_data. const MAX = 500; count_var = emp_num; fn = read_employees; fields = id, name, salary; prompt = \"How many employees?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 500;
      employee_data employees[MAX];
      int emp_num;
  
      cout << "How many employees? ";
      cin >> emp_num;
  
      read_employees(employees, emp_num);
  
      for (int i = 0; i < emp_num; i++)
      {
          cout << employees[i].id << ", ";
          cout << employees[i].name << ", ";
          cout << employees[i].salary << endl;
      }
  
      return 0;
  }

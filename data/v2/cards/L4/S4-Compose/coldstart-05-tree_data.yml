prompt: |
  Entity name: tree_data. Write all 3 questions:
  Q2 — struct definition with fields
  Q3 — read fn signature + body that fills the array
  Q4 — main() that calls the read fn and prints all rows.
  
  Suggested fields: species, height, age with types string, double, int. MAX = 200. count_var = tree_count. fn = read_trees. prompt = "How many trees?".
canonicalAnswer: |
  // Q2: struct
  struct tree_data
  {
      string species;
      double height;
      int age;
  };
  
  // Q3: read fn
  void read_trees(tree_data trees[], int &count)
  {
      cout << "How many trees? ";
      cin >> count;
      for (int i = 0; i < count; i++)
      {
          cin >> trees[i].species;
          cin >> trees[i].height;
          cin >> trees[i].age;
      }
  }
  
  // Q4: main
  int main()
  {
      const int MAX = 200;
      tree_data trees[MAX];
      int tree_count;
  
      cout << "How many trees? ";
      cin >> tree_count;
  
      read_trees(trees, tree_count);
  
      for (int i = 0; i < tree_count; i++)
      {
          cout << trees[i].species << ", ";
          cout << trees[i].height << ", ";
          cout << trees[i].age << endl;
      }
  
      return 0;
  }

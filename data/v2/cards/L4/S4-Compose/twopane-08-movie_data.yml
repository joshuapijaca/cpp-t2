prompt: |
  LEFT PANE (given):
  struct movie_data
  {
      string title;
      string director;
      int duration;
  };
  
  void read_movies(movie_data movies[], int &count);
  
  RIGHT PANE (write): the full main() that calls read_movies and prints all 3 fields per row. MAX = 250; count = movie_count; prompt = "How many movies?".
canonicalAnswer: |
  int main()
  {
      const int MAX = 250;
      movie_data movies[MAX];
      int movie_count;
  
      cout << "How many movies? ";
      cin >> movie_count;
  
      read_movies(movies, movie_count);
  
      for (int i = 0; i < movie_count; i++)
      {
          cout << movies[i].title << ", ";
          cout << movies[i].director << ", ";
          cout << movies[i].duration << endl;
      }
  
      return 0;
  }

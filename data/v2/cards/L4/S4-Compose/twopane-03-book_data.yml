prompt: |
  LEFT PANE (given):
  struct book_data
  {
      string title;
      string author;
      int pages;
  };
  
  void read_books(book_data books[], int &count);
  
  RIGHT PANE (write): the full main() that calls read_books and prints all 3 fields per row. MAX = 200; count = book_count; prompt = "How many books?".
canonicalAnswer: |
  int main()
  {
      const int MAX = 200;
      book_data books[MAX];
      int book_count;
  
      cout << "How many books? ";
      cin >> book_count;
  
      read_books(books, book_count);
  
      for (int i = 0; i < book_count; i++)
      {
          cout << books[i].title << ", ";
          cout << books[i].author << ", ";
          cout << books[i].pages << endl;
      }
  
      return 0;
  }

prompt: |
  LEFT PANE (given):
  struct employee_data
  {
      int id;
      string name;
      double salary;
  };
  
  void read_employees(employee_data employees[], int &count);
  
  RIGHT PANE (write): the full main() that calls read_employees and prints all 3 fields per row. MAX = 500; count = emp_num; prompt = "How many employees?".
canonicalAnswer: |
  int main()
  {
      const int MAX = 500;
      employee_data employees[MAX];
      int emp_num;
  
      cout << "How many employees? ";
      cin >> emp_num;
  
      read_employees(employees, emp_num);
  
      for (int i = 0; i < emp_num; i++)
      {
          cout << employees[i].id << ", ";
          cout << employees[i].name << ", ";
          cout << employees[i].salary << endl;
      }
  
      return 0;
  }

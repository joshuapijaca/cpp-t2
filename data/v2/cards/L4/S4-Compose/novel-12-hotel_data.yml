prompt: "Write a full main() for hotel_data. const MAX = 150; count_var = hotel_num; fn = read_hotels; fields = name, rating, price; prompt = \"How many hotels?\"."
canonicalAnswer: |
  int main()
  {
      const int MAX = 150;
      hotel_data hotels[MAX];
      int hotel_num;
  
      cout << "How many hotels? ";
      cin >> hotel_num;
  
      read_hotels(hotels, hotel_num);
  
      for (int i = 0; i < hotel_num; i++)
      {
          cout << hotels[i].name << ", ";
          cout << hotels[i].rating << ", ";
          cout << hotels[i].price << endl;
      }
  
      return 0;
  }

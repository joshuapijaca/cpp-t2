stem: |-
  This call has the arguments in the wrong order. Fix the order to match the read_desks signature.

  Code under review:
  // Signature: void read_desks(desk_data desks[], int number_to_read)
  // Call site:
  read_desks(desk_num, desks);


  Which diagnosis describes the bug?
correct: argument order swap (count first, array second)
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  Argument order MUST match the function signature: array first, count second. Swapping them passes an int where an
  array is expected — usually a hard compile error.

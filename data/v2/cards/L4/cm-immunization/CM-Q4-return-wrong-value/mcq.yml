stem: |
  Q4 main is declared `int main()`. What MUST appear on the last line?

correct: '`return 0;` — int main() requires returning an int (0 = success)'

distractors:
  - '`return;` — works for void functions, but main returns int'
  - '`return main;` — function name as value; type mismatch'
  - 'nothing — implicit return is fine in C++'

explanation: |
  `int main()` is a contract: the function returns an int. `return 0;` is the canonical success value to the OS. `return;` (no value) is a hard compile error in non-void functions.


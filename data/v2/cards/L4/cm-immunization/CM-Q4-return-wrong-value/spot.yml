stem: |-
  The last line of int main() returns no value. Find and fix the bug.

  Code under review:
  int main() {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
      cout << "How many desks? ";
      cin >> desk_num;
      read_desks(desks, desk_num);
      return;
  }


  Which diagnosis describes the bug?
correct: return without value in int main()
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: |
  int main() must return an int. `return;` is only legal in void functions. Use `return 0;` to signal success to the OS.

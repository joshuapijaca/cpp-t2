stem: |
  You wrote `#include <iostream>` then `cout << x;` and got `cout was not declared`. What did you forget?

correct: 'You forgot `using namespace std;` (or `std::cout`).'

distractors:
  - 'You forgot `#include <stdio.h>`.'
  - 'You forgot to call `printf` instead.'
  - 'You forgot to declare `cout` as `int`.'

explanation: |
  `cout` lives in namespace `std`. Either bring the namespace in with `using namespace std;` or qualify each call as `std::cout`.


stem: |-
  This Q4 program will not compile because of one missing line at the top. Find and fix the bug.

  Code under review:
  #include <iostream>

  int main() {
    cout << "Hello";
    return 0;
  }


  Which diagnosis describes the bug?
correct: missing `using namespace std;`
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  Without `using namespace std;` you must write `std::cout`. Either use the namespace once at file scope, or prefix
  every cin/cout/endl with `std::`.

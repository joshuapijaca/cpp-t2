stem: |
  This Q4 program will not compile because of one missing line at the top. Find and fix the bug.

brokenCode: |
  #include <iostream>
  
  int main() {
    cout << "Hello";
    return 0;
  }

bugLocations: [2]

fixedCode: |
  #include <iostream>
  using namespace std;
  
  int main() {
    cout << "Hello";
    return 0;
  }

bugCategory: 'missing `using namespace std;`'

keyChecks:
  - 'using namespace std'

explanation: |
  Without `using namespace std;` you must write `std::cout`. Either use the namespace once at file scope, or prefix every cin/cout/endl with `std::`.


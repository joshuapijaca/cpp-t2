stem: |-
  This Q4 main function call has an extra `&` at the call site. Find and fix it.

  Code under review:
  int main() {
    stat_double d;
    read_data(&d);   // BUG: extra &
    return 0;
  }


  Which diagnosis describes the bug?
correct: extra `&` at call site
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  Pass-by-reference puts `&` on the PARAMETER (in the signature). At the call site you pass the variable as-is. `&d`
  would be the address-of operator (a pointer).

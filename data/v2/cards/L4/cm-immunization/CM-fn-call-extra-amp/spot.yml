# Auto-emitted CM immunization (FaultInjectionCard) for CM-fn-call-extra-amp
id: "L4-cmimm-CM-fn-call-extra-amp-spot"
schemaVersion: "v2"
atomId: "Q-00"
qTags: ["Q4"]
stage: 4
level: "L4"
type: "FaultInjectionCard"

stem: |
  This Q4 main function call has an extra `&` at the call site. Find and fix it.

brokenCode: |
  int main() {
    stat_double d;
    read_data(&d);   // BUG: extra &
    return 0;
  }

bugLocations: [3]

fixedCode: |
  int main() {
    stat_double d;
    read_data(d);    // pass `d`; the `&` is on the parameter, not the argument
    return 0;
  }

bugCategory: 'extra `&` at call site'

keyChecks:
  - 'read_data(d)'

explanation: |
  Pass-by-reference puts `&` on the PARAMETER (in the signature). At the call site you pass the variable as-is. `&d` would be the address-of operator (a pointer).


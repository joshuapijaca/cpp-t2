# Hand-authored CM immunization (FaultInjectionCard) for CM-Q4-MAX-as-define
id: "L4-cmimm-CM-Q4-MAX-as-define-spot"
schemaVersion: "v2"
atomId: "Q-00"
qTags: ["Q4"]
stage: 4
level: "L4"
type: "FaultInjectionCard"

stem: |
  This Q4 main uses #define for MAX. Replace with the SIT102-canonical const declaration.

brokenCode: |
  #define MAX 700

  int main() {
      desk_data desks[MAX];
      int desk_num;
      cin >> desk_num;
      read_desks(desks, desk_num);
      return 0;
  }

bugLocations: [1]

fixedCode: |
  int main() {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
      cin >> desk_num;
      read_desks(desks, desk_num);
      return 0;
  }

bugCategory: "#define for constant — should be const int"

keyChecks:
  - "const int MAX = 700;"

explanation: |
  SIT102 uses `const int MAX = 700;` inside main(). #define is a preprocessor macro (off-scope for Test 2) and loses type safety. const int is typed and properly scoped.


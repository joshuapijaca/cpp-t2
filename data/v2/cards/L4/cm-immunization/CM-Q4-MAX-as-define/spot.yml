stem: |-
  This Q4 main uses #define for MAX. Replace with the SIT102-canonical const declaration.

  Code under review:
  #define MAX 700

  int main() {
      desk_data desks[MAX];
      int desk_num;
      cin >> desk_num;
      read_desks(desks, desk_num);
      return 0;
  }


  Which diagnosis describes the bug?
correct: '#define for constant — should be const int'
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  SIT102 uses `const int MAX = 700;` inside main(). #define is a preprocessor macro (off-scope for Test 2) and loses
  type safety. const int is typed and properly scoped.

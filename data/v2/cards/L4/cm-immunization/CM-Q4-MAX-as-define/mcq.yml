stem: |
  In Q4, what is the SIT102-canonical way to declare MAX = 700 for use as an array bound?

correct: '`const int MAX = 700;` inside main()'

distractors:
  - '`#define MAX 700` at file top (preprocessor macro)'
  - '`int MAX = 700;` (no const)'
  - '`MAX = 700;` (no type)'

explanation: |
  const int gives a typed, scoped, compile-time constant — what Test 2 expects. #define is a textual macro (off-scope for SIT102), `int MAX` allows accidental mutation, and `MAX = 700;` would not declare anything.


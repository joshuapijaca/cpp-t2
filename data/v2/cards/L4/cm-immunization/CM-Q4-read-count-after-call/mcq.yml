stem: |
  In Q4 main(), in what order should these 3 lines appear?

correct: '`cin >> desk_num;` then `read_desks(desks, desk_num);` then `for (int i = 0; i < desk_num; i++)`'

distractors:
  - '`read_desks(desks, desk_num);` then `cin >> desk_num;` then loop'
  - 'loop first, then cin, then read_desks'
  - 'order does not matter — variables are global'

explanation: |
  Counts must be READ from cin BEFORE they are USED. Calling read_desks before cin makes desk_num garbage; the read function then reads garbage slots. Always: prompt → cin → call → loop.


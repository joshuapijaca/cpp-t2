stem: |-
  This main() calls read_desks BEFORE reading desk_num from cin. Find and fix the wrong order.

  Code under review:
  int main() {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
      read_desks(desks, desk_num);
      cout << "How many desks? ";
      cin >> desk_num;
      return 0;
  }


  Which diagnosis describes the bug?
correct: 'wrong order: read_desks called before cin reads count'
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  desk_num is uninitialised when read_desks uses it as the loop bound — undefined behaviour. Always: cin reads the count
  FIRST, then call the read function with the now-known count.

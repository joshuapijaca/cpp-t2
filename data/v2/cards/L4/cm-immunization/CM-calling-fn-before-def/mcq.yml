type: "MCQCard"

stem: |
  You define `read_data` AFTER main. How do you let main call it anyway?

correct: 'Add a forward declaration (prototype) above main.'

distractors:
  - 'Move the call inside read_data itself.'
  - 'Use #include "read_data.cpp".'
  - 'Capitalise the call site.'

explanation: |
  A prototype `void read_data(stat_double &);` above main tells the compiler the signature. The full definition can come later.


stem: |-
  This Q4 main calls `read_data` before `read_data` is defined. The compiler complains. Find the missing piece.

  Code under review:
  int main() {
    stat_double d;
    read_data(d);
    return 0;
  }

  void read_data(stat_double &data) { ... }


  Which diagnosis describes the bug?
correct: function used before declaration
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  C++ reads top-down. To call a function from main, declare it (prototype) before main, or define it before main.
  Without that, the compiler doesn't know `read_data`.

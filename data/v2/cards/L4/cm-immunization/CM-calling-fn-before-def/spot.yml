# Auto-emitted CM immunization (FaultInjectionCard) for CM-calling-fn-before-def
id: "L4-cmimm-CM-calling-fn-before-def-spot"
schemaVersion: "v2"
atomId: "Q-00"
qTags: ["Q4"]
stage: 4
level: "L4"
type: "FaultInjectionCard"

stem: |
  This Q4 main calls `read_data` before `read_data` is defined. The compiler complains. Find the missing piece.

brokenCode: |
  int main() {
    stat_double d;
    read_data(d);
    return 0;
  }
  
  void read_data(stat_double &data) { ... }

bugLocations: [1]

fixedCode: |
  void read_data(stat_double &data);   // forward declaration
  
  int main() {
    stat_double d;
    read_data(d);
    return 0;
  }
  
  void read_data(stat_double &data) { ... }

bugCategory: 'function used before declaration'

keyChecks:
  - 'void read_data(stat_double &data);'

explanation: |
  C++ reads top-down. To call a function from main, declare it (prototype) before main, or define it before main. Without that, the compiler doesn't know `read_data`.


stem: |-
  This Q4 program doesn't compile because a header is missing. Find what to add at the top.

  Code under review:
  using namespace std;

  int main() {
    cout << "Hi";
    return 0;
  }


  Which diagnosis describes the bug?
correct: missing `#include <iostream>`
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: |
  cin / cout / endl all live in <iostream>. Without that include the compiler doesn't know what `cout` is.

stem: |-
  Spot the bug: missing return. Read the broken main() and identify which line is wrong, then write the fix.

  Code under review:
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;

      cout << "How many desks? ";
      cin >> desk_num;

      read_desks(desks, desk_num);

      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }

  }


  Which diagnosis describes the bug?
correct: missing return
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: Missing `return 0;`. Most compilers warn or err. Test 2 grader subtracts points. Always end main with `return 0;`.

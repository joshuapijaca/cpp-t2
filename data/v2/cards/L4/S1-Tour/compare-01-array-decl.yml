code: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }
question: "Which line correctly declares the array?"
options: 
  - {label: "A", text: "desk_data desks[MAX];"}
  - {label: "B", text: "desk_data desks[desk_num];"}
  - {label: "C", text: "desk_data desks[700];"}
  - {label: "D", text: "desk_data * desks = new desk_data[MAX];"}
correctLabel: "A"
explanation: "A is canonical. B is a variable-length array (off-scope). C hardcodes the literal (works but loses the named cap). D uses `new` (off-scope)."

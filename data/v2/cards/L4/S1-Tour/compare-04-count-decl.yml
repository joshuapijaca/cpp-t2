code: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }
question: "Which line correctly declares the count variable?"
options: 
  - {label: "A", text: "int desk_num;"}
  - {label: "B", text: "double desk_num;"}
  - {label: "C", text: "const int desk_num;"}
  - {label: "D", text: "int desk_num = MAX;"}
correctLabel: "A"
explanation: "A is canonical. B is wrong type. C makes desk_num immutable so cin >> desk_num fails. D pre-initialises to MAX (700) — overwritten by cin but redundant."

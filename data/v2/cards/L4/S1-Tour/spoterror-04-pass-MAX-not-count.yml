fixedCode: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }
bugCategory: "wrong argument"
keyChecks: 
  - "const int MAX"
  - "desks[MAX]"
  - "read_desks(desks, desk_num)"
  - "i < desk_num"
  - "return 0;"
explanation: "Passes MAX (700) to read fn → fn loops 700 times asking for input even if user only wants 5 desks. Pass count_var, NEVER MAX."

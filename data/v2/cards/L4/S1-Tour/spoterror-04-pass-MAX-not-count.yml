stem: |-
  Spot the bug: wrong argument. Read the broken main() and identify which line is wrong, then write the fix.

  Code under review:
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;

      cout << "How many desks? ";
      cin >> desk_num;

      read_desks(desks, MAX);

      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }

      return 0;
  }


  Which diagnosis describes the bug?
correct: wrong argument
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >-
  Passes MAX (700) to read fn → fn loops 700 times asking for input even if user only wants 5 desks. Pass count_var,
  NEVER MAX.

stem: |-
  Spot the bug: spurious &. Read the broken main() and identify which line is wrong, then write the fix.

  Code under review:
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;

      cout << "How many desks? ";
      cin >> desk_num;

      read_desks(&desks, &desk_num);

      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }

      return 0;
  }


  Which diagnosis describes the bug?
correct: spurious &
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: NO `&` at call site. The `&` lives ONLY at the function signature (declaration/definition). Compiler error.

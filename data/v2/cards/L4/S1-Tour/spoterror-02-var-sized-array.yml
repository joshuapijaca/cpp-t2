stem: |-
  Spot the bug: variable-sized array. Read the broken main() and identify which line is wrong, then write the fix.

  Code under review:
  int main()
  {
      const int MAX = 700;
      desk_data desks[desk_num];
      int desk_num;

      cout << "How many desks? ";
      cin >> desk_num;

      read_desks(desks, desk_num);

      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }

      return 0;
  }


  Which diagnosis describes the bug?
correct: variable-sized array
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >-
  Array bound is `desk_num` — a runtime variable. C++ requires compile-time-constant. Use MAX, not count_var, in the
  array decl.

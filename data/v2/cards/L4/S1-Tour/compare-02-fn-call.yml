code: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }
question: "Which line correctly calls the read fn at call site?"
options: 
  - {label: "A", text: "read_desks(&desks, &desk_num);"}
  - {label: "B", text: "read_desks(desks, desk_num);"}
  - {label: "C", text: "read_desks(desks, MAX);"}
  - {label: "D", text: "read_desks(desk_num, desks);"}
correctLabel: "B"
explanation: "B is canonical: no `&` at call site, count NOT MAX, array first. A puts `&` at call site (only goes on the signature). C passes MAX. D swaps arg order."

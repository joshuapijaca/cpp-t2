brokenCode: |
  int main()
  {
      const int MAX = 5;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }
bugLocations: 
  - 3
fixedCode: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }
bugCategory: "tiny array"
keyChecks: 
  - "const int MAX"
  - "desks[MAX]"
  - "read_desks(desks, desk_num)"
  - "i < desk_num"
  - "return 0;"
explanation: "MAX = 5 means the array can hold at most 5 desks. If user enters 6+ → out-of-bounds writes → undefined behaviour. MAX must be a generous cap."

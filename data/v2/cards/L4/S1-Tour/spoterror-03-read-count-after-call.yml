stem: |-
  Spot the bug: wrong order. Read the broken main() and identify which line is wrong, then write the fix.

  Code under review:
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;

      read_desks(desks, desk_num);
      cout << "How many desks? ";
      cin >> desk_num;

      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }

      return 0;
  }


  Which diagnosis describes the bug?
correct: wrong order
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >-
  read_desks called BEFORE cin reads desk_num → desk_num is uninitialised → undefined behaviour. Always read count
  FIRST, then call read fn.

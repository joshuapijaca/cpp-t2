code: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }
question: "Which line correctly starts the print for-loop?"
options: 
  - {label: "A", text: "for (int i = 0; i < MAX; i++)"}
  - {label: "B", text: "for (int i = 1; i <= desk_num; i++)"}
  - {label: "C", text: "for (int i = 0; i < desk_num; i++)"}
  - {label: "D", text: "for (int i = 0; i <= desk_num; i++)"}
correctLabel: "C"
explanation: "C is canonical. A loops MAX (700) times → garbage. B starts at 1 → skips index 0. D loops desk_num+1 → off by one (out of bounds)."

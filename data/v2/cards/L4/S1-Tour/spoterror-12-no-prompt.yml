stem: |-
  Spot the bug: missing prompt. Read the broken main() and identify which line is wrong, then write the fix.

  Code under review:
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;

      cin >> desk_num;

      read_desks(desks, desk_num);

      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }

      return 0;
  }


  Which diagnosis describes the bug?
correct: missing prompt
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: cin without a cout prompt = blank screen waiting silently. User has no idea what to type. Always prompt first.

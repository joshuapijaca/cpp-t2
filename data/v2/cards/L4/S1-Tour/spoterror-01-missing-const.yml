stem: |-
  Spot the bug: missing const. Read the broken main() and identify which line is wrong, then write the fix.

  Code under review:
  int main()
  {
      int MAX = 700;
      desk_data desks[MAX];
      int desk_num;

      cout << "How many desks? ";
      cin >> desk_num;

      read_desks(desks, desk_num);

      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }

      return 0;
  }


  Which diagnosis describes the bug?
correct: missing const
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >-
  Missing `const`. Without it, MAX is a runtime-mutable int → array bound is no longer compile-time-constant →
  variable-length array (off-scope for SIT102).

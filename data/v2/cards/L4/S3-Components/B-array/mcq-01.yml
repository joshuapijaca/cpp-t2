correct: "desk_num is a runtime variable; C++ array bounds must be compile-time constants."
distractors: 
  - "MAX is faster."
  - "Convention only."
  - "desk_num is uninitialised."
explanation: "Variable-length arrays are not standard C++. Bound MUST be const."

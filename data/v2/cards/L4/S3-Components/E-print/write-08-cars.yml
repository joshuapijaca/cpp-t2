prompt: "Print all car_num cars as comma-separated rows (3 fields per row + endl)."
signatureHint: |
  for (int i = 0; i < ___; i++) {
    cout << ___[i].___ << ", " << ___[i].___ << ", " << ___[i].___ << endl;
  }
canonicalAnswer: |
  for (int i = 0; i < car_num; i++)
  {
      cout << cars[i].model << ", ";
      cout << cars[i].year << ", ";
      cout << cars[i].price << endl;
  }

correct: "Yes — `cout << a << b;` and `cout << a; cout << b;` are equivalent."
distractors: 
  - "No — chained is required."
  - "No — separate is required."
  - "Chained is faster but separate is safer."
explanation: "Both produce the same output. Chained is the canonical SIT102 idiom."

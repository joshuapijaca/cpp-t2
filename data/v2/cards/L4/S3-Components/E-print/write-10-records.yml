prompt: "Print all count records as comma-separated rows (3 fields per row + endl)."
signatureHint: |
  for (int i = 0; i < ___; i++) {
    cout << ___[i].___ << ", " << ___[i].___ << ", " << ___[i].___ << endl;
  }
canonicalAnswer: |
  for (int i = 0; i < count; i++)
  {
      cout << records[i].id << ", ";
      cout << records[i].tag << ", ";
      cout << records[i].value << endl;
  }

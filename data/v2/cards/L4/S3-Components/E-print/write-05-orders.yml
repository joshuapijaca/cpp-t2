prompt: "Print all order_count orders as comma-separated rows (3 fields per row + endl)."
signatureHint: |
  for (int i = 0; i < ___; i++) {
    cout << ___[i].___ << ", " << ___[i].___ << ", " << ___[i].___ << endl;
  }
canonicalAnswer: |
  for (int i = 0; i < order_count; i++)
  {
      cout << orders[i].id << ", ";
      cout << orders[i].customer << ", ";
      cout << orders[i].total << endl;
  }
keyChecks: 
  - "i < order_count"
  - "orders"
  - "id"
  - "customer"
  - "total"
  - "endl"
forbiddenTokens: 
  - "while"
  - "getline"
  - "printf"
passByRefRequired: false
explanation: "Loop bound = order_count (count, NOT MAX). Last cout in body uses endl. Comma separators between fields."

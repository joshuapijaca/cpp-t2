prompt: "Print all student_num students as comma-separated rows (3 fields per row + endl)."
signatureHint: |
  for (int i = 0; i < ___; i++) {
    cout << ___[i].___ << ", " << ___[i].___ << ", " << ___[i].___ << endl;
  }
canonicalAnswer: |
  for (int i = 0; i < student_num; i++)
  {
      cout << students[i].id << ", ";
      cout << students[i].name << ", ";
      cout << students[i].grade << endl;
  }
keyChecks: 
  - "i < student_num"
  - "students"
  - "id"
  - "name"
  - "grade"
  - "endl"
forbiddenTokens: 
  - "while"
  - "getline"
  - "printf"
passByRefRequired: false
explanation: "Loop bound = student_num (count, NOT MAX). Last cout in body uses endl. Comma separators between fields."

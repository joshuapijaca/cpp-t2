  for (int i = 0; i < ___; i++) {
    cout << ___[i].___ << ", " << ___[i].___ << ", " << ___[i].___ << endl;
  }
canonicalAnswer: |
  for (int i = 0; i < desk_num; i++)
  {
      cout << desks[i].room_id << ", ";
      cout << desks[i].d_id << ", ";
      cout << desks[i].number_of_screens << endl;
  }

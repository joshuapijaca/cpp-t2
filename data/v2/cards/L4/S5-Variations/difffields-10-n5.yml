prompt: "5 fields: title, author, pages, isbn, year. Update print loop to chain 5 cout statements with comma separator + endl on the last."
canonicalAnswer: |
  int main()
  {
      const int MAX = 100;
      computer_data computers[MAX];
      int computer_num;
  
      cout << "How many computers? ";
      cin >> computer_num;
  
      read_computers(computers, computer_num);
  
      for (int i = 0; i < computer_num; i++)
      {
          cout << computers[i].title << ", ";
          cout << computers[i].author << ", ";
          cout << computers[i].pages << ", ";
          cout << computers[i].isbn << ", ";
          cout << computers[i].year << endl;
      }
  
      return 0;
  }

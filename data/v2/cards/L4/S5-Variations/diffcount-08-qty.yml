canonicalAnswer: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int qty;
  
      cout << "How many desks? ";
      cin >> qty;
  
      read_desks(desks, qty);
  
      for (int i = 0; i < qty; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }

  int main()
  {
      const int MAX = 40;
      sport_data sports[MAX];
      int sport_num;
  
      cout << "How many sports? ";
      cin >> sport_num;
  
      read_sports(sports, sport_num);
  
      for (int i = 0; i < sport_num; i++)
      {
          cout << sports[i].name << ", ";
          cout << sports[i].players << ", ";
          cout << sports[i].rules << endl;
      }
  
      return 0;
  }

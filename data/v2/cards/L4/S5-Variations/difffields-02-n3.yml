prompt: "3 fields: id, name, price. Update print loop to chain 3 cout statements with comma separator + endl on the last."
canonicalAnswer: |
  int main()
  {
      const int MAX = 100;
      computer_data computers[MAX];
      int computer_num;
  
      cout << "How many computers? ";
      cin >> computer_num;
  
      read_computers(computers, computer_num);
  
      for (int i = 0; i < computer_num; i++)
      {
          cout << computers[i].id << ", ";
          cout << computers[i].name << ", ";
          cout << computers[i].price << endl;
      }
  
      return 0;
  }

canonicalAnswer: |
  int main()
  {
      const int MAX = 80;
      project_data projects[MAX];
      int p_count;
  
      cout << "How many projects? ";
      cin >> p_count;
  
      read_projects(projects, p_count);
  
      for (int i = 0; i < p_count; i++)
      {
          cout << projects[i].title << ", ";
          cout << projects[i].lead << ", ";
          cout << projects[i].status << endl;
      }
  
      return 0;
  }

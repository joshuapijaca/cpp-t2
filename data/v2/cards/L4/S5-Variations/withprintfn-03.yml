prompt: "Re-write V2.0 main using a separate print fn `print_desks(desks, desk_num)` instead of an inline for-loop."
canonicalAnswer: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
      print_desks(desks, desk_num);
  
      return 0;
  }

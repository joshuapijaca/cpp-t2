  int main()
  {
      const int MAX = 60;
      gadget_data gadgets[MAX];
      int g_num;
  
      cout << "How many gadgets? ";
      cin >> g_num;
  
      read_gadgets(gadgets, g_num);
  
      for (int i = 0; i < g_num; i++)
      {
          cout << gadgets[i].name << ", ";
          cout << gadgets[i].brand << ", ";
          cout << gadgets[i].cost << endl;
      }
  
      return 0;
  }

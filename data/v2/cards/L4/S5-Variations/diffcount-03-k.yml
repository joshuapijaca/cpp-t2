prompt: "Use k as the count variable name everywhere."
canonicalAnswer: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int k;
  
      cout << "How many desks? ";
      cin >> k;
  
      read_desks(desks, k);
  
      for (int i = 0; i < k; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }

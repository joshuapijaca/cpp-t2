canonicalAnswer: |
  int main()
  {
      const int MAX = 50;
      building_data buildings[MAX];
      int b_count;
  
      cout << "How many buildings? ";
      cin >> b_count;
  
      read_buildings(buildings, b_count);
  
      for (int i = 0; i < b_count; i++)
      {
          cout << buildings[i].address << ", ";
          cout << buildings[i].floors << ", ";
          cout << buildings[i].rooms << endl;
      }
  
      return 0;
  }

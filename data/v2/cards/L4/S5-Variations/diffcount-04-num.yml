prompt: "Use num as the count variable name everywhere."
canonicalAnswer: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int num;
  
      cout << "How many desks? ";
      cin >> num;
  
      read_desks(desks, num);
  
      for (int i = 0; i < num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }

canonicalAnswer: |
  int main()
  {
      const int MAX = 200;
      app_data apps[MAX];
      int app_num;
  
      cout << "How many apps? ";
      cin >> app_num;
  
      read_apps(apps, app_num);
  
      for (int i = 0; i < app_num; i++)
      {
          cout << apps[i].name << ", ";
          cout << apps[i].version << ", ";
          cout << apps[i].downloads << endl;
      }
  
      return 0;
  }

canonicalAnswer: |
  int main()
  {
      const int MAX = 100;
      meal_data meals[MAX];
      int meal_num;
  
      cout << "How many meals? ";
      cin >> meal_num;
  
      read_meals(meals, meal_num);
  
      for (int i = 0; i < meal_num; i++)
      {
          cout << meals[i].name << ", ";
          cout << meals[i].calories << ", ";
          cout << meals[i].price << endl;
      }
  
      return 0;
  }

  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int count;
  
      cout << "How many desks? ";
      cin >> count;
  
      read_desks(desks, count);
  
      for (int i = 0; i < count; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }

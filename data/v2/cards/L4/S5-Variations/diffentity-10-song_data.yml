canonicalAnswer: |
  int main()
  {
      const int MAX = 1000;
      song_data songs[MAX];
      int s_count;
  
      cout << "How many songs? ";
      cin >> s_count;
  
      read_songs(songs, s_count);
  
      for (int i = 0; i < s_count; i++)
      {
          cout << songs[i].title << ", ";
          cout << songs[i].artist << ", ";
          cout << songs[i].length << endl;
      }
  
      return 0;
  }

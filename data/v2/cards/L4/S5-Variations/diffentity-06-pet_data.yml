canonicalAnswer: |
  int main()
  {
      const int MAX = 50;
      pet_data pets[MAX];
      int pet_count;
  
      cout << "How many pets? ";
      cin >> pet_count;
  
      read_pets(pets, pet_count);
  
      for (int i = 0; i < pet_count; i++)
      {
          cout << pets[i].name << ", ";
          cout << pets[i].species << ", ";
          cout << pets[i].age << endl;
      }
  
      return 0;
  }

canonicalAnswer: |
  int main()
  {
      const int MAX = 100;
      website_data websites[MAX];
      int web_count;
  
      cout << "How many websites? ";
      cin >> web_count;
  
      read_websites(websites, web_count);
  
      for (int i = 0; i < web_count; i++)
      {
          cout << websites[i].url << ", ";
          cout << websites[i].visits << ", ";
          cout << websites[i].rank << endl;
      }
  
      return 0;
  }

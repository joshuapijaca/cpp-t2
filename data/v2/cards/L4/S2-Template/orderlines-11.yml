code: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }
question: "Where does the closing brace of main go?"
options: 
  - {label: "A", text: "Right after `return 0;`."}
  - {label: "B", text: "Right after the for-loop closing brace."}
  - {label: "C", text: "Inside the for-loop body."}
  - {label: "D", text: "Before const int MAX = 700."}
correctLabel: "A"
explanation: "main's closing `}` is the very last token of the file; it sits right after `return 0;`."

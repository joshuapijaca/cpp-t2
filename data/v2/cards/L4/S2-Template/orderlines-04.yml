  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }
question: "Which order is correct for the read pipeline?"
options: 
  - {label: "A", text: "cin >> count → read_desks(arr, count)"}
  - {label: "B", text: "read_desks(arr, count) → cin >> count"}
  - {label: "C", text: "cin >> count → read_desks(arr, MAX)"}
  - {label: "D", text: "read_desks(arr, count) → cout prompt"}
correctLabel: "A"
explanation: "cin populates count first; then we pass that real count to read_desks."

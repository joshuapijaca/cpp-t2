code: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }
question: "Which order is correct for the FIRST 3 lines of main body?"
options: 
  - {label: "A", text: "const int MAX → struct array decl → int count_var"}
  - {label: "B", text: "int count_var → const int MAX → struct array decl"}
  - {label: "C", text: "struct array decl → const int MAX → int count_var"}
  - {label: "D", text: "cout prompt → cin → const int MAX"}
correctLabel: "A"
explanation: "const MAX must come first (used by array decl). Array decl uses MAX. count_var declared last; only set later via cin."

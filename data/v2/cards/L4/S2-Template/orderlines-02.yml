  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }
question: "Which order is correct for prompt → call?"
options: 
  - {label: "A", text: "read fn call → cout prompt → cin"}
  - {label: "B", text: "cout prompt → cin → read fn call"}
  - {label: "C", text: "cin → cout prompt → read fn call"}
  - {label: "D", text: "cout prompt → read fn call → cin"}
correctLabel: "B"
explanation: "Prompt first (so user knows what to type), THEN cin reads count, THEN call read_desks(arr, count)."

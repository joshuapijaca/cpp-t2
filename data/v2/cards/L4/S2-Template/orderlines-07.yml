code: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }
question: "What sits between `{` of main and `const int MAX = 700;`?"
options: 
  - {label: "A", text: "Nothing — const MAX is the first body line."}
  - {label: "B", text: "cout prompt."}
  - {label: "C", text: "cin >> desk_num."}
  - {label: "D", text: "read_desks call."}
correctLabel: "A"
explanation: "const MAX is THE first line of main's body. It must come before the array decl that uses it."

  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }
question: "Where does `return 0;` go relative to the print loop?"
options: 
  - {label: "A", text: "Before the print loop."}
  - {label: "B", text: "Inside the print-loop body."}
  - {label: "C", text: "After the print loop, before main's closing brace."}
  - {label: "D", text: "After main's closing brace."}
correctLabel: "C"
explanation: "return 0 is the LAST statement of main, AFTER the print loop, BEFORE the closing brace of main."

code: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }
question: "Order: cout-prompt and int-count-decl."
options: 
  - {label: "A", text: "int count_var; THEN cout prompt."}
  - {label: "B", text: "cout prompt; THEN int count_var."}
  - {label: "C", text: "They can be in any order."}
  - {label: "D", text: "cout prompt only — count_var is implicitly created by cin."}
correctLabel: "A"
explanation: "count_var must be DECLARED before cin can read into it. Decl → prompt → cin."

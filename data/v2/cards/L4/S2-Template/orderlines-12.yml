code: |
  int main()
  {
      const int MAX = 700;
      desk_data desks[MAX];
      int desk_num;
  
      cout << "How many desks? ";
      cin >> desk_num;
  
      read_desks(desks, desk_num);
  
      for (int i = 0; i < desk_num; i++)
      {
          cout << desks[i].room_id << ", ";
          cout << desks[i].d_id << ", ";
          cout << desks[i].number_of_screens << endl;
      }
  
      return 0;
  }
question: "Where does `return 0;` sit relative to main's `{` and `}`?"
options: 
  - {label: "A", text: "Before main's `{`."}
  - {label: "B", text: "Inside main's body, last statement before `}`."}
  - {label: "C", text: "After main's closing `}`."}
  - {label: "D", text: "Inside the for-loop body."}
correctLabel: "B"
explanation: "return 0 is INSIDE main's body but is the LAST statement, immediately before main's closing brace."

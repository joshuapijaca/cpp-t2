stem: |
  Q4 main — student wrote main without `return 0;` at the end. Compiles in C++17+ (main implicitly returns 0), but the unit's rubric requires explicit `return 0;`. Read the diff.

failedAttempt: |
  int main()
  {
      const int MAX = 100;
      student_data students[MAX];
      int count = 0;

      cout << "How many students? ";
      cin >> count;

      read_students(students, count);
      print_students(students, count);
  }

diagnosis: |
  C++17 lets `int main()` compile without an explicit `return 0;` (the compiler inserts one). But the unit's rubric expects the explicit return statement — it's a token in the marking regex. Without it, the structure-check loses a mark even though the program runs correctly. Always finish main with `return 0;`.

repairSteps:
  - "int main()"
  - "{"
  - "    const int MAX = 100;"
  - "    student_data students[MAX];"
  - "    int count = 0;"
  - "    cout << \"How many students? \";"
  - "    cin >> count;"
  - "    read_students(students, count);"
  - "    print_students(students, count);"
  - "    return 0;       // <-- EXPLICIT return 0"
  - "}"

preventionTip: |
  Every `int main()` ends with `return 0;` (returns success status to the OS). It's the LAST line before the closing `}`. When you type `int main()`, immediately type the closing structure including `return 0;`, then fill in the body.

explanation: |
  Lesson learned — main is the program's exit point. Returning 0 signals success to the operating system; non-zero signals errors. Even though C++17 allows omission, EVERY style guide and EVERY rubric in this unit requires explicit `return 0;`. Make it muscle memory: `int main() { ... return 0; }` as a single template.

canonicalAnswer: |
  int main()
  {
      const int MAX = 100;
      student_data students[MAX];
      int count = 0;

      cout << "How many students? ";
      cin >> count;

      read_students(students, count);
      print_students(students, count);

      return 0;
  }


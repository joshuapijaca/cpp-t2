stem: |
  Q2 struct — student named a field `class` (a C++ reserved keyword). Compiler error: cannot use keyword as identifier. Read the diff.

failedAttempt: |
  struct student_data
  {
      string name;
      int class;
      int year;
  };

diagnosis: |
  `class` is a reserved keyword in C++ — it introduces class definitions. You cannot use it as an identifier. Other off-limits: `int`, `double`, `for`, `if`, `return`, `void`, `const`, `struct`, `enum`, `using`, `namespace`. Compiler error: "expected member name before 'class'". Choose a non-reserved name like `class_id`, `class_num`, or `course`.

repairSteps:
  - "struct student_data"
  - "{"
  - "    string name;"
  - "    int class_id;     // <-- avoid the keyword `class`"
  - "    int year;"
  - "};"

preventionTip: |
  C++ has ~80 reserved keywords. If your editor highlights a name in keyword color, pick a different name. Common traps: `class`, `template`, `new`, `delete`, `case`, `try`, `throw`, `default`, `friend`, `operator`. Append `_id`, `_num`, or `_value` to disambiguate.

explanation: |
  Lesson learned — reserved words are language-level taboo. The compiler error is immediate and clear ("expected member name before 'class'"), but the fix requires you to know the keyword list. When in doubt, paste your identifier into a C++ keyword reference. PascalCase doesn't save you either: `Class` is fine but conventions for this unit are snake_case.

canonicalAnswer: |
  struct student_data
  {
      string name;
      int class_id;
      int year;
  };

annotations:
  - line: 4
    severity: err
    note: "`class` is a reserved C++ keyword. Use `class_id` or `course` or another non-keyword."


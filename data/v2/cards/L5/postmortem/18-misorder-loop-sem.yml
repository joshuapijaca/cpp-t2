stem: |
  Q3 read function — student wrote `cin >> students.name` (forgot the `[i]` subscript). Every iteration writes into the same conceptual struct; the array is never populated correctly.

failedAttempt: |
  void read_students(student_data students[], int count)
  {
      for (int i = 0; i < count; i++)
      {
          cout << "Enter name: ";
          cin >> students.name;
          cout << "Enter age: ";
          cin >> students.age;
      }
  }

diagnosis: |
  `students` is an array of structs; you must subscript it with `[i]` BEFORE accessing a field. The composite token `students[i].name` has THREE parts: array name, subscript, field. The student dropped `[i]` and wrote `students.name`. This actually fails to compile (arrays don't have `.name` directly), but students sometimes paper over it with refactors and end up with all input flowing into the same conceptual record.

repairSteps:
  - "for (int i = 0; i < count; i++)"
  - "{"
  - "    cout << \"Enter name: \";"
  - "    cin >> students[i].name;     // <-- ARRAY[i].FIELD"
  - "    cout << \"Enter age: \";"
  - "    cin >> students[i].age;"
  - "}"

preventionTip: |
  Inside a read loop, the input target is `arr[i].field`. Three tokens: array, `[i]`, `.field`. Drop any one and you have a different (wrong) thing. Mantra: "array-bracket-i-dot-field."

explanation: |
  Lesson learned — `students[i].name` is a single composite expression you should drill until it's automatic. Common confusion under exam pressure: students collapse it to `students.name` (forgot subscript) or `students[i]` (forgot field). Both lose marks. Practice writing the full composite 10 times to lock it in.

canonicalAnswer: |
  void read_students(student_data students[], int count)
  {
      for (int i = 0; i < count; i++)
      {
          cout << "Enter name: ";
          cin >> students[i].name;
          cout << "Enter age: ";
          cin >> students[i].age;
      }
  }

annotations:
  - line: 6
    severity: err
    note: "`students.name` is missing `[i]`. Should be `students[i].name`. Won't compile (arrays have no `.name`)."
  - line: 8
    severity: err
    note: "Same mistake on the next field. Both inputs target a non-existent member."


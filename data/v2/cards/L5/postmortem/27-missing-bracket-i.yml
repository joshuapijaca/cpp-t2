    severity: err
    note: "`&students` at call site creates a pointer-to-array. Function expects `student_data[]`. Type mismatch. Just write `students`."
  - line: 11
    severity: err
    note: "Same extra `&`. The `&` belongs in the FUNCTION SIGNATURE, not the call."


stem: |
  Q3 read function — student wrote `cin << students[i].name` instead of `cin >> students[i].name`. Wrong stream direction; nothing reads from stdin.

failedAttempt: |
  void read_students(student_data students[], int count)
  {
      for (int i = 0; i < count; i++)
      {
          cout << "Enter name: ";
          cin << students[i].name;
          cout << "Enter age: ";
          cin << students[i].age;
      }
  }

diagnosis: |
  `cin >>` reads FROM standard input INTO a variable. `cout <<` writes TO standard output FROM a variable. Direction matters: `cin << var` would mean "write var TO cin," which is meaningless. Most C++ compilers actually error out on `cin << some_struct_field` ("no operator `<<` matching"), but for primitive types they sometimes compile silently with no effect — the worst possible failure mode.

repairSteps:
  - "for (int i = 0; i < count; i++)"
  - "{"
  - "    cout << \"Enter name: \";   // cout <<  (output)"
  - "    cin >> students[i].name;   // cin >>  (input)"
  - "    cout << \"Enter age: \";"
  - "    cin >> students[i].age;"
  - "}"

preventionTip: |
  Streams are arrows pointing at the destination: `cin >> var` (data flows INTO var); `cout << var` (data flows OUT to terminal). Mantra: "cin-right, cout-left." The arrows always point at the variable when reading; always point away when writing.

explanation: |
  Lesson learned — operator direction for streams is fixed. `cin <<` is essentially a typo for `cin >>` and produces wrong behavior whether or not it compiles. When you find yourself typing `cin`, the next two characters are ALWAYS `>>`. Train both directions until they're reflex.

canonicalAnswer: |
  void read_students(student_data students[], int count)
  {
      for (int i = 0; i < count; i++)
      {
          cout << "Enter name: ";
          cin >> students[i].name;
          cout << "Enter age: ";
          cin >> students[i].age;
      }
  }

annotations:
  - line: 6
    severity: err
    note: "`cin << ...` is wrong direction. Should be `cin >> students[i].name`."
  - line: 8
    severity: err
    note: "Same direction error. Reading uses `>>`, writing uses `<<`."


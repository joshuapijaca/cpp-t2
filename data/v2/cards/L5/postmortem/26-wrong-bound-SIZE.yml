stage: 5
level: "L5"
type: "PostmortemCard"

stem: |
  Q4 main — student passed `MAX` (capacity) to the read/print functions instead of `count` (runtime). Read function asks user for 100 records; print function prints 100 records (most uninitialised).

failedAttempt: |
  int main()
  {
      const int MAX = 100;
      student_data students[MAX];
      int count = 0;

      cout << "How many students? ";
      cin >> count;

      read_students(students, MAX);
      print_students(students, MAX);

      return 0;
  }

diagnosis: |
  Two parameters look alike: `MAX` (compile-time capacity, the array size) and `count` (runtime, the number the user wants to enter). The student passed `MAX` to both functions, so read_students prompts the user 100 times and print_students prints all 100 slots — most uninitialised. The user-supplied `count` is ignored. Symptom: program runs forever asking for input, or prints 100 garbage rows.

repairSteps:
  - "int main()"
  - "{"
  - "    const int MAX = 100;"
  - "    student_data students[MAX];"
  - "    int count = 0;"
  - "    cout << \"How many students? \";"
  - "    cin >> count;"
  - "    read_students(students, count);   // <-- pass `count`, not `MAX`"
  - "    print_students(students, count);  // <-- pass `count`, not `MAX`"
  - "    return 0;"
  - "}"

preventionTip: |
  At the call site, the second argument to read/print is the RUNTIME `count`, never the compile-time `MAX`. `MAX` is for declaring the array; `count` is for iterating it. Mantra: "MAX declares, count iterates."

explanation: |
  Lesson learned — capacity and count are separate concepts. The array is statically sized at MAX (you might use 100 slots even though you only fill 5). The COUNT tells the rest of the program "this many slots are real data." Pass `count` to anything that LOOPS over the array; reserve `MAX` for the array DECLARATION line only.

canonicalAnswer: |
  int main()
  {
      const int MAX = 100;
      student_data students[MAX];
      int count = 0;

      cout << "How many students? ";
      cin >> count;

      read_students(students, count);
      print_students(students, count);

      return 0;
  }

annotations:
  - line: 10
    severity: err
    note: "`read_students(students, MAX)` passes capacity. Should be `count` so the function only reads what the user requested."
  - line: 11
    severity: err
    note: "`print_students(students, MAX)` prints uninitialised slots beyond `count`. Pass `count`."


type: "PostmortemCard"

stem: |
  Q2 struct — student dropped the `;` after a field declaration, expecting the newline to terminate the line. Compiler reads two fields as one and emits "expected ';' before". Read the diff.

failedAttempt: |
  struct student_data
  {
      string name
      int age;
      double gpa;
  };

diagnosis: |
  C++ statement terminators are SEMICOLONS, not newlines. Each field declaration must end with `;`. The student left `string name` without `;`, so the compiler reads `string name int age` as a single (malformed) declaration. The error message will point at `int age` saying "expected ';' before 'int'" — confusing because the missing semicolon is on the line ABOVE.

repairSteps:
  - "struct student_data"
  - "{"
  - "    string name;     // <-- semicolon at end of EVERY field"
  - "    int age;"
  - "    double gpa;"
  - "};"

preventionTip: |
  Every field declaration ends with `;`. When the compiler complains about a token on line N, the bug is often on line N-1 (missing `;`). Type-then-name-then-semicolon is the canonical rhythm.

explanation: |
  Lesson learned — C++ doesn't care about whitespace or newlines for statement boundaries. Only `;` ends a statement. When you write fields, each one is its own statement. Habituate "type, name, semicolon, newline" as one mental unit so you never drop the semi.

canonicalAnswer: |
  struct student_data
  {
      string name;
      int age;
      double gpa;
  };

annotations:
  - line: 3
    severity: err
    note: "Missing `;` after `string name`. Compiler error appears on the next line."
  - line: 4
    severity: warn
    note: "This is where the error appears — `int age` interpreted as continuation of line above."


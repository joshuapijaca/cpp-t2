stem: |
  Q3 read function — student used `i < SIZE` instead of `i < count`. Loop reads past the actual user-supplied count, asking for input on uninitialised slots and corrupting subsequent main-fn output.

failedAttempt: |
  void read_students(student_data students[], int count)
  {
      for (int i = 0; i < SIZE; i++)
      {
          cout << "Enter name: ";
          cin >> students[i].name;
          cout << "Enter age: ";
          cin >> students[i].age;
      }
  }

diagnosis: |
  Q3's `count` is the runtime number of records the user wants to enter. `SIZE` (or `MAX`) is the compile-time array capacity, which is usually larger. Looping to `SIZE` asks the user for input on slots they didn't ask for, blocking on `cin` for missing data. Even if input is available, you populate slots beyond `count` that main never iterates over later — wasted work AND user confusion.

repairSteps:
  - "void read_students(student_data students[], int count)"
  - "{"
  - "    for (int i = 0; i < count; i++)     // <-- bound is `count`, not `SIZE`"
  - "    {"
  - "        cout << \"Enter name: \";"
  - "        cin >> students[i].name;"
  - "        cout << \"Enter age: \";"
  - "        cin >> students[i].age;"
  - "    }"
  - "}"

preventionTip: |
  In Q3 read functions, the loop bound is the RUNTIME COUNT parameter (`count` / `n`), NOT the compile-time CAPACITY (`SIZE` / `MAX`). The capacity tells you how many slots the array CAN hold; the count tells you how many the USER wants to fill.

explanation: |
  Lesson learned — capacity vs count is a defining distinction in array-of-struct work. The function signature literally takes `count` as a parameter precisely so the caller can specify "fill this many." Using `SIZE` ignores the parameter and over-reads. Whenever you see a parameter named `count` or `n`, it IS the loop bound for the data-bearing slots.

canonicalAnswer: |
  void read_students(student_data students[], int count)
  {
      for (int i = 0; i < count; i++)
      {
          cout << "Enter name: ";
          cin >> students[i].name;
          cout << "Enter age: ";
          cin >> students[i].age;
      }
  }

annotations:
  - line: 3
    severity: err
    note: "`i < SIZE` ignores the runtime count. Should be `i < count`. Asks user for too many records."


stem: >
  Q3 read function — student used `i < SIZE` instead of `i < count`. Loop reads past the actual user-supplied count,
  asking for input on uninitialised slots and corrupting subsequent main-fn output.
levelLabel: L5 · M-03 · Postmortem
fullCode: |-
  void read_students(student_data students[], int count)
  {
      for (int i = 0; i < count; i++)
      {
          cout << "Enter name: ";
          cin >> students[i].name;
          cout << "Enter age: ";
          cin >> students[i].age;
      }
  }

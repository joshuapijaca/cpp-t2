stem: |
  Q2 struct — student used a hyphen in the type name (`student-data`). Hyphens aren't legal in C++ identifiers; the compiler treats `student - data` as subtraction of two undeclared variables. Read the diff.

failedAttempt: |
  struct student-data
  {
      string name;
      int age;
      double gpa;
  };

diagnosis: |
  Legal C++ identifier characters are: letters (A-Z, a-z), digits (0-9), and underscore (_). Hyphens are NOT allowed — they're the subtraction operator. `student-data` is parsed as `student MINUS data`, two identifiers neither declared. Compiler error: "expected unqualified-id before '-' token". Use UNDERSCORE for word separation in C++ identifiers.

repairSteps:
  - "struct student_data    // <-- underscore, not hyphen"
  - "{"
  - "    string name;"
  - "    int age;"
  - "    double gpa;"
  - "};"

preventionTip: |
  C++ identifier alphabet: letters, digits, underscores. NO hyphens, NO spaces, NO dollar signs. To separate words use `snake_case` (underscore) or `camelCase`. Mantra: "underscore for separator, never hyphen."

explanation: |
  Lesson learned — identifier rules differ across languages. CSS allows hyphens (`background-color`); Lisp prefers them (`my-list`); C++ FORBIDS them. If you're coming from web dev or other dialects, this is a common reflex error. Train the underscore: `student_data`, `final_score`, `num_items`.

canonicalAnswer: |
  struct student_data
  {
      string name;
      int age;
      double gpa;
  };

annotations:
  - line: 1
    severity: err
    note: "Hyphen `-` is not legal in C++ identifiers. Replace with underscore `_`."


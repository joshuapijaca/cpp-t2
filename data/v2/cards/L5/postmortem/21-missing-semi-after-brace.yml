id: "L5-postmortem-21-missing-semi-after-brace"
schemaVersion: "v2"
atomId: "M-03"
qTags: ["Q3"]
stage: 5
level: "L5"
type: "PostmortemCard"

stem: |
  Q3 read function — student dropped the `[]` from the array parameter, declaring `student_data students` (single struct) instead of `student_data students[]` (array). Compiles, but every iteration overwrites the same struct.

failedAttempt: |
  void read_students(student_data students, int count)
  {
      for (int i = 0; i < count; i++)
      {
          cout << "Enter name: ";
          cin >> students[i].name;
          cout << "Enter age: ";
          cin >> students[i].age;
      }
  }

diagnosis: |
  Without `[]`, `students` is a single struct, not an array. The body's `students[i].name` then fails to compile (cannot subscript a non-array). Even if you "fix" it by removing `[i]`, you'd write to the same single struct each iteration, ending with only the last input retained. The `[]` in the signature is what makes `students` an array parameter.

repairSteps:
  - "void read_students(student_data students[], int count)   // <-- ARRAY param: students[]"
  - "{"
  - "    for (int i = 0; i < count; i++)"
  - "    {"
  - "        cout << \"Enter name: \";"
  - "        cin >> students[i].name;"
  - "        cout << \"Enter age: \";"
  - "        cin >> students[i].age;"
  - "    }"
  - "}"

preventionTip: |
  Array parameters need `[]` after the name in the signature: `T name[]`. The brackets distinguish "array of T" from "single T." Without them, your `[i]` subscripts in the body have nothing to index.

explanation: |
  Lesson learned — function signatures encode parameter shape. `student_data students[]` says "this is an array of student_data." Drop the brackets and you've declared a single struct, breaking every subscript in the body. When writing a read function for an array, the FIRST thing to type after the type name is `name[]`.

canonicalAnswer: |
  void read_students(student_data students[], int count)
  {
      for (int i = 0; i < count; i++)
      {
          cout << "Enter name: ";
          cin >> students[i].name;
          cout << "Enter age: ";
          cin >> students[i].age;
      }
  }

annotations:
  - line: 1
    severity: err
    note: "`student_data students` declares a single struct. Should be `student_data students[]` for an array parameter."
  - line: 6
    severity: err
    note: "`students[i]` won't compile because `students` is not an array (per the signature on line 1)."


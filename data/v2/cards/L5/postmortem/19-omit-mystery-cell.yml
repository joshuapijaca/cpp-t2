stem: |
  Q3 read function — student wrote `cin >> students[i] name` (no `.` between subscript and field). Compile error: "expected ';' before 'name'". Read the diff.

failedAttempt: |
  void read_students(student_data students[], int count)
  {
      for (int i = 0; i < count; i++)
      {
          cout << "Enter name: ";
          cin >> students[i] name;
          cout << "Enter age: ";
          cin >> students[i] age;
      }
  }

diagnosis: |
  Field access in C++ uses `.` for structs/objects (or `->` for pointers). Without `.`, the compiler sees `students[i]` followed by an identifier `name` and tries to interpret it as two separate things — fails to parse. Error: "expected ';' before 'name'". Three-part composite `students[i].name` MUST have the dot.

repairSteps:
  - "for (int i = 0; i < count; i++)"
  - "{"
  - "    cout << \"Enter name: \";"
  - "    cin >> students[i].name;     // <-- DOT between subscript and field"
  - "    cout << \"Enter age: \";"
  - "    cin >> students[i].age;"
  - "}"

preventionTip: |
  Field access requires the `.` operator. `array[i].field` — never `array[i] field`. The dot is part of the field access OP, not a stylistic choice. C++ won't autocorrect it.

explanation: |
  Lesson learned — operators in C++ are explicit. Where some languages allow space-separated paths or method chaining without dots, C++ requires the punctuation. Train the muscle memory: subscript `[i]` followed immediately by `.` followed immediately by field. No space, no missing dot.

canonicalAnswer: |
  void read_students(student_data students[], int count)
  {
      for (int i = 0; i < count; i++)
      {
          cout << "Enter name: ";
          cin >> students[i].name;
          cout << "Enter age: ";
          cin >> students[i].age;
      }
  }

annotations:
  - line: 6
    severity: err
    note: "`students[i] name` is missing the dot. Should be `students[i].name`."
  - line: 8
    severity: err
    note: "Same dot omission. Won't compile."


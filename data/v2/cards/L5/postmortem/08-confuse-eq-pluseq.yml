stem: |
  Q1 trace — student wrote `data.mystery = data.numbers[i]` for a sum-positive accumulation. They overwrote the running total each iteration instead of adding to it. Final mystery = last positive seen, not the sum.

failedAttempt: |
  void who_am_i(test_data &data) {
      data.mystery = 0.0;
      for (int i = 0; i < SIZE; i++) {
          if (data.numbers[i] > 0) {
              data.mystery = data.numbers[i];
          }
      }
  }

diagnosis: |
  Sum-style accumulation needs `mystery = mystery + numbers[i]` (or `mystery += numbers[i]`). The student wrote bare `=`, which OVERWRITES the running total each iteration. With inputs `{3, -1, 7, -2, 5}`, expected sum = 15; actual final = 5 (just the last positive). Find-max uses `=` (overwrite); sum/count use `+=` (accumulate). Different operators for different patterns.

repairSteps:
  - "for (int i = 0; i < SIZE; i++) {"
  - "    if (data.numbers[i] > 0) {"
  - "        data.mystery = data.mystery + data.numbers[i];   // <-- ACCUMULATE"
  - "    }"
  - "}"

preventionTip: |
  Two patterns, two operators: find-max keeps the LATEST winner with `mystery = numbers[i]`; sum/count combine ALL hits with `mystery = mystery + numbers[i]`. Read the algorithm name first — "sum" / "count" / "total" implies `+=`.

explanation: |
  Lesson learned — `=` and `+=` look similar but compute opposite things. `=` overwrites; `+=` adds. Sum-positive's whole point is to accumulate across iterations; without `+=` you lose every previous contribution. Compiler can't catch this; only the trace reveals the missing growth. Mantra: "sum implies plus-equals."

canonicalAnswer: |
  void who_am_i(test_data &data) {
      data.mystery = 0.0;
      for (int i = 0; i < SIZE; i++) {
          if (data.numbers[i] > 0) {
              data.mystery = data.mystery + data.numbers[i];
          }
      }
  }

annotations:
  - line: 5
    severity: err
    note: "`mystery = numbers[i]` overwrites. Sum-positive needs `mystery = mystery + numbers[i]` to accumulate."


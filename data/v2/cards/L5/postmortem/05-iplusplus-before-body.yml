stem: >
  Q1 trace — student incremented `i` BEFORE running the body. Sequence went `i = 0 -> i = 1 -> body[1]` instead of `i =
  0 -> body[0] -> i = 1`. Off by one row in the trace.
levelLabel: L5 · M-03 · Postmortem
fullCode: |-
  // Correct trace order:
  //   i = 0  -> body uses numbers[0]
  //   i = 1  -> body uses numbers[1]
  //   ...
  //   i = SIZE-1 -> body uses numbers[SIZE-1]
  //   i = SIZE   -> check fails, loop exits
  void who_am_i(test_data &data) {
      data.mystery = 0.0;
      for (int i = 0; i < SIZE; i++) {
          data.mystery = data.mystery + data.numbers[i];
      }
  }

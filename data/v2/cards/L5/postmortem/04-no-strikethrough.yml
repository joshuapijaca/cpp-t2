fullCode: |-
  // Trace with strikethrough applied:
  //   i = 0:  mystery = -20.0
  //   i = 1:  mystery = ~~-20.0~~  3.5
  //   i = 2:  mystery = 3.5  (cond false, no row update)
  //   i = 3:  mystery = ~~3.5~~  12.0
  //   final mystery = 12.0
  void who_am_i(test_data &data) {
      data.mystery = data.numbers[0];
      for (int i = 1; i < SIZE; i++) {
          if (data.numbers[i] > data.mystery) {
              data.mystery = data.numbers[i];
          }
      }
  }

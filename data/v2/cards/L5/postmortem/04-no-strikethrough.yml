id: "L5-postmortem-04-no-strikethrough"
schemaVersion: "v2"
atomId: "M-03"
qTags: ["Q1"]
stage: 5
level: "L5"
type: "PostmortemCard"

stem: |
  Q1 trace — student wrote the new `mystery` value next to the old one without striking the old. Marker can't tell which value is current. Read the failed attempt and the canonical fix.

failedAttempt: |
  // Trace table for `data.mystery` (Q1 hand-execution):
  //   i = 0:  mystery = -20.0
  //   i = 1:  mystery = -20.0  3.5
  //   i = 2:  mystery = -20.0  3.5  3.5
  //   i = 3:  mystery = -20.0  3.5  3.5  12.0
  //   final: mystery = ???  (which one counts?)
  void who_am_i(test_data &data) {
      data.mystery = data.numbers[0];
      for (int i = 1; i < SIZE; i++) {
          if (data.numbers[i] > data.mystery) {
              data.mystery = data.numbers[i];
          }
      }
  }

diagnosis: |
  Q1 hand-execution rubric REQUIRES strikethrough on stale values: each cell shows old-value-crossed-out next to new-value. The student wrote values side-by-side without strikes. The marker can't tell which is current; the trace is ambiguous and gets zero marks even if the values are right.

repairSteps:
  - "// Strike out the previous value when overwriting:"
  - "//   i = 0:  mystery = -20.0"
  - "//   i = 1:  mystery = ~~-20.0~~  3.5"
  - "//   i = 2:  mystery = 3.5  (cond false: 1.0 > 3.5 is false)"
  - "//   i = 3:  mystery = ~~3.5~~  12.0"
  - "//   final: mystery = 12.0"

preventionTip: |
  Every memory cell in the trace shows the HISTORY of that variable. When a value changes, draw a line through the old number and write the new one beside it. Final answer = the only un-struck value at the end.

explanation: |
  Lesson learned — the trace IS the answer; presentation matters as much as the math. Strikethrough makes the sequence of mutations readable at a glance. Without it, the marker sees ambiguity and assumes you don't know which value is current. APK practice mode renders this exactly: old values get a line through them on update.

canonicalAnswer: |
  // Trace with strikethrough applied:
  //   i = 0:  mystery = -20.0
  //   i = 1:  mystery = ~~-20.0~~  3.5
  //   i = 2:  mystery = 3.5  (cond false, no row update)
  //   i = 3:  mystery = ~~3.5~~  12.0
  //   final mystery = 12.0
  void who_am_i(test_data &data) {
      data.mystery = data.numbers[0];
      for (int i = 1; i < SIZE; i++) {
          if (data.numbers[i] > data.mystery) {
              data.mystery = data.numbers[i];
          }
      }
  }

annotations:
  - line: 2
    severity: info
    note: "First assignment — no prior value to strike."
  - line: 3
    severity: err
    note: "Wrote `-20.0  3.5` side-by-side. Should be `~~-20.0~~ 3.5` (old value crossed)."
  - line: 4
    severity: err
    note: "Three values with no strikes. Marker cannot determine which is current."


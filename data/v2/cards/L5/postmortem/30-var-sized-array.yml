stem: |
  Q4 main — student sized the array with the runtime `count` (`student_data students[count]`). This is a Variable-Length Array (VLA), non-standard C++. Read the diff.

failedAttempt: |
  int main()
  {
      int count = 0;
      cout << "How many students? ";
      cin >> count;

      student_data students[count];

      read_students(students, count);
      print_students(students, count);

      return 0;
  }

diagnosis: |
  The student tried to size the array based on the user-supplied count: `student_data students[count]`. This is a Variable-Length Array — `count` is a runtime value, not a compile-time constant. VLAs are a GCC extension, not standard C++, and the unit explicitly disallows them. Standard pattern: declare the array at MAX capacity (`const int MAX = 100; T arr[MAX];`), then track real size with `count`.

repairSteps:
  - "int main()"
  - "{"
  - "    const int MAX = 100;             // <-- compile-time capacity"
  - "    student_data students[MAX];      // <-- size with MAX, NOT count"
  - "    int count = 0;"
  - "    cout << \"How many students? \";"
  - "    cin >> count;"
  - "    read_students(students, count);  // <-- iterate up to count"
  - "    print_students(students, count);"
  - "    return 0;"
  - "}"

preventionTip: |
  Arrays are sized once, at compile time, with `const`. The runtime `count` controls iteration, not declaration. Pattern: "MAX sizes the array; count iterates the array." Never `T arr[runtime_var]`.

explanation: |
  Lesson learned — fixed-capacity arrays with a runtime count is THE canonical pattern for SIT102 record-management programs. Allocate enough room (MAX); track real fill (count). VLAs feel intuitive ("I want exactly the right size") but they're non-portable and break the rubric. Train the discipline: declare at MAX, iterate up to count.

canonicalAnswer: |
  int main()
  {
      const int MAX = 100;
      student_data students[MAX];
      int count = 0;

      cout << "How many students? ";
      cin >> count;

      read_students(students, count);
      print_students(students, count);

      return 0;
  }

annotations:
  - line: 7
    severity: err

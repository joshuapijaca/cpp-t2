stem: |
  S5.5 wildcard: Zero-instead-of-i index.

correct: "cin >> arr[i].field — the index must be `i`, not `0`."

distractors:
  - "cin >> arr[0].field is fine in a loop."
  - "Index can be omitted."
  - "Index must be `count - 1`."

explanation: |
  Inside the loop, `i` is the current iteration. `arr[0]` only ever writes to element 0 — overwrites previous values.


  S5.5 wildcard: Amp at call site trap.

correct: "read_X(arr, count) — bare names, no `&`."

distractors:
  - "read_X(&arr, &count) — & at call site."
  - "read_X(*arr, count) — pointer dereference."
  - "read_X(arr[], count) — repeat the brackets."

explanation: |
  C++ pass-by-reference is in the SIGNATURE only. At the call site, you pass bare variable names.


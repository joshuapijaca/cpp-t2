  Write read_games(game_data arr[], int count) reading title, genre, year, rating.

canonicalAnswer: |
  void read_games(game_data arr[], int count) {
    int i;
    for (i = 0; i < count; i++) {
      cin >> arr[i].title;
      cin >> arr[i].genre;
      cin >> arr[i].year;
      cin >> arr[i].rating;
    }
  }


prompt: |
  Write the function read_orders(order_data arr[], int count). It loops i
  from 0 to count-1 and reads each field of arr[i] from cin in order:
  customer, items, total.

canonicalAnswer: |
  void read_orders(order_data arr[], int count) {
    int i;
    for (i = 0; i < count; i++) {
    cin >> arr[i].customer;
    cin >> arr[i].items;
    cin >> arr[i].total;
    }
  }


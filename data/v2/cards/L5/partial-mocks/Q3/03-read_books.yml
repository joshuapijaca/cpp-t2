prompt: |
  Write the function read_books(book_data arr[], int count). It loops i
  from 0 to count-1 and reads each field of arr[i] from cin in order:
  title, pages, price.
canonicalAnswer: |
  void read_books(book_data arr[], int count) {
    int i;
    for (i = 0; i < count; i++) {
    cin >> arr[i].title;
    cin >> arr[i].pages;
    cin >> arr[i].price;
    }
  }

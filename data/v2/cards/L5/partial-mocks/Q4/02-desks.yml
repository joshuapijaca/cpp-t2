prompt: |
  Write int main() that:
    1. Declares const int MAX = 100;
    2. Declares desk_data arr[MAX];
    3. Reads count from cin (count <= MAX).
    4. Calls read_desks(arr, count).
    5. Calls print_desks(arr, count).
    6. Returns 0.

canonicalAnswer: |
  int main() {
    const int MAX = 100;
    desk_data arr[MAX];
    int count;
    cin >> count;
    read_desks(arr, count);
    print_desks(arr, count);
    return 0;
  }


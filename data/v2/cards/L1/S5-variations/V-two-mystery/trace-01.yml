stem: "stat_two has TWO mystery fields. Track BOTH: mystery_a = max, mystery_b = sum. Single loop, two updates per iteration. numbers = {2.0, 5.0, 1.0, 4.0, 3.0}."

code: |
  const int SIZE = 5;
  
  struct stat_two {
    double numbers[SIZE];
    double mystery_a;
    double mystery_b;
  };
  
  int main() {
    stat_two data = { {2.0, 5.0, 1.0, 4.0, 3.0}, 0, 0 };
    data.mystery_a = data.numbers[0];
    data.mystery_b = 0.0;
    for (int i = 0; i < SIZE; i = i + 1) {
      if (data.numbers[i] > data.mystery_a) {
        data.mystery_a = data.numbers[i];
      }
      data.mystery_b = data.mystery_b + data.numbers[i];
    }
    cout << data.mystery_a << " " << data.mystery_b << endl;
    return 0;
  }


stem: "Trace sum-all with SIZE = 3, numbers = {2.0, 4.0, 6.0}. Loop runs 3 iterations."

code: |
  const int SIZE = 3;
  
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };
  
  int main() {
    stat_double data = { {2.0, 4.0, 6.0}, 0 };
    data.mystery = 0.0;
    for (int i = 0; i < SIZE; i = i + 1) {
      data.mystery = data.mystery + data.numbers[i];
    }
    cout << data.mystery << endl;
    return 0;
  }


stem: Trace sum-all on stat_int { numbers = {3, 7, 1, 4, 9} }. Note the integer mystery (no decimal point).
code: |
  const int SIZE = 5;

  struct stat_int {
    int numbers[SIZE];
    int mystery;
  };

  int main() {
    stat_int data = { {3, 7, 1, 4, 9}, 0 };
    data.mystery = 0;
    for (int i = 0; i < SIZE; i = i + 1) {
      data.mystery = data.mystery + data.numbers[i];
    }
    cout << data.mystery << endl;
    return 0;
  }

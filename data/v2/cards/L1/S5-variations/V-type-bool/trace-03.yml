stem: Trace count-true on stat_bool { flags = {true, false, true, true, false} }. Counter increments where flags[i] == true.
code: |
  const int SIZE = 5;

  struct stat_bool {
    bool flags[SIZE];
    int mystery;
  };

  int main() {
    stat_bool data = { {true, false, true, true, false}, 0 };
    data.mystery = 0;
    for (int i = 0; i < SIZE; i = i + 1) {
      if (data.flags[i] == true) {
        data.mystery = data.mystery + 1;
      }
    }
    cout << data.mystery << endl;
    return 0;
  }

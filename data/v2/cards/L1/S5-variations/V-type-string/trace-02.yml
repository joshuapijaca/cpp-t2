stem: "Trace string-concat on stat_string with parts = {\"ab\", \"cd\", \"ef\"}. mystery starts empty; loop concatenates."

code: |
  const int SIZE = 3;
  
  struct stat_string {
    string parts[SIZE];
    string mystery;
  };
  
  int main() {
    stat_string data = { {"ab", "cd", "ef"}, "" };
    data.mystery = "";
    for (int i = 0; i < SIZE; i = i + 1) {
      data.mystery = data.mystery + data.parts[i];
    }
    cout << data.mystery << endl;
    return 0;
  }

variables: ["i", "data.mystery"]


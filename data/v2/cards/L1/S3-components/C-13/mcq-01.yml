stem: |
  What is the correct execution order inside one iteration of a
  `for (int i = 0; i < SIZE; i++)` loop, starting from when control
  first enters the loop?
correct: "init i=0 (once) -> test guard -> if true: run body -> run i++ -> retest guard -> ..."
distractors:
  - init -> run body -> test guard -> run i++ -> retest
  - init -> run i++ -> test guard -> run body -> retest
  - test guard -> init -> run body -> run i++ -> retest
explanation: |
  The for-loop visits each clause in a strict order: init runs once,
  the guard is tested before every body, the body runs only when the
  guard is true, and the post (`i++`) runs after the body. Targets
  CM-C13a (post runs before body) and CM-C13b (init runs every
  iteration).

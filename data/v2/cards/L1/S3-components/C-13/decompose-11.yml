stem: Pick the correct execution order for ONE iteration of `for (int i = 0; i < SIZE; i++) { body }`.
code: |-
  for (int i = 0; i < SIZE; i++) {
    // body
  }
question: >-
  Within a single iteration (after the init has already run once), what is the order of the three
  phases?
options:
  - label: A
    text: 1) i++  2) test i<SIZE  3) run body
  - label: B
    text: 1) test i<SIZE  2) run body  3) i++
  - label: C
    text: 1) run body  2) i++  3) test i<SIZE
  - label: D
    text: 1) run body  2) test i<SIZE  3) i++
correctLabel: B
explanation: >-
  Each iteration: TEST the guard → if true, run BODY → run POST (i++). Then RE-test guard. Body runs
  BEFORE i++; this is the M05 trap: putting i++ before the body off-by-ones the trace.


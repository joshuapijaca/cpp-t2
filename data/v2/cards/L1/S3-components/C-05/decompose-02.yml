stem: Pick the correct sketch for the scalar `double mystery`.
code: |-
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };
  stat_double d;
question: Which option draws mystery correctly?
options:
  - label: A
    text: mystery[0] | mystery[1] | mystery[2]  — 3 cells.
  - label: B
    text: mystery   — 1 cell, no index.
  - label: C
    text: No cell — mystery is implicit and not drawn.
  - label: D
    text: 5 cells — one per array slot.
correctLabel: B
explanation: A scalar is one named cell. mystery has no [] anywhere — it is not an array.


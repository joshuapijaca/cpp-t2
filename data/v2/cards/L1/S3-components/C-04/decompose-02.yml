stem: Pick the correctly-drawn memory layout for `numbers[SIZE]` (SIZE=5).
code: |-
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };
  stat_double d;  // SIZE = 5
question: Which layout is correct?
options:
  - label: A
    text: numbers[0]|numbers[1]|numbers[2]|numbers[3]|numbers[4]  — 5 cells, 0-indexed.
  - label: B
    text: numbers[1]|numbers[2]|numbers[3]|numbers[4]|numbers[5]  — 5 cells, 1-indexed.
  - label: C
    text: numbers[0]|numbers[1]|numbers[2]|numbers[3]|numbers[4]|numbers[5]  — 6 cells.
  - label: D
    text: numbers       — single cell holding all 5 values.
correctLabel: A
explanation: 5 cells, indexed 0..4. Drawing 6 cells (B/C) is the off-by-one trap.


stem: Hand-execute sum-negative on numbers={2.4, -3.7, -1.7, 3.0, 2.0}. Strikethrough every overwrite of data.mystery.
code: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

  int main() {
    stat_double data = { {2.4, -3.7, -1.7, 3.0, 2.0}, 0 };
    data.mystery = 0.0;
    for (int i = 0; i < SIZE; i = i + 1) {
      if (data.numbers[i] < 0) {
        data.mystery = data.mystery + data.numbers[i];
      }
    }
    cout << data.mystery << endl;
    return 0;
  }

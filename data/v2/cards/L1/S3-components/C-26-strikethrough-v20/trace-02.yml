stem: "Hand-execute find-max on numbers={3.2, 7.1, 5.0, 9.4, 2.8}. Strikethrough every overwrite of data.mystery."

code: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

  int main() {
    stat_double data = { {3.2, 7.1, 5.0, 9.4, 2.8}, 0 };
    data.mystery = data.numbers[0];
    for (int i = 1; i < SIZE; i = i + 1) {
      if (data.numbers[i] > data.mystery) {
        data.mystery = data.numbers[i];
      }
    }
    cout << data.mystery << endl;
    return 0;
  }

variables: ["i", "data.mystery"]


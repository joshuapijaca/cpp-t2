type: DecomposeCard
stem: After tracing V2.0 stimulus, two students wrote different mystery cells. Pick the V2.0-correct one.
code: |
  // Student A wrote:
  //   -0.9, 0.0, 2.4, 5.4, 7.4
  //
  // Student B wrote:
  //   ~~-0.9~~ ~~0.0~~ ~~2.4~~ ~~5.4~~ 7.4
question: Which is the V2.0-correct strikethrough trail?
options:
  - label: A
    text: Student A. Comma-listing all values is fine — the marker reads the rightmost.
  - label: B
    text: >-
      Student B. Strikethrough explicitly marks every previous live value as overwritten; only the unstruck value is
      live.
  - label: C
    text: Both are equivalent — punctuation does not matter.
  - label: D
    text: Neither — both list too many values.
correctLabel: B
explanation: >
  Comma-list is ambiguous (could read as a sequence or a set). Strikethrough is the V2.0-correct convention. Targets
  CM-C26b.

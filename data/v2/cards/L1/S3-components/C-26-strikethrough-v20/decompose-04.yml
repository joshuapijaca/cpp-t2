stem: After tracing V2.0 stimulus, a student over-strikes — even striking the final value. Pick the V2.0-correct trail.
code: |
  // Student A wrote (over-struck):
  //   ~~-0.9~~ ~~0.0~~ ~~2.4~~ ~~5.4~~ ~~7.4~~
  //
  // Student B wrote:
  //   ~~-0.9~~ ~~0.0~~ ~~2.4~~ ~~5.4~~ 7.4
question: Which trail correctly leaves the live value visible?
options:
  - label: A
    text: Student A — striking everything makes the trail clean.
  - label: B
    text: Student B — exactly one value (the live one, 7.4) must remain unstruck.
  - label: C
    text: Both are fine.
  - label: D
    text: Neither — V2.0 wants no strikes at all.
correctLabel: B
explanation: |
  The unstruck rightmost value IS the live value. Striking it would mean nothing is live. Targets CM-C26a (drop trail).

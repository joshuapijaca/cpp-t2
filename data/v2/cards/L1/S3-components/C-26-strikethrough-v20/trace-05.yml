stem: "Hand-execute index-of-max on numbers={2.4, -3.7, -1.7, 3.0, 2.0}. Strikethrough every overwrite of data.mystery (which holds the index)."

code: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    int mystery;
  };

  int main() {
    stat_double data = { {2.4, -3.7, -1.7, 3.0, 2.0}, 0 };
    data.mystery = 0;
    for (int i = 1; i < SIZE; i = i + 1) {
      if (data.numbers[i] > data.numbers[data.mystery]) {
        data.mystery = i;
      }
    }
    cout << data.mystery << endl;
    return 0;
  }


teachMe: |
  Strikethrough trail — REQUIRED notation:
    data.mystery cell:  ~~-0.9~~ ~~0.0~~ ~~2.4~~ ~~5.4~~ 7.4

  i cell trail:         ~~0~~ ~~1~~ ~~2~~ ~~3~~ 4

  Why strike-and-keep: marker proves you SAW the previous value
  and the new one replaces it. Final live value = rightmost unstruck.

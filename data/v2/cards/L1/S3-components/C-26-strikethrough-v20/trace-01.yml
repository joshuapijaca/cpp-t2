stem: >-
  Hand-execute on V2.0 stimulus { {2.4, -3.7, -1.7, 3.0, 2.0}, -0.9 }. As you trace, build the full strikethrough trail
  in the data.mystery cell. Every overwrite strikes the previous live value.
code: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

  int main() {
    stat_double data = { {2.4, -3.7, -1.7, 3.0, 2.0}, -0.9 };
    data.mystery = 0.0;
    for (int i = 0; i < SIZE; i = i + 1) {
      if (data.numbers[i] > 0) {
        data.mystery = data.mystery + data.numbers[i];
      }
    }
    cout << data.mystery << endl;
    return 0;
  }
variables:
  - i
  - data.mystery

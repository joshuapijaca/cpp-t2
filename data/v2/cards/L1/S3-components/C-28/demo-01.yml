stem: |
  Watch how the running mystery cell is read at end-of-loop.
whyOneLine: After the for-loop guard returns false, the live (un-struck) mystery value is the answer.
demoCode: |
  // mystery trail across 4 iterations:
  // i=0:    mystery = 0.0
  // i=1:    mystery = 2.4   (0.0 struck through)
  // i=2:    mystery = 5.4   (2.4 struck through)
  // i=3:    mystery = 9.1   (5.4 struck through)
  // i=4:    guard i<SIZE returns false — loop exits.

  // Final cell sketch:
  // mystery: ~~0.0~~ ~~2.4~~ ~~5.4~~ 9.1

  // Answer = 9.1   (the only live, un-struck value)

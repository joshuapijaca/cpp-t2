stem: |
  Fill the operator that asks "is the array element even?"
  (remainder-zero test).
code: |
  if (data.numbers[i] % 2 ___ 0) {
    // ... element is even
  }
clozeSentence: "if (data.numbers[i] % 2 ___ 0) { ... }   // even guard"
answer: "=="
explanation: |
  `% 2 == 0` returns true for even values. The `%` operator yields
  the remainder; for an even number the remainder when divided by 2
  is zero. Targets CM-C19a (uses `=` instead of `==`, an assignment
  bug).
notes: "Cloze form for QA-M10 type-diversity. Drills the equality operator."

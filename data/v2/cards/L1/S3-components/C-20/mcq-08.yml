stem: >-
  In `if (data.numbers[i] > 0) { data.mystery = data.mystery + data.numbers[i]; }`, the condition
  evaluates to TRUE. What happens?
correct: 'The body runs: data.mystery = data.mystery + data.numbers[i] is executed.'
distractors:
  - The body is skipped because there is no else clause.
  - The condition is re-evaluated until it returns false.
  - The whole if-statement is replaced by 0 (early-exit).
explanation: >-
  If the condition is true, the body runs ONCE. There is no else, so falling through after the
  closing brace is normal.


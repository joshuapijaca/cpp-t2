stem: |
  Trace one iteration where `data.numbers[i]` is 4 and
  `data.mystery` is currently 1. The if-condition checks for a
  positive value.
code: |
  if (data.numbers[i] > 0) {
    data.mystery = data.mystery + data.numbers[i];
  }
question: |
  After this iteration, what is the value of `data.mystery`?
options:
  - label: A
    text: 5 — the guard is true (4 > 0), the body runs, mystery becomes 1 + 4 = 5.
  - label: B
    text: 1 — the guard is true, but the body does not modify mystery.
  - label: C
    text: 4 — mystery is replaced by numbers[i].
  - label: D
    text: 0 — mystery is reset whenever the body runs.
correctLabel: A
explanation: |
  When the if-condition is true, the body runs as written:
  `data.mystery = data.mystery + data.numbers[i]` accumulates 4 onto
  the running mystery. Targets CM-C20a (skips the body even though
  the condition is true).
notes: Decompose form for QA-M10 type-diversity. Drills the if-true branch.

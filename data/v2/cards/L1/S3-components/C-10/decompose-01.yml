stem: |
  Decide whether the for-loop body runs for the given iteration.
code: |
  const int SIZE = 5;
  for (int i = 0; i < SIZE; i++) {
    // body
  }
  // Question is about the iteration where i == 3.
question: |
  When i has been incremented to 3 and the guard `i < SIZE` is
  re-tested, what happens?
options:
  - label: A
    text: The guard is true (3 < 5); the body runs for i = 3.
  - label: B
    text: The guard is false (3 is not less than 5); the body is skipped.
  - label: C
    text: The guard re-runs the init clause and resets i to 0.
  - label: D
    text: The guard panics because 3 is not equal to SIZE.
correctLabel: A
explanation: |
  3 is less than 5, so the guard is true and the body runs. Targets
  CM-C10a (off-by-one confusion at i==3). The body always runs while
  the guard returns true; only when the guard returns false does the
  loop exit (that is C-11).
notes: Decompose form for QA-M10 type-diversity.

stem: SIZE is 5. The for-header guard `i < SIZE` is being tested. If i = 1, what is the result?
correct: true (so the loop body runs this iteration)
distractors:
  - false (so the loop exits)
  - true but the loop exits anyway
  - undefined — the comparison cannot be evaluated until i==SIZE
explanation: 1 < 5 is true, so the body runs and the iteration continues.

stem: Pick the correct memory-model picture for who_am_i(stat_double &data).
code: |-
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };
  void who_am_i(stat_double &data) {
    data.mystery = 7.4;
  }
  int main() {
    stat_double d = { {2.4, -3.7, -1.7, 3.0, 2.0}, -0.9 };
    who_am_i(d);   // & in signature, no & at call site
    cout << d.mystery << endl;
    return 0;
  }
question: After who_am_i(d) returns, what does main print?
options:
  - label: A
    text: "-0.9 — main`s d was not affected (function got a copy)."
  - label: B
    text: 7.4 — d and the function`s data were the same memory; the mutation persists.
  - label: C
    text: 0.0 — main`s d is reset to default after the function call.
  - label: D
    text: undefined — accessing d after who_am_i is illegal.
correctLabel: B
explanation: The & in the signature gives data the SAME memory as the caller`s d. Mutations are visible in main.

stage: 3
level: L1
type: DemoCard
stem: |
  Watch how `stat_double &data` makes the function and the caller
  share the same memory.
whyOneLine: "`&` declares the parameter as an alias — the function and the caller name the same struct."
demoCode: |
  void who_am_i(stat_double &data) {
    data.mystery = 0;          // mutates caller struct
  }

  int main() {
    stat_double d;
    d.mystery = 99;
    who_am_i(d);                // d.mystery becomes 0
    cout << d.mystery << endl;  // prints 0
    return 0;
  }

  // Memory:
  //   caller: d     -- same address
  //   callee: data  -- (alias of d)
highlightTokens:
  - stat_double &data
  - data.mystery
  - who_am_i(d)
  - "0"
usedIn:

stem: Identify what the outer braces enclose.
code: |-
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };
  stat_double d = { {0, 0, 0, 0, 0}, 7.7 };
question: What is the *outer* brace pair enclosing?
options:
  - label: A
    text: Just the array values — outer = inner.
  - label: B
    text: 'The whole struct: array field + mystery field.'
  - label: C
    text: A C++ scope block; nothing to do with the struct.
  - label: D
    text: A function body for `d`.
correctLabel: B
explanation: >-
  Outer braces = the struct brace-init list, listing every field in declared order. Inner = the
  array sub-init.


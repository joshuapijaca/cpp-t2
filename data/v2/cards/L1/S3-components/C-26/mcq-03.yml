stem: >-
  When mystery is overwritten from 2.4 to 5.4 mid-trace, what is the correct hand-execute notation
  in the mystery cell?
correct: ~~2.4~~ 5.4   (strike old, write new beside it)
distractors:
  - 5.4   (just the new value; old is gone forever)
  - 2.4 + 5.4 = 7.8   (sum the old and new)
  - 2.4, 5.4   (comma-separated; both are still live)
explanation: >-
  Strikethrough shows you SAW the old value but it is no longer the live value. Marker prevents M09
  (drop trail). Markers also let you reread the trail end-to-end.


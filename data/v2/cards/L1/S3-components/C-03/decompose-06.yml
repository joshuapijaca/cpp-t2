stem: Match brace-init values to array indices.
code: |-
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };
  stat_double d = { {0, 0, 0, 0, 0}, 7.7 };
question: Which option pairs values to indices correctly?
options:
  - label: A
    text: numbers[1] = 0, numbers[2] = 0, numbers[3] = 0, numbers[4] = 0, numbers[5] = 0
  - label: B
    text: numbers[0] = 0, numbers[1] = 0, numbers[2] = 0, numbers[3] = 0, numbers[4] = 0
  - label: C
    text: numbers[0] = 0, numbers[1] = 0, numbers[2] = 0, numbers[3] = 0, numbers[4] = 0
  - label: D
    text: numbers[0] = 7.7, numbers[1] = 0, numbers[2] = 0, numbers[3] = 0, numbers[4] = 0
correctLabel: B
explanation: >-
  C++ arrays are 0-indexed and brace-init fills left-to-right: 1st value → index 0, 5th value →
  index 4.


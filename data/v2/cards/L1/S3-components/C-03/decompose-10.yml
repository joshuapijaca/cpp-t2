stem: Match brace-init values to array indices.
code: |-
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };
  stat_double d = { {1.5, 2.5, 3.5, 4.5, 5.5}, 0 };
question: Which option pairs values to indices correctly?
options:
  - label: A
    text: numbers[1] = 1.5, numbers[2] = 2.5, numbers[3] = 3.5, numbers[4] = 4.5, numbers[5] = 5.5
  - label: B
    text: numbers[0] = 1.5, numbers[1] = 2.5, numbers[2] = 3.5, numbers[3] = 4.5, numbers[4] = 5.5
  - label: C
    text: numbers[0] = 5.5, numbers[1] = 4.5, numbers[2] = 3.5, numbers[3] = 2.5, numbers[4] = 1.5
  - label: D
    text: numbers[0] = 0, numbers[1] = 1.5, numbers[2] = 2.5, numbers[3] = 3.5, numbers[4] = 4.5
correctLabel: B
explanation: >-
  C++ arrays are 0-indexed and brace-init fills left-to-right: 1st value → index 0, 5th value →
  index 4.


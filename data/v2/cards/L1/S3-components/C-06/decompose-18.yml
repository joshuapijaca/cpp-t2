stem: Pick the cell-fill that matches the brace-init.
code: |-
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };
  stat_double d = { {4, 4, 4, 4, 4}, 0 };
question: Which fill is correct?
options:
  - label: A
    text: numbers[0]=4, numbers[1]=4, numbers[2]=4, numbers[3]=4, numbers[4]=4, mystery=0
  - label: B
    text: numbers[0]=0, numbers[1]=4, numbers[2]=4, numbers[3]=4, numbers[4]=4, mystery=4
  - label: C
    text: numbers[0..4] all 0.0, mystery=0
  - label: D
    text: numbers and mystery both stay uninitialized — brace-init does nothing on a struct.
correctLabel: A
explanation: Inner brace fills numbers[0..4] in order, scalar fills mystery. No re-shuffle.


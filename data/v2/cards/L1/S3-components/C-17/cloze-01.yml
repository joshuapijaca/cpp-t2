  Fill the right-hand operand of the V2.0 sum-positive guard:
  "is the array element strictly greater than zero?"
code: |
  if (data.numbers[i] > ___) {
    data.mystery = data.mystery + data.numbers[i];
  }
clozeSentence: if (data.numbers[i] > ___) { ... }   // sum-positive guard
answer: "0"
explanation: |
  V2.0 sums only the positive numbers; the guard is
  `data.numbers[i] > 0`. Zero itself is excluded (strictly greater).
  Targets CM-C17a (uses `>= 0` and accidentally adds zeros to the
  sum).

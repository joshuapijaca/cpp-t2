stem: |
  In a for-header `for (int i = 0; i < SIZE; i++) { ... }`, when does
  the `i++` clause run, and what is its effect on i?
correct: It runs after the body of every iteration; it adds 1 to i.
distractors:
  - It runs before the guard test; it adds 1 to i.
  - It runs only once at the end of the loop; it does not change i.
  - It runs in place of the body when the guard is false.
explanation: |
  `i++` is the post-step. After the body completes, i++ adds 1 to i;
  then the guard is re-tested. Targets CM-C12a (i++ runs before body
  trap). Order: init -> guard -> body -> post -> guard -> body -> ...
notes: MCQ form for QA-M10 type-diversity.
drills: tier1:Q1:for-header

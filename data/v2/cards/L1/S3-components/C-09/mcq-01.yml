stem: |
  In the header `for (int i = 0; i < SIZE; i++) { ... }`, when does
  the `int i = 0;` clause run, and what is the value of i immediately
  after it runs?
correct: It runs ONCE before the first guard test; i is 0.
distractors:
  - It runs at the start of every iteration; i is reset to 0 each time.
  - It runs after each iteration's body; i is 0 after the first body.
  - It runs after the guard test fails; i is 0 when the loop exits.
explanation: |
  The init clause runs exactly once, before the guard is first
  tested. After it runs, i holds 0. Targets CM-C09a (init runs every
  iteration trap). The guard is evaluated next.
notes: MCQ form for QA-M10 type-diversity.

stem: Identify what the inner braces enclose.
code: |-
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };
  stat_double d = { {4, 4, 4, 4, 4}, 0 };
question: What is the inner brace pair enclosing?
options:
  - label: A
    text: The 5 array values, mapped to numbers[0]..numbers[4].
  - label: B
    text: The single mystery value.
  - label: C
    text: A nested anonymous struct with 5 fields.
  - label: D
    text: A discarded comment block.
correctLabel: A
explanation: Inner braces = the array sub-init; each value lands in numbers[0]..numbers[4] in order.


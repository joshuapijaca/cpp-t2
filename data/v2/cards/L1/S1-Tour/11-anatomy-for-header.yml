stem: |
  Anatomy 6/10: the for-header. Three slots between parens: init,
  guard, post. `for (int i = 0; i < SIZE; i++)`. Body runs as long
  as the guard evaluates to true.

whyOneLine: "i runs from 0 to SIZE-1 inclusive — `i < SIZE` is strict, so i==SIZE never enters the body."

demoCode: |
  for ( int i = 0 ; i < SIZE ; i++ ) {
        ^^^^^^^^^   ^^^^^^^^   ^^^
        |           |          |
        |           |          POST: increment AFTER each body
        |           GUARD: keep going as long as true (strict <)
        INIT: declare + zero, fires ONCE before loop
  }
  //   loop iters: i = 0, 1, 2, 3, 4
  //   exit on i = 5 because 5 < 5 is false

highlightTokens:
  - "int i = 0"
  - "i < SIZE"
  - "i++"
  - "ONCE"

usedIn:
  - "Q1: counted iteration over the array"


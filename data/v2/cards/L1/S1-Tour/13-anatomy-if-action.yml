stem: |
  Anatomy 8/10: the if-action. The mutation that updates
  `data.mystery`. Pattern: `data.mystery = <something using
  data.numbers[i]>;`. Sum-positive uses
  `data.mystery = data.mystery + data.numbers[i];`.

whyOneLine: "The action is always an assignment to `data.mystery` — the array cells are NEVER mutated."

demoCode: |
  if (data.numbers[i] > 0) {
    data.mystery = data.mystery + data.numbers[i];
    ^^^^^^^^^^^^   ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^
    |              |
    |              read-and-combine: old mystery + the array cell
    LHS (write) — only data.mystery, NEVER data.numbers[i]
  }

  // Variants by algorithm:
  //   find-max:   data.mystery = data.numbers[i];
  //   sum-pos:    data.mystery = data.mystery + data.numbers[i];
  //   product:    data.mystery = data.mystery * data.numbers[i];
  //   count-pos:  data.mystery = data.mystery + 1;

highlightTokens:
  - "data.mystery = "
  - "data.mystery + data.numbers[i]"
  - "NEVER"

usedIn:

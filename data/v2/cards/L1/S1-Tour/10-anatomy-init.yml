stem: |
  Anatomy 5/10: the pre-loop init. ONE line that sets `data.mystery`
  before the loop runs. INIT varies by algorithm: 0.0 (sum), 1.0
  (product), data.numbers[0] (max/min).

whyOneLine: "Pre-loop init fires ONCE before the loop — skipping it is the #1 trace error in Q1."

demoCode: |
  void who_am_i(stat_double &data) {
    data.mystery = INIT;     // <-- pre-loop init, fires ONCE
    //              ^^^^
    //              0.0    for sum-anything
    //              1.0    for product
    //  data.numbers[0]    for find-max / find-min
    //              0      for count-anything
    for (int i = 0; i < SIZE; i++) {
      ...
    }
  }


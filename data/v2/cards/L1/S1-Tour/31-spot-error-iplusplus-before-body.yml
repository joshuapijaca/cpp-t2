stem: |-
  Spot the error 5/5. A student incremented i BEFORE running the
  body. The trace looks plausible but the values are off. Find the
  bug.

  Code under review:
  // student trace: ran i++ BEFORE the body each iteration
  // brace-init: stat_double d = {{2.4,-3.7,1.0,-2.1,0.5}, -0.9};
  // pre-loop init: mystery = 0.0
  //
  // start: i = 0, then student bumps i++ FIRST -> i = 1
  // body: data.numbers[1] = -3.7 > 0 ? false. skip.
  // ...repeats with i pre-incremented every time...
  // result: skipped numbers[0] (=2.4) entirely
  //
  // student answer: 1.5
  ;


  Which diagnosis describes the bug?
correct: i++ executed before body
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: |
  M05: ran i++ before the body of the iteration. The for-header
  semantics are init -> guard -> BODY -> post-step. The post step
  (i++) fires AFTER the body has run for the current i. Doing
  i++ before the body skips numbers[0] entirely on iter 0 and
  shifts every subsequent index by one. Correct answer = 3.9.

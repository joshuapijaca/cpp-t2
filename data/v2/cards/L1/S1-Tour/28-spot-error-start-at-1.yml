stem: |
  Spot the error 2/5. A student started the array index at 1 instead
  of 0. Where is the bug and what is the correct answer?

brokenCode: |
  // student trace: started at i=1 (skipped numbers[0])
  // brace-init: stat_double d = {{2.4,-3.7,1.0,-2.1,0.5}, -0.9};
  // pre-loop init: mystery = 0.0
  //
  // i=1  -> -3.7 > 0 ? false, skip
  // i=2  -> 1.0  + 0.0 = 1.0
  // i=3  -> -2.1 > 0 ? false, skip
  // i=4  -> 0.5  + 1.0 = 1.5
  //
  // student answer: 1.5
  ;

bugLocations: [3]

fixedCode: |
  // CORRECT: i starts at 0. for (int i = 0; i < SIZE; i++)
  //
  // i=0 -> 2.4 > 0, mystery = 0.0 + 2.4 = 2.4   (MISSED in broken trace)
  // i=1 -> skip
  // i=2 -> 2.4 + 1.0 = 3.4
  // i=3 -> skip
  // i=4 -> 3.4 + 0.5 = 3.9
  //
  // correct answer: 3.9
  ;

bugCategory: "off-by-one start: indexed from 1"

keyChecks:
  - "i = 0"
  - "numbers[0]"

explanation: |
  M02: started counting at i=1 instead of 0. The for-header is
  `for (int i = 0; ...)` — i begins at 0 and the first cell is
  `numbers[0]`. Skipping it loses 2.4 from the running sum.
  Correct answer = 3.9, not 1.5.


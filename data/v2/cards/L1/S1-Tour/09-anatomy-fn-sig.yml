stem: |
  Anatomy 4/10: the function signature. `void who_am_i(stat_double
  &data)`. Return type `void`. Name is the procedure. Param is a
  pass-by-reference struct — the `&` is REQUIRED.
whyOneLine: >-
  The `&` after `stat_double` makes mutations stick — without it the function changes a copy and the caller sees
  nothing.
demoCode: |
  void who_am_i ( stat_double  &data ) {
  ^^^^  ^^^^^^^^   ^^^^^^^^^^^  ^  ^^^^
  |     |          |            |  |
  |     |          |            |  parameter NAME
  |     |          |            REFERENCE marker (mandatory)
  |     |          parameter TYPE (the struct)
  |     function NAME
  RETURN TYPE (void = no return value)
  }   // body braces close here

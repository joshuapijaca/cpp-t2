stem: |
  Anatomy 7/10: the if-guard. `if (cond) { ... }`. The body runs
  ONLY when cond is true. Q1 cond patterns: `data.numbers[i] > 0`
  (V2.0), `data.numbers[i] > data.mystery` (find-max).
whyOneLine: "`if (cond)` is a GATE — false means skip the body for THIS iteration only, not exit the loop."
demoCode: |
  if ( data.numbers[i] > 0 ) {
       ^^^^^^^^^^^^^^^^^^^^
       |
       CONDITION (a bool expression evaluated each iter)
    data.mystery = data.mystery + data.numbers[i];   // <- body
  }   // false -> body SKIPPED, but loop continues to i++

  // common misread: students think a false cond exits the loop.
  // It does NOT — only the BODY of the if is skipped for that iter.
highlightTokens:

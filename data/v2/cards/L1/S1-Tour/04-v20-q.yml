whyOneLine: "V2.0 Q1 = sum-positives algorithm; canonical answer is 0.0 + 2.4 + 1.0 + 0.5 = 3.9."

demoCode: |
  // PROCEDURE
  void who_am_i(stat_double &data) {
    data.mystery = 0.0;                   // pre-loop init = 0.0 not numbers[0]
    for (int i = 0; i < SIZE; i++) {
      if (data.numbers[i] > 0) {
        data.mystery = data.mystery + data.numbers[i];
      }
    }
  }

  // HAND-EXECUTE
  stat_double d = {{2.4, -3.7, 1.0, -2.1, 0.5}, -0.9};
  who_am_i(d);
  // What is d.mystery now?


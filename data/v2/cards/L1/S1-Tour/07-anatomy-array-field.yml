stem: |
  Anatomy 2/10: the array field. `double numbers[SIZE];` declares
  5 doubles inside the struct. Indices 0..4. Access with
  `data.numbers[i]`.
whyOneLine: "`numbers[SIZE]` reserves SIZE cells; index range is 0..SIZE-1, never SIZE."
demoCode: |
  struct stat_double {
    double numbers[SIZE];   // <- 5 cells: numbers[0..4]
    double mystery;
  };

  // memory layout when SIZE = 5:
  //   numbers[0]  numbers[1]  numbers[2]  numbers[3]  numbers[4]
  //   [   ?   ]   [   ?   ]   [   ?   ]   [   ?   ]   [   ?   ]

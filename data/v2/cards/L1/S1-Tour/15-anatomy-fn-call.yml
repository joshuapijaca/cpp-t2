type: DemoCard
stem: |
  Anatomy 10/10: the function call. `who_am_i(d);` — pass the variable
  d by reference. NO `&` at the call site — only on the parameter
  declaration in the function header.
whyOneLine: The `&` lives on the parameter, not the argument — `who_am_i(&d)` would be a compile error.
demoCode: |
  // declaration (inside the function header)
  void who_am_i ( stat_double &data ) { ... }
                                ^
                                & belongs HERE

  // call (in the hand-execute body)
  who_am_i ( d ) ;
            ^
            NO & here — just the variable name

  // After the call returns:
  //   d.mystery is updated in place (because of the & on the param)
  //   The caller's d sees the changes — that's the whole point of
  //   pass-by-reference.
highlightTokens:
  - who_am_i(d)
  - NO &
  - "&data"
usedIn:
  - "Q1: every hand-execute body ends with this call"

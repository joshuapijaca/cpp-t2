stem: |
  Memory format 2/4: post brace-init, pre-call. Now numbers[0..4]
  hold their initial values from the brace-init and mystery holds
  its trailing value.
whyOneLine: >-
  After the brace-init: array cells filled, mystery still equals its init value (it has not been overwritten by the
  function yet).
demoCode: |
  // After: stat_double d = {{2.4, -3.7, 1.0, -2.1, 0.5}, -0.9};

  +-- POST brace-init, PRE function call -----------------+
  |                                                       |
  |   numbers[0]  numbers[1]  numbers[2]                  |
  |   [  2.4   ]  [ -3.7   ]  [  1.0   ]                  |
  |                                                       |
  |   numbers[3]  numbers[4]   mystery                    |
  |   [ -2.1   ]  [  0.5   ]   [ -0.9   ]                 |
  |                                                       |
  +-------------------------------------------------------+

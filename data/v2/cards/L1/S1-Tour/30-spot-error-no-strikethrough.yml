stem: |-
  Spot the error 4/5. A student wrote only the final mystery value
  without the trail. The number is correct — but is the answer
  acceptable under the hand-execute rubric?

  Code under review:
  // student answer (only the final number):
  //   mystery = 3.9
  ;


  Which diagnosis describes the bug?
correct: no strikethrough trail (work not shown)
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: |
  M04 / M09: omitted the strikethrough trail. Even with the right
  final number, hand-execute marking expects to see the WORK — every
  intermediate mystery value with the old crossed out. A bare "3.9"
  loses marks for missing process even when the answer is numerically
  correct. Always produce the trail.

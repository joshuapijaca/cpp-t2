id: "L1-S1-tour-29-spot-error-run-when-false"
schemaVersion: "v2"
atomId: "T-00"
qTags: ["Q1"]
stage: 1
level: "L1"
type: "FaultInjectionCard"

stem: |
  Spot the error 3/5. A student ignored the if-guard and added every
  array value to mystery. Find the bug.

brokenCode: |
  // student trace: ignored `if (data.numbers[i] > 0)`
  // brace-init: stat_double d = {{2.4,-3.7,1.0,-2.1,0.5}, -0.9};
  // pre-loop init: mystery = 0.0
  //
  // i=0  -> 0.0 + 2.4  = 2.4
  // i=1  -> 2.4 + (-3.7) = -1.3
  // i=2  -> -1.3 + 1.0 = -0.3
  // i=3  -> -0.3 + (-2.1) = -2.4
  // i=4  -> -2.4 + 0.5 = -1.9
  //
  // student answer: -1.9
  ;

bugLocations: [3]

fixedCode: |
  // CORRECT: only add when data.numbers[i] > 0.
  //
  // i=0 -> 2.4 > 0  -> add. mystery = 2.4
  // i=1 -> -3.7 > 0 -> false. SKIP.
  // i=2 -> 1.0 > 0  -> add. mystery = 3.4
  // i=3 -> -2.1 > 0 -> false. SKIP.
  // i=4 -> 0.5 > 0  -> add. mystery = 3.9
  //
  // correct answer: 3.9
  ;

bugCategory: "ran body when cond was false"

keyChecks:
  - "data.numbers[i] > 0"
  - "skip"

explanation: |
  M03: ran the if-body even when the condition was false. The if
  is a GATE — when the cond is false, the body is SKIPPED for that
  iteration. mystery does not change. Negative numbers should be
  skipped, not added. Correct answer = 3.9, not -1.9.


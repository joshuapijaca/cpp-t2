  void who_am_i(stat_double &data) {
    data.mystery = 0.0;            // <-- THIS line, fires once
    for (int i = 0; i < SIZE; i++) {
      if (data.numbers[i] > 0) {
        data.mystery = data.mystery + data.numbers[i];
      }
    }
  }

stem: |
  This is the practice-test Q1. Read the procedure (find-max). Then
  read the hand-execute body. The brace-init values are
  {-20.0, 3.2, 1.9, -1.5, 1.3} and mystery starts at 0.0.
whyOneLine: Practice Q1 = find-max algorithm with mixed-sign array; canonical answer is 3.2.
demoCode: |
  // PROCEDURE
  void who_am_i(stat_double &data) {
    int i;
    data.mystery = data.numbers[0];
    for (i = 0; i < SIZE; i++) {
      if (data.numbers[i] > data.mystery) {
        data.mystery = data.numbers[i];
      }
    }
    return;
  }

  // HAND-EXECUTE
  stat_double d = {{-20.0, 3.2, 1.9, -1.5, 1.3}, 0.0};
  who_am_i(d);
  // What is d.mystery now?

type: DemoCard
stem: |
  Q1 is a HAND-EXECUTE question. You read a tiny C++ program and trace
  it on paper. The program is always the same shape: a struct, a
  function, a brace-init, a call. Your job: produce the FINAL value
  of `data.mystery` after the function returns.
whyOneLine: Q1 is hand-executing the same templated mini-program every time — only the algorithm body and brace-init values vary.
demoCode: |
  +-- Q1 GENRE -------------------------------------------+
  | const int SIZE = 5;                                   |
  |                                                       |
  | struct stat_double {                                  |
  |   double numbers[SIZE];                               |
  |   double mystery;                                     |
  | };                                                    |
  |                                                       |
  | void who_am_i(stat_double &data) {                    |
  |   data.mystery = INIT;            // pre-loop init    |
  |   for (int i = 0; i < SIZE; i++) {                    |
  |     if (COND) {                                       |
  |       data.mystery = ACTION;                          |
  |     }                                                 |
  |   }                                                   |
  | }                                                     |
  |                                                       |
  | // hand-execute body (always the same shape)          |
  | stat_double d = {{...}, init};                        |
  | who_am_i(d);                                          |
  +-------------------------------------------------------+
  Final answer: report d.mystery after the call returns.
highlightTokens:
  - stat_double
  - numbers[SIZE]
  - mystery
  - INIT
  - COND
  - ACTION
usedIn:
  - Every Q1 question follows this skeleton — only INIT, COND, ACTION, brace-init values change.

stem: |
  Anatomy 1/10: the struct decl. Three required pieces: keyword
  `struct`, name `stat_double`, and brace-body containing the
  fields. Trailing `;` after the closing brace is mandatory.

whyOneLine: "Forgetting the trailing `;` after `}` is the #1 Q1/Q2 compile error — the struct ends with `};`."

demoCode: |
  struct stat_double {       // <- keyword + name + open brace
    double numbers[SIZE];    // <- array field (5 doubles)
    double mystery;          // <- scalar field
  };                         // <- close brace + REQUIRED `;`


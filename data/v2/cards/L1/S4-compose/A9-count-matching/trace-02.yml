stem: >-
  Hand-execute the count-matching loop on stat_double { numbers = {10.0, 5.0, 15.0, 3.0, 8.0}, mystery = ? }. Track i
  and data.mystery in the panel; print final mystery. threshold=8.
code: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    int mystery;
  };

  int main() {
    stat_double data = { {10.0, 5.0, 15.0, 3.0, 8.0}, 0 };
    data.mystery = 0;
    for (int i = 0; i < SIZE; i = i + 1) {
      if (data.numbers[i] > 8.0) {
        data.mystery = data.mystery + 1;
      }
    }
    cout << data.mystery << endl;
    return 0;
  }

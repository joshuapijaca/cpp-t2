stem: "Hand-execute the count-matching loop on stat_double { numbers = {1.0, 5.0, 3.0, 7.0, 2.0}, mystery = ? }. Track i and data.mystery in the panel; print final mystery. threshold=4."

code: |
  const int SIZE = 5;
  
  struct stat_double {
    double numbers[SIZE];
    int mystery;
  };
  
  int main() {
    stat_double data = { {1.0, 5.0, 3.0, 7.0, 2.0}, 0 };
    data.mystery = 0;
    for (int i = 0; i < SIZE; i = i + 1) {
      if (data.numbers[i] > 4.0) {
        data.mystery = data.mystery + 1;
      }
    }
    cout << data.mystery << endl;
    return 0;
  }


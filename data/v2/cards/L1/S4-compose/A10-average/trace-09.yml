stem: "Hand-execute the average loop on stat_double { numbers = {2.5, 3.5, 4.5, 5.5, 6.5}, mystery = ? }. Track i and data.mystery in the panel; print final mystery. floats."

code: |
  const int SIZE = 5;
  
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };
  
  int main() {
    stat_double data = { {2.5, 3.5, 4.5, 5.5, 6.5}, 0 };
    data.mystery = 0.0;
    for (int i = 0; i < SIZE; i = i + 1) {
      data.mystery = data.mystery + data.numbers[i];
    }
    data.mystery = data.mystery / 5;
    cout << data.mystery << endl;
    return 0;
  }


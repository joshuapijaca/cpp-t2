stem: >-
  Hand-execute the average loop on stat_double { numbers = {5.0, 5.0, 5.0, 5.0, 5.0}, mystery = ? }. Track i and
  data.mystery in the panel; print final mystery. equal.
code: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

  int main() {
    stat_double data = { {5.0, 5.0, 5.0, 5.0, 5.0}, 0 };
    data.mystery = 0.0;
    for (int i = 0; i < SIZE; i = i + 1) {
      data.mystery = data.mystery + data.numbers[i];
    }
    data.mystery = data.mystery / 5;
    cout << data.mystery << endl;
    return 0;
  }

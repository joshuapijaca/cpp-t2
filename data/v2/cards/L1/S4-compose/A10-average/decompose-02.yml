  for (int i = 0; i < SIZE; i = i + 1) {
    data.mystery = data.mystery + data.numbers[i];
    data.mystery = data.mystery / SIZE;
  }

question: "Pick the option that correctly identifies the bug."

options:
  - label: "A"
    text: "The bug: divide is INSIDE the loop — runs SIZE times; correct: divide once after the loop ends. The correct output should be 3."

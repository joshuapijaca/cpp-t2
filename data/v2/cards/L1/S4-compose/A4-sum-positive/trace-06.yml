stem: >-
  Hand-execute the sum-positive loop on stat_double { numbers = {2.4, -3.7, 5.1, -1.2, 4.8}, mystery = ? }. Track i and
  data.mystery in the panel; print final mystery. V2.0 floats.
code: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

  int main() {
    stat_double data = { {2.4, -3.7, 5.1, -1.2, 4.8}, 0 };
    data.mystery = 0.0;
    for (int i = 0; i < SIZE; i = i + 1) {
      if (data.numbers[i] > 0) {
        data.mystery = data.mystery + data.numbers[i];
      }
    }
    cout << data.mystery << endl;
    return 0;
  }

teachMe: |
  Strikethrough convention (verbose):
    data.mystery cell trail:
      ~~-0.9~~ ~~0.0~~ ~~2.4~~ ~~5.4~~ 7.4
    Each new value strikes the previous live value.
    Only the rightmost (unstruck) value is the live one.

  Step-by-step (i, data.mystery, action):
    init brace:    mystery = -0.9
    line 10:       mystery = 0.0   (resets)
    i = 0, 2.4 > 0  -> mystery = 0.0 + 2.4 = 2.4
    i = 1, -3.7 > 0 false, skip
    i = 2, -1.7 > 0 false, skip
    i = 3, 3.0 > 0  -> mystery = 2.4 + 3.0 = 5.4
    i = 4, 2.0 > 0  -> mystery = 5.4 + 2.0 = 7.4
    print: 7.4

  Final terminal output: 7.4

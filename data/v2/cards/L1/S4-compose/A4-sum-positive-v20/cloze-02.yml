  stat_double data = { {2.4, -3.7, -1.7, 3.0, 2.0}, -0.9 };
  data.mystery = 0.0;
  for (int i = 0; i < 5; i = i + 1) {
    if (data.numbers[i] > 0) {
      data.mystery = data.mystery + data.numbers[i];
    }
  }
clozeSentence: After iteration 3 finishes (i was 3, now incrementing), data.mystery = ____.
answer: "5.4"
explanation: |
  Iterations 0,1,2,3 = i=0,1,2,3. Sum runs: +2.4, skip, skip, +3.0 = 5.4. Iteration 4 (i=4) has not run yet.

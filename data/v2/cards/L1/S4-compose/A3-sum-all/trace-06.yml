stem: >-
  Hand-execute the sum-all loop on stat_double { numbers = {10.0, 20.0, 30.0, 40.0, 50.0}, mystery = ? }. Track i and
  data.mystery in the panel; print final mystery. large positives.
code: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

  int main() {
    stat_double data = { {10.0, 20.0, 30.0, 40.0, 50.0}, 0 };
    data.mystery = 0.0;
    for (int i = 0; i < SIZE; i = i + 1) {
      data.mystery = data.mystery + data.numbers[i];
    }
    cout << data.mystery << endl;
    return 0;
  }

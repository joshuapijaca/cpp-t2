stem: "Hand-execute the find-min loop on stat_double { numbers = {5.0, 3.0, 7.0, 2.0, 8.0}, mystery = ? }. Track i and data.mystery in the panel; print final mystery. simple."

code: |
  const int SIZE = 5;
  
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };
  
  int main() {
    stat_double data = { {5.0, 3.0, 7.0, 2.0, 8.0}, 0 };
    data.mystery = data.numbers[0];
    for (int i = 1; i < SIZE; i = i + 1) {
      if (data.numbers[i] < data.mystery) {
        data.mystery = data.numbers[i];
      }
    }
    cout << data.mystery << endl;
    return 0;
  }


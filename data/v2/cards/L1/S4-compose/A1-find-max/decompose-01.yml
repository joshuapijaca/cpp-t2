stem: The code below CLAIMS to compute find-max on numbers={3.0, 1.0, 5.0, 2.0, 4.0}. There is a bug. Identify it.
code: |
  data.mystery = 0;
  for (int i = 0; i < SIZE; i = i + 1) {
    if (data.numbers[i] > data.mystery) {
      data.mystery = data.numbers[i];
    }
  }
question: Pick the option that correctly identifies the bug.
options:
  - label: A
    text: >-
      The bug: mystery is initialised to 0 — wrong if all values are negative or if 0 is not in the array; also starts
      at i=0 which double-counts numbers[0]. The correct output should be 5.
  - label: B
    text: The code is correct — it produces the right answer.
  - label: C
    text: The bug is the loop bound `i < SIZE`; should be `i <= SIZE`.
  - label: D
    text: The bug is in the cout statement; missing endl flush.
correctLabel: A
explanation: >-
  Spot-error drill. mystery is initialised to 0 — wrong if all values are negative or if 0 is not in the array; also
  starts at i=0 which double-counts numbers[0]. Targets CM-A1-init-with-zero, CM-A1-use-lt-instead-of-gt.

stem: >-
  Hand-execute the find-max loop on stat_double { numbers = {5.0, 4.0, 3.0, 2.0, 1.0}, mystery = ? }. Track i and
  data.mystery in the panel; print final mystery. mixed-sign mid-max.
code: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

  int main() {
    stat_double data = { {5.0, 4.0, 3.0, 2.0, 1.0}, 0 };
    data.mystery = data.numbers[0];
    for (int i = 1; i < SIZE; i = i + 1) {
      if (data.numbers[i] > data.mystery) {
        data.mystery = data.numbers[i];
      }
    }
    cout << data.mystery << endl;
    return 0;
  }

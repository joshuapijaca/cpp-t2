stem: The code below CLAIMS to compute index-of-max on numbers={2.0, -3.0, 4.0, -1.0, 5.0}. There is a bug. Identify it.
code: |
  data.mystery = 0;
  for (int i = 1; i < SIZE; i = i + 1) {
    if (data.numbers[i] > data.mystery) {
      data.mystery = data.numbers[i];
    }
  }
question: Pick the option that correctly identifies the bug.
options:
  - label: A
    text: >-
      The bug: compares numbers[i] against data.mystery (an int treated as value) — wrong: index-of-max needs
      `numbers[i] > numbers[data.mystery]` AND must store `i` (index), not numbers[i] (value). The correct output should
      be 4.
  - label: B
    text: The code is correct — it produces the right answer.
  - label: C
    text: The bug is the loop bound `i < SIZE`; should be `i <= SIZE`.
  - label: D
    text: The bug is in the cout statement; missing endl flush.
correctLabel: A
explanation: >-
  Spot-error drill. compares numbers[i] against data.mystery (an int treated as value) — wrong: index-of-max needs

stem: "Hand-execute the index-of-max loop on stat_double { numbers = {100.0, 50.0, 25.0, 12.0, 6.0}, mystery = ? }. Track i and data.mystery in the panel; print final mystery. large values."

code: |
  const int SIZE = 5;
  
  struct stat_double {
    double numbers[SIZE];
    int mystery;
  };
  
  int main() {
    stat_double data = { {100.0, 50.0, 25.0, 12.0, 6.0}, 0 };
    data.mystery = 0;
    for (int i = 1; i < SIZE; i = i + 1) {
      if (data.numbers[i] > data.numbers[data.mystery]) {
        data.mystery = i;
      }
    }
    cout << data.mystery << endl;
    return 0;
  }


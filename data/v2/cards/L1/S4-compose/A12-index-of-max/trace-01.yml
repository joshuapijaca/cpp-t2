stem: >-
  Hand-execute the index-of-max loop on stat_double { numbers = {3.0, 1.0, 5.0, 2.0, 4.0}, mystery = ? }. Track i and
  data.mystery in the panel; print final mystery. simple.
code: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    int mystery;
  };

  int main() {
    stat_double data = { {3.0, 1.0, 5.0, 2.0, 4.0}, 0 };
    data.mystery = 0;
    for (int i = 1; i < SIZE; i = i + 1) {
      if (data.numbers[i] > data.numbers[data.mystery]) {
        data.mystery = i;
      }
    }
    cout << data.mystery << endl;
    return 0;
  }

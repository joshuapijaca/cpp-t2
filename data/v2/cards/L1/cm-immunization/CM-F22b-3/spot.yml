stem: |-
  who_am_i is void and mutates via reference. Fix the wrong call site that tries to assign its return value.

  Code under review:
  int main() {
      stat_double d = { {1,2,3,4,5}, 0.0 };
      d = who_am_i(d);
      cout << d.mystery << endl;
      return 0;
  }


  Which diagnosis describes the bug?
correct: tries to assign return value of a void function
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  who_am_i returns void — there is no value to assign. The reference parameter (`stat_double &data`) is the channel
  back: the caller's d is mutated in place. Just call it as a statement.

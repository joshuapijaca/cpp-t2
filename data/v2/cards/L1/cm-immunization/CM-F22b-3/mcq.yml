type: "MCQCard"

stem: |
  After `who_am_i(d);` (where who_am_i is void and uses `stat_double &data`), the caller's d.mystery is...

correct: 'changed — the reference exposed d to the function, which assigned to it'

distractors:
  - 'unchanged — pass-by-value made a copy'
  - 'undefined — no return value to capture'
  - 'depends on the return type of who_am_i'

explanation: |
  Pass-by-reference (`&data`) makes data inside the function an alias for the caller's variable. Assignments through the alias mutate the caller's storage. No return value needed — that's the entire point of `&`.


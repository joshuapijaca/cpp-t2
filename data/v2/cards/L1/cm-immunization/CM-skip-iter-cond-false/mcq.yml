stem: |
  During a Q1 trace, the if-condition on iteration i=2 is FALSE. What should you record?
correct: Same iteration row, with mystery unchanged from i=1.
distractors:
  - Skip the row — there's no work to record.
  - Set mystery back to the pre-loop init.
  - Set mystery to numbers[i].
explanation: >
  A false condition means the body is skipped, not the iteration. Mystery carries through unchanged. Recording the row
  stops you from losing the value.

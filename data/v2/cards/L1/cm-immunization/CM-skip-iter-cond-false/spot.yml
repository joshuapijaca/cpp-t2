stem: >-
  In this Q1 sum-positive trace, the student dropped the mystery row entirely on a `false` iteration. What did they get
  wrong?


  Code under review:

  // algo: if (numbers[i] > 0) mystery = mystery + numbers[i];

  // numbers = {2.4, -3.7, 1.0}; mystery init = 0.0

  //

  // i=0:  2.4>0 true   0.0+2.4=2.4   mystery=2.4

  // i=1:  -3.7>0 false [no row]

  // i=2:  1.0>0 true   ?.?+1.0       mystery=?



  Which diagnosis describes the bug?
correct: omitted false-branch row in trace
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  When the if-condition is false the body skips, but the iteration still happens and mystery still has its previous
  value. Always record a row (even if mystery is unchanged) so the next iter reads the right value.

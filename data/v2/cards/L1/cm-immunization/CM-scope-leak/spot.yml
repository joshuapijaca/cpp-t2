stem: |
  This trace incorrectly references `i` after the loop ended. Find the line that's wrong.

brokenCode: |
  for (int i = 0; i < SIZE; i++) {
    data.mystery = data.mystery + data.numbers[i];
  }
  cout << "stopped at " << i;

bugLocations: [4]

fixedCode: |
  int i;
  for (i = 0; i < SIZE; i++) {
    data.mystery = data.mystery + data.numbers[i];
  }
  cout << "stopped at " << i;

bugCategory: 'scope leak — `i` declared in for-init is dead after the loop'

keyChecks:
  - 'int i;'

explanation: |
  `for (int i = ...)` makes `i` local to the loop. After the loop closes `i` is gone. Either declare `int i;` outside the loop, or move the cout inside.


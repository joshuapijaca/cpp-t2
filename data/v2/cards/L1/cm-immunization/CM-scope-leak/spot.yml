stem: |-
  This trace incorrectly references `i` after the loop ended. Find the line that's wrong.

  Code under review:
  for (int i = 0; i < SIZE; i++) {
    data.mystery = data.mystery + data.numbers[i];
  }
  cout << "stopped at " << i;


  Which diagnosis describes the bug?
correct: scope leak — `i` declared in for-init is dead after the loop
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  `for (int i = ...)` makes `i` local to the loop. After the loop closes `i` is gone. Either declare `int i;` outside
  the loop, or move the cout inside.

stem: |
  After `for (int i = 0; i < N; i++) { ... }`, can you `cout << i;` on the next line?

correct: 'No — `i` is scoped to the for-statement and is gone after the closing brace.'

distractors:
  - 'Yes — `i` always lives until the function returns.'
  - 'Yes, but only if N > 0.'
  - 'Only if you write `cout << ::i;`.'

explanation: |
  `for (int i ...)` declares `i` with for-statement scope. To use `i` after the loop, declare it outside: `int i; for (i = 0; ...)`.


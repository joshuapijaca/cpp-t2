stem: |-
  After flip(d), the student claimed numbers[1..4] became 0. Find and fix the wrong panel.

  Code under review:
  // Code:
  //   void flip(stat_double &data) {
  //       data.numbers[0] = 99.0;
  //       data.mystery = 7.7;
  //   }
  //   int main() {
  //       stat_double d = { {1,2,3,4,5}, 0.0 };
  //       flip(d);
  //   }
  //
  // Student panel after flip:
  //   d.numbers = {99, 0, 0, 0, 0}
  //   d.mystery = 7.7


  Which diagnosis describes the bug?
correct: wiped unmutated fields after a partial-mutation function call
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  flip only assigns to data.numbers[0] and data.mystery. The other slots (numbers[1..4]) are read but never written, so
  they retain their original values. A function call doesn't "consume" or "clear" the struct — only assignments change
  it.

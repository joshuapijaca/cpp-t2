qTags: ["Q1", "Q3"]
stage: 4
level: "L1"
type: "FaultInjectionCard"

stem: |
  After flip(d), the student claimed numbers[1..4] became 0. Find and fix the wrong panel.

brokenCode: |
  // Code:
  //   void flip(stat_double &data) {
  //       data.numbers[0] = 99.0;
  //       data.mystery = 7.7;
  //   }
  //   int main() {
  //       stat_double d = { {1,2,3,4,5}, 0.0 };
  //       flip(d);
  //   }
  //
  // Student panel after flip:
  //   d.numbers = {99, 0, 0, 0, 0}
  //   d.mystery = 7.7

bugLocations: [10]

fixedCode: |
  // Correct panel after flip:
  //   d.numbers = {99, 2, 3, 4, 5}
  //   d.mystery = 7.7
  //
  // (only fields ASSIGNED inside flip change; others stay)

bugCategory: "wiped unmutated fields after a partial-mutation function call"

keyChecks:
  - "{99, 2, 3, 4, 5}"

explanation: |
  flip only assigns to data.numbers[0] and data.mystery. The other slots (numbers[1..4]) are read but never written, so they retain their original values. A function call doesn't "consume" or "clear" the struct — only assignments change it.


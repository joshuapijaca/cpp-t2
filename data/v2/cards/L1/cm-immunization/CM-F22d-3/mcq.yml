stem: |
  After `who_am_i(d);` returns, what happens to fields the function did NOT assign to?

correct: 'They keep their original values — only fields that were ASSIGNED change'

distractors:
  - 'They are reset to 0 / default values'
  - 'They become undefined'
  - 'They are returned to the function scope and lost'

explanation: |
  Pass-by-reference exposes ALL the caller's fields, but a function only changes the fields where it executes an assignment. Reading a field doesn't change it; absent assignment, the value persists.


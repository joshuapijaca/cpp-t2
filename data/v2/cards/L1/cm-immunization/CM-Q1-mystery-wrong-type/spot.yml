stem: |-
  This stat_double struct uses the wrong type for mystery. Find and fix the field.

  Code under review:
  struct stat_double {
      double numbers[SIZE];
      int mystery;
  };


  Which diagnosis describes the bug?
correct: wrong type — int instead of double for accumulator
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  mystery accumulates sums/products of doubles — its type must match the array element type. int truncates fractional
  parts (1.5 + 2.7 = 4 instead of 4.2).

stem: |
  In `struct stat_double { double numbers[SIZE]; ___ mystery; };`, what is the right type for mystery?

correct: '`double` — same type as numbers[] elements (accumulator matches element type)'

distractors:
  - '`int` — saves space'
  - '`float` — same family, different precision'
  - '`void` — type-less placeholder'

explanation: |
  mystery stores running sums/products of doubles, so it must hold doubles. int truncates; float loses precision; void is not a value type.


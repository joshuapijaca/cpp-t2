stem: |-
  This for loop init slot is missing the type keyword. Fix the declaration.

  Code under review:
  for (i = 0; i < SIZE; i++) {
      cout << numbers[i] << endl;
  }


  Which diagnosis describes the bug?
correct: "for-loop init: assignment instead of declaration"
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  Without `int`, `i = 0` is an assignment to a variable that may not exist. Use `int i = 0` to declare AND initialise i
  in one step, scoped to the loop.

stem: |
  This for loop init slot is missing the type keyword. Fix the declaration.

brokenCode: |
  for (i = 0; i < SIZE; i++) {
      cout << numbers[i] << endl;
  }

bugLocations: [1]

fixedCode: |
  for (int i = 0; i < SIZE; i++) {
      cout << numbers[i] << endl;
  }

bugCategory: "for-loop init: assignment instead of declaration"

keyChecks:
  - "int i = 0"

explanation: |
  Without `int`, `i = 0` is an assignment to a variable that may not exist. Use `int i = 0` to declare AND initialise i in one step, scoped to the loop.


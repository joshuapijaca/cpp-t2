stem: |
  What is the canonical for-loop init slot in Test 2 C++?

correct: '`int i = 0` — declare-and-init in the slot itself'

distractors:
  - '`i = 0` — assumes i was declared elsewhere'
  - '`int i;` — declares but does not init'
  - '`i := 0` — Pascal-style; not valid C++'

explanation: |
  `int i = 0` does both: declares a fresh int, initialised to 0, scoped to the loop. The other forms either leak scope or rely on a prior declaration.


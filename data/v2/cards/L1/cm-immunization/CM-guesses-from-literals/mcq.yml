stem: |
  In Q1 ("What does this program print?") with no compiler, what is the only reliable strategy?
correct: "Hand-execute: maintain a variables panel, walk line-by-line, read off cout output"
distractors:
  - Guess based on the largest literal in the code
  - Guess based on the first variable assigned
  - Skip and rely on partial credit
explanation: >
  Guessing fails the moment any arithmetic happens (which is always). Hand-execution is the only reliable method: be the
  CPU, maintain the panel, read off output.

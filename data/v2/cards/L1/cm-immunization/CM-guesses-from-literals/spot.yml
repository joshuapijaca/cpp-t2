level: L1
type: MCQCard
stem: >-
  A student guessed the program output from the literals (4 or 3) without tracing. The actual output requires
  hand-execution. Find the wrong-guess answer and fix it.


  Code under review:

  // Student answer for "what does this program print?":

  // Output: 4

  //

  // Code:

  //   int a = 4;

  //   int b = a * 3;

  //   cout << b << endl;



  Which diagnosis describes the bug?
correct: guessed from literals; did not trace arithmetic
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  The student saw `int a = 4;` and guessed 4 was the answer. They missed line 2 — the arithmetic. Always: maintain the
  variables panel line-by-line and read off the cout value, never guess from literals.

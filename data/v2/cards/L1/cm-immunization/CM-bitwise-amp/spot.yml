schemaVersion: "v2"
atomId: "A1"
qTags: ["Q1"]
stage: 4
level: "L1"
type: "FaultInjectionCard"

stem: |
  This Q1 condition uses bitwise `&` instead of logical `&&`. Trace this on `numbers[i] = -1` and you'll see the bug.

brokenCode: |
  if (numbers[i] > 0 & numbers[i] < 10) ...   // BUG: bitwise &

bugLocations: [1]

fixedCode: |
  if (numbers[i] > 0 && numbers[i] < 10) ...   // logical &&

bugCategory: 'bitwise & vs logical &&'

keyChecks:
  - '&&'

explanation: |
  `&` is bitwise AND on integer bits. `&&` is logical short-circuit AND on booleans. With negative numbers the bitwise version may give surprising results and skip short-circuit semantics.


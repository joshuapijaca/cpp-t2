stem: |-
  This Q1 condition uses bitwise `&` instead of logical `&&`. Trace this on `numbers[i] = -1` and you'll see the bug.

  Code under review:
  if (numbers[i] > 0 & numbers[i] < 10) ...   // BUG: bitwise &


  Which diagnosis describes the bug?
correct: bitwise & vs logical &&
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  `&` is bitwise AND on integer bits. `&&` is logical short-circuit AND on booleans. With negative numbers the bitwise
  version may give surprising results and skip short-circuit semantics.

stem: |-
  This Q1 trace mixed up the loop counter `i` with the value `numbers[i]`. Spot the bug.

  Code under review:
  // numbers = {2.4, 3.7, 1.0, 2.1, 0.5}; mystery init = 0.0
  // algo: mystery = mystery + numbers[i]
  // i=0: 0.0 + 0 = 0.0   mystery = 0.0   // BUG: used i, not numbers[i]


  Which diagnosis describes the bug?
correct: confused `i` with `numbers[i]`
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  `i` is the index (0,1,2,...). `numbers[i]` is the VALUE at that index. The accumulator adds `numbers[i]` (the value),
  not `i` (the index).

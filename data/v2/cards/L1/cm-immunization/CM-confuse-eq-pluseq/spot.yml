stem: |
  This Q1 trace replaced mystery instead of accumulating it. Spot the bug.

brokenCode: |
  // algo: mystery = mystery + numbers[i]
  // numbers = {2.4, 3.7}; init = 0.0
  //
  // i=0: mystery = 2.4    // wrote 2.4 directly (lost +)
  // i=1: mystery = 3.7    // overwrote 2.4 (lost the running sum)

bugLocations: [4]

fixedCode: |
  // i=0: 0.0 + 2.4 = 2.4    mystery = 2.4   // accumulator: keep prev + new
  // i=1: 2.4 + 3.7 = 6.1    mystery = 6.1

bugCategory: 'misread `=` as plain assign (dropped the +)'

keyChecks:
  - 'mystery + numbers[i]'

explanation: |
  `mystery = mystery + X` accumulates. The `mystery` on the RHS is the previous value. Without it, you just overwrite each iter and lose the running sum.


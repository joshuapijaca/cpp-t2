stem: |-
  This Q1 trace replaced mystery instead of accumulating it. Spot the bug.

  Code under review:
  // algo: mystery = mystery + numbers[i]
  // numbers = {2.4, 3.7}; init = 0.0
  //
  // i=0: mystery = 2.4    // wrote 2.4 directly (lost +)
  // i=1: mystery = 3.7    // overwrote 2.4 (lost the running sum)


  Which diagnosis describes the bug?
correct: misread `=` as plain assign (dropped the +)
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  `mystery = mystery + X` accumulates. The `mystery` on the RHS is the previous value. Without it, you just overwrite
  each iter and lose the running sum.

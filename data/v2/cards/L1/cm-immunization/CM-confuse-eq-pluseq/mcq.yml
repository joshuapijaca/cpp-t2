stem: |
  What does `x = x + y;` do?

correct: 'Reads x and y, adds them, stores result back into x (accumulate).'

distractors:
  - 'Stores y into x (overwrite).'
  - 'Increments x by 1.'
  - 'Tests if x equals x+y.'

explanation: |
  `x = x + y` is the accumulator pattern: read x and y, sum, write to x.


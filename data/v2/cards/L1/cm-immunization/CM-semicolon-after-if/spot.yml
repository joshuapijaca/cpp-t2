stem: |-
  This Q1 if-statement always runs the body. Why? Find the stray punctuation.

  Code under review:
  if (numbers[i] > 0);
    data.mystery = data.mystery + numbers[i];


  Which diagnosis describes the bug?
correct: stray `;` after if-condition
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  A semicolon after `if (...)` ends the if with an empty body. The line below runs unconditionally. Delete the `;` so
  the body is the next statement.

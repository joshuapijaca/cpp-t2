stem: |
  Given `stat_double d = {{2.4,3.7,1.0,2.1,0.5}, -0.9};`, which fields get which values?
correct: "`numbers={2.4,3.7,1.0,2.1,0.5}; mystery=-0.9`"
distractors:
  - "`numbers={2.4,3.7,1.0,2.1,0.5,-0.9}; mystery=0.0`"
  - "`numbers={2.4}; mystery=3.7`"
  - "`numbers={};` — empty by default"
explanation: >
  Outer braces enumerate the struct fields in order. Inner braces enumerate the array. The `-0.9` after the inner braces
  is the scalar `mystery`.

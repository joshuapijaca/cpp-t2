stem: >-
  This Q1 trace mis-parsed the brace-init. The student treated the comma after the inner array as part of numbers. Find
  the line that's wrong.


  Code under review:

  stat_double d = {{2.4,3.7,1.0,2.1,0.5}, -0.9};

  // student trace

  // numbers = {2.4, 3.7, 1.0, 2.1, 0.5, -0.9}   // BUG

  // mystery = 0.0



  Which diagnosis describes the bug?
correct: mis-parsed brace-init — included scalar in the array
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  The OUTER brace `{ ... }` holds two items: the inner-brace array `{2.4,...,0.5}` and the scalar `-0.9`. They are
  separate fields, not one big list.

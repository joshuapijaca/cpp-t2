bugCategory: 'mis-parsed brace-init — included scalar in the array'

keyChecks:
  - 'mystery = -0.9'

explanation: |
  The OUTER brace `{ ... }` holds two items: the inner-brace array `{2.4,...,0.5}` and the scalar `-0.9`. They are separate fields, not one big list.


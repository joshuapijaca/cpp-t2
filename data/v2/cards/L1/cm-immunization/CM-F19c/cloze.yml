stem: Fill in the loop bound for iterating over an int array of compile-time size SIZE.
code: |
  const int SIZE = 5;
  int arr[SIZE] = {1,2,3,4,5};
  for (int i = 0; i < ___; i++) {
      cout << arr[i] << endl;
  }
clozeSentence: Fill in the file-scope size constant.
answer: SIZE
explanation: |
  Use SIZE — the const int file-scope symbol — as the loop bound. C++ raw arrays do not have `.length` or `.size()`.

stem: |-
  This loop tries to use arr.length (Java/JS style). Fix it to use the SIZE constant.

  Code under review:
  const int SIZE = 5;
  int arr[SIZE] = {1,2,3,4,5};
  for (int i = 0; i < arr.length; i++) {
      cout << arr[i] << endl;
  }


  Which diagnosis describes the bug?
correct: C++ raw arrays do not have .length / .size()
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  C++ raw arrays do NOT carry size with them — `arr.length` is JS/Java syntax and is a compile error here. Use the
  `const int SIZE` symbol or pass size as a separate parameter.

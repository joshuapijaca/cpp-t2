stem: |
  Inside a function that received `int arr[]`, how do you find out how many elements it has?

correct: 'You cannot — pass size as a separate parameter (or use a `const int SIZE` symbol)'

distractors:
  - '`arr.length` — every array carries its length'
  - '`arr.size()` — the size method returns the count'
  - '`sizeof(arr) / sizeof(arr[0])` — works in any function'

explanation: |
  C++ raw arrays do not carry size. Inside a function the array decayed to a pointer-like alias — size is permanently lost. The standard fix: pass size separately, or use a file-scope SIZE constant.


stem: |
  Inside a struct, what is the right way to declare a fixed-size array field?

correct: '`double numbers[SIZE];` where `const int SIZE = 5;` was declared above the struct'

distractors:
  - '`double numbers[];` — empty brackets, sized by initialiser'
  - '`double numbers[n];` — sized by a runtime variable'
  - '`double numbers;` — no brackets, single value'

explanation: |
  Struct array fields require a compile-time-known size. Empty brackets are illegal inside a struct (unlike function parameters, where they decay to a pointer).


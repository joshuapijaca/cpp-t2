clozeSentence: 'Fill in the compile-time constant for the array size.'

answer: 'SIZE'

explanation: |
  SIZE is the file-scope `const int SIZE = 5;` constant. Inside a struct, array sizes must be compile-time constants — `SIZE` qualifies, but a runtime variable would not.


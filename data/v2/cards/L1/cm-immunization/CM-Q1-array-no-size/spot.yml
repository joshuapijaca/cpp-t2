stage: 4
level: "L1"
type: "FaultInjectionCard"

stem: |
  This struct array field has empty brackets. Fix it so the struct compiles.

brokenCode: |
  const int SIZE = 5;
  struct stat_double {
      double numbers[];
      double mystery;
  };

bugLocations: [3]

fixedCode: |
  const int SIZE = 5;
  struct stat_double {
      double numbers[SIZE];
      double mystery;
  };

bugCategory: "empty array brackets in struct field"

keyChecks:
  - "numbers[SIZE]"

explanation: |
  Inside a struct, the array size MUST be a compile-time constant. Empty brackets are a compile error. Use SIZE (declared `const int SIZE = 5;` above).


stem: |-
  This struct array field has empty brackets. Fix it so the struct compiles.

  Code under review:
  const int SIZE = 5;
  struct stat_double {
      double numbers[];
      double mystery;
  };


  Which diagnosis describes the bug?
correct: empty array brackets in struct field
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  Inside a struct, the array size MUST be a compile-time constant. Empty brackets are a compile error. Use SIZE
  (declared `const int SIZE = 5;` above).

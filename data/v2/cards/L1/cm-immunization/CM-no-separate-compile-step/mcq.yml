stem: |
  What's the right pipeline to run a C++ program from `hello.cpp`?

correct: 'edit hello.cpp -> compile with g++ -> run the resulting executable'

distractors:
  - 'edit hello.cpp -> run hello.cpp directly (no compile step)'
  - 'edit hello.cpp -> upload to a server -> the server runs it'
  - 'edit hello.cpp -> run g++ which is your program'

explanation: |
  C++ source is plain text. The compiler (g++) reads it and writes an executable. Only the executable can be run. Source ≠ program.


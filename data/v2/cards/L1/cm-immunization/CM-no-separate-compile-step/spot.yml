qTags: ["Q1", "Q2", "Q3", "Q4"]
stage: 4
level: "L1"
type: "FaultInjectionCard"

stem: |
  A student tried to run hello.cpp directly without compiling. Identify and fix the missing step.

brokenCode: |
  // Terminal:
  //   $ ls
  //   hello.cpp
  //   $ ./hello.cpp
  //   bash: ./hello.cpp: cannot execute binary file

bugLocations: [4]

fixedCode: |
  // Terminal (corrected):
  //   $ ls
  //   hello.cpp
  //   $ g++ hello.cpp -o hello
  //   $ ./hello

bugCategory: "tried to run source file; missing compile step"

keyChecks:
  - "g++ hello.cpp -o hello"

explanation: |
  hello.cpp is plain text — the CPU cannot run text. You must first compile it: `g++ hello.cpp -o hello` produces an executable (hello) which you THEN run with `./hello`.


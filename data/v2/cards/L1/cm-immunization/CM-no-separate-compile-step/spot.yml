stem: |-
  A student tried to run hello.cpp directly without compiling. Identify and fix the missing step.

  Code under review:
  // Terminal:
  //   $ ls
  //   hello.cpp
  //   $ ./hello.cpp
  //   bash: ./hello.cpp: cannot execute binary file


  Which diagnosis describes the bug?
correct: tried to run source file; missing compile step
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  hello.cpp is plain text — the CPU cannot run text. You must first compile it: `g++ hello.cpp -o hello` produces an
  executable (hello) which you THEN run with `./hello`.

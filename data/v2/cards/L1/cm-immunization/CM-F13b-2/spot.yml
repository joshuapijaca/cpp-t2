level: "L1"
type: "FaultInjectionCard"

stem: |
  This cout uses Java-style + concatenation. Fix it to use C++ stream insertion.

brokenCode: |
  int x = 5;
  cout << "x = " + x + endl;

bugLocations: [2]

fixedCode: |
  int x = 5;
  cout << "x = " << x << endl;

bugCategory: "Java + concat instead of C++ << chaining"

keyChecks:
  - 'cout << "x = " << x << endl;'

explanation: |
  In C++, cout chains values with `<<`, NOT `+`. The `+` form treats `"x = "` as a string literal pointer and adds x as a number — pointer arithmetic, garbage output. Always chain with `<<`.


stem: |-
  This cout uses Java-style + concatenation. Fix it to use C++ stream insertion.

  Code under review:
  int x = 5;
  cout << "x = " + x + endl;


  Which diagnosis describes the bug?
correct: Java + concat instead of C++ << chaining
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  In C++, cout chains values with `<<`, NOT `+`. The `+` form treats `"x = "` as a string literal pointer and adds x as
  a number — pointer arithmetic, garbage output. Always chain with `<<`.

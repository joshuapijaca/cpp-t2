stem: |
  How does C++ chain text and an int value into one cout statement?

correct: '`cout << "x = " << x << endl;` — repeated stream insertion `<<`'

distractors:
  - '`cout << "x = " + x + endl;` — Java-style + concatenation'
  - '`cout << "x = ", x, endl;` — Python-style commas'
  - '`cout >> "x = " >> x >> endl;` — input direction'

explanation: |
  `<<` is the stream-insertion operator; chain it once per value. `+` would do pointer arithmetic, `,` is the comma operator (only the last side is printed), `>>` is for input.


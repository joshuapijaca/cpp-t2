stem: |
  When a function parameter is `int arr[]` (no &), what happens at the call site for the caller's array?

correct: 'arr aliases the caller storage (decay); mutations through arr[i] are visible after return'

distractors:
  - 'arr is a local copy; mutations are local-only'
  - 'undefined behaviour because there is no &'
  - 'compile error — arrays must always be passed via &'

explanation: |
  Raw arrays decay to a pointer-like alias at the parameter boundary — no copy is made. Test 2 V2.0 wraps the array in a struct + `&` to make this explicit, but the underlying mechanism is the same: no copy.


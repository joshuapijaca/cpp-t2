stem: |
  A student wrote that the function would NOT change the caller's array because no `&` was used. Find and fix the wrong claim.

brokenCode: |
  // Code:
  //   void zero_first(int arr[], int size) { arr[0] = 0; }
  //   int main() { int data[3] = {7,8,9}; zero_first(data, 3);
  //                cout << data[0] << endl; }
  //
  // Student claim:
  //   "Output: 7. The array param has no & so it's a local copy."

bugLocations: [6]

fixedCode: |
  // Correct claim:
  //   "Output: 0. Raw arrays decay to pointer-like aliases at the
  //    parameter boundary; mutations through arr[i] are visible to
  //    the caller. No `&` needed for arrays."

bugCategory: "thinks raw array param makes a local copy"

keyChecks:
  - "0"

explanation: |
  Arrays do NOT copy at the parameter boundary — they decay. Mutations to arr[i] inside the function modify the caller's storage. Output is 0, not 7.


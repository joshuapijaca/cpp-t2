stem: >-
  A student wrote that the function would NOT change the caller's array because no `&` was used. Find and fix the wrong
  claim.


  Code under review:

  // Code:

  //   void zero_first(int arr[], int size) { arr[0] = 0; }

  //   int main() { int data[3] = {7,8,9}; zero_first(data, 3);

  //                cout << data[0] << endl; }

  //

  // Student claim:

  //   "Output: 7. The array param has no & so it's a local copy."



  Which diagnosis describes the bug?
correct: thinks raw array param makes a local copy
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  Arrays do NOT copy at the parameter boundary — they decay. Mutations to arr[i] inside the function modify the caller's
  storage. Output is 0, not 7.

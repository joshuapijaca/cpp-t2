stem: "Fill in what data[0] holds in main after the call."

code: |
  void zero_first(int arr[], int size) {
      arr[0] = 0;
  }
  int main() {
      int data[3] = {7, 8, 9};
      zero_first(data, 3);
      // After call, data[0] == ___
  }

clozeSentence: 'Fill in the value of data[0] after zero_first returns.'

answer: '0'

explanation: |
  Raw array decay: arr inside zero_first aliases caller's data. Setting arr[0] = 0 mutates data[0] in main. The mutation persists.


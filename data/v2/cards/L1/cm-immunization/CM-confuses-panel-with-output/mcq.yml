stem: |
  The exam asks "What does the program print?" After hand-execution your panel is `{x:5, y:12, z:17}`. What do you write?

correct: 'Only the terminal output (e.g. `17`) — the panel is scratch'

distractors:
  - 'The full panel: x=5, y=12, z=17'
  - 'Both panel and output, separated'
  - 'The source code, copied out neatly'

explanation: |
  "Print" means terminal output. The panel is your scratchpad to ARRIVE at the output. Only the cout result goes on the answer line.


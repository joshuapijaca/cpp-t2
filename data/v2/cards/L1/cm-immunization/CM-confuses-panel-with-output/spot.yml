bugCategory: "wrote variables panel instead of terminal output"

keyChecks:
  - "17"

explanation: |
  The exam wording asks for what the program PRINTS. cout << z prints 17 — only the terminal output is the answer. The panel `{x:5, y:12, z:17}` is your scratch working, not the deliverable.


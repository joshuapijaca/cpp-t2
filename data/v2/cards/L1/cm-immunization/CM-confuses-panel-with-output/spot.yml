stem: >-
  The exam asked "What does the program print?" The student wrote the variables panel where only the terminal output was
  wanted. Find the wrong answer.


  Code under review:

  // Question: What does this program print?

  //

  // Student answer:

  //   x = 5, y = 12, z = 17

  //

  // Code traced:

  //   int x = 5;

  //   int y = 12;

  //   int z = x + y;

  //   cout << z << endl;



  Which diagnosis describes the bug?
correct: wrote variables panel instead of terminal output
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  The exam wording asks for what the program PRINTS. cout << z prints 17 — only the terminal output is the answer. The
  panel `{x:5, y:12, z:17}` is your scratch working, not the deliverable.

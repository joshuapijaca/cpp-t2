  //
  // Student answer:
  //   x = 5, y = 12, z = 17
  //
  // Code traced:
  //   int x = 5;
  //   int y = 12;
  //   int z = x + y;
  //   cout << z << endl;

bugLocations: [4]

fixedCode: |

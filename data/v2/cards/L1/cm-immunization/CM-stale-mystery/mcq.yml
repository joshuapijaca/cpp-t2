stem: |
  In `mystery = mystery + numbers[i]`, the right-hand `mystery` refers to:

correct: 'The value of mystery from the PREVIOUS iteration (or pre-loop init for i=0).'

distractors:
  - 'Always the pre-loop initial value.'
  - 'The brace-init value from `{numbers..., mystery}`.'
  - 'Always 0.0 — that is what mystery starts at.'

explanation: |
  The accumulator pattern reads the latest mystery each iteration. Using a stale value flat-lines the running total.


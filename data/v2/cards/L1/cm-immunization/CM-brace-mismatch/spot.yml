stem: |
  A student submitted code that wouldn't compile because the final closing brace was missing. Below is the FIXED version. Identify the line where the student would need to add a closing brace.

brokenCode: |
  void who_am_i(stat_double &data) {
    data.mystery = 0.0;
    for (int i = 0; i < SIZE; i++) {
      data.mystery = data.mystery + data.numbers[i];
    }
  } /* this final close was MISSING in student code */

bugLocations: [6]

fixedCode: |
  void who_am_i(stat_double &data) {
    data.mystery = 0.0;
    for (int i = 0; i < SIZE; i++) {
      data.mystery = data.mystery + data.numbers[i];
    }
  } /* close of function */

bugCategory: 'unbalanced braces — missing closing brace'

keyChecks:
  - '/* close of function */'

explanation: |
  Two opens were made (function and for-loop). The student only wrote one close. Always count opens vs closes; the function body needs its own final close after the for-loop closes.


stem: >-
  A student submitted code that wouldn't compile because the final closing brace was missing. Below is the FIXED
  version. Identify the line where the student would need to add a closing brace.


  Code under review:

  void who_am_i(stat_double &data) {
    data.mystery = 0.0;
    for (int i = 0; i < SIZE; i++) {
      data.mystery = data.mystery + data.numbers[i];
    }
  } /* this final close was MISSING in student code */



  Which diagnosis describes the bug?
correct: unbalanced braces — missing closing brace
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  Two opens were made (function and for-loop). The student only wrote one close. Always count opens vs closes; the
  function body needs its own final close after the for-loop closes.

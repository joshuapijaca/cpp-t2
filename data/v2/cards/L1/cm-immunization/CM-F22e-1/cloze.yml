clozeSentence: Fill in the pass-by-reference marker between type and parameter name.
answer: "&"
explanation: >
  `&` between the type and the parameter name marks pass-by-reference: data aliases the caller's variable. No `[]`
  because the struct (not a raw array) is being passed.

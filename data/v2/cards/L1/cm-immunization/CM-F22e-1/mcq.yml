stem: |
  Test 2 V2.0 wraps the array inside a struct. Which signature is correct for who_am_i?
correct: "`void who_am_i(stat_double &data)` — struct by reference"
distractors:
  - "`void who_am_i(stat_double data[], int size)` — array of structs"
  - "`void who_am_i(int &data[], int size)` — reference to array"
  - "`void who_am_i(stat_double data, int size)` — struct by value"
explanation: >
  Test 2 uses Idiom 2: a single struct passed by reference. The `&` makes data alias the caller's variable; size is
  reachable via the file-scope `const int SIZE`.

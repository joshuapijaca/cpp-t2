  // i=0: 0 + numbers[mystery=0] = 0 + 3 = 3    mystery = 3
  // i=1: 3 + numbers[mystery=3] = 3 + 0 = 3    mystery = 3
  // i=2: 3 + numbers[mystery=3] = 3 + 0 = 3    mystery = 3


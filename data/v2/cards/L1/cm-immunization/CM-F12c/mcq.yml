stem: |
  In C++, what does `if (x = 5)` actually do (assuming int x = 3 above)?
correct: Assigns 5 to x and runs the body (5 is non-zero, treated as true)
distractors:
  - Compares x to 5 and runs the body if equal
  - Fails to compile — = is illegal in if
  - Runs the body once and skips on retry
explanation: >
  `=` is assignment. The expression `x = 5` evaluates to the assigned value (5), and 5 is non-zero, so the if-condition
  is always true. As a side effect, x becomes 5. The intended comparison needs `==`.

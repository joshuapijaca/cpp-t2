stem: |-
  This if-statement uses = (assignment) where == (comparison) was meant. Fix it.

  Code under review:
  int x = 3;
  if (x = 5) {
      cout << "match" << endl;
  }


  Which diagnosis describes the bug?
correct: "= (assignment) used in condition where == (comparison) was meant"
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  `=` ASSIGNS 5 to x and the if-condition then uses 5 (non-zero = true) — the body always runs and x is silently
  mutated. `==` is the comparison: only enters if x equals 5.

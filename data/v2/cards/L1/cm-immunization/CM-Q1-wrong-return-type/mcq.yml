stem: |
  Test 2 V2.0 who_am_i mutates the struct via &data. What is its return type?

correct: '`void` — the function returns nothing; the mutation is the side effect'

distractors:
  - '`double` — returns the accumulated mystery value'
  - '`int` — returns the number of elements processed'
  - '`stat_double` — returns the modified struct'

explanation: |
  who_am_i works through the reference parameter — the caller's storage is updated directly. There is no value to return, so the type is `void`.


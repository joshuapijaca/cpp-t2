stem: |-
  This who_am_i function declares a non-void return type but mutates via reference. Fix the signature.

  Code under review:
  double who_am_i(stat_double &data) {
      data.mystery = 0.0;
      for (int i = 0; i < SIZE; i++) {
          data.mystery = data.mystery + data.numbers[i];
      }
  }


  Which diagnosis describes the bug?
correct: non-void return type but no return statement
distractors:
  - no bug — code is correct
  - pre-loop init missing
  - loop bound off-by-one (use < not <=)
explanation: >
  who_am_i mutates the caller's struct via the reference parameter and returns nothing. The return type must be `void`.
  Declaring `double` requires a return statement, which doesn't fit the mutate-via-reference pattern.

commonMistakeIds: ["CM-Q1-missing-amp"]
stem: |
  Which line is the canonical Q1 function signature as it appears on
  the test?
correct: "void who_am_i(stat_double &data)"
distractors:
  - "void who_am_i(stat_double data)"
  - "double who_am_i(stat_double &data)"
  - "void who_am_i(&stat_double data)"
explanation: |
  The signature is `void who_am_i(stat_double &data)`. The `&` after
  the type makes `data` a reference (alias) to the caller's struct;
  mutations are visible to the caller.
  Distractor 1 (CM-Q1-missing-amp) drops the `&` and silently passes
  by value — the loop's mutations are then lost. Distractor 2
  changes the return type. Distractor 3 puts the `&` on the wrong
  side of the type, which is a syntax error.
notes: "MCQ form for QA-M10 type-diversity."

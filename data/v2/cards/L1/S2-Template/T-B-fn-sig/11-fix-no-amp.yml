stem: |
  This signature compiles but is broken in semantics. Find and fix.

prompt: |
  Rewrite the signature so the function can mutate the caller's struct.

template: |
  // BROKEN: function takes a copy of data
  void who_am_i(stat_double data) {
  }

canonicalAnswer: |
  void who_am_i(stat_double &data) {
  }

keyChecks:
  - "&data"

forbiddenTokens: []

explanation: |
  Add `&` before `data`. Without it, mutations inside the function
  affect a LOCAL copy and the caller's d.mystery never changes.
  This is M11 in the Q1 mistakes catalog.


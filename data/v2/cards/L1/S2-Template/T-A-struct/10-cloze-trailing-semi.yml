stem: |
  Fill in the missing token after the closing brace. This is the most
  commonly forgotten character on the whole test.
prompt: |
  Provide the punctuation that closes the struct definition after the
  closing brace.
template: |
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  }___
canonicalAnswer: |
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };
keyChecks:
  - "};"
forbiddenTokens: []
explanation: |
  `;` — required after the closing brace of every struct definition.
  Forgetting this is the highest-frequency Q2 error and a common Q1
  trip on the procedure listing.

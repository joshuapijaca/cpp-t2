prompt: |
  Provide the SIZE constant declaration AND the struct definition.

template: |
  // (type SIZE const + struct from memory)

canonicalAnswer: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

keyChecks:
  - "const int SIZE = 5"
  - "struct stat_double"
  - "numbers[SIZE]"
  - "mystery"
  - "};"

forbiddenTokens:
  - "while"

explanation: |
  Two declarations. SIZE is a compile-time constant used inside the
  struct's array brackets. Without `const int SIZE = 5;` the
  `numbers[SIZE]` line fails to compile.


id: "L1-S2-TA-18-fix-broken-2"
schemaVersion: "v2"
atomId: "T-01"
qTags: ["Q1"]
stage: 2
level: "L1"
type: "TemplateRecallCard"

stem: |
  This struct uses the wrong size form. Fix it.

prompt: |
  The brackets are empty. Provide the corrected version.

template: |
  // BROKEN (missing array size):
  struct stat_double {
    double numbers[];
    double mystery;
  };

canonicalAnswer: |
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

keyChecks:
  - "numbers[SIZE]"
  - "mystery"
  - "};"

forbiddenTokens:
  - "while"

explanation: |
  Inside a struct, the array size MUST be a compile-time constant —
  no empty brackets allowed. Use `SIZE` (declared `const int SIZE = 5;`
  above).

source:
  kind: "v2"
  ref: "Test 2 V2.0 attempt 1 — numbers[SIZE]"

commonMistakeIds: ["CM-Q1-array-no-size"]
status: "NEW"
createdBy: "SA-L1-S1S2"
notes: |
  T-A repair: empty brackets.
authoringStatus: "DRAFT"

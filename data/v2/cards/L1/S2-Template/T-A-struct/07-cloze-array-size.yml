id: "L1-S2-TA-07-cloze-array-size"
schemaVersion: "v2"
atomId: "T-01"
qTags: ["Q1"]
stage: 2
level: "L1"
type: "TemplateRecallCard"

stem: |
  Fill in the array size constant.

prompt: |
  What size literal/const is inside the brackets?

template: |
  struct stat_double {
    double numbers[___];
    double mystery;
  };

canonicalAnswer: |
  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

keyChecks:
  - "SIZE"

forbiddenTokens:
  - "MAX"
  - "5"

explanation: |
  `SIZE` — the symbolic constant declared above. Using `5` directly
  would still compile but loses the connection to the const.


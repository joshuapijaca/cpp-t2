stem: |
  Final speed rep: type the entire V2.0 Q1 program from a fully
  blank prompt under 90 seconds. This is the S2 exit gate.
prompt: |
  Type the full canonical V2.0 Q1 program.
template: |
  // (totally blank — under 90 sec)
canonicalAnswer: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

  void who_am_i(stat_double &data) {
    data.mystery = 0.0;
    for (int i = 0; i < SIZE; i++) {
      if (data.numbers[i] > 0) {
        data.mystery = data.mystery + data.numbers[i];
      }
    }
  }

  stat_double d = {{2.4, -3.7, 1.0, -2.1, 0.5}, -0.9};
  who_am_i(d);

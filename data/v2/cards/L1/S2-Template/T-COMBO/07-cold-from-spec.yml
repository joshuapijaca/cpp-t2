type: "TemplateRecallCard"

stem: |
  Cold spec: write the full Q1 program for "sum-positive on
  {2.4, -3.7, 1.0, -2.1, 0.5} starting from -0.9".

prompt: |
  Spec: stat_double struct (numbers[SIZE], mystery). Function:
  sum-positive. Brace-init: {2.4,-3.7,1.0,-2.1,0.5} with mystery
  -0.9. Call who_am_i. Write the whole thing.

template: |
  // (cold from spec)

canonicalAnswer: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

  void who_am_i(stat_double &data) {
    data.mystery = 0.0;
    for (int i = 0; i < SIZE; i++) {
      if (data.numbers[i] > 0) {
        data.mystery = data.mystery + data.numbers[i];
      }
    }
  }

  stat_double d = {{2.4, -3.7, 1.0, -2.1, 0.5}, -0.9};
  who_am_i(d);

keyChecks:
  - "struct stat_double"
  - "void who_am_i(stat_double &data)"
  - "data.mystery = 0.0"
  - "for (int i = 0; i < SIZE; i++)"
  - "data.numbers[i] > 0"
  - "data.mystery = data.mystery + data.numbers[i]"
  - "{{2.4, -3.7, 1.0, -2.1, 0.5}, -0.9}"
  - "who_am_i(d);"

forbiddenTokens:
  - "while"

explanation: |
  Type the full program from a textual spec — no template hint. This
  exercises retrieval from spec wording rather than template recall.


stem: |
  Which pre-loop init line is correct for the V2.0 sum-positive
  algorithm?
correct: "data.mystery = 0.0;"
distractors:
  - "data.mystery = data.numbers[0];"
  - "data.mystery = SIZE;"
  - "double data.mystery = 0.0;"
explanation: |
  Sum-positive starts mystery at 0.0 so the running sum begins from
  a clean baseline. Distractor 1 is the find-max init (T-03 alt).
  Distractor 2 is meaningless — SIZE is the array length. Distractor
  3 redeclares the field with `double`, which is wrong syntax inside
  a function body (the field already exists on the struct).
notes: "MCQ form for QA-M10 type-diversity."

id: L1-S2-TF-04-cloze-inner-open
schemaVersion: v2
atomId: T-06
qTags:
  - Q1
stage: 2
level: L1
type: TemplateRecallCard
stem: |
  This brace-init is missing the inner array opening brace. Provide
  the corrected full line.
prompt: |
  Provide the corrected brace-init line.
template: |
  // BROKEN (missing inner array open-brace before 2.4 -- needs another { )
  stat_double d = {2.4, -3.7, 1.0, -2.1, 0.5}, -0.9};
canonicalAnswer: |
  stat_double d = {{2.4, -3.7, 1.0, -2.1, 0.5}, -0.9};
keyChecks:
  - "{2.4"
forbiddenTokens: []
explanation: |
  `{` — opens the array sub-initialiser. Without it, the parser
  parses `2.4` directly as a struct field.
source:

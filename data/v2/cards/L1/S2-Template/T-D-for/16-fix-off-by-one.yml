id: "L1-S2-TD-16-fix-off-by-one"
schemaVersion: "v2"
atomId: "T-04"
qTags: ["Q1"]
stage: 2
level: "L1"
type: "TemplateRecallCard"

stem: |
  This for-header has an off-by-one error. Fix it.

prompt: |
  Find the bug and rewrite the for-header.

template: |
  // BROKEN
  for (int i = 0; i <= SIZE; i++) {
  }

canonicalAnswer: |
  for (int i = 0; i < SIZE; i++) {
  }

keyChecks:
  - "i < SIZE"

forbiddenTokens:
  - "i <= SIZE"

explanation: |
  `<=` runs one extra iteration with i=SIZE, indexing
  `data.numbers[SIZE]` which is out of bounds (valid indices 0..SIZE-1).
  Use strict `<`.

source:
  kind: "v2"
  ref: "Test 2 V2.0 attempt 1 — strict < required"

commonMistakeIds: ["CM-Q1-off-by-one"]
status: "NEW"
createdBy: "SA-L1-S1S2"
notes: |
  T-D repair: off-by-one.

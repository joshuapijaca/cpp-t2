stem: |
  This for-header omits the type declaration on the loop variable.
  Provide the correct version.

prompt: |
  Add the missing type keyword.

template: |
  // BROKEN: i is not declared
  for (i = 0; i < SIZE; i++) {
  }

canonicalAnswer: |
  for (int i = 0; i < SIZE; i++) {
  }

keyChecks:
  - "int i = 0"

forbiddenTokens: []

explanation: |
  `int i = 0` — declare the loop variable inside the header. The
  practice test does declare `int i;` separately above the loop, but
  the canonical SIT102 / V2.0 form puts `int` inside the for header.


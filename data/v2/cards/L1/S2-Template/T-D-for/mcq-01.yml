commonMistakeIds: ["CM-Q1-off-by-one", "CM-Q1-iplusplus-before-body"]
stem: |
  Which for-header is the canonical Q1 counted loop?
correct: "for (int i = 0; i < SIZE; i++)"
distractors:
  - "for (int i = 1; i <= SIZE; i++)"
  - "for (int i = 0; i++ < SIZE;)"
  - "for (i = 0, i < SIZE, i++)"
explanation: |
  The Q1 loop walks indices 0..SIZE-1 inclusive: init `int i = 0`,
  guard `i < SIZE`, post `i++`. Distractor 1 starts at 1 and uses
  `<=`, which both off-by-ones (skips index 0, runs index SIZE).
  Distractor 2 mixes guard and post incorrectly. Distractor 3 uses
  commas where the for-header expects semicolons.
notes: "MCQ form for QA-M10 type-diversity."

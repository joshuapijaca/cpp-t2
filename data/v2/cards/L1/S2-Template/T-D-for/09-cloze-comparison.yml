qTags: ["Q1"]
stage: 2
level: "L1"
type: "TemplateRecallCard"

stem: |
  Fill in the comparison operator in the guard.

prompt: |
  Which comparison goes between i and SIZE?

template: |
  for (int i = 0; i ___ SIZE; i++) {
  }

canonicalAnswer: |
  for (int i = 0; i < SIZE; i++) {
  }

keyChecks:
  - "<"
  - "i < SIZE"

forbiddenTokens:
  - "<="
  - ">="

explanation: |
  `<` — strict less-than. `<=` would do one iteration too many and
  index past the array's last cell.

source:
  kind: "v2"
  ref: "Test 2 V2.0 attempt 1 — < operator"


stem: |
  Add the body braces around the for-loop's body region.
prompt: |
  Provide the missing body braces.
template: |
  for (int i = 0; i < SIZE; i++) ___
    // body
  ___
canonicalAnswer: |
  for (int i = 0; i < SIZE; i++) {
    // body
  }
keyChecks:
  - "{"
  - "}"
forbiddenTokens: []
explanation: |
  Open `{` after the closing paren of the for-header, close `}` after
  the last body statement. Required when the body has more than one
  statement (and stylistically required even for single-statement
  bodies in SIT102).

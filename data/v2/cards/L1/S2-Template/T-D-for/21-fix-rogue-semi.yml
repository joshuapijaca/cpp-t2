stem: |
  This for-loop has a stray semicolon after the closing paren.
  Provide the corrected first 2 lines.
prompt: |
  Remove the bug.
template: |
  // BROKEN: stray ; after the for-header's )
  for (int i = 0; i < SIZE; i++);
  {
    // body never runs as the body of the for
  }
canonicalAnswer: |
  for (int i = 0; i < SIZE; i++) {
    // body
  }
keyChecks:

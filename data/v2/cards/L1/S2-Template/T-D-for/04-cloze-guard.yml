id: "L1-S2-TD-04-cloze-guard"
schemaVersion: "v2"
atomId: "T-04"
qTags: ["Q1"]
stage: 2
level: "L1"
type: "TemplateRecallCard"

stem: |
  Fill in the GUARD slot of the for-header. This is the canonical
  V2.0 Q1 for-loop — fill the strict comparison that keeps the loop
  going as long as the index is below SIZE.

prompt: |
  What goes in the SECOND slot (the loop guard)?

template: |
  for (int i = 0; ___; i++) {
  }

canonicalAnswer: |
  for (int i = 0; i < SIZE; i++) {
  }

keyChecks:
  - "i < SIZE"

forbiddenTokens:
  - "i <= SIZE"

explanation: |
  `i < SIZE` — STRICT less-than. Using `i <= SIZE` would access
  numbers[SIZE] which is OUT OF BOUNDS (valid indices are 0..SIZE-1).
  This off-by-one is M07 in the Q1 mistake catalog.

source:
  kind: "v2"
  ref: "Test 2 V2.0 attempt 1 — for guard"

commonMistakeIds: ["CM-Q1-off-by-one"]

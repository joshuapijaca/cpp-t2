stem: |
  Fill in the loop bound (the constant on the right of `<`).
prompt: |
  What goes after `i <`?
template: |
  for (int i = 0; i < ___; i++) {
  }
canonicalAnswer: |
  for (int i = 0; i < SIZE; i++) {
  }
keyChecks:
  - SIZE
forbiddenTokens:
  - MAX
  - "5"
explanation: |
  `SIZE` — the same constant the struct's array uses. Keeps the loop
  in lockstep with the array length.

stem: |
  Which 3-line block is the canonical V2.0 sum-positive if-action
  body?
correct: |-
  if (data.numbers[i] > 0) {
    data.mystery = data.mystery + data.numbers[i];
  }
distractors:
  - |-
    if (data.numbers[i] > 0) {
      data.mystery = data.numbers[i];
    }
  - |-
    if (data.numbers[i] > 0)
      data.mystery + data.numbers[i];
  - |-
    if (data.numbers[i] > 0); {
      data.mystery = data.mystery + data.numbers[i];
    }
explanation: |
  Sum-positive accumulates: mystery = mystery + numbers[i]. Distractor
  1 OVERWRITES mystery with numbers[i] instead of adding (CM-Q1-eq-vs-pluseq).
  Distractor 2 uses `+` (an expression) instead of `=` (an assignment)
  and so does nothing. Distractor 3 has a stray `;` after the if
  condition — the body becomes a no-op block that always runs.
notes: "MCQ form for QA-M10 type-diversity."

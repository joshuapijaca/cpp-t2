stem: |
  Fill in the find-max condition.
prompt: |
  What is the cond when finding the maximum?
template: |
  if (___) {
    data.mystery = data.numbers[i];
  }
canonicalAnswer: |
  if (data.numbers[i] > data.mystery) {
    data.mystery = data.numbers[i];
  }
keyChecks:
  - data.numbers[i] > data.mystery
forbiddenTokens: []
explanation: |
  `data.numbers[i] > data.mystery` — current cell strictly greater
  than the running best. Strict `>` is conventional; `>=` works but
  may overwrite with equal values, slightly slower.

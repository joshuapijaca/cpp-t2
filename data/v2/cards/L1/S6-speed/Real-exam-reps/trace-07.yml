stem: >-
  REAL V2.0 EXAM REP. Trace sum-positive on stat_double with numbers = {-2.5, 6.5, -1.0, 4.0, 3.0}. Target: 2 minutes.
  Use strikethrough on every reassignment.
code: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

  int main() {
    stat_double data = { {-2.5, 6.5, -1.0, 4.0, 3.0}, 0 };
    data.mystery = 0.0;
    for (int i = 0; i < SIZE; i = i + 1) {
      if (data.numbers[i] > 0) {
        data.mystery = data.mystery + data.numbers[i];
      }
    }
    cout << data.mystery << endl;
    return 0;
  }

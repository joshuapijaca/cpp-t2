stem: >-
  MIXED MOCK. Read code carefully — do NOT assume the algorithm. Trace under 2-min target. numbers = {2.0, -3.0, 4.0,
  -1.0, 5.0}.
code: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    double mystery;
  };

  int main() {
    stat_double data = { {2.0, -3.0, 4.0, -1.0, 5.0}, 0 };
    data.mystery = 0.0;
    for (int i = 0; i < SIZE; i = i + 1) {
      if (data.numbers[i] > 0) {
        data.mystery = data.mystery + data.numbers[i];
      }
    }
    cout << data.mystery << endl;
    return 0;
  }

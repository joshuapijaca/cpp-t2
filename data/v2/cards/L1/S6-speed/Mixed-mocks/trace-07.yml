code: |
  const int SIZE = 5;

  struct stat_double {
    double numbers[SIZE];
    int mystery;
  };

  int main() {
    stat_double data = { {5.0, 4.0, 3.0, 2.0, 1.0}, 0 };
    data.mystery = 0;
    for (int i = 1; i < SIZE; i = i + 1) {
      if (data.numbers[i] > data.numbers[data.mystery]) {
        data.mystery = i;
      }
    }
    cout << data.mystery << endl;
    return 0;
  }

id: F-18
name: "for (int i=0; i<N; i++) counting loop"
level: L0
phase: D
teaches: "Init / test / increment header. Body runs while test true. Standard counted iteration. Used in Q1, Q3, Q4."
prereqs: [F-17, F-11]
usedByQs: [Q1, Q3, Q4]
cardCountTarget: 26
source:
  - kind: pfg
    ref: "Programming Fundamentals Guide § part-1/3-control-flow/2-trailside/04-3-for-loop"
    quote: "A for loop has three parts in its header: an initialiser, a condition, and a step. The body runs while the condition is true."
  - kind: pfg
    ref: "Programming Fundamentals Guide § part-2/5-working-with-multiples/2-trailside/01-for-loop"
    quote: "for (int i = 0; i < SIZE; i++) is the canonical loop for iterating over an array."
  - kind: seminar
    ref: "SIT102 Seminar Mondays 6pm new (2) @ 00:36:31 — Saloni: 'It tells you for I equal to 0'"
  - kind: seminar
    ref: "SIT102 Seminar Mondays 6pm new (2) @ 00:41:18 — Saloni: 'we do I plus plus. ... is 5 less than five? No, so this is where we stop the loop'"
commonMistakes:
  - CM-F18a  # off-by-one i<=N
  - CM-F18b  # forgets i++ → infinite loop
  - CM-F18c  # places i++ before body executes
splitInto: [F-18a, F-18b]
notes:
  cardMix: { walkthrough: 2, demo: 3, decompose: 3, trace: 5, cloze: 5, μWrite: 4, tmplRec: 1, mcq: 2, proc: 1 }

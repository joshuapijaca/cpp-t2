  P-05:
    canonical_example: |
      // After compiling: ./hello runs the instructions
      // Line 1: cout executes -> "Hello" appears
      // Line 2: return 0 -> program exits
    expected_output: "Hello printed, program exits with 0"
    see_demo_snippet: |
      // Running the .exe executes each line in order:
      int main() {
        cout << "Hello" << endl;   // line 1: prints Hello
        return 0;                  // line 2: exits
      }
    see_demo_highlights: ["// line 1: prints Hello", "// line 2: exits"]
    see_decompose_snippet: |
      int main() {
        cout << "Hello" << endl;
        int x = 5;
        cout << x << endl;
        return 0;
      }


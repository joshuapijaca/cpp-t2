  ME-01:
    canonical_example: |
      // Mock Exam 1: struct + read + who_am_i + main
      struct stat_double { double mystery; double a; double b; };
      void who_am_i(stat_double &data) {
        data.mystery = data.a + data.b;
      }
    expected_output: "mystery = a + b"
    see_demo_snippet: |
      // Mock 1 — all four questions in one program
      struct stat_double { double mystery; double a; double b; };

      void who_am_i(stat_double &data) {
        data.mystery = data.a + data.b;
      }

      void read_stat(stat_double &list[], int count) {
        for (int i = 0; i < count; i++) {
          cin >> list[i].a;
          cin >> list[i].b;
        }
      }

      int main() {
        const int MAX = 100;
        stat_double list[MAX];
        int count;
        cin >> count;
        read_stat(list, count);
        printf("%.2f\n", list[0].mystery);
        return 0;
      }
    see_demo_highlights: ["stat_double", "who_am_i", "read_stat", "int main()"]
    see_decompose_snippet: |
      struct stat_double { double mystery; double a; double b; };
      void who_am_i(stat_double &data) {
        data.mystery = data.a + data.b;
      }
      void read_stat(stat_double &list[], int count) {
        for (int i = 0; i < count; i++) {
          cin >> list[i].a;
          cin >> list[i].b;
        }
      }
      int main() {
        const int MAX = 100;
        stat_double list[MAX];
        int count;
        cin >> count;
        read_stat(list, count);
        return 0;
      }

  ME-02:
    canonical_example: |
      struct stat_double { double mystery; double numbers[5]; };
      void who_am_i(stat_double &data) {
        data.mystery = data.numbers[0];
        for (int i = 1; i < 5; i++) {
          if (data.numbers[i] > data.mystery)
            data.mystery = data.numbers[i];
        }
      }
